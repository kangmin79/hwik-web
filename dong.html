<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이동 중... - 휙</title>
<meta name="robots" content="noindex, follow">
<meta name="description" content="휙 동별 아파트 시세 페이지로 이동합니다.">
<link rel="canonical" href="https://hwik.kr/">
<meta http-equiv="refresh" content="3; url=https://hwik.kr/">
<style>
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f8f8fa;color:#1a1a2e;}
.box{max-width:430px;margin:80px auto;padding:40px 24px;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.06);text-align:center;}
.logo{width:48px;height:48px;background:#f5c842;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#1a1a2e;margin:0 auto 16px;}
h1{font-size:16px;margin:0 0 8px;font-weight:600;}
p{font-size:13px;color:#6b7280;margin:0 0 20px;line-height:1.6;}
a{display:inline-block;padding:10px 20px;background:#1a1a2e;color:#fff;text-decoration:none;border-radius:8px;font-size:13px;}
.spinner{width:24px;height:24px;border:3px solid #e5e7eb;border-top-color:#f5c842;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">휙</div>
  <div class="spinner"></div>
  <h1>새 페이지로 이동 중입니다</h1>
  <p>페이지 주소가 변경되었습니다.<br>잠시만 기다려 주세요.</p>
  <a href="https://hwik.kr/">바로 이동</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/config.js"></script>
<script src="/makeSlug.js"></script>
<script>
(function(){
  var p = new URLSearchParams(location.search);
  var gu = p.get('gu'), dong = p.get('dong');
  if (!gu || !dong) { location.replace('/'); return; }
  try {
    var sb = supabase.createClient(HWIK_CONFIG.SUPABASE_URL, HWIK_CONFIG.SUPABASE_KEY);
    sb.from('danji_pages')
      .select('address,location')
      .eq('location', gu + ' ' + dong)
      .not('id','like','offi-%')
      .limit(1)
      .then(function(r){
        var row = r && r.data && r.data[0];
        if (row && row.address) {
          var slug = makeDongSlug(gu, dong, row.address);
          location.replace('/dong/' + slug);
        } else {
          location.replace('/');
        }
      })
      .catch(function(){ location.replace('/'); });
  } catch(e) { location.replace('/'); }
})();
</script>
</body>
</html>
