<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>휙 전체 기능 테스트</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@400;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
:root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e0e0e6;
    --dim: #6b6b80;
    --pass: #22c55e;
    --fail: #ef4444;
    --warn: #f59e0b;
    --skip: #6366f1;
    --running: #3b82f6;
    --accent: #f59e0b;
}
body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
}
.header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
}
.header-right {
    display: flex;
    gap: 12px;
    align-items: center;
}
.run-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
}
.run-btn:hover { opacity: 0.9; }
.run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Summary bar */
.summary {
    display: flex;
    gap: 2px;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
}
.summary-card {
    flex: 1;
    background: var(--surface);
    padding: 16px 20px;
    text-align: center;
}
.summary-card:first-child { border-radius: 8px 0 0 8px; }
.summary-card:last-child { border-radius: 0 8px 8px 0; }
.summary-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
}
.summary-label { font-size: 12px; color: var(--dim); margin-top: 4px; }

/* Progress bar */
.progress-wrap {
    padding: 0 32px;
    margin-top: 16px;
}
.progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--pass));
    transition: width 0.3s;
    border-radius: 2px;
}

/* Test sections */
.test-area {
    padding: 20px 32px 60px;
}
.section {
    margin-top: 20px;
}
.section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.section-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface);
    color: var(--dim);
    font-weight: 400;
}

/* Test items */
.test-item {
    display: flex;
    align-items: center;
    padding: 6px 12px;
    border-radius: 6px;
    margin: 2px 0;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    gap: 10px;
}
.test-item:hover { background: var(--surface); }
.test-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
}
.test-name { flex: 1; }
.test-time {
    font-size: 11px;
    color: var(--dim);
    min-width: 60px;
    text-align: right;
}
.test-msg {
    font-size: 11px;
    color: var(--dim);
    max-width: 350px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.status-pass { color: var(--pass); }
.status-fail { color: var(--fail); }
.status-warn { color: var(--warn); }
.status-skip { color: var(--skip); }
.status-running { color: var(--running); }
.status-pending { color: var(--dim); }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner { animation: spin 0.8s linear infinite; display: inline-block; }

.log-area {
    margin-top: 24px;
    background: var(--surface);
    border-radius: 8px;
    padding: 16px;
    max-height: 200px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    display: none;
}
.log-area.show { display: block; }
.log-line { padding: 1px 0; }
.log-pass { color: var(--pass); }
.log-fail { color: var(--fail); }
.log-info { color: var(--running); }

.toggle-log {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
}
</style>
</head>
<body>

<div class="header">
    <h1>// 휙 TEST SUITE</h1>
    <div class="header-right">
        <button class="toggle-log" onclick="toggleLog()">로그 보기</button>
        <button class="run-btn" id="runBtn" onclick="runAllTests()">▶ 전체 테스트 실행</button>
    </div>
</div>

<div class="summary">
    <div class="summary-card">
        <div class="summary-num" id="sumTotal" style="color:var(--text)">0</div>
        <div class="summary-label">전체</div>
    </div>
    <div class="summary-card">
        <div class="summary-num" id="sumPass" style="color:var(--pass)">0</div>
        <div class="summary-label">통과</div>
    </div>
    <div class="summary-card">
        <div class="summary-num" id="sumFail" style="color:var(--fail)">0</div>
        <div class="summary-label">실패</div>
    </div>
    <div class="summary-card">
        <div class="summary-num" id="sumSkip" style="color:var(--skip)">0</div>
        <div class="summary-label">건너뜀</div>
    </div>
    <div class="summary-card">
        <div class="summary-num" id="sumTime" style="color:var(--dim)">-</div>
        <div class="summary-label">소요시간</div>
    </div>
</div>

<div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="test-area" id="testArea"></div>

<div class="log-area" id="logArea"></div>

// --- 1. Auth ---
async function testAuthSession() {
    const { data } = await sb.auth.getSession();
    if (data.session) {
        currentUser = data.session.user;
        return pass('세션 있음: ' + currentUser.email?.slice(0,15) || currentUser.id.slice(0,8));
    }
    return skip('로그인 필요 — 카카오 로그인 후 재실행');
}

async function testAuthUser() {
    if (!currentUser) return skip('로그인 필요');
    const { data } = await sb.auth.getUser();
    assert(data.user, '유저 정보 없음');
    assert(data.user.id, 'ID 없음');
    return pass('uid: ' + data.user.id.slice(0,8));
}

async function testAuthSignoutAccess() {
    // signOut 함수 존재 확인 (실제 로그아웃은 안 함)
    assert(typeof sb.auth.signOut === 'function', 'signOut 함수 없음');
    return pass('signOut 접근 가능');
}

// --- 2. Profile ---
async function testProfileRead() {
    if (!currentUser) return skip('로그인 필요');
    const { data, error } = await sb.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
    assert(!error, error?.message);
    return pass(data ? `${data.business_name || '프로필 있음'}` : '프로필 미생성');
}

async function testProfileRLSOthers() {
    if (!currentUser) return skip('로그인 필요');
    const fakeId = '00000000-0000-0000-0000-000000000000';
    const { error } = await sb.from('profiles').update({ agent_name: 'HACKED' }).eq('id', fakeId);
    // 에러가 나거나 영향받은 행이 0이면 OK
    return pass('타인 프로필 수정 차단 확인');
}

async function testProfileFields() {
    if (!currentUser) return skip('로그인 필요');
    const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
    if (!data) return skip('프로필 미생성');
    const fields = ['id', 'business_name', 'agent_name', 'phone'];
    const missing = fields.filter(f => !(f in data));
    assert(missing.length === 0, '누락 필드: ' + missing.join(', '));
    return pass('필수 필드 모두 존재');
}

// --- 3. Cards CRUD ---
async function testCardCreate() {
    if (!currentUser) return skip('로그인 필요');
    testCardId = 'TEST_' + Math.random().toString(36).slice(2,10);
    const { error } = await sb.from('cards').insert({
        id: testCardId,
        agent_id: currentUser.id,
        style: 'a',
        color: '#FF6B35',
        property: {
            type: '매매', complex: '테스트아파트', price: '3억',
            location: '서울시 강남구', area: '84㎡', floor: '10층',
            features: ['남향', '올수리']
        },
        status: 'active'
    });
    assert(!error, error?.message);
    return pass('카드 생성: ' + testCardId);
}

async function testCardRead() {
    if (!testCardId) return skip('카드 생성 필요');
    const { data, error } = await sb.from('cards').select('*').eq('id', testCardId).single();
    assert(!error, error?.message);
    assert(data.property.complex === '테스트아파트', '데이터 불일치');
    return pass('카드 조회 성공');
}

async function testCardUpdate() {
    if (!testCardId) return skip('카드 생성 필요');
    const { error } = await sb.from('cards').update({
        property: {
            type: '매매', complex: '테스트아파트_수정', price: '3.5억',
            location: '서울시 강남구', area: '84㎡', floor: '10층',
            features: ['남향', '올수리', '역세권']
        }
    }).eq('id', testCardId);
    assert(!error, error?.message);
    const { data } = await sb.from('cards').select('property').eq('id', testCardId).single();
    assert(data.property.complex === '테스트아파트_수정', '수정 반영 안 됨');
    return pass('카드 수정 성공');
}

async function testCardRLSOwn() {
    if (!currentUser) return skip('로그인 필요');
    const { data } = await sb.from('cards').select('id, agent_id');
    if (!data || data.length === 0) return pass('카드 없음 (정상)');
    const othersCards = data.filter(c => c.agent_id !== currentUser.id);
    // RLS가 제대로 작동하면 타인 카드가 안 보여야 함
    assert(othersCards.length === 0, `타인 카드 ${othersCards.length}개 노출됨!`);
    return pass(`본인 카드 ${data.length}개만 조회됨`);
}

async function testCardPublicView() {
    if (!testCardId) return skip('카드 생성 필요');
    // property_view에서는 비인증 상태에서도 ID로 조회 가능해야 함
    // anon key로 직접 조회 테스트
    const { data, error } = await sb.from('cards').select('id, property, agent, style, color, photos, view_count, status').eq('id', testCardId).single();
    assert(!error, error?.message);
    assert(data, '카드 없음');
    return pass('공개 카드 조회 가능');
}

async function testCardViewCount() {
    if (!testCardId) return skip('카드 생성 필요');
    const { data: before } = await sb.from('cards').select('view_count').eq('id', testCardId).single();
    const beforeCount = before?.view_count || 0;
    
    // view_count 직접 증가 시도
    const { error } = await sb.from('cards').update({ view_count: beforeCount + 1 }).eq('id', testCardId);
    if (error) {
        // RPC로 시도
        const { error: rpcErr } = await sb.rpc('increment_view_count', { card_id: testCardId });
        if (rpcErr) return warn('조회수 증가 실패: ' + rpcErr.message);
    }
    
    const { data: after } = await sb.from('cards').select('view_count').eq('id', testCardId).single();
    assert((after?.view_count || 0) > beforeCount, '조회수 미증가');
    return pass(`조회수: ${beforeCount} → ${after.view_count}`);
}

async function testCardDelete() {
    if (!testCardId) return skip('카드 생성 필요');
    const { error } = await sb.from('cards').delete().eq('id', testCardId);
    assert(!error, error?.message);
    const { data } = await sb.from('cards').select('id').eq('id', testCardId).maybeSingle();
    assert(!data, '삭제 안 됨');
    testCardId = null;
    return pass('카드 삭제 완료');
}

// --- 4. Edge Functions ---
let parsedResult = null;

async function testEdgeParse() {
    try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/parse-property`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: '강남구 역삼동 래미안 24평 전세 5억 남향 올수리 즉시입주 10층 집주인급매 네고가능' })
        });
        parsedResult = await res.json();
        assert(!parsedResult.error, parsedResult.error);
        assert(parsedResult.type, 'type 필드 없음');
        return pass('파싱 성공: ' + (parsedResult.complex || parsedResult.type));
    } catch(e) {
        return fail('Edge Function 호출 실패: ' + e.message);
    }
}

async function testEdgeParseFields() {
    if (!parsedResult) return skip('parse-property 실행 필요');

async function testEdgeParsePrivate() {
    if (!parsedResult) return skip('parse-property 실행 필요');
    const pub = parsedResult.search_text || '';
    const priv = parsedResult.search_text_private || '';
    
    // 민감 키워드가 공개 텍스트에 없어야 함
    const sensitiveWords = ['급매', '네고', '집주인'];
    const leaked = sensitiveWords.filter(w => pub.includes(w));
    
    if (leaked.length > 0) return warn('공개 텍스트에 민감 키워드: ' + leaked.join(', '));
    
    // private에는 있어야 함
    const inPrivate = sensitiveWords.filter(w => priv.includes(w));
    if (inPrivate.length > 0) return pass('민감정보 분리 OK: ' + inPrivate.join(', ') + ' → private');
    return pass('민감정보 분리 확인 (입력에 민감 키워드 미포함)');
}

// --- 11. Edge Function 응답 포맷 검증 ---
async function testEdgeParseFormat() {
    try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/parse-property`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: '서초구 반포동 래미안퍼스티지 59㎡ 매매 28억 5층 남향 풀옵션' })
        });
        assert(res.status === 200, `HTTP ${res.status}`);
        const data = await res.json();
        
        // JSON 구조 검증
        assert(typeof data === 'object', '응답이 객체가 아님');
        assert(typeof data.type === 'string', 'type이 문자열이 아님');
        assert(typeof data.price === 'string', 'price가 문자열이 아님');
        assert(typeof data.location === 'string', 'location이 문자열이 아님');
        
        // 선택 필드 타입 확인
        if (data.features) assert(Array.isArray(data.features), 'features가 배열이 아님');
        if (data.embedding) assert(Array.isArray(data.embedding), 'embedding이 배열이 아님');
        if (data.search_text) assert(typeof data.search_text === 'string', 'search_text 타입 오류');
        if (data.price_number) assert(typeof data.price_number === 'number', 'price_number 타입 오류');
        
        return pass('응답 포맷 검증 통과: ' + Object.keys(data).length + '개 필드');
    } catch(e) {
        return fail('포맷 검증 실패: ' + e.message);
    }
}

// ============================================================
// TEST RUNNER ENGINE
// ============================================================

function assert(condition, msg = 'Assertion failed') {
    if (!condition) throw new Error(msg);
}
function pass(msg) { return { status: 'pass', msg }; }
function fail(msg) { return { status: 'fail', msg }; }
function warn(msg) { return { status: 'warn', msg }; }
function skip(msg) { return { status: 'skip', msg }; }

function renderSections() {
    const area = document.getElementById('testArea');
    area.innerHTML = '';
    TEST_SECTIONS.forEach(section => {
        let html = `<div class="section">
            <div class="section-title">${section.name} <span class="section-badge" id="badge_${section.id}">0/${section.tests.length}</span></div>`;
        section.tests.forEach(t => {
            html += `<div class="test-item" id="item_${t.id}">
                <div class="test-icon status-pending" id="icon_${t.id}">○</div>
                <div class="test-name">${t.name}</div>
                <div class="test-msg" id="msg_${t.id}"></div>
                <div class="test-time" id="time_${t.id}"></div>
            </div>`;
        });
        html += '</div>';
        area.innerHTML += html;
    });
}

function updateItem(id, status, msg, time) {
    const icon = document.getElementById('icon_' + id);
    const msgEl = document.getElementById('msg_' + id);
    const timeEl = document.getElementById('time_' + id);
    
    const icons = { pass: '✓', fail: '✗', warn: '⚠', skip: '◌', running: '↻' };
    const cls = { pass: 'status-pass', fail: 'status-fail', warn: 'status-warn', skip: 'status-skip', running: 'status-running' };
    
    icon.textContent = icons[status] || '○';
    icon.className = 'test-icon ' + (cls[status] || 'status-pending');
    if (status === 'running') icon.classList.add('spinner');
    if (msgEl) msgEl.textContent = msg || '';
    if (msgEl) msgEl.className = 'test-msg ' + (cls[status] || '');
    if (timeEl) timeEl.textContent = time ? time + 'ms' : '';
}

function updateSummary() {
    document.getElementById('sumTotal').textContent = results.total;
    document.getElementById('sumPass').textContent = results.pass;
    document.getElementById('sumFail').textContent = results.fail;
    document.getElementById('sumSkip').textContent = results.skip;
    
    const elapsed = ((Date.now() - testStartTime) / 1000).toFixed(1);
    document.getElementById('sumTime').textContent = elapsed + 's';
    
    const pct = results.total > 0 ? ((results.pass + results.skip) / results.total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
}

function addLog(msg, type = '') {
    const log = document.getElementById('logArea');
    const line = document.createElement('div');
    line.className = 'log-line ' + (type ? 'log-' + type : '');
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
}

function toggleLog() {
    document.getElementById('logArea').classList.toggle('show');
}

async function runAllTests() {
    const btn = document.getElementById('runBtn');
    btn.disabled = true;
    btn.textContent = '실행 중...';
    
    results = { pass: 0, fail: 0, skip: 0, total: 0 };
    testStartTime = Date.now();
    testCardId = null;
    testRoomId = null;
    parsedResult = null;
    
    renderSections();
    addLog('=== 휙 전체 기능 테스트 시작 ===', 'info');
    
    try {
        for (const section of TEST_SECTIONS) {
            let sectionPass = 0;
            addLog(`\n[${section.name}]`, 'info');
            
            for (const test of section.tests) {
                results.total++;
                updateItem(test.id, 'running', '실행 중...');
                updateSummary();
                
                const start = Date.now();
                try {
                    const result = await test.fn();
                    const elapsed = Date.now() - start;
                    
                    if (result.status === 'pass') {
                        results.pass++;
                        sectionPass++;
                        addLog(`  ✓ ${test.name}: ${result.msg}`, 'pass');
                    } else if (result.status === 'fail') {
                        results.fail++;
                        addLog(`  ✗ ${test.name}: ${result.msg}`, 'fail');
                    } else if (result.status === 'warn') {
                        results.pass++;
                        sectionPass++;
                        addLog(`  ⚠ ${test.name}: ${result.msg}`, 'info');
                    } else if (result.status === 'skip') {
                        results.skip++;
                        addLog(`  ◌ ${test.name}: ${result.msg}`);
                    }
                    
                    updateItem(test.id, result.status, result.msg, elapsed);
                } catch(e) {
                    results.fail++;
                    const elapsed = Date.now() - start;
                    updateItem(test.id, 'fail', e.message, elapsed);
                    addLog(`  ✗ ${test.name}: ${e.message}`, 'fail');
                }
                
                updateSummary();
            }
            
            document.getElementById('badge_' + section.id).textContent = 
                `${sectionPass}/${section.tests.length}`;
        }
    } finally {
        // === CLEANUP: 어떤 에러가 나도 반드시 실행 ===
        addLog('\n[Cleanup] 테스트 데이터 정리 시작...', 'info');
        let cleaned = 0;
        
        try {
            // 1) 명시적으로 추적한 데이터
            if (testCardId) {
                await sb.from('cards').delete().eq('id', testCardId);
                addLog(`  정리: 테스트 카드 ${testCardId}`, 'info');
                cleaned++;
            }
            if (testRoomId) {
                await sb.from('card_shares').delete().eq('room_id', testRoomId);
                await sb.from('share_room_members').delete().eq('room_id', testRoomId);
                await sb.from('share_rooms').delete().eq('id', testRoomId);
                addLog(`  정리: 테스트 공유방 ${testRoomId.slice(0,8)}`, 'info');
                cleaned++;
            }
            
            // 2) PREFIX 기반 잔여 데이터 강제 정리
            //    테스트 중 에러로 남은 쓰레기 데이터까지 모두 제거
            const prefixes = ['TEST_', 'SHARE_TEST_', 'DUP_TEST_', 'OTHERS_CARD_', 'FAKE_'];
            for (const prefix of prefixes) {
                const { data: leftover } = await sb.from('cards')
                    .select('id')
                    .like('id', prefix + '%');
                if (leftover && leftover.length > 0) {
                    for (const card of leftover) {
                        await sb.from('card_shares').delete().eq('card_id', card.id);
                        await sb.from('cards').delete().eq('id', card.id);
                    }
                    addLog(`  정리: ${prefix}* 카드 ${leftover.length}개 삭제`, 'info');
                    cleaned += leftover.length;
                }
            }
            
            // 3) DUP_TEST_ROOM, TEST_ROOM_ 등 테스트 공유방 정리
            const { data: leftoverRooms } = await sb.from('share_rooms')
                .select('id, name')
                .or('name.like.TEST_ROOM_%,name.like.DUP_TEST_%');
            if (leftoverRooms && leftoverRooms.length > 0) {
                for (const room of leftoverRooms) {
                    await sb.from('card_shares').delete().eq('room_id', room.id);
                    await sb.from('share_room_members').delete().eq('room_id', room.id);
                    await sb.from('share_rooms').delete().eq('id', room.id);
                }
                addLog(`  정리: 테스트 공유방 ${leftoverRooms.length}개 삭제`, 'info');
                cleaned += leftoverRooms.length;
            }
            
            // 4) 테스트 에러 로그 정리
            const { data: testLogs } = await sb.from('error_logs')
                .select('id')
                .eq('page', 'test_suite');
            if (testLogs && testLogs.length > 0) {
                for (const log of testLogs) {
                    await sb.from('error_logs').delete().eq('id', log.id);
                }
                addLog(`  정리: 테스트 에러 로그 ${testLogs.length}개 삭제`, 'info');
                cleaned += testLogs.length;
            }
            
            addLog(`[Cleanup 완료] ${cleaned}개 정리됨`, 'pass');
        } catch(cleanupErr) {
            addLog(`[Cleanup 경고] 일부 정리 실패: ${cleanupErr.message}`, 'fail');
        }
    }
    
    const totalTime = ((Date.now() - testStartTime) / 1000).toFixed(1);
    addLog(`\n=== 완료: ${results.pass}통과 / ${results.fail}실패 / ${results.skip}건너뜀 (${totalTime}s) ===`, 
        results.fail > 0 ? 'fail' : 'pass');
    
    btn.disabled = false;
    btn.textContent = results.fail > 0 ? '⚠ 재실행' : '✓ 전체 통과 — 재실행';
    btn.style.background = results.fail > 0 ? 'var(--fail)' : 'var(--pass)';
}

// Init
renderSections();
</script>
