<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>페이지를 찾을 수 없습니다 (404) - 휙</title>
<meta name="description" content="요청하신 페이지를 찾을 수 없습니다.">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f8f9fa;
  color: #212529;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  text-align: center;
  max-width: 480px;
}
.logo {
  display: inline-block;
  width: 56px;
  height: 56px;
  border-radius: 12px;
  background: #facc15;
  line-height: 56px;
  font-weight: 700;
  font-size: 24px;
  color: #1a1a1a;
  margin-bottom: 24px;
}
h1 {
  font-size: 64px;
  font-weight: 700;
  color: #6366f1;
  margin-bottom: 8px;
}
h2 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 16px;
}
p {
  color: #6c757d;
  margin-bottom: 32px;
  line-height: 1.6;
}
.btn {
  display: inline-block;
  padding: 12px 28px;
  background: #6366f1;
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 600;
  transition: background 0.2s;
}
.btn:hover { background: #4f46e5; }
.btn-secondary {
  background: #fff;
  color: #6366f1;
  border: 1px solid #6366f1;
  margin-left: 8px;
}
.btn-secondary:hover { background: #f0f0ff; }
#redirect-msg { display: none; color: #6c757d; font-size: 14px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">휙</div>
  <h1>404</h1>
  <h2>페이지를 찾을 수 없습니다</h2>
  <p id="redirect-msg">URL이 변경되었습니다. 새 페이지로 이동 중...</p>
  <p id="default-msg">요청하신 단지 정보를 찾을 수 없습니다.<br>주소가 변경되었거나 삭제되었을 수 있습니다.</p>
  <a href="/" class="btn">홈으로</a>
  <a href="/gu.html" class="btn btn-secondary">구별 시세</a>
</div>
<script>
// 구버전 apt- URL → 신버전 자동 리다이렉트
// 구버전 패턴: /danji/{region}-{gu}-{dong}-apt-{num}-{name}
(function() {
  var path = location.pathname;
  if (!path.startsWith('/danji/')) return;

  var slug = path.replace('/danji/', '').replace(/\.html$/, '');
  if (slug.indexOf('-apt-') === -1) return;

  document.getElementById('redirect-msg').style.display = 'block';
  document.getElementById('default-msg').style.display  = 'none';

  // 리다이렉트 맵에서 새 URL 검색
  fetch('/danji/apt-redirect.json')
    .then(function(r) { return r.json(); })
    .then(function(map) {
      var newSlug = map[slug];
      if (newSlug) {
        location.replace('/danji/' + newSlug);
      } else {
        document.getElementById('redirect-msg').textContent = '단지 URL이 변경되었으나 새 주소를 찾을 수 없습니다.';
        document.getElementById('default-msg').style.display = 'block';
      }
    })
    .catch(function() {
      document.getElementById('redirect-msg').style.display = 'none';
      document.getElementById('default-msg').style.display = 'block';
    });
})();
</script>
</body>
</html>
