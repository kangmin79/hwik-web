<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>페이지를 찾을 수 없습니다 (404) - 휙</title>
<meta name="description" content="요청하신 페이지를 찾을 수 없습니다.">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f8f9fa;
  color: #212529;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  text-align: center;
  max-width: 480px;
}
.logo {
  display: inline-block;
  width: 56px;
  height: 56px;
  border-radius: 12px;
  background: #facc15;
  line-height: 56px;
  font-weight: 700;
  font-size: 24px;
  color: #1a1a1a;
  margin-bottom: 24px;
}
h1 {
  font-size: 64px;
  font-weight: 700;
  color: #6366f1;
  margin-bottom: 8px;
}
h2 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 16px;
}
p {
  color: #6c757d;
  margin-bottom: 32px;
  line-height: 1.6;
}
.btn {
  display: inline-block;
  padding: 12px 28px;
  background: #6366f1;
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 600;
  transition: background 0.2s;
}
.btn:hover { background: #4f46e5; }
.btn-secondary {
  background: #fff;
  color: #6366f1;
  border: 1px solid #6366f1;
  margin-left: 8px;
}
.btn-secondary:hover { background: #f0f0ff; }
#redirect-msg { display: none; color: #6c757d; font-size: 14px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">휙</div>
  <h1>404</h1>
  <h2>페이지를 찾을 수 없습니다</h2>
  <p id="redirect-msg">URL이 변경되었습니다. 새 페이지로 이동 중...</p>
  <p id="default-msg">요청하신 단지 정보를 찾을 수 없습니다.<br>주소가 변경되었거나 삭제되었을 수 있습니다.</p>
  <a href="/" class="btn">홈으로</a>
  <a href="/gu.html" class="btn btn-secondary">구별 시세</a>
</div>
<script>
// 404 자동 복구 전략
// 1) /danji/ : apt-redirect.json 정확 매칭 (기존 동작 유지)
// 2) /gu/, /dong/, /ranking/ : {folder}-index.json 에서 fuzzy 추측
//    - 사용자가 축약/오타 URL 로 진입해도 가장 가까운 실제 slug 로 이동
//    - 과거 색인된 옛 slug 규칙(GSC 404) 자연 복구 기대
(function() {
  var path = location.pathname;
  var msg = document.getElementById('redirect-msg');
  var defMsg = document.getElementById('default-msg');

  // 무한 루프 방지: 이미 한번 리다이렉트 시도했으면 더 안함
  // (리다이렉트 대상도 404 인 극단 케이스 — race / 삭제됐을 때)
  try {
    if (sessionStorage.getItem('_hwik_404_redirected') === path) {
      sessionStorage.removeItem('_hwik_404_redirected');
      return; // 기본 404 화면 유지
    }
  } catch (e) { /* sessionStorage 미지원 */ }

  function showRedirecting() {
    if (msg) msg.style.display = 'block';
    if (defMsg) defMsg.style.display = 'none';
  }
  function showFailed(text) {
    if (msg) msg.textContent = text || 'URL이 변경되었으나 새 주소를 찾을 수 없습니다.';
    if (defMsg) defMsg.style.display = 'block';
  }
  function safeRedirect(target) {
    try { sessionStorage.setItem('_hwik_404_redirected', path); } catch (e) {}
    location.replace(target);
  }

  // ── danji : 기존 정확 매칭 유지 ──────────────────────────
  if (path.startsWith('/danji/')) {
    var slug = decodeURIComponent(path.replace('/danji/', '').replace(/\.html$/, ''));
    var isLegacy = slug.indexOf('-apt-') !== -1;
    var isKaptSlug = /[a-zA-Z]\d{6,}$/.test(slug);
    if (!isLegacy && !isKaptSlug) return;

    showRedirecting();
    fetch('/danji/apt-redirect.json')
      .then(function(r) { return r.json(); })
      .then(function(map) {
        var newSlug = map[slug];
        if (newSlug) safeRedirect('/danji/' + newSlug);
        else showFailed('단지 URL이 변경되었으나 새 주소를 찾을 수 없습니다.');
      })
      .catch(function() { showFailed(); });
    return;
  }

  // ── gu / dong / ranking : fuzzy 매칭 ─────────────────────
  var m = path.match(/^\/(gu|dong|ranking)\/(.+?)(?:\.html)?\/?$/);
  if (!m) return;
  var folder = m[1];
  var requested = decodeURIComponent(m[2]);

  showRedirecting();

  fetch('/' + folder + '-index.json')
    .then(function(r) { return r.json(); })
    .then(function(slugs) {
      // 다자구 도시 모호성 감지 (gu 전용):
      // '수원시' 로 들어오면 수원시-권선구/영통구/장안구/팔달구 중 임의의 한 곳으로
      // 보내는 대신 /gu/ 인덱스로 보냄 (어느 구인지 정확히 알 수 없으므로)
      if (folder === 'gu' && isAmbiguousPrefix(requested, slugs)) {
        safeRedirect('/gu/');
        return;
      }
      var match = fuzzyBestMatch(requested, slugs);
      if (match) {
        safeRedirect('/' + folder + '/' + encodeURIComponent(match));
      } else {
        showFailed();
      }
    })
    .catch(function() { showFailed(); });

  // 요청 slug 가 서로 다른 candidate 2개 이상에 포함되어 있으면 모호함.
  // 지역 prefix(예: "충남-천안시-동남구") 가 있어도 '천안시' 가 slug 에 포함된
  // candidate 가 여러 개면 어느 구인지 특정 불가 → /gu/ 인덱스로 fallback.
  function isAmbiguousPrefix(target, candidates) {
    var tclean = target.replace(/[^가-힣a-zA-Z0-9]/g, '').toLowerCase();
    if (tclean.length < 2) return false;
    var count = 0;
    for (var i = 0; i < candidates.length; i++) {
      var cc = candidates[i].replace(/[^가-힣a-zA-Z0-9]/g, '').toLowerCase();
      if (cc.indexOf(tclean) !== -1 && cc.length > tclean.length) {
        count++;
        if (count >= 2) return true;
      }
    }
    return false;
  }

  // 한글 slug 유사도: character-hit 비율 + 최장 공통 부분 문자열
  // 임계값 0.7 이상일 때만 리다이렉트 (오동작 방지)
  function fuzzyBestMatch(target, candidates) {
    if (!target || !candidates || !candidates.length) return null;
    var clean = target.replace(/[^가-힣a-zA-Z0-9]/g, '').toLowerCase();
    if (clean.length < 2) return null;

    var best = null, bestScore = 0;
    for (var i = 0; i < candidates.length; i++) {
      var cand = candidates[i];
      var candClean = cand.replace(/[^가-힣a-zA-Z0-9]/g, '').toLowerCase();
      var score = similarity(clean, candClean);
      if (score > bestScore) { bestScore = score; best = cand; }
    }
    return bestScore >= 0.7 ? best : null;
  }

  function similarity(a, b) {
    if (!a || !b) return 0;
    // character-hit 비율 (target 의 각 글자가 candidate 에 존재하는 비율)
    var hits = 0;
    for (var i = 0; i < a.length; i++) {
      if (b.indexOf(a[i]) !== -1) hits++;
    }
    var hitRatio = hits / a.length;
    // LCS 길이 / target 길이 (연속 일치 가중치)
    var lcs = longestCommonSubstring(a, b);
    var lcsRatio = lcs / a.length;
    // 두 지표 평균 (연속 일치가 우선)
    return hitRatio * 0.4 + lcsRatio * 0.6;
  }

  function longestCommonSubstring(a, b) {
    var m = a.length, n = b.length, max = 0;
    if (!m || !n) return 0;
    var dp = new Array(n + 1);
    for (var k = 0; k <= n; k++) dp[k] = 0;
    for (var i = 1; i <= m; i++) {
      var prev = 0;
      for (var j = 1; j <= n; j++) {
        var tmp = dp[j];
        if (a.charAt(i - 1) === b.charAt(j - 1)) {
          dp[j] = prev + 1;
          if (dp[j] > max) max = dp[j];
        } else {
          dp[j] = 0;
        }
        prev = tmp;
      }
    }
    return max;
  }
})();
</script>
</body>
</html>
