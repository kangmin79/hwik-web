<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>페이지를 찾을 수 없습니다 (404) - 휙</title>
<meta name="description" content="요청하신 페이지를 찾을 수 없습니다.">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f8f9fa;
  color: #212529;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  text-align: center;
  max-width: 480px;
}
.logo {
  display: inline-block;
  width: 56px;
  height: 56px;
  border-radius: 12px;
  background: #facc15;
  line-height: 56px;
  font-weight: 700;
  font-size: 24px;
  color: #1a1a1a;
  margin-bottom: 24px;
}
h1 {
  font-size: 64px;
  font-weight: 700;
  color: #6366f1;
  margin-bottom: 8px;
}
h2 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 16px;
}
p {
  color: #6c757d;
  margin-bottom: 32px;
  line-height: 1.6;
}
.btn {
  display: inline-block;
  padding: 12px 28px;
  background: #6366f1;
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 600;
  transition: background 0.2s;
}
.btn:hover { background: #4f46e5; }
.btn-secondary {
  background: #fff;
  color: #6366f1;
  border: 1px solid #6366f1;
  margin-left: 8px;
}
.btn-secondary:hover { background: #f0f0ff; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">휙</div>
  <h1>404</h1>
  <h2>페이지를 찾을 수 없습니다</h2>
  <p>요청하신 단지 정보를 찾을 수 없습니다.<br>주소가 변경되었거나 삭제되었을 수 있습니다.</p>
  <a href="/" class="btn">홈으로</a>
  <a href="/gu.html" class="btn btn-secondary">구별 시세</a>
</div>
</body>
</html>
