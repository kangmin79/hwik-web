<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>휙 — Hub</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest-pc.json">
<meta name="theme-color" content="#6366f1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --primary-bg: rgba(99,102,241,0.06);
  --bg: #f6f5f1;
  --bg-card: #ffffff;
  --bg-input: #f0efeb;
  --text: #0f172a;
  --text-sub: #475569;
  --text-light: #64748b;
  --border: #e0ded8;
}

html, body { height:100%; overflow:hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* 스크롤바 */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#c9c6be; border-radius:4px; }

/* ── 헤더 ── */
.hub-header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:56px;
  background:rgba(246,245,241,0.92);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px;
}
.hub-logo { font-size:24px; font-weight:900; color:var(--primary); cursor:pointer; }
.hub-header-actions { display:flex; gap:8px; align-items:center; }
.hub-header-btn {
  padding:8px 18px; border-radius:10px;
  border:1px solid var(--border);
  background:var(--bg-card); color:var(--text);
  font-size:13px; font-weight:600; cursor:pointer;
  transition:all 0.2s; letter-spacing:-0.3px;
}
.hub-header-btn:hover { border-color:var(--primary); color:var(--primary); }
.hub-header-btn.primary {
  background:linear-gradient(135deg,#6366f1,#818cf8);
  color:#fff; border-color:transparent;
  box-shadow:0 2px 12px rgba(99,102,241,0.3);
}
.hub-user-name { font-size:13px; font-weight:600; color:var(--text-sub); margin-right:4px; }

/* ── 메인 레이아웃 ── */
.hub-main {
  display:flex;
  height:calc(100vh - 56px);
  margin-top:56px;
}
.hub-left {
  flex:1;
  display:flex; align-items:center; justify-content:center;
  padding-bottom:5%;
  transition:all 0.45s cubic-bezier(0.4,0,0.2,1);
}
.hub-right {
  width:0; opacity:0; overflow:hidden;
  transition:all 0.45s cubic-bezier(0.4,0,0.2,1);
}
.hub-main.split .hub-left { flex:0 0 50%; }
.hub-main.split .hub-right {
  flex:0 0 50%; opacity:1; width:auto;
  overflow-y:auto;
  border-left:1px solid var(--border);
  padding:0;
}

/* ── 허브 비주얼 ── */
.hub-visual {
  position:relative;
  width:min(90%,700px);
  aspect-ratio:800/700;
  max-height:75vh;
}
.hub-lines { position:absolute; inset:0; z-index:1; pointer-events:none; }
.hub-line { stroke:#cbd5e1; stroke-width:1; opacity:0.5; }

/* 중앙 노드 */
.hub-center {
  position:absolute; left:50%; top:50%;
  transform:translate(-50%,-50%);
  width:150px; height:150px;
  border-radius:32px;
  background:#fff;
  border:1px solid rgba(99,102,241,0.2);
  box-shadow:0 0 0 1px rgba(99,102,241,0.08), 0 0 40px rgba(99,102,241,0.08), 0 8px 32px rgba(0,0,0,0.06);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:5;
}
.hub-center-icon { font-size:34px; margin-bottom:4px; }
.hub-center-name { font-size:15px; font-weight:800; color:var(--text); text-align:center; line-height:1.2; letter-spacing:-0.5px; }
.hub-center-sub { font-size:11px; color:var(--text-light); margin-top:2px; font-weight:500; }

/* 노드 */
.hub-node {
  position:absolute; z-index:4;
  transform:translate(-50%,-50%) scale(0);
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  cursor:pointer;
}
.hub-node.appear { transform:translate(-50%,-50%) scale(1); }
.hub-node-inner {
  background:#fff;
  border:1.5px solid rgba(0,0,0,0.08);
  border-radius:22px;
  padding:12px 26px;
  text-align:center;
  white-space:nowrap;
  box-shadow:0 2px 12px rgba(0,0,0,0.04);
  transition:all 0.3s;
  min-width:130px;
}
.hub-node:hover .hub-node-inner {
  border-color:rgba(99,102,241,0.4);
  box-shadow:0 0 20px rgba(99,102,241,0.1), 0 4px 20px rgba(0,0,0,0.05);
  transform:translateY(-3px);
}
.hub-node.active .hub-node-inner {
  border-color:#6366f1;
  background:rgba(99,102,241,0.06);
  box-shadow:0 0 0 3px rgba(99,102,241,0.12), 0 0 20px rgba(99,102,241,0.08);
}
.hub-node-label { font-size:15px; font-weight:600; color:#374151; letter-spacing:-0.3px; }
.hub-node-count {
  display:inline-block; margin-left:6px;
  padding:1px 8px; border-radius:8px;
  background:rgba(99,102,241,0.1); color:#6366f1;
  font-size:12px; font-weight:700;
}
.hub-node-count.empty { background:transparent; color:#cbd5e1; }

/* 빛 애니메이션 */
.hub-pulse-head { fill:#fff; display:none; filter:drop-shadow(0 0 4px #fff) drop-shadow(0 0 10px #818cf8) drop-shadow(0 0 20px #6366f1) drop-shadow(0 0 40px rgba(99,102,241,0.5)); }
.hub-pulse-head.on { display:block; opacity:1; }
.hub-pulse-t1 { fill:#818cf8; display:none; filter:drop-shadow(0 0 6px #6366f1); }
.hub-pulse-t2 { fill:#6366f1; display:none; filter:drop-shadow(0 0 4px rgba(99,102,241,0.5)); }
.hub-pulse-t3 { fill:rgba(99,102,241,0.5); display:none; }
.hub-pulse-t1.on { display:block; opacity:0.7; }
.hub-pulse-t2.on { display:block; opacity:0.4; }
.hub-pulse-t3.on { display:block; opacity:0.2; }

/* ── 우측 패널 ── */
.panel-inner {
  padding:28px 24px;
  min-height:100%;
}
.panel-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px;
  position:sticky; top:0; z-index:5;
  background:var(--bg); padding:16px 24px; margin:-28px -24px 20px;
  border-bottom:1px solid var(--border);
}
.panel-title { font-size:18px; font-weight:800; color:var(--text); letter-spacing:-0.5px; }
.panel-title span { color:var(--primary); }
.panel-close {
  background:none; border:none; color:var(--text-light);
  font-size:22px; cursor:pointer; padding:4px 8px;
  border-radius:8px; transition:all 0.2s; line-height:1;
}
.panel-close:hover { background:var(--primary-bg); color:var(--primary); }

/* 패널 내부 아이템 */
.p-item {
  display:flex; align-items:center; gap:12px;
  padding:14px 16px; border-radius:14px;
  cursor:pointer; transition:all 0.2s;
  border:1px solid transparent;
  margin-bottom:6px;
}
.p-item:hover { background:var(--primary-bg); border-color:rgba(99,102,241,0.08); }
.p-type {
  padding:4px 10px; border-radius:8px;
  font-size:11px; font-weight:800; flex-shrink:0;
}
.p-type.sale { background:rgba(249,115,22,0.1); color:#ea580c; }
.p-type.jeonse { background:rgba(99,102,241,0.1); color:#4f46e5; }
.p-type.rent { background:rgba(167,139,250,0.1); color:#7c3aed; }
.p-type.client { background:rgba(78,205,196,0.1); color:#0d9488; }
.p-info { flex:1; min-width:0; }
.p-name { font-size:14px; font-weight:700; color:var(--text); letter-spacing:-0.2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.p-detail { font-size:12px; color:var(--text-sub); margin-top:2px; }
.p-badge {
  padding:4px 10px; border-radius:8px;
  font-size:11px; font-weight:700; flex-shrink:0;
}

/* 매물 등록 */
.register-area { padding:0 24px; }
.register-input {
  width:100%; min-height:200px;
  padding:16px; border-radius:14px;
  border:1.5px solid var(--border);
  background:var(--bg-card); color:var(--text);
  font-size:15px; line-height:1.7;
  font-family:inherit; resize:vertical; outline:none;
  transition:border-color 0.2s;
}
.register-input:focus { border-color:var(--primary); }
.register-input::placeholder { color:#94a3b8; }
.register-btn {
  width:100%; padding:14px; margin-top:12px;
  border-radius:12px; border:none;
  background:linear-gradient(135deg,#6366f1,#818cf8);
  color:#fff; font-size:15px; font-weight:700;
  cursor:pointer; transition:all 0.2s;
  box-shadow:0 2px 12px rgba(99,102,241,0.3);
}
.register-btn:hover { box-shadow:0 4px 20px rgba(99,102,241,0.4); }

/* 검색 */
.panel-search {
  display:flex; gap:8px; margin-bottom:16px;
}
.panel-search input {
  flex:1; padding:10px 16px; border-radius:10px;
  border:1px solid var(--border);
  background:var(--bg-input); color:var(--text);
  font-size:13px; outline:none;
}
.panel-search input:focus { border-color:var(--primary); }

/* 필터 */
.panel-filters {
  display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap;
}
.p-filter {
  padding:6px 14px; border-radius:20px;
  border:1px solid var(--border);
  background:transparent; color:var(--text-sub);
  font-size:12px; font-weight:600; cursor:pointer;
  transition:all 0.2s;
}
.p-filter.active { background:var(--primary); color:#fff; border-color:var(--primary); }

/* 빈 상태 */
.p-empty {
  text-align:center; padding:60px 20px;
  color:var(--text-light); font-size:14px;
}
.p-empty-icon { font-size:48px; margin-bottom:12px; }

/* 로그인 모달 */
.login-overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.4);
  display:flex; align-items:center; justify-content:center;
  display:none;
}
.login-overlay.show { display:flex; }
.login-modal {
  background:#fff; border-radius:24px;
  padding:40px; text-align:center;
  max-width:380px; width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
}
.login-modal h2 { font-size:32px; font-weight:900; color:var(--primary); margin-bottom:8px; }
.login-modal p { font-size:14px; color:var(--text-sub); margin-bottom:24px; line-height:1.6; }
.kakao-btn {
  width:100%; padding:14px; border-radius:12px; border:none;
  background:#FEE500; color:#000;
  font-size:15px; font-weight:700; cursor:pointer;
  transition:opacity 0.2s;
}
.kakao-btn:hover { opacity:0.9; }

/* 타임라인 */
.tl-item { display:flex; align-items:flex-start; gap:10px; padding:10px 0; }
.tl-badge { padding:3px 10px; border-radius:8px; font-size:10px; font-weight:700; flex-shrink:0; margin-top:2px; }
.tl-badge.상담 { background:rgba(96,165,250,0.1); color:#60a5fa; }
.tl-badge.방문 { background:rgba(74,222,128,0.1); color:#4ade80; }
.tl-badge.매물소개 { background:rgba(251,146,60,0.1); color:#fb923c; }
.tl-badge.계약 { background:rgba(248,113,113,0.1); color:#f87171; }
.tl-badge.메모 { background:rgba(148,163,184,0.06); color:#94a3b8; }
.tl-content { flex:1; font-size:13px; color:var(--text); font-weight:500; }
.tl-date { font-size:11px; color:var(--text-light); margin-top:1px; }

/* 메모 입력 */
.note-input { display:flex; gap:8px; margin-bottom:16px; }
.note-input input {
  flex:1; padding:11px 16px; border-radius:12px;
  border:1px solid var(--border);
  background:var(--bg-input); color:var(--text);
  font-size:13px; outline:none;
}
.note-input input:focus { border-color:var(--primary); }
.note-input button {
  padding:11px 22px; border-radius:12px; border:none;
  background:linear-gradient(135deg,#6366f1,#818cf8);
  color:#fff; font-weight:700; font-size:13px; cursor:pointer;
}

/* 알림 아이템 */
.alert-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; border-radius:12px;
  margin-bottom:6px; cursor:pointer; transition:all 0.2s;
}
.alert-item:hover { background:var(--primary-bg); }
.alert-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.alert-info { flex:1; }
.alert-title { font-size:13px; font-weight:600; color:var(--text); }
.alert-sub { font-size:11px; color:var(--text-light); margin-top:2px; }

@media (max-width:768px) {
  .hub-main.split .hub-left { display:none; }
  .hub-main.split .hub-right { flex:1; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<header class="hub-header">
  <div class="hub-logo" onclick="goBackOrHome()">휙</div>
  <div class="hub-header-actions" id="headerActions">
    <span class="hub-user-name" id="userName"></span>
  </div>
</header>

<!-- 메인 -->
<div class="hub-main" id="hubMain">
  <div class="hub-left">
    <div class="hub-visual" id="hubVisual">
      <svg class="hub-lines" id="hubLines" viewBox="0 0 800 700" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="hub-center" id="hubCenter">
        <div class="hub-center-icon">👤</div>
        <div class="hub-center-name" id="centerName">로딩 중...</div>
        <div class="hub-center-sub" id="centerSub"></div>
      </div>
    </div>
  </div>
  <div class="hub-right" id="hubRight"></div>
</div>

<!-- 로그인 모달 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-modal">
    <h2>휙</h2>
    <p>중개사 전용 허브<br>카카오 로그인으로 시작하세요</p>
    <button class="kakao-btn" onclick="doLogin()">💬 카카오로 시작하기</button>
  </div>
</div>

<script>
// ── 초기화 ──
const SUPABASE_URL = HWIK_CONFIG.SUPABASE_URL;
const SUPABASE_KEY = HWIK_CONFIG.SUPABASE_KEY;
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { clockSkewInSeconds: 300 } });

let currentUser = null;
let userProfile = null;
let _activePanel = null;
let _pulseRaf = null;
let _hubStack = []; // 허브 레벨 스택 [{type, data, nodes, center}]
let _currentLevel = null;

// 데이터 캐시
let _myCards = [];
let _sharedCards = [];
let _clientCards = [];
let _memos = [];
let _counts = { my:0, shared:0, client:0, alert:0, memo:0, send:'휙', settings:'', register:'+' };

// ── 엔티티별 노드 정의 ──
const CLIENT_NODES = [
  { key:'cl_conditions', label:'희망 조건',  angle:-90 },
  { key:'cl_match',      label:'매칭 매물',  angle:-30 },
  { key:'cl_timeline',   label:'상담 기록',  angle:30 },
  { key:'cl_schedule',   label:'일정/알림',  angle:90 },
  { key:'cl_contact',    label:'연락처',    angle:150 },
  { key:'cl_back',       label:'← 돌아가기', angle:210 },
];

const PROPERTY_NODES = [
  { key:'pr_detail',   label:'상세 정보',  angle:-90 },
  { key:'pr_clients',  label:'관심 손님',  angle:-30 },
  { key:'pr_share',    label:'공유 이력',  angle:30 },
  { key:'pr_status',   label:'거래 상태',  angle:90 },
  { key:'pr_send',     label:'휙 보내기',  angle:150 },
  { key:'pr_back',     label:'← 돌아가기', angle:210 },
];

// ── 노드 정의 ──
const HUB_NODES = [
  { key:'register', label:'매물 등록',   angle:-90 },
  { key:'my',       label:'내 매물',    angle:-38 },
  { key:'send',     label:'휙 보내기',  angle:14 },
  { key:'client',   label:'손님',      angle:66 },
  { key:'alert',    label:'알림',      angle:118 },
  { key:'shared',   label:'공유방',    angle:170 },
  { key:'settings', label:'설정',      angle:222 },
];

// ── 인증 ──
async function checkAuth() {
  const { data:{ session } } = await sb.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    const { data } = await sb.from('profiles').select('business_name, agent_name, phone, is_admin').eq('id', currentUser.id).maybeSingle();
    userProfile = data;
    return true;
  }
  return false;
}

function doLogin() {
  sb.auth.signInWithOAuth({ provider:'kakao', options:{ redirectTo: window.location.href.split('?')[0].split('#')[0] } });
}

function logout() {
  sb.auth.signOut();
  currentUser = null;
  userProfile = null;
  location.reload();
}

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session?.user) {
    currentUser = session.user;
    init();
  }
});

// ── 초기 로드 ──
async function init() {
  if (!currentUser) {
    document.getElementById('loginOverlay').classList.add('show');
    return;
  }
  document.getElementById('loginOverlay').classList.remove('show');

  // 프로필
  if (!userProfile) {
    const { data } = await sb.from('profiles').select('business_name, agent_name, phone, is_admin').eq('id', currentUser.id).maybeSingle();
    userProfile = data;
  }

  const name = userProfile?.business_name || userProfile?.agent_name || '중개사';
  document.getElementById('centerName').textContent = name;
  document.getElementById('centerSub').textContent = userProfile?.phone || '';
  document.getElementById('userName').textContent = name + '님';

  // 카운트 병렬 로드
  const [myRes, clientRes, sharedRes, alertRes, memoRes] = await Promise.all([
    sb.from('cards').select('id', { count:'exact', head:true }).eq('agent_id', currentUser.id).neq('property->>type', '손님'),
    sb.from('cards').select('id', { count:'exact', head:true }).eq('agent_id', currentUser.id).eq('property->>type', '손님'),
    sb.from('room_cards').select('id', { count:'exact', head:true }),
    sb.from('match_notifications').select('id', { count:'exact', head:true }).eq('agent_id', currentUser.id).eq('is_read', false),
    sb.from('memos').select('id', { count:'exact', head:true }).eq('agent_id', currentUser.id).eq('is_read', false),
  ]);
  _counts = {
    my: myRes.count || 0,
    client: clientRes.count || 0,
    shared: sharedRes.count || 0,
    alert: alertRes.count || 0,
    memo: memoRes.count || 0,
    register: '+',
    send: '휙',
    settings: '',
  };

  renderHub();
}

// ── 허브 렌더링 ──
function renderHub(nodes, centerInfo, counts) {
  nodes = nodes || HUB_NODES;
  counts = counts || _counts;
  centerInfo = centerInfo || {
    icon: '👤',
    name: userProfile?.business_name || '중개사',
    sub: userProfile?.phone || ''
  };

  const visual = document.getElementById('hubVisual');
  const center = document.getElementById('hubCenter');
  const vw = 800, vh = 700;
  const cx = vw/2, cy = vh/2, radius = 230;

  // 중앙 노드 업데이트
  center.innerHTML = `
    <div class="hub-center-icon">${centerInfo.icon}</div>
    <div class="hub-center-name" id="centerName">${esc(centerInfo.name)}</div>
    <div class="hub-center-sub" id="centerSub">${esc(centerInfo.sub)}</div>
  `;

  let svgHtml = '';
  let nodesHtml = '';

  nodes.forEach((node, i) => {
    const rad = (node.angle * Math.PI) / 180;
    const nx = cx + radius * Math.cos(rad);
    const ny = cy + radius * Math.sin(rad);
    const count = counts[node.key];
    // 카운트 표시 안 함

    svgHtml += `<line class="hub-line" x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" />`;
    svgHtml += `<circle class="hub-pulse-t3" id="pt3-${node.key}" cx="${cx}" cy="${cy}" r="6" />`;
    svgHtml += `<circle class="hub-pulse-t2" id="pt2-${node.key}" cx="${cx}" cy="${cy}" r="5" />`;
    svgHtml += `<circle class="hub-pulse-t1" id="pt1-${node.key}" cx="${cx}" cy="${cy}" r="4" />`;
    svgHtml += `<circle class="hub-pulse-head" id="ph-${node.key}" cx="${cx}" cy="${cy}" r="3.5" />`;

    const leftPct = (nx / vw * 100).toFixed(1);
    const topPct = (ny / vh * 100).toFixed(1);
    nodesHtml += `
      <div class="hub-node" data-key="${node.key}" style="left:${leftPct}%;top:${topPct}%;" onclick="onNodeClick('${node.key}')">
        <div class="hub-node-inner">
          <span class="hub-node-label">${node.label}</span>
        </div>
      </div>`;
  });

  document.getElementById('hubLines').innerHTML = svgHtml;
  visual.querySelectorAll('.hub-node').forEach(el => el.remove());
  visual.insertAdjacentHTML('beforeend', nodesHtml);

  visual.querySelectorAll('.hub-node').forEach((el, i) => {
    setTimeout(() => el.classList.add('appear'), 30 + i * 40);
    el.addEventListener('mouseenter', () => pulseStart(el.dataset.key, nodes, radius));
    el.addEventListener('mouseleave', () => pulseStop(el.dataset.key));
  });
}

// ── 빛 애니메이션 ──
function pulseStart(key, nodeList, radius) {
  nodeList = nodeList || _currentLevel?.nodes || HUB_NODES;
  radius = radius || 230;
  const node = nodeList.find(n => n.key === key);
  if (!node) return;
  const vw=800, vh=700, fromX=vw/2, fromY=vh/2;
  const rad = (node.angle * Math.PI) / 180;
  const toX = fromX + radius * Math.cos(rad);
  const toY = fromY + radius * Math.sin(rad);

  const els = ['ph','pt1','pt2','pt3'].map(p => document.getElementById(`${p}-${key}`));
  els.forEach(el => { if(el) el.classList.add('on'); });

  const start = performance.now();
  const dur = 500;
  const delays = [0,40,90,150];

  function animate(now) {
    els.forEach((el,i) => {
      if(!el) return;
      const t = Math.max(0, Math.min((now-start-delays[i])/dur, 1));
      const ease = t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
      el.setAttribute('cx', fromX+(toX-fromX)*ease);
      el.setAttribute('cy', fromY+(toY-fromY)*ease);
    });
    if ((now-start-delays[3])/dur < 1) {
      _pulseRaf = requestAnimationFrame(animate);
    } else {
      els.forEach(el => { if(el) { el.setAttribute('cx',fromX); el.setAttribute('cy',fromY); }});
      setTimeout(() => { if(document.querySelector(`.hub-node[data-key="${key}"]:hover`)) pulseStart(key); }, 200);
    }
  }
  _pulseRaf = requestAnimationFrame(animate);
}

function pulseStop(key) {
  if(_pulseRaf) { cancelAnimationFrame(_pulseRaf); _pulseRaf=null; }
  ['ph','pt1','pt2','pt3'].forEach(p => {
    const el = document.getElementById(`${p}-${key}`);
    if(el) el.classList.remove('on');
  });
}

// ── 노드 클릭 핸들러 ──
function onNodeClick(key) {
  // 돌아가기
  if (key === 'cl_back' || key === 'pr_back') { goBack(); return; }

  // 서브 허브 노드 → 패널 열기
  if (key.startsWith('cl_') || key.startsWith('pr_')) {
    openSubPanel(key);
    return;
  }

  // 메인 허브 노드 → 패널 열기
  openPanel(key);
}

function openPanel(key) {
  if (_activePanel === key) { closePanel(); return; }

  document.querySelectorAll('.hub-node').forEach(n => n.classList.remove('active'));
  document.querySelector(`.hub-node[data-key="${key}"]`)?.classList.add('active');
  _activePanel = key;

  const right = document.getElementById('hubRight');
  document.getElementById('hubMain').classList.add('split');

  switch(key) {
    case 'register': loadRegisterPanel(right); break;
    case 'my':       loadMyPanel(right); break;
    case 'send':     loadSendPanel(right); break;
    case 'client':   loadClientPanel(right); break;
    case 'shared':   loadSharedPanel(right); break;
    case 'alert':    loadAlertPanel(right); break;
    case 'settings': loadSettingsPanel(right); break;
  }
}

function closePanel() {
  document.getElementById('hubMain').classList.remove('split');
  document.querySelectorAll('.hub-node').forEach(n => n.classList.remove('active'));
  _activePanel = null;
}

// ── 서브 허브 전환 (손님 → 손님 허브, 매물 → 매물 허브) ──
function enterClientHub(card) {
  const p = card.property || {};
  _hubStack.push({ nodes: _currentLevel?.nodes || HUB_NODES, center: _currentLevel?.center, counts: _currentLevel?.counts || _counts });

  const counts = {};
  _currentLevel = { type:'client', data: card, nodes: CLIENT_NODES, center: {
    icon: '🙋',
    name: card.contact_name || p.location || p.complex || '손님',
    sub: p.price || ''
  }, counts };

  closePanel();
  renderHub(CLIENT_NODES, _currentLevel.center, counts);

  // 비동기로 카운트 로드
  loadClientCounts(card.id);
}

async function loadClientCounts(cardId) {
  const [notesRes, matchRes] = await Promise.all([
    sb.from('client_notes').select('id, alert_date, alert_done', { count:'exact' }).eq('client_card_id', cardId),
    fetch(`${SUPABASE_URL}/functions/v1/match-properties`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+SUPABASE_KEY, 'apikey':SUPABASE_KEY },
      body: JSON.stringify({ client_card_id: cardId, agent_id: currentUser.id, limit:10, threshold:0.15 })
    }).then(r => r.json()).catch(() => ({ results:[] }))
  ]);

  const notes = notesRes.data || [];
  const matches = matchRes.results || [];
  const card = _currentLevel.data;

  const counts = {
    cl_conditions: (card.property?.features || []).length || 0,
    cl_match: matches.length,
    cl_timeline: notes.length,
    cl_schedule: notes.filter(n => n.alert_date && !n.alert_done).length,
    cl_contact: (card.contact_phone ? 1 : 0),
    cl_back: '',
  };

  _currentLevel.counts = counts;
  _currentLevel._matches = matches;
  _currentLevel._notes = notes;

  // 노드 카운트 업데이트 (리렌더 없이)
  Object.entries(counts).forEach(([k, v]) => {
    const countEl = document.querySelector(`.hub-node[data-key="${k}"] .hub-node-count`);
    if (countEl && v) {
      countEl.textContent = v > 0 ? v : '-';
      countEl.classList.toggle('empty', !v || v === 0);
    }
  });
}

function enterPropertyHub(card) {
  const p = card.property || {};
  _hubStack.push({ nodes: _currentLevel?.nodes || HUB_NODES, center: _currentLevel?.center, counts: _currentLevel?.counts || _counts });

  _currentLevel = { type:'property', data: card, nodes: PROPERTY_NODES, center: {
    icon: '🏠',
    name: p.complex || p.location || '매물',
    sub: [p.type, p.price].filter(Boolean).join(' · ')
  }, counts: {} };

  closePanel();
  renderHub(PROPERTY_NODES, _currentLevel.center, {});
}

function goBack() {
  if (!_hubStack.length) return;
  const prev = _hubStack.pop();
  _currentLevel = prev.nodes === HUB_NODES ? null : { nodes: prev.nodes, center: prev.center, counts: prev.counts };
  closePanel();
  renderHub(prev.nodes || HUB_NODES, prev.center, prev.counts || _counts);
}

// ── 서브 패널 (손님/매물 허브의 노드 클릭) ──

        condHtml += `<div style="padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.04);"><div style="font-size:15px;font-weight:700;color:var(--text);">${esc(val)}</div><div style="font-size:12px;color:var(--text-light);">${label}</div></div>`;
      });
      if (features.length) condHtml += `<div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;">${features.map(f => `<span style="padding:5px 14px;border-radius:20px;background:rgba(99,102,241,0.06);color:var(--primary);font-size:12px;font-weight:600;border:1px solid rgba(99,102,241,0.1);">${esc(f)}</span>`).join('')}</div>`;
      if (pn.memo) condHtml += `<div style="margin-top:14px;padding:14px;border-radius:12px;background:rgba(99,102,241,0.04);font-size:13px;color:var(--text-sub);line-height:1.7;">${esc(pn.memo)}</div>`;
      condHtml += `</div>`;
      right.innerHTML = condHtml;
      break;

    case 'cl_match':
      const matches = _currentLevel._matches || [];
      let matchHtml = `<div class="panel-inner"><div class="panel-header"><div class="panel-title">매칭 매물 <span>${matches.length}건</span></div><button class="panel-close" onclick="closePanel()">✕</button></div>`;
      if (!matches.length) { matchHtml += '<div class="p-empty"><div class="p-empty-icon">🏠</div>매칭되는 매물이 없어요</div>'; }
      else { matches.forEach(m => {
        const mp = m.property || {};
        const tc = mp.type === '매매' ? 'sale' : mp.type === '전세' ? 'jeonse' : 'rent';
        const score = m.similarity ? Math.round(m.similarity*100) : 0;
        matchHtml += `<div class="p-item" onclick="enterPropertyHub(${JSON.stringify(m).replace(/"/g,'&quot;')})">
          <span class="p-type ${tc}">${esc(mp.type||'')}</span>
          <div class="p-info"><div class="p-name">${esc(mp.complex||mp.location||'매물')}</div>
          <div class="p-detail">${[mp.price,mp.area].filter(Boolean).map(v=>esc(v)).join(' · ')}</div></div>
          ${score ? `<span class="p-badge" style="background:rgba(99,102,241,0.08);color:var(--primary);">${score}%</span>` : ''}
        </div>`;
      }); }
      matchHtml += `</div>`;
      right.innerHTML = matchHtml;
      break;

    case 'cl_timeline':
      const notes = _currentLevel._notes || [];
      let tlHtml = `<div class="panel-inner"><div class="panel-header"><div class="panel-title">상담 기록 <span>${notes.length}건</span></div><button class="panel-close" onclick="closePanel()">✕</button></div>`;
      tlHtml += `<div class="note-input"><input type="text" id="subNoteInput" placeholder="메모 입력..." onkeydown="if(event.key==='Enter')saveSubNote('${card.id}')"><button onclick="saveSubNote('${card.id}')">저장</button></div>`;
      if (!notes.length) tlHtml += '<div class="p-empty">아직 상담 기록이 없어요</div>';
      else notes.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).forEach(n => {
        const type = n.type || '메모';
        tlHtml += `<div class="tl-item"><span class="tl-badge ${type}">${type}</span><div><div class="tl-content">${esc(n.content||'')}</div><div class="tl-date">${new Date(n.created_at).toLocaleDateString('ko-KR')}</div></div></div>`;
      });
      tlHtml += `</div>`;
      right.innerHTML = tlHtml;
      break;

    case 'cl_schedule':
      const schNotes = (_currentLevel._notes || []).filter(n => n.alert_date && !n.alert_done);
      let schHtml = `<div class="panel-inner"><div class="panel-header"><div class="panel-title">일정/알림 <span>${schNotes.length}건</span></div><button class="panel-close" onclick="closePanel()">✕</button></div>`;
      if (!schNotes.length) schHtml += '<div class="p-empty"><div class="p-empty-icon">📅</div>예정된 일정이 없어요</div>';
      else schNotes.forEach(n => {
        const isPast = new Date(n.alert_date) < new Date();
        schHtml += `<div class="alert-item"><div class="alert-dot" style="background:${isPast?'#ef4444':'var(--primary)'}"></div><div class="alert-info"><div class="alert-title" style="${isPast?'color:#ef4444;':''}">${esc(n.content||'일정')}</div><div class="alert-sub">${new Date(n.alert_date).toLocaleDateString('ko-KR')} ${isPast?'(지연)':''}</div></div></div>`;
      });
      schHtml += `</div>`;
      right.innerHTML = schHtml;
      break;

    case 'cl_contact':
      let ctHtml = `<div class="panel-inner"><div class="panel-header"><div class="panel-title">연락처</div><button class="panel-close" onclick="closePanel()">✕</button></div>`;
      if (card.contact_name || card.contact_phone) {
        ctHtml += `<div style="padding:20px;text-align:center;">
          <div style="font-size:18px;font-weight:700;">${esc(card.contact_name||'손님')}</div>
          ${card.contact_phone ? `<div style="margin-top:8px;"><button onclick="navigator.clipboard.writeText('${esc(card.contact_phone)}')" style="padding:10px 24px;border-radius:10px;border:1px solid var(--primary);background:var(--primary-bg);color:var(--primary);font-size:14px;font-weight:600;cursor:pointer;">${esc(card.contact_phone)} 📋</button></div>` : ''}
        </div>`;
      } else {
        const memo = pn.memo || '';
        const ph = memo.match(/01[016789][-.\s]?\d{3,4}[-.\s]?\d{4}/);
        if (ph) ctHtml += `<div style="padding:20px;text-align:center;"><button onclick="navigator.clipboard.writeText('${esc(ph[0])}')" style="padding:10px 24px;border-radius:10px;border:1px solid var(--primary);background:var(--primary-bg);color:var(--primary);font-size:14px;font-weight:600;cursor:pointer;">${esc(ph[0])} 📋</button></div>`;
        else ctHtml += '<div class="p-empty">등록된 연락처가 없어요</div>';
      }
      ctHtml += `</div>`;
      right.innerHTML = ctHtml;
      break;

    case 'pr_detail':
      const pp = card.property || {};
      let dtHtml = `<div class="panel-inner"><div class="panel-header"><div class="panel-title">상세 정보</div><button class="panel-close" onclick="closePanel()">✕</button></div>`;
      [pp.type&&['거래유형',pp.type], pp.price&&['가격',pp.price], pp.complex&&['단지',pp.complex], pp.location&&['위치',pp.location], pp.area&&['면적',pp.area], pp.floor&&['층',pp.floor], pp.room&&['방',pp.room]].filter(Boolean).forEach(([l,v]) => {
        dtHtml += `<div style="padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.04);"><div style="font-size:15px;font-weight:700;">${esc(v)}</div><div style="font-size:12px;color:var(--text-light);">${l}</div></div>`;
      });
      if ((pp.features||[]).length) dtHtml += `<div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;">${pp.features.map(f=>`<span style="padding:5px 14px;border-radius:20px;background:rgba(99,102,241,0.06);color:var(--primary);font-size:12px;font-weight:600;">${esc(f)}</span>`).join('')}</div>`;
      dtHtml += `</div>`;
      right.innerHTML = dtHtml;
      break;

    case 'pr_status':
      const st = card.trade_status || '계약가능';
      right.innerHTML = `<div class="panel-inner"><div class="panel-header"><div class="panel-title">거래 상태</div><button class="panel-close" onclick="closePanel()">✕</button></div>
        <div style="text-align:center;padding:40px 0;">
          <div style="font-size:48px;margin-bottom:12px;">${st==='완료'?'✅':st==='계약중'?'📝':'🏠'}</div>
          <div style="font-size:24px;font-weight:800;color:${st==='완료'?'#22c55e':st==='계약중'?'#f59e0b':'var(--primary)'};">${st}</div>
        </div></div>`;
      break;

    default:
      right.innerHTML = `<div class="panel-inner"><div class="panel-header"><div class="panel-title">${key}</div><button class="panel-close" onclick="closePanel()">✕</button></div><div class="p-empty">준비 중입니다</div></div>`;
  }
}

  });

  if (!items.length) {
    document.getElementById('myList').innerHTML = '<div class="p-empty"><div class="p-empty-icon">🏠</div>매물이 없어요</div>';

  document.getElementById('myList').innerHTML = items.map(c => {

    const typeClass = p.type === '매매' ? 'sale' : p.type === '전세' ? 'jeonse' : 'rent';

}

    </div>
    <div class="panel-search"><input type="text" id="clientSearch" placeholder="손님 검색 (이름, 전화번호, 조건...)" oninput="renderClientList()"></div>
    <div id="clientList"><div class="p-empty"><div class="p-empty-icon">⏳</div>불러오는 중...</div></div>
  </div>`;

  const { data } = await sb.from('cards')
    .select('id, property, private_note, contact_name, contact_phone, created_at')
    .eq('agent_id', currentUser.id)
    .eq('property->>type', '손님')
    .order('created_at', { ascending:false })
    .limit(50);
  _clientCards = data || [];
  renderClientList();
}

function renderClientList() {
  const q = (document.getElementById('clientSearch')?.value || '').toLowerCase();
  let items = _clientCards;
  if (q) items = items.filter(c => {
    const p = c.property || {};
    return [p.rawText, p.complex, p.location, p.price, c.contact_name, c.contact_phone, c.private_note?.memo].filter(Boolean).join(' ').toLowerCase().includes(q);
  });

  if (!items.length) {
    document.getElementById('clientList').innerHTML = '<div class="p-empty"><div class="p-empty-icon">🙋</div>손님이 없어요</div>';
    return;
  }

  document.getElementById('clientList').innerHTML = items.map(c => {
    const p = c.property || {};
    const name = c.contact_name || p.location || p.complex || '손님';
    return `<div class="p-item" onclick='enterClientHub(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
      <span class="p-type client">손님</span>
      <div class="p-info">
        <div class="p-name">${esc(name)}</div>
        <div class="p-detail">${[p.price, p.location, p.complex].filter(Boolean).map(v=>esc(v)).join(' · ')}</div>
      </div>
      ${c.contact_phone ? `<span style="font-size:11px;color:#fb923c;">${esc(c.contact_phone)}</span>` : ''}
    </div>`;
  }).join('');
}

// ── 패널: 알림 ──
async function loadAlertPanel(el) {
  el.innerHTML = `<div class="panel-inner">
    <div class="panel-header">
      <div class="panel-title">알림 <span>${_counts.alert}건</span></div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div id="alertList"><div class="p-empty"><div class="p-empty-icon">⏳</div>불러오는 중...</div></div>
  </div>`;

  const [matchRes, overdueRes, memoRes] = await Promise.all([
    sb.from('match_notifications').select('id, card_id, client_card_id, similarity, created_at, is_read')
      .eq('agent_id', currentUser.id).order('created_at', { ascending:false }).limit(20),
    sb.from('client_notes').select('id, client_card_id, content, alert_date, type')
      .eq('agent_id', currentUser.id).eq('alert_done', false).not('alert_date','is',null).lt('alert_date', new Date().toISOString())
      .order('alert_date', { ascending:true }).limit(20),
    sb.from('memos').select('id, content, is_read, created_at')
      .eq('agent_id', currentUser.id).order('created_at', { ascending:false }).limit(20),
  ]);

  const matches = matchRes.data || [];
  const overdue = overdueRes.data || [];
  const memos = memoRes.data || [];

  if (!matches.length && !overdue.length && !memos.length) {
    document.getElementById('alertList').innerHTML = '<div class="p-empty"><div class="p-empty-icon">🔔</div>새 알림이 없어요</div>';
    return;
  }

  let html = '';

  if (overdue.length) {
    html += `<div style="font-size:12px;font-weight:700;color:#ef4444;padding:8px 0 4px;">지연된 일정 (${overdue.length})</div>`;
    overdue.forEach(a => {
      html += `<div class="alert-item">
        <div class="alert-dot" style="background:#ef4444;"></div>
        <div class="alert-info">
          <div class="alert-title">${esc(a.content || a.type || '일정')}</div>
          <div class="alert-sub">${new Date(a.alert_date).toLocaleDateString('ko-KR')} (지연)</div>
        </div>
      </div>`;
    });
  }

  if (matches.length) {
    html += `<div style="font-size:12px;font-weight:700;color:var(--primary);padding:12px 0 4px;">매칭 알림 (${matches.length})</div>`;
    matches.forEach(m => {
      html += `<div class="alert-item">
        <div class="alert-dot" style="background:${m.is_read ? '#94a3b8' : '#6366f1'};"></div>
        <div class="alert-info">
          <div class="alert-title">🏠 매칭 매물 발견</div>
          <div class="alert-sub">${new Date(m.created_at).toLocaleDateString('ko-KR')}</div>
        </div>
      </div>`;
    });
  }

  if (memos.length) {
    html += `<div style="font-size:12px;font-weight:700;color:#f59e0b;padding:12px 0 4px;">모바일 메모 (${memos.length})</div>`;
    memos.forEach(m => {
      html += `<div class="alert-item" style="${m.is_read ? 'opacity:0.5;' : ''}">
        <div class="alert-dot" style="background:${m.is_read ? '#94a3b8' : '#f59e0b'};"></div>
        <div class="alert-info">
          <div class="alert-title">${esc(m.content || '메모')}</div>
          <div class="alert-sub">${new Date(m.created_at).toLocaleDateString('ko-KR')}</div>
        </div>
      </div>`;
    });
  }

  document.getElementById('alertList').innerHTML = html;
}

// ── 패널: 휙 보내기 ──
async function loadSendPanel(el) {
  el.innerHTML = `<div class="panel-inner">
    <div class="panel-header">
      <div class="panel-title">휙 보내기</div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <p style="color:var(--text-sub);font-size:13px;margin-bottom:16px;line-height:1.6;">매물을 선택하고 손님에게 링크를 보내세요</p>
    <div class="panel-search"><input type="text" id="sendSearch" placeholder="매물 검색..." oninput="renderSendList()"></div>
    <div id="sendSelected" style="margin-bottom:12px;"></div>
    <div id="sendList"><div class="p-empty"><div class="p-empty-icon">⏳</div>불러오는 중...</div></div>
    <div id="sendActions" style="display:none;position:sticky;bottom:0;padding:16px 0;background:var(--bg);">
      <button class="register-btn" onclick="generateSendLink()">🔗 링크 생성하기</button>
    </div>
  </div>`;

  if (!_myCards.length) {
    const { data } = await sb.from('cards')
      .select('id, property, trade_status, created_at')
      .eq('agent_id', currentUser.id)
      .neq('property->>type', '손님')
      .order('created_at', { ascending:false })
      .limit(50);
    _myCards = data || [];
  }
  _sendSelected = new Set();
  renderSendList();
}

let _sendSelected = new Set();

function renderSendList() {
  const q = (document.getElementById('sendSearch')?.value || '').toLowerCase();
  let items = _myCards.filter(c => (c.trade_status || '계약가능') !== '완료');
  if (q) items = items.filter(c => {
    const p = c.property || {};
    return [p.complex, p.location, p.price, p.type].filter(Boolean).join(' ').toLowerCase().includes(q);
  });

  // 선택된 매물 표시
  const selEl = document.getElementById('sendSelected');
  const actEl = document.getElementById('sendActions');
  if (_sendSelected.size > 0) {
    selEl.innerHTML = `<div style="padding:10px 14px;border-radius:10px;background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.1);font-size:13px;font-weight:600;color:var(--primary);">${_sendSelected.size}건 선택됨</div>`;
    if (actEl) actEl.style.display = '';
  } else {
    selEl.innerHTML = '';
    if (actEl) actEl.style.display = 'none';
  }

  if (!items.length) {
    document.getElementById('sendList').innerHTML = '<div class="p-empty"><div class="p-empty-icon">🏠</div>보낼 매물이 없어요</div>';
    return;
  }

  document.getElementById('sendList').innerHTML = items.map(c => {
    const p = c.property || {};
    const typeClass = p.type === '매매' ? 'sale' : p.type === '전세' ? 'jeonse' : 'rent';
    const selected = _sendSelected.has(c.id);
    return `<div class="p-item" style="${selected ? 'background:rgba(99,102,241,0.06);border-color:var(--primary);' : ''}" onclick="toggleSend('${c.id}')">
      <div style="width:20px;height:20px;border-radius:6px;border:2px solid ${selected ? 'var(--primary)' : 'var(--border)'};background:${selected ? 'var(--primary)' : 'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        ${selected ? '<span style="color:#fff;font-size:12px;font-weight:800;">✓</span>' : ''}
      </div>
      <span class="p-type ${typeClass}">${esc(p.type||'')}</span>
      <div class="p-info">
        <div class="p-name">${esc(p.complex || p.location || '매물')}</div>
        <div class="p-detail">${[p.price, p.area].filter(Boolean).map(v=>esc(v)).join(' · ')}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleSend(id) {
  if (_sendSelected.has(id)) _sendSelected.delete(id);
  else _sendSelected.add(id);
  renderSendList();
}

async function generateSendLink() {
  if (!_sendSelected.size) return;
  const ids = [..._sendSelected];
  const btn = document.querySelector('#sendActions .register-btn');
  btn.textContent = '생성 중...'; btn.disabled = true;

  try {
    // 링크 생성 API 호출
    const res = await fetch(`${SUPABASE_URL}/functions/v1/create-share-link`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+SUPABASE_KEY },
      body: JSON.stringify({ card_ids: ids, agent_id: currentUser.id })
    });
    const data = await res.json();
    if (data.url) {
      document.getElementById('sendActions').innerHTML = `
        <div style="padding:16px;border-radius:12px;background:#ecfdf5;border:1px solid #6ee7b7;">
          <div style="font-weight:700;color:#065f46;margin-bottom:8px;">✅ 링크가 생성되었습니다!</div>
          <div style="display:flex;gap:8px;">
            <input type="text" value="${data.url}" readonly style="flex:1;padding:8px 12px;border-radius:8px;border:1px solid #6ee7b7;font-size:12px;background:#fff;color:var(--text);" onclick="this.select();navigator.clipboard.writeText(this.value);">
            <button onclick="navigator.clipboard.writeText('${data.url}')" style="padding:8px 16px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-weight:700;font-size:12px;cursor:pointer;">복사</button>
          </div>
        </div>`;
    } else {
      btn.textContent = '🔗 링크 생성하기'; btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = '🔗 링크 생성하기'; btn.disabled = false;
  }
}
