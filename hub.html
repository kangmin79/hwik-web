<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>휙 — Hub</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest-pc.json">
<meta name="theme-color" content="#6366f1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js"></script>
<style>
/* ═══════════════════════════════════
   1. 기본 & 테마 변수
   ═══════════════════════════════════ */
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary:#6366f1; --primary-dark:#4f46e5;
  --primary-bg:rgba(99,102,241,0.06);
  --bg:#f6f5f1; --bg-card:#fff; --bg-input:#f0efeb;
  --text:#0f172a; --text-sub:#475569; --text-light:#64748b;
  --border:#e0ded8;
  --header-h:56px;
}
html,body { height:100%; overflow:hidden; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#c9c6be; border-radius:4px; }

/* ═══════════════════════════════════
   2. 레이아웃
   ═══════════════════════════════════ */
.header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:var(--header-h);
  background:rgba(246,245,241,0.92);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 24px;
}
.logo { font-size:24px; font-weight:900; color:var(--primary); cursor:pointer; }

.main { height:calc(100vh - var(--header-h)); margin-top:var(--header-h); position:relative; }

/* 왼쪽: 허브 */
.hub-area {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  padding-bottom:5%;
  transition:width 0.4s ease;
}

/* 오른쪽: 패널 */
.panel-area {
  position:fixed; top:var(--header-h); right:0;
  width:0; height:calc(100vh - var(--header-h));
  background:var(--bg-card);
  overflow-y:auto; overflow-x:hidden;
  border-left:1px solid var(--border);
  transition:width 0.4s ease;
  z-index:50;
}
.main.split .hub-area { width:50%; }
.main.split .panel-area { width:50%; }

/* 3분할 (매물 등록 + 미리보기) */
.main.triple .hub-area { width:33%; }
.main.triple .panel-area { width:67%; }

/* ═══════════════════════════════════
   3. 허브 비주얼 (SVG + 노드)
   ═══════════════════════════════════ */
.hub-visual { position:relative; width:min(90%,700px); aspect-ratio:800/700; max-height:75vh; }
.hub-lines { position:absolute; inset:0; z-index:1; pointer-events:none; }
.hub-line { stroke:#cbd5e1; stroke-width:1; opacity:0.5; }

.hub-center {
  position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  width:150px; height:150px; border-radius:32px;
  background:#fff; border:1px solid rgba(99,102,241,0.2);
  box-shadow:0 0 40px rgba(99,102,241,0.08), 0 8px 32px rgba(0,0,0,0.06);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:5; cursor:pointer;
}
.hub-center-icon { font-size:34px; margin-bottom:4px; }
.hub-center-name { font-size:15px; font-weight:800; text-align:center; line-height:1.2; letter-spacing:-0.5px; }
.hub-center-sub { font-size:11px; color:var(--text-light); margin-top:2px; }

.hub-node {
  position:absolute; z-index:4;
  transform:translate(-50%,-50%) scale(0);
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  cursor:pointer;
}
.hub-node.appear { transform:translate(-50%,-50%) scale(1); }
.hub-node-inner {
  background:#fff; border:1.5px solid rgba(0,0,0,0.08);
  border-radius:22px; padding:12px 26px;
  text-align:center; white-space:nowrap; min-width:130px;
  box-shadow:0 2px 12px rgba(0,0,0,0.04); transition:all 0.3s;
}
.hub-node:hover .hub-node-inner {
  border-color:rgba(99,102,241,0.4);
  box-shadow:0 0 20px rgba(99,102,241,0.1), 0 4px 20px rgba(0,0,0,0.05);
  transform:translateY(-3px);
}
.hub-node.active .hub-node-inner {
  border-color:#6366f1; background:rgba(99,102,241,0.06);
  box-shadow:0 0 0 3px rgba(99,102,241,0.12);
}
.hub-node-label { font-size:15px; font-weight:600; color:#374151; letter-spacing:-0.3px; }

/* 빛 애니메이션 */
.pulse-head { fill:#fff; display:none; filter:drop-shadow(0 0 4px #fff) drop-shadow(0 0 10px #818cf8) drop-shadow(0 0 20px #6366f1) drop-shadow(0 0 40px rgba(99,102,241,0.5)); }
.pulse-t1 { fill:#818cf8; display:none; filter:drop-shadow(0 0 6px #6366f1); }
.pulse-t2 { fill:#6366f1; display:none; filter:drop-shadow(0 0 4px rgba(99,102,241,0.5)); }
.pulse-t3 { fill:rgba(99,102,241,0.5); display:none; }
.pulse-head.on { display:block; opacity:1; }
.pulse-t1.on { display:block; opacity:0.7; }
.pulse-t2.on { display:block; opacity:0.4; }
.pulse-t3.on { display:block; opacity:0.2; }

/* ═══════════════════════════════════
   4. 패널 공통
   ═══════════════════════════════════ */
.panel-inner { padding:24px; min-height:100%; }
.panel-head {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px; position:sticky; top:0; z-index:5;
  background:var(--bg-card); padding:16px 24px; margin:-24px -24px 20px;
  border-bottom:1px solid var(--border);
}
.panel-title { font-size:18px; font-weight:800; letter-spacing:-0.5px; }
.panel-title span { color:var(--primary); }
.panel-x {
  background:none; border:none; color:var(--text-light);
  font-size:22px; cursor:pointer; padding:4px 8px; border-radius:8px; line-height:1;
}
.panel-x:hover { background:var(--primary-bg); color:var(--primary); }

/* 리스트 아이템 */
.item {
  display:flex; align-items:center; gap:12px;
  padding:14px 16px; border-radius:14px; cursor:pointer;
  transition:all 0.2s; border:1px solid transparent; margin-bottom:6px;
}
.item:hover { background:var(--primary-bg); border-color:rgba(99,102,241,0.08); }
.item-type { padding:4px 10px; border-radius:8px; font-size:11px; font-weight:800; flex-shrink:0; }
.item-type.sale { background:rgba(249,115,22,0.1); color:#ea580c; }
.item-type.jeonse { background:rgba(99,102,241,0.1); color:#4f46e5; }
.item-type.rent { background:rgba(167,139,250,0.1); color:#7c3aed; }
.item-type.client { background:rgba(78,205,196,0.1); color:#0d9488; }
.item-body { flex:1; min-width:0; }
.item-name { font-size:14px; font-weight:700; letter-spacing:-0.2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.item-sub { font-size:12px; color:var(--text-sub); margin-top:2px; }

/* 검색 & 필터 */
.search { display:flex; gap:8px; margin-bottom:16px; }
.search input {
  flex:1; padding:10px 16px; border-radius:10px;
  border:1px solid var(--border); background:var(--bg-input);
  color:var(--text); font-size:13px; outline:none;
}
.search input:focus { border-color:var(--primary); }
.filters { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
.filter-btn {
  padding:6px 14px; border-radius:20px;
  border:1px solid var(--border); background:transparent;
  color:var(--text-sub); font-size:12px; font-weight:600; cursor:pointer;
}
.filter-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }

/* 폼 */
.textarea {
  width:100%; min-height:200px; padding:16px; border-radius:14px;
  border:1.5px solid var(--border); background:var(--bg-card);
  color:var(--text); font-size:15px; line-height:1.7;
  font-family:inherit; resize:vertical; outline:none;
}
.textarea:focus { border-color:var(--primary); }
.textarea::placeholder { color:#94a3b8; }
.btn-primary {
  width:100%; padding:14px; margin-top:12px; border-radius:12px; border:none;
  background:linear-gradient(135deg,#6366f1,#818cf8);
  color:#fff; font-size:15px; font-weight:700; cursor:pointer;
  box-shadow:0 2px 12px rgba(99,102,241,0.3);
}
.btn-primary:hover { box-shadow:0 4px 20px rgba(99,102,241,0.4); }

/* 메모 입력 */
.note-row { display:flex; gap:8px; margin-bottom:16px; }
.note-row input {
  flex:1; padding:11px 16px; border-radius:12px;
  border:1px solid var(--border); background:var(--bg-input);
  color:var(--text); font-size:13px; outline:none;
}
.note-row input:focus { border-color:var(--primary); }
.note-row button {
  padding:11px 22px; border-radius:12px; border:none;
  background:linear-gradient(135deg,#6366f1,#818cf8);
  color:#fff; font-weight:700; font-size:13px; cursor:pointer;
}

/* 타임라인 */
.tl { display:flex; align-items:flex-start; gap:10px; padding:10px 0; }
.tl-tag { padding:3px 10px; border-radius:8px; font-size:10px; font-weight:700; flex-shrink:0; margin-top:2px; }
.tl-tag.상담 { background:rgba(96,165,250,0.1); color:#60a5fa; }
.tl-tag.방문 { background:rgba(74,222,128,0.1); color:#4ade80; }
.tl-tag.매물소개 { background:rgba(251,146,60,0.1); color:#fb923c; }
.tl-tag.계약 { background:rgba(248,113,113,0.1); color:#f87171; }
.tl-tag.메모 { background:rgba(148,163,184,0.06); color:#94a3b8; }
.tl-text { font-size:13px; font-weight:500; }
.tl-date { font-size:11px; color:var(--text-light); margin-top:1px; }

/* 알림 */
.alert { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:12px; margin-bottom:6px; cursor:pointer; }
.alert:hover { background:var(--primary-bg); }
.alert-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* 빈 상태 */
.empty { text-align:center; padding:60px 20px; color:var(--text-light); font-size:14px; }
.empty-icon { font-size:48px; margin-bottom:12px; }

/* 로그인 */
.login-bg { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; }
.login-bg.show { display:flex; }
.login-box { background:#fff; border-radius:24px; padding:40px; text-align:center; max-width:380px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.15); }
.login-box h2 { font-size:32px; font-weight:900; color:var(--primary); margin-bottom:8px; }
.login-box p { font-size:14px; color:var(--text-sub); margin-bottom:24px; line-height:1.6; }
.kakao-btn { width:100%; padding:14px; border-radius:12px; border:none; background:#FEE500; color:#000; font-size:15px; font-weight:700; cursor:pointer; }

/* 섹션 구분 */
.section-label { font-size:12px; font-weight:700; padding:12px 0 4px; }

/* 반응형 */
@media (max-width:768px) {
  .main.split .hub-area { display:none; }
  .main.split .panel-area { width:100%; position:relative; top:0; height:auto; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<header class="header">
  <div class="logo" onclick="Hub.back()">휙</div>
</header>

<!-- 메인 -->
<div class="main" id="main">
  <div class="hub-area">
    <div class="hub-visual" id="hubVisual">
      <svg class="hub-lines" id="hubLines" viewBox="0 0 800 700" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="hub-center" id="hubCenter" onclick="Hub.openPanel('settings')">
        <div class="hub-center-icon">👤</div>
        <div class="hub-center-name" id="centerName"></div>
        <div class="hub-center-sub" id="centerSub"></div>
      </div>
    </div>
  </div>
  <div class="panel-area" id="panelArea"></div>
</div>

<!-- 로그인 -->
<div class="login-bg" id="loginBg">
  <div class="login-box">
    <h2>휙</h2>
    <p>중개사 전용 허브<br>카카오 로그인으로 시작하세요</p>
    <button class="kakao-btn" onclick="Auth.login()">💬 카카오로 시작하기</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════
   모듈 구조:
   - Auth: 인증
   - Data: 데이터 캐시 & 로드
   - Hub: 허브 렌더링 & 네비게이션
   - Panel: 패널 빌더
   - Pulse: 빛 애니메이션
   ═══════════════════════════════════ */

// ── Auth 모듈 ──
const Auth = {
  sb: supabase.createClient(HWIK_CONFIG.SUPABASE_URL, HWIK_CONFIG.SUPABASE_KEY, { auth:{ clockSkewInSeconds:300 } }),
  user: null,
  profile: null,

  async check() {
    const { data:{ session } } = await this.sb.auth.getSession();
    if (!session?.user) return false;
    this.user = session.user;
    const { data } = await this.sb.from('profiles').select('business_name, agent_name, phone, is_admin').eq('id', this.user.id).maybeSingle();
    this.profile = data;
    return true;
  },

  login() {
    this.sb.auth.signInWithOAuth({ provider:'kakao', options:{ redirectTo: location.href.split('?')[0].split('#')[0] }});
  },

  logout() {
    this.sb.auth.signOut();
    this.user = null; this.profile = null;
    location.reload();
  },

  init() {
    this.sb.auth.onAuthStateChange((ev, session) => {
      if (ev === 'SIGNED_IN' && session?.user) { this.user = session.user; App.init(); }
    });
  }
};

// ── Data 모듈 ──
const Data = {
  myCards: [], clientCards: [], sharedCards: [],
  counts: {},

  async loadCounts() {
    const uid = Auth.user.id;
    const sb = Auth.sb;
    const [my, cl, sh, al, me] = await Promise.all([
      sb.from('cards').select('id',{count:'exact',head:true}).eq('agent_id',uid).neq('property->>type','손님'),
      sb.from('cards').select('id',{count:'exact',head:true}).eq('agent_id',uid).eq('property->>type','손님'),
      sb.from('card_shares').select('id',{count:'exact',head:true}),
      sb.from('match_notifications').select('id',{count:'exact',head:true}).eq('agent_id',uid).eq('is_read',false),
      sb.from('memos').select('id',{count:'exact',head:true}).eq('agent_id',uid).eq('is_read',false),
    ]);
    this.counts = { my:my.count||0, client:cl.count||0, shared:sh.count||0, alert:al.count||0, memo:me.count||0 };
  },

  async loadMyCards() {
    const { data } = await Auth.sb.from('cards')
      .select('id,property,trade_status,price_number,created_at')
      .eq('agent_id',Auth.user.id).neq('property->>type','손님')
      .order('created_at',{ascending:false}).limit(50);
    this.myCards = data || [];
  },

  async loadClientCards() {
    const { data } = await Auth.sb.from('cards')
      .select('id,property,private_note,contact_name,contact_phone,created_at')
      .eq('agent_id',Auth.user.id).eq('property->>type','손님')
      .order('created_at',{ascending:false}).limit(50);
    this.clientCards = data || [];
  },

  async loadSharedCards() {
    const { data } = await Auth.sb.from('card_shares')
      .select('card_id,cards(id,property,trade_status,agent_id,created_at)')
      .order('created_at',{ascending:false}).limit(30);
    this.sharedCards = (data||[]).map(r=>r.cards).filter(Boolean).filter(c=>c.property?.type!=='손님');
  },

  async loadAlerts() {
    const uid = Auth.user.id;
    const sb = Auth.sb;
    const [m,o,me] = await Promise.all([
      sb.from('match_notifications').select('id,card_id,client_card_id,similarity,created_at,is_read').eq('agent_id',uid).order('created_at',{ascending:false}).limit(20),
      sb.from('client_notes').select('id,client_card_id,content,alert_date,type').eq('agent_id',uid).eq('alert_done',false).not('alert_date','is',null).lt('alert_date',new Date().toISOString()).order('alert_date',{ascending:true}).limit(20),
      sb.from('memos').select('id,content,is_read,created_at').eq('agent_id',uid).order('created_at',{ascending:false}).limit(20),
    ]);
    return { matches:m.data||[], overdue:o.data||[], memos:me.data||[] };
  },

  async loadClientDetail(cardId) {
    const [notesRes, matchRes] = await Promise.all([
      Auth.sb.from('client_notes').select('id,type,content,alert_date,alert_done,created_at').eq('client_card_id',cardId).order('created_at',{ascending:false}),
      fetch(`${HWIK_CONFIG.SUPABASE_URL}/functions/v1/match-properties`,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+HWIK_CONFIG.SUPABASE_KEY,'apikey':HWIK_CONFIG.SUPABASE_KEY},
        body:JSON.stringify({client_card_id:cardId,agent_id:Auth.user.id,limit:10,threshold:0.15})
      }).then(r=>r.json()).catch(()=>({results:[]}))
    ]);
    return { notes:notesRes.data||[], matches:matchRes.results||[] };
  }
};

// ── Hub 모듈 ──
const Hub = {
  VW:800, VH:700, RADIUS:230,
  stack: [],
  current: null,
  activePanel: null,

  MAIN_NODES: [
    { key:'register', label:'매물 등록', angle:-90 },
    { key:'my',       label:'내 매물',  angle:-18 },
    { key:'client',   label:'손님',    angle:54 },
    { key:'alert',    label:'알림',    angle:126 },
    { key:'shared',   label:'공유방',  angle:198 },
  ],
  CLIENT_NODES: [
    { key:'cl_conditions', label:'희망 조건',  angle:-90 },
    { key:'cl_match',      label:'매칭 매물',  angle:-30 },
    { key:'cl_timeline',   label:'상담 기록',  angle:30 },
    { key:'cl_schedule',   label:'일정/알림',  angle:90 },
    { key:'cl_contact',    label:'연락처',    angle:150 },
    { key:'cl_back',       label:'← 돌아가기', angle:210 },
  ],
  PROPERTY_NODES: [
    { key:'pr_detail', label:'상세 정보', angle:-90 },
    { key:'pr_status', label:'거래 상태', angle:30 },
    { key:'pr_back',   label:'← 돌아가기', angle:150 },
  ],

  render(nodes, center) {
    nodes = nodes || this.MAIN_NODES;
    center = center || { icon:'👤', name:Auth.profile?.business_name||'중개사', sub:'' };

    const visual = document.getElementById('hubVisual');
    const hubCenter = document.getElementById('hubCenter');
    const {VW,VH,RADIUS} = this;
    const cx=VW/2, cy=VH/2;

    hubCenter.innerHTML = `<div class="hub-center-icon">${center.icon}</div><div class="hub-center-name">${esc(center.name)}</div><div class="hub-center-sub">${esc(center.sub)}</div>`;

    let svg='', html='';
    nodes.forEach(n => {
      const rad=n.angle*Math.PI/180, nx=cx+RADIUS*Math.cos(rad), ny=cy+RADIUS*Math.sin(rad);
      svg += `<line class="hub-line" x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}"/>`;
      ['t3','t2','t1'].forEach((s,i)=> svg+=`<circle class="pulse-${s}" id="p${s}-${n.key}" cx="${cx}" cy="${cy}" r="${6-i}"/>`);
      svg += `<circle class="pulse-head" id="ph-${n.key}" cx="${cx}" cy="${cy}" r="3.5"/>`;
      html += `<div class="hub-node" data-key="${n.key}" style="left:${(nx/VW*100).toFixed(1)}%;top:${(ny/VH*100).toFixed(1)}%;" onclick="Hub.onNode('${n.key}')"><div class="hub-node-inner"><span class="hub-node-label">${n.label}</span></div></div>`;
    });

    document.getElementById('hubLines').innerHTML = svg;
    visual.querySelectorAll('.hub-node').forEach(el=>el.remove());
    visual.insertAdjacentHTML('beforeend', html);
    visual.querySelectorAll('.hub-node').forEach((el,i) => {
      setTimeout(()=>el.classList.add('appear'), 30+i*40);
      el.addEventListener('mouseenter', ()=>Pulse.start(el.dataset.key, nodes));
      el.addEventListener('mouseleave', ()=>Pulse.stop(el.dataset.key));
    });
  },

  onNode(key) {
    if (key==='cl_back'||key==='pr_back') { this.back(); return; }
    if (key.startsWith('cl_')||key.startsWith('pr_')) { Panel.openSub(key); return; }
    this.openPanel(key);
  },

  openPanel(key) {
    if (this.activePanel===key) { this.closePanel(); return; }
    document.querySelectorAll('.hub-node').forEach(n=>n.classList.remove('active'));
    document.querySelector(`.hub-node[data-key="${key}"]`)?.classList.add('active');
    this.activePanel = key;
    document.getElementById('main').classList.add('split');
    Panel.load(key, document.getElementById('panelArea'));
  },

  closePanel() {
    document.getElementById('main').classList.remove('split');
    document.getElementById('main').classList.remove('triple');
    document.querySelectorAll('.hub-node').forEach(n=>n.classList.remove('active'));
    this.activePanel = null;
  },

  enterClient(card) {
    const p = card.property||{};
    this.stack.push({ nodes:this.current?.nodes||this.MAIN_NODES, center:this.current?.center });
    this.current = { type:'client', data:card, nodes:this.CLIENT_NODES,
      center:{ icon:'🙋', name:card.contact_name||p.location||p.complex||'손님', sub:p.price||'' },
      _notes:[], _matches:[] };
    this.closePanel();
    this.render(this.CLIENT_NODES, this.current.center);
    Data.loadClientDetail(card.id).then(d => { this.current._notes=d.notes; this.current._matches=d.matches; });
  },

  enterProperty(card) {
    const p = card.property||{};
    this.stack.push({ nodes:this.current?.nodes||this.MAIN_NODES, center:this.current?.center });
    this.current = { type:'property', data:card, nodes:this.PROPERTY_NODES,
      center:{ icon:'🏠', name:p.complex||p.location||'매물', sub:[p.type,p.price].filter(Boolean).join(' · ') }};
    this.closePanel();
    this.render(this.PROPERTY_NODES, this.current.center);
  },

  back() {
    if (!this.stack.length) { this.closePanel(); return; }
    const prev = this.stack.pop();
    this.current = this.stack.length ? null : null;
    this.closePanel();
    this.render(prev.nodes, prev.center);
  }
};

// ── Pulse 모듈 ──
const Pulse = {
  raf: null,

  start(key, nodes) {
    nodes = nodes || Hub.current?.nodes || Hub.MAIN_NODES;
    const node = nodes.find(n=>n.key===key);
    if (!node) return;
    const {VW,VH,RADIUS}=Hub, fx=VW/2, fy=VH/2;
    const rad=node.angle*Math.PI/180, tx=fx+RADIUS*Math.cos(rad), ty=fy+RADIUS*Math.sin(rad);
    const els=['ph','pt1','pt2','pt3'].map(p=>document.getElementById(`${p}-${key}`));
    els.forEach(e=>{if(e)e.classList.add('on');});
    const t0=performance.now(), dur=500, delays=[0,40,90,150];
    const anim = now => {
      els.forEach((e,i)=>{if(!e)return;const t=Math.max(0,Math.min((now-t0-delays[i])/dur,1)),ease=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;e.setAttribute('cx',fx+(tx-fx)*ease);e.setAttribute('cy',fy+(ty-fy)*ease);});
      if((now-t0-delays[3])/dur<1) this.raf=requestAnimationFrame(anim);
      else{els.forEach(e=>{if(e){e.setAttribute('cx',fx);e.setAttribute('cy',fy);}});setTimeout(()=>{if(document.querySelector(`.hub-node[data-key="${key}"]:hover`))this.start(key,nodes);},200);}
    };
    this.raf=requestAnimationFrame(anim);
  },

  stop(key) {
    if(this.raf){cancelAnimationFrame(this.raf);this.raf=null;}
    ['ph','pt1','pt2','pt3'].forEach(p=>{const e=document.getElementById(`${p}-${key}`);if(e)e.classList.remove('on');});
  }
};

// ── App ──
const App = {
  async init() {
    if (!Auth.user) { document.getElementById('loginBg').classList.add('show'); return; }
    document.getElementById('loginBg').classList.remove('show');
    if (!Auth.profile) await Auth.check();
    await Data.loadCounts();
    Hub.render();
  }
};

// ── 시작 ──
Auth.init();
document.addEventListener('DOMContentLoaded', async () => {
  await Auth.check();
  App.init();
});
</script>
