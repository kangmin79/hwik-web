<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --dark: #1a1a2e;
  --yellow: #FFD43B;
  --bg: #f8f8fa;
  --white: #ffffff;
  --border: #e2e8f0;
  --sub: #94a3b8;
  --text: #1a1a2e;
  --sell: #ea580c;
  --lease: #4f46e5;
  --monthly: #7c3aed;
}

html, body {
  height: 100%;
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ── 중개사 버튼 ── */
.btn-agent {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 100;
  padding: 7px 14px;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: #5a5a6e;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: all 0.2s;
}
.btn-agent:hover { border-color: #94a3b8; color: var(--text); }

/* ── 메인 레이아웃 ── */
.page {
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 24px;
  padding-bottom: 10%;
  transition: padding 0.4s ease;
  width: 100%;
  min-height: 100vh;
}

.hero.has-results {
  min-height: auto;
  padding-top: 60px;
  padding-bottom: 24px;
  justify-content: flex-start;
}

/* ── 로고 ── */
.logo {
  margin-bottom: 48px;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: default;
  user-select: none;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.logo-text {
  font-size: 68px;
  font-weight: 900;
  letter-spacing: -3px;
  color: var(--dark);
  transition: all 0.3s ease;
}
.logo-dot {
  width: 12px;
  height: 12px;
  background: var(--yellow);
  border-radius: 50%;
  margin-top: 28px;
  transition: all 0.3s ease;
}
.hero.has-results .logo { margin-bottom: 12px; }
.hero.has-results .logo-text { font-size: 36px; }
.hero.has-results .logo-dot { width: 8px; height: 8px; margin-top: 16px; }

/* ── 태그라인 ── */
.tagline {
  font-size: 14px;
  font-weight: 400;
  color: var(--sub);
  margin-top: -36px;
  margin-bottom: 40px;
  letter-spacing: 0.3px;
  transition: all 0.4s ease;
  text-align: center;
}
.hero.has-results .tagline { display: none; }

/* ── 검색창 ── */
.search-wrap {
  width: 100%;
  max-width: 540px;
  position: relative;
}
.search-input {
  width: 100%;
  padding: 18px 56px 18px 22px;
  font-size: 17px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 400;
  border: 1.5px solid var(--border);
  border-radius: 28px;
  outline: none;
  background: var(--white);
  color: var(--text);
  transition: all 0.25s ease;
  -webkit-appearance: none;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.search-input::placeholder { color: var(--sub); font-weight: 300; }
.search-input:focus {
  border-color: #0ea5e9;
  box-shadow: 0 4px 20px rgba(14,165,233,0.12), 0 0 0 3px rgba(14,165,233,0.08);
}
.search-btn {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 50%;
  background: var(--yellow);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.search-btn:hover { background: #FFC800; transform: translateY(-50%) scale(1.05); }

/* ── 결과 ── */
.results-wrap {
  width: 100%;
  max-width: 540px;
  margin-top: 12px;
  padding: 0 24px 40px;
}

.results-count {
  font-size: 12px;
  color: var(--sub);
  margin-bottom: 10px;
  padding: 0 4px;
}

.result-item {
  background: var(--white);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  text-decoration: none;
  display: block;
  border: 1px solid var(--border);
  transition: all 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.result-item:hover { border-color: #94a3b8; box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }

.result-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
}
.result-loc {
  font-size: 12px;
  color: var(--sub);
  margin-bottom: 10px;
}
.result-trades {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.trade-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  background: #f8f8fa;
  border-radius: 8px;
  padding: 5px 9px;
  font-size: 12px;
}
.trade-type {
  font-weight: 700;
  font-size: 11px;
  padding: 1px 5px;
  border-radius: 4px;
  color: #fff;
}
.type-매매 { background: var(--sell); }
.type-전세 { background: var(--lease); }
.type-월세 { background: var(--monthly); }
.trade-price { font-weight: 600; color: var(--text); }
.trade-date { color: var(--sub); font-size: 11px; }
.trade-pyeong { color: #64748b; font-size: 11px; }

.empty-msg {
  text-align: center;
  color: var(--sub);
  font-size: 14px;
  padding: 40px 0;
}

.loading-msg {
  text-align: center;
  color: var(--sub);
  font-size: 14px;
  padding: 30px 0;
}

/* 데이터 출처 */
.data-source {
  font-size: 11px;
  color: #b0b8c8;
  text-align: center;
  padding: 8px 0 24px;
  width: 100%;
}
</style>
</head>
<body>

<a class="btn-agent" href="#">중개사</a>

<div class="page">
  <div class="hero" id="hero">
    <div class="logo">
      <span class="logo-text">휙</span>
      <span class="logo-dot"></span>
    </div>
    <p class="tagline">아파트 실거래가 이제 휙 확인하세요</p>
    <div class="search-wrap">
      <input class="search-input" id="searchInput"
        type="search"
        placeholder="단지명, 지역으로 검색"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        enterkeyhint="search">
      <button class="search-btn" id="searchBtn" aria-label="검색">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="results-wrap" id="resultsWrap" style="display:none">
    <div class="results-count" id="resultsCount"></div>
    <div id="resultsList"></div>
    <div class="data-source">출처: 국토교통부 실거래가 공개시스템</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPA_URL = 'https://jqaxejgzkchxbfzgzyzi.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxYXhlamd6a2NoeGJmemd6eXppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDk3MTM5OTksImV4cCI6MjAyNTI4OTk5OX0.hHrKEFCNMBbMTYqDLJWzMT5mcpZAPnJBCFm-CMWUO8k';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatPrice(manwon) {
  if (!manwon) return '-';
  const uk = Math.floor(manwon / 10000);
  const rem = manwon % 10000;
  const chun = Math.floor(rem / 1000);
  if (uk > 0 && chun > 0) return `${uk}억 ${chun}천`;
  if (uk > 0) return `${uk}억`;
  return `${manwon.toLocaleString()}만`;
}

let searchTimer = null;
let lastQuery = '';

const input = document.getElementById('searchInput');
const hero = document.getElementById('hero');
const resultsWrap = document.getElementById('resultsWrap');
const resultsList = document.getElementById('resultsList');
const resultsCount = document.getElementById('resultsCount');

input.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = input.value.trim();
  if (q.length < 2) {
    if (q.length === 0) resetView();
    return;
  }
  searchTimer = setTimeout(() => doSearch(q), 300);
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    clearTimeout(searchTimer);
    const q = input.value.trim();
    if (q.length >= 2) doSearch(q);
  }
});

document.getElementById('searchBtn').addEventListener('click', () => {
  const q = input.value.trim();
  if (q.length >= 2) doSearch(q);
});

function resetView() {
  hero.classList.remove('has-results');
  resultsWrap.style.display = 'none';
  resultsList.innerHTML = '';
}

async function doSearch(query) {
  if (query === lastQuery) return;
  lastQuery = query;

  hero.classList.add('has-results');
  resultsWrap.style.display = 'block';
  resultsList.innerHTML = `<div class="loading-msg">검색 중...</div>`;
  resultsCount.textContent = '';

  // 1. 아파트 단지 검색
  const { data: apts, error } = await sb.from('apartments')
    .select('kapt_code,kapt_name,umd_nm,sgg,slug')
    .or(`kapt_name.ilike.%${query}%,umd_nm.ilike.%${query}%,sgg.ilike.%${query}%`)
    .limit(20);

  if (error || !apts?.length) {
    resultsList.innerHTML = `<div class="empty-msg">"${esc(query)}"에 해당하는 단지가 없습니다</div>`;
    resultsCount.textContent = '';
    return;
  }

  // 2. 최근 실거래 조회
  const codes = apts.map(a => a.kapt_code);
  const { data: trades } = await sb.from('trades')
    .select('kapt_code,trade_type,price,pyeong,year,month')
    .in('kapt_code', codes)
    .order('year', { ascending: false })
    .order('month', { ascending: false })
    .limit(200);

  // 3. 단지별 거래유형별 최신 거래 매핑
  const tradeMap = {};
  (trades || []).forEach(t => {
    const key = `${t.kapt_code}_${t.trade_type}`;
    if (!tradeMap[key]) tradeMap[key] = t;
  });

  // 4. 렌더링
  resultsCount.textContent = `${apts.length}개 단지`;
  resultsList.innerHTML = apts.map(apt => {
    const types = ['매매', '전세', '월세'];
    const badges = types.map(type => {
      const t = tradeMap[`${apt.kapt_code}_${type}`];
      if (!t) return '';
      const pyeongStr = t.pyeong ? `·${t.pyeong}평형` : '';
      const dateStr = `${t.year}.${String(t.month).padStart(2,'0')}`;
      return `<span class="trade-badge">
        <span class="trade-type type-${type}">${type}</span>
        <span class="trade-price">${formatPrice(t.price)}</span>
        <span class="trade-pyeong">${pyeongStr}</span>
        <span class="trade-date">${dateStr}</span>
      </span>`;
    }).join('');

    const loc = [apt.sgg, apt.umd_nm].filter(Boolean).join(' ');
    const link = apt.slug ? `/danji/${esc(apt.slug)}` : '#';

    return `<a class="result-item" href="${link}">
      <div class="result-name">${esc(apt.kapt_name)}</div>
      <div class="result-loc">${esc(loc)}</div>
      <div class="result-trades">${badges || '<span style="font-size:12px;color:#b0b8c8">거래 내역 없음</span>'}</div>
    </a>`;
  }).join('');
}
</script>
</body>
