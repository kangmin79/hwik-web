<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>휙</title>
<meta name="description" content="AI가 찾아주는 내 조건에 딱 맞는 매물">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --hwik-dark: #1a1a2e;
    --hwik-dark-light: #242442;
    --hwik-yellow: #FFD43B;
    --hwik-yellow-hover: #FFC800;
    --bg: #f8f8fa;
    --white: #ffffff;
    --gray-100: #f0f0f3;
    --gray-200: #e2e2e8;
    --gray-400: #8e8e9a;
    --gray-600: #5a5a6e;
    --text: #1a1a2e;
  }

  html, body {
    height: 100%;
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ── 레이아웃 ── */
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 0 24px;
    padding-bottom: 18%;
    transition: justify-content 0.4s ease;
  }

  .container.active {
    justify-content: flex-start;
    padding-top: 40px;
  }

  /* ── 로고 ── */
  .logo {
    margin-bottom: 48px;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .logo-text {
    font-size: 68px;
    font-weight: 900;
    letter-spacing: -3px;
    color: var(--hwik-dark);
    transition: all 0.3s ease;
  }

  .logo-dot {
    width: 12px;
    height: 12px;
    background: var(--hwik-yellow);
    border-radius: 50%;
    margin-top: 28px;
    transition: all 0.3s ease;
  }

  .logo:hover .logo-text { color: var(--hwik-dark-light); }
  .logo:hover .logo-dot { transform: scale(1.3); background: var(--hwik-yellow-hover); }

  .container.active .logo { margin-bottom: 20px; }
  .container.active .logo-text { font-size: 32px; }
  .container.active .logo-dot { width: 8px; height: 8px; margin-top: 14px; }

  .tagline {
    font-size: 14px;
    font-weight: 300;
    color: var(--gray-400);
    margin-top: -36px;
    margin-bottom: 40px;
    letter-spacing: -0.3px;
    transition: all 0.4s ease;
  }

  .container.active .tagline { display: none; }

  /* ── 검색 영역 ── */
  .search-wrap {
    width: 100%;
    max-width: 540px;
    position: relative;
  }

  .search-box {
    position: relative;
    width: 100%;
  }

  .search-input {
    width: 100%;
    padding: 18px 56px 18px 20px;
    font-size: 17px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    border: 2px solid var(--gray-200);
    border-radius: 28px;
    outline: none;
    background: var(--white);
    color: var(--text);
    transition: all 0.25s ease;
    -webkit-appearance: none;
  }

  .search-input::placeholder { color: var(--gray-400); font-weight: 300; opacity: 0.5; }

  .search-input:focus {
    border-color: var(--hwik-dark);
    box-shadow: 0 4px 24px rgba(26,26,46,0.1);
  }

  /* 드롭다운 열리면 검색창 하단 모서리 제거 */
  .search-input.dropdown-open {
    border-radius: 28px 28px 0 0;
    border-bottom-color: var(--gray-100);
  }

  /* ── 좌우 버튼 ── */
  .btn-left {
    position: absolute;
    left: 6px;
    top: 50%;
    transform: translateY(-50%);
  }

  .btn-right {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
  }

  .icon-btn {
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .icon-btn:active { transform: scale(0.9); }

  .icon-btn svg {
    width: 20px;
    height: 20px;
    stroke-width: 2.5;
    fill: none;
  }

  .btn-search { background: var(--hwik-yellow); }
  .btn-search:hover { background: var(--hwik-yellow-hover); }
  .btn-search svg { stroke: var(--hwik-dark); }

  .btn-register { background: var(--hwik-dark); }
  .btn-register:hover { background: var(--hwik-dark-light); }
  .btn-register svg { stroke: var(--hwik-yellow); }

  /* ── 추천 드롭다운 ── */
  .suggest-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--white);
    border: 2px solid var(--hwik-dark);
    border-top: 1px solid var(--gray-100);
    border-radius: 0 0 20px 20px;
    padding: 4px 0 8px;
    z-index: 50;
    box-shadow: 0 8px 24px rgba(26,26,46,0.1);
    max-height: 60vh;
    overflow-y: auto;
  }
  .suggest-dropdown .recent-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px 4px;
  }

  .suggest-dropdown.show { display: block; }

  .suggest-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.1s ease;
    font-size: 15px;
    color: var(--text);
    font-weight: 400;
  }

  .suggest-item:hover { background: var(--gray-100); }
  .suggest-item:active { background: var(--gray-200); }

  .suggest-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .suggest-icon svg {
    width: 16px;
    height: 16px;
    stroke: var(--gray-400);
    stroke-width: 2;
    fill: none;
  }

  .suggest-text {
    flex: 1;
  }

  .suggest-label {
    font-size: 11px;
    color: var(--gray-400);
    font-weight: 300;
    padding: 10px 20px 4px;
  }

  /* ── 결과 ── */
  .results {
    display: none;
    width: 100%;
    max-width: 540px;
    margin-top: 16px;
    overflow-y: auto;
    max-height: calc(100vh - 240px);
    padding-bottom: 90px;
    -webkit-overflow-scrolling: touch;
  }

  .container.active .results { display: block; }
  .results::-webkit-scrollbar { display: none; }
  .results { scrollbar-width: none; }

  .results-status {
    font-size: 14px;
    color: var(--gray-400);
    font-weight: 300;
    margin-bottom: 16px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .results-status strong { color: var(--hwik-dark); font-weight: 700; }

  .sort-toggle {
    display: flex; align-items: center; gap: 4px;
    padding: 5px 10px;
    border: 1.5px solid var(--gray-200);
    border-radius: 20px;
    background: var(--white);
    font-size: 11px; font-weight: 600;
    color: var(--gray-400);
    cursor: pointer; font-family: inherit;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .sort-toggle.active {
    border-color: var(--hwik-dark);
    background: var(--hwik-dark);
    color: var(--hwik-yellow);
  }
  .sort-toggle:active { transform: scale(0.95); }
  .sort-toggle svg { width: 11px; height: 11px; stroke: currentColor; stroke-width: 2.5; fill: none; }

  .searching { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--gray-400); font-weight: 300; padding-left: 4px; }
  .dot-pulse { display: flex; gap: 4px; }
  .dot-pulse span { width: 6px; height: 6px; border-radius: 50%; background: var(--hwik-yellow); animation: pulse 1.2s ease infinite; }
  .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
  .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }

  /* ── 리스트 아이템 ── */
  .li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 10px;
    margin-bottom: 6px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }
  .li.my { background: #FFFBEB; }
  .li.shared { background: #F0F1FF; }
  .li.my:hover { background: #FFF6D6; }
  .li.shared:hover { background: #E8E9FF; }
  .li.checked.my { background: #FFF0B3; box-shadow: inset 0 0 0 1.5px #E6C200; }
  .li.checked.shared { background: #DDDEFF; box-shadow: inset 0 0 0 1.5px #7C8CF8; }
  .li:nth-child(2){animation-delay:.05s}
  .li:nth-child(3){animation-delay:.1s}
  .li:nth-child(4){animation-delay:.15s}
  .li:nth-child(5){animation-delay:.2s}
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .li-check {
    width: 20px; height: 20px;
    border: 2px solid var(--gray-200);
    border-radius: 5px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .li-check svg { width: 14px; height: 14px; stroke: var(--white); stroke-width: 3; fill: none; display: none; }
  .li.checked .li-check { background: var(--hwik-dark); border-color: var(--hwik-dark); }
  .li.checked .li-check svg { display: block; }

  .li-type {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .type-sale { background: #FFE8E8; color: #C62828; }
  .type-jeonse { background: #E3F2FD; color: #1565C0; }
  .type-rent { background: #E8F5E9; color: #2E7D32; }

  .li-price {
    font-size: 15px;
    font-weight: 900;
    color: var(--hwik-dark);
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 50px;
  }

  .li-info {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }

  .li-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--hwik-dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .li-detail {
    font-size: 11px;
    color: var(--gray-400);
    font-weight: 300;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .li-from {
    font-size: 10px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .li-from.from-my { color: #9E8600; background: #FFF8E1; }
  .li-from.from-shared { color: #4A52B5; background: #EDEFFF; }

  .li-trade {
    font-size: 10px; font-weight: 600;
    white-space: nowrap; flex-shrink: 0;
    padding: 2px 6px; border-radius: 4px;
  }
  .li-trade.trade-available { background: rgba(34,197,94,0.12); color: #16a34a; }
  .li-trade.trade-ongoing   { background: rgba(250,204,21,0.15); color: #ca8a04; }
  .li-trade.trade-done      { background: rgba(120,120,120,0.12); color: #888; }

  /* 공유 시트 — my_cards.html 동일 스타일 */
  .share-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(3px); z-index:1100; }
  .share-overlay.show { display:block; }
  .share-sheet {
    position:fixed; bottom:-100%; left:50%; transform:translateX(-50%);
    width:min(400px, 92vw);
    background:#1a2535; border-radius:24px 24px 0 0;
    padding:12px 20px calc(32px + env(safe-area-inset-bottom)); z-index:1101;
    transition:bottom 0.35s cubic-bezier(0.4,0,0.2,1);
    border-top:1px solid rgba(255,255,255,0.08);
  }
  .share-sheet.show { bottom:0; }
  .share-sheet-handle { width:36px; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; margin:0 auto 16px; }
  .share-sheet-title { font-size:13px; font-weight:600; color:#6b7280; text-align:center; margin-bottom:20px; letter-spacing:0.05em; }
  .share-sheet-btns { display:flex; justify-content:center; gap:20px; margin-bottom:20px; }
  .share-opt { display:flex; flex-direction:column; align-items:center; gap:8px; background:none; border:none; cursor:pointer; transition:transform 0.15s; }
  .share-opt:active { transform:translateY(-3px); }
  .share-opt-icon { width:56px; height:56px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:26px; transition:all 0.15s; }
  .share-opt.kakao .share-opt-icon { background:#FEE500; }
  .share-opt.copy .share-opt-icon { background:rgba(78,205,196,0.15); border:1.5px solid rgba(78,205,196,0.25); }
  .share-opt-label { font-size:12px; color:#9ca3af; font-weight:500; }
  .share-sheet-cancel { width:100%; padding:14px; border-radius:12px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); color:#9ca3af; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.15s; }
  .share-sheet-cancel:active { background:rgba(255,255,255,0.1); color:#fff; }

  .li-btn-detail {
    padding: 5px 10px;
    font-size: 11px; font-weight: 600;
    color: var(--gray-600);
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 6px;
    cursor: pointer; font-family: inherit;
    flex-shrink: 0;
    transition: all 0.15s ease;
  }
  .li-btn-detail:active { transform: scale(0.93); background: var(--gray-100); }

  /* ── 플로팅 카드 만들기 버튼 ── */
  .float-card-btn {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    padding: 14px 32px;
    background: var(--gray-200);
    color: var(--gray-400);
    border: none; border-radius: 16px;
    font-size: 15px; font-weight: 700;
    font-family: inherit;
    cursor: default;
    box-shadow: 0 6px 24px rgba(26,26,46,0.1);
    z-index: 90;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .float-card-btn.visible { transform: translateX(-50%) translateY(0); }
  .float-card-btn.active {
    background: var(--hwik-dark);
    color: var(--hwik-yellow);
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(26,26,46,0.3);
  }
  .float-card-btn.active:active { transform: translateX(-50%) scale(0.95); }
  .float-card-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; }

  /* ── 로그인 시트 ── */
  .overlay { display: none; position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.3); z-index: 100; animation: fi .2s ease; }
  .overlay.show { display: block; }
  @keyframes fi { from{opacity:0}to{opacity:1} }

  .login-sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-radius: 20px 20px 0 0;
    padding: 28px 24px 36px;
    z-index: 101;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    text-align: center;
  }
  .login-sheet.show { transform: translateY(0); }
  .login-sheet-bar { width: 36px; height: 4px; background: var(--gray-200); border-radius: 2px; margin: 0 auto 20px; }

  .kakao-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; max-width: 320px; margin: 0 auto;
    padding: 14px 0;
    background: #FEE500; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; color: #3C1E1E;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s ease;
  }
  .kakao-btn:active { transform: scale(0.97); }
  .kakao-btn svg { width: 20px; height: 20px; }

  /* ── 상세 모달 (풀스크린) ── */
  .detail-overlay {
    display: none;
    position: fixed; top:0;left:0;right:0;bottom:0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
  }
  .detail-overlay.show { display: block; animation: fi .2s ease; }

  .detail-modal {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #0a0a1a;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .detail-modal.show { transform: translateY(0); }
  .detail-modal::-webkit-scrollbar { display: none; }

  .dm-header {
    position: sticky; top: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    background: #0a0a1a;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    z-index: 10;
  }
  .dm-back {
    width: 36px; height: 36px;
    border: none; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .dm-back:active { transform: scale(0.9); }
  .dm-back svg { width: 18px; height: 18px; stroke: #fff; stroke-width: 2.5; fill: none; }
  .dm-title { font-size: 16px; font-weight: 700; color: #fff; }

  .dm-body { padding: 20px; }

  .dm-type-price {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px;
  }
  .dm-type-badge { font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 5px; }

  .dm-field { margin-bottom: 16px; }
  .dm-label {
    font-size: 11px; font-weight: 500; color: #666;
    margin-bottom: 6px;
  }
  .dm-input {
    width: 100%;
    padding: 12px 14px;
    background: #1a1a2e;
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    font-size: 15px; font-family: inherit; font-weight: 400;
    color: #fff;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .dm-input:focus { border-color: #4ECDC4; background: #1e1e36; }
  .dm-input::placeholder { color: #555; font-weight: 300; }

  .dm-row {
    display: flex; gap: 10px;
  }
  .dm-row .dm-field { flex: 1; }

  .dm-textarea {
    width: 100%;
    padding: 12px 14px;
    background: #1a1a2e;
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    font-size: 14px; font-family: inherit; font-weight: 400;
    color: #fff;
    outline: none; resize: none;
    min-height: 60px;
    line-height: 1.5;
    transition: border-color 0.15s ease;
  }
  .dm-textarea:focus { border-color: #4ECDC4; background: #1e1e36; }
  .dm-textarea::placeholder { color: #555; font-weight: 300; }

  .dm-memo-label-icon {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 500; margin-bottom: 6px;
  }
  .dm-memo-private { color: #E67E22; }
  .dm-memo-public { color: #4ECDC4; }


  .dm-actions {
    display: flex; gap: 8px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .dm-act {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px 0;
    border: none; border-radius: 10px;
    cursor: pointer; font-family: inherit;
    font-size: 13px; font-weight: 600;
    transition: all 0.15s ease;
  }
  .dm-act:active { transform: scale(0.95); }
  .dm-act svg { width: 18px; height: 18px; stroke-width: 2; fill: none; }

  .act-cancel { background: rgba(255,255,255,0.08); color: #aaa; }
  .act-save { background: var(--hwik-yellow); color: #1a1a2e; }

  /* ── 카드 미리보기 ── */
  .card-overlay {
    display: none;
    position: fixed; top:0;left:0;right:0;bottom:0;
    background: #0a0a1a;
    z-index: 300;
    flex-direction: column;
  }
  .card-overlay.show { display: flex; }

  .card-header {
    text-align: center;
    padding: 16px 20px 8px;
    color: #888;
    font-size: 13px;
    font-weight: 300;
    position: relative;
  }
  .card-close {
    position: absolute; right: 16px; top: 14px;
    width: 32px; height: 32px;
    border: none; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .card-close svg { width: 16px; height: 16px; stroke: #aaa; stroke-width: 2.5; fill: none; }

  .card-body {
    flex: 1;
    overflow-y: auto;

  <div class="share-sheet-title" id="shareSheetTitle">매물 공유하기</div>
  <div class="share-sheet-btns">
    <button class="share-opt kakao" onclick="shareKakao()">
      <div class="share-opt-icon"><img src="https://developers.kakao.com/assets/img/about/logos/kakaolink/kakaolink_btn_medium.png" style="width:32px;height:32px;"></div>
      <div class="share-opt-label">카카오톡</div>
    </button>
    <button class="share-opt copy" onclick="copyLink()">
      <div class="share-opt-icon">🔗</div>
      <div class="share-opt-label">링크 공유</div>
    </button>
  </div>
  <button class="share-sheet-cancel" onclick="closeShareSheet()">취소</button>
</div>

<div class="detail-modal" id="detailModal">
  <div class="dm-header">
    <button class="dm-back" onclick="closeDetail()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="dm-title">매물 상세</span>
    <span style="width:36px"></span>

  <div class="dm-body">

    <div class="dm-type-price">

      <span class="li-trade" id="dmTrade" style="margin-left:6px;"></span>
      <input class="dm-input" id="dmPrice" style="font-size:20px;font-weight:900;background:transparent;padding:4px 0;flex:1;border:none;color:#4ECDC4">
    </div>

    <!-- 기본 정보 -->
    <div class="dm-field">
      <div class="dm-label">건물명</div>
      <input class="dm-input" id="dmName">

    <div class="dm-field">
      <div class="dm-label">위치</div>
      <input class="dm-input" id="dmLocation">
    </div>
    <div class="dm-row">
      <div class="dm-field">
        <div class="dm-label">평수</div>
        <input class="dm-input" id="dmSize">
      </div>
      <div class="dm-field">
        <div class="dm-label">층수</div>
        <input class="dm-input" id="dmFloor">

    <div class="dm-row">
      <div class="dm-field">
        <div class="dm-label">방구조</div>

      <div class="dm-field">
        <div class="dm-label">향</div>
        <input class="dm-input" id="dmDirection">
      </div>
    </div>

    <!-- 태그 -->
    <div class="dm-field">
      <div class="dm-label">태그</div>
      <div class="dm-tags" id="dmTags"></div>
      <div class="dm-tag-input-wrap" id="dmTagInputWrap">
        <input class="dm-tag-input" id="dmTagInput" placeholder="태그 입력 후 Enter" onkeydown="if(event.key==='Enter'){event.preventDefault();addTag();}">
        <button class="dm-tag-add" onclick="addTag()">추가</button>
      </div>

    <!-- 메모 -->
    <div class="dm-field" id="dmPrivateField">

      <textarea class="dm-textarea" id="dmMemoPrivate" placeholder="예: 1601호, 집주인 010-xxxx-xxxx" rows="2"></textarea>
    </div>
    <div class="dm-field">
      <div class="dm-memo-label-icon dm-memo-public">💬 손님에게 한마디</div>
      <textarea class="dm-textarea" id="dmMemoPublic" placeholder="예: 급매물, 이번주 결정 필요" rows="2"></textarea>

    <!-- 하단 액션 -->
    <div class="dm-actions">
      <button class="dm-act act-cancel" id="dmActCancel" onclick="closeDetail()">취소</button>
      <button class="dm-act act-save" id="dmActSave" onclick="saveDetail()">저장</button>
    </div>
  </div>
</div>

<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
<script>
  // ── 플레이스홀더 순환 ──
  const container = document.getElementById('container');
  const searchInput = document.getElementById('searchInput');
  const dropdown = document.getElementById('dropdown');
  const results = document.getElementById('results');

// ── Supabase + Kakao 초기화 ──
  const SUPABASE_URL = 'https://api.hwik.kr';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxYXhlamd6a2NoeGJmemd6eXppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2MzI3NTIsImV4cCI6MjA4MjIwODc1Mn0.-njNdAKVA7Me60H98AYaf-Z3oi45SfUmeoBNvuRJugE';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 카카오 SDK 초기화 (my_cards.html 동일 패턴)
  window.addEventListener('load', function() {
    if (typeof Kakao !== 'undefined' && !Kakao.isInitialized()) {
      Kakao.init('124cd68b3419bde24e03efa4f1ca2830');
    }
  });

  const overlay = document.getElementById('overlay');
  const loginSheet = document.getElementById('loginSheet');
  let currentUser = null;
  let searchData = [];

  // 로그인 상태 확인
  supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (session?.user) { currentUser = session.user; onLoggedIn(); }
  });
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (session?.user) { currentUser = session.user; onLoggedIn(); }
    else { currentUser = null; }
  });

  async function onLoggedIn() {
    closeLogin();
    showHomeWidgets();
    await loadMyCount();
  }

  async function loadMyCount() {
    if (!currentUser) return;
    updateTabBadges();
  }

  // 검색창 포커스
  searchInput.addEventListener('focus', () => {
    if (!currentUser) { searchInput.blur(); showLogin(); return; }
    // 키보드 올라올 때 검색창이 보이도록 스크롤
    setTimeout(() => {
      searchInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
    openDropdown();
  });
  searchInput.addEventListener('input', () => {
    if (searchInput.value.trim()) closeDropdown(); else openDropdown();
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrap')) closeDropdown();
  });

  function openDropdown() {
    if (container.classList.contains('active')) return;
    renderRecent();
    dropdown.classList.add('show');
    searchInput.classList.add('dropdown-open');
  }
  function closeDropdown() {
    dropdown.classList.remove('show');
    searchInput.classList.remove('dropdown-open');
  }
  function pickSuggest(el) {
    searchInput.value = el.querySelector('.suggest-text').textContent;
    closeDropdown(); doSearch();
  }

  // ── 로그인 ──
  function showLogin() {
    overlay.classList.add('show');
    setTimeout(() => loginSheet.classList.add('show'), 10);
  }
  function closeLogin() {
    loginSheet.classList.remove('show');
    setTimeout(() => overlay.classList.remove('show'), 300);
  }
  function doKakaoLogin() {
    supabaseClient.auth.signInWithOAuth({
      provider: 'kakao',
      options: { redirectTo: window.location.href }
    });
  }
  function showHomeWidgets() {
    document.getElementById('bottomTabBar').classList.add('visible');
    renderRecent();
    updateTabBadges();
  }

  // ── 하단 탭 전환 ──
  function switchTab(tab) {
    // 탭 버튼 active 처리
    ['home','my','shared','memo'].forEach(t => {
      document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1))?.classList.toggle('active', t === tab);
    });
    if (tab === 'home') {
      resetAll();
    } else if (tab === 'my') {
      doQuickSearch('my');
    } else if (tab === 'shared') {
      doQuickSearch('shared');
    } else if (tab === 'memo') {
      goRegister();
      // 메모 탭 클릭 시 뱃지 제거
      const badge = document.getElementById('badgeMemo');
      badge.textContent = '';
      badge.classList.remove('show');
    }
  }

  async function updateTabBadges() {
    if (!currentUser) return;
    try {
      // 내 매물 수
      const { count: myCount } = await supabaseClient.from('cards').select('*', { count: 'exact', head: true }).eq('agent_id', currentUser.id);
      setBadge('badgeMy', myCount);

      // 미확인 메모 수
      const { count: memoCount } = await supabaseClient.from('memos').select('id', { count: 'exact', head: true }).eq('agent_id', currentUser.id).eq('is_read', false);
      setBadge('badgeMemo', memoCount);
    } catch(e) {}
  }

  function setBadge(id, count) {
    const el = document.getElementById(id);
    if (!el) return;
    if (count > 0) {
      el.textContent = count > 99 ? '99+' : count;
      el.classList.add('show');
    } else {
      el.textContent = '';
      el.classList.remove('show');
    }
  }

  // ── 최근 검색 ──
  let recentSearches = JSON.parse(localStorage.getItem('hwik_recent') || '[]');

  function addRecent(query) {
    recentSearches = recentSearches.filter(q => q !== query);
    recentSearches.unshift(query);
    if (recentSearches.length > 3) recentSearches = recentSearches.slice(0, 3);
    localStorage.setItem('hwik_recent', JSON.stringify(recentSearches));
  }
  function renderRecent() {
    const recentEl = document.getElementById('recentInDropdown');
    const staticEl = document.getElementById('suggestStatic');
    if (!recentEl) return;
    if (!recentSearches.length) {
      recentEl.innerHTML = '';
      if (staticEl) staticEl.style.display = '';
      return;
    }
    if (staticEl) staticEl.style.display = 'none';
    recentEl.innerHTML = `
      <div class="recent-header" style="padding:10px 16px 4px;">
        <span class="recent-title">최근 검색</span>
        <button class="recent-clear" onclick="clearAllRecent()">전체 삭제</button>
      </div>
      ${recentSearches.map((q, i) => `
        <div class="suggest-item" onclick="pickRecent('${q}')">
          <div class="suggest-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg></div>
          <span class="suggest-text">${q}</span>
          <button class="recent-item-del" onclick="event.stopPropagation();deleteRecent(${i})">×</button>
        </div>
      `).join('')}
    `;
  }
  function pickRecent(query) { searchInput.value = query; doSearch(); }
  function deleteRecent(idx) {
    recentSearches.splice(idx, 1);
    localStorage.setItem('hwik_recent', JSON.stringify(recentSearches));
    renderRecent();
  }
  function clearAllRecent() {
    recentSearches = [];
    localStorage.removeItem('hwik_recent');
    renderRecent();
  }
  function doQuickSearch(cat) {
    searchInput.value = cat === 'my' ? '내 매물 전체' : '공유받은 매물';
    doSearch(true);
  }

  // ── 검색 ──
  searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });

  async function doSearch(skipRecent = false) {
    if (!currentUser) { showLogin(); return; }
    const query = searchInput.value.trim();
    if (!query) return;
    if (!skipRecent) addRecent(query);
    closeDropdown();
    container.classList.add('active');
    searchInput.blur();
    results.innerHTML = `
      <div class="searching">
        <div class="dot-pulse"><span></span><span></span><span></span></div>
        "${query}" 검색 중
      </div>`;
    try {
      const res = await fetch('https://api.hwik.kr/functions/v1/search-property', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
        body: JSON.stringify({ query, agent_id: currentUser.id, limit: 30, search_mode: 'my' })
      });
      const data = await res.json();
      showResults(data.results || []);
    } catch(e) {
      results.innerHTML = `<div class="results-status" style="text-align:center;padding:32px 0;color:#f87171">검색 오류가 발생했어요</div>`;
    }
  }

  function resetAll() {
    container.classList.remove('active');
    searchInput.value = '';
    results.innerHTML = '';
    searchData = [];
    closeDropdown();
    checkedSet.clear();
    hideFloatBtn();
    if (currentUser) showHomeWidgets();
  }

  let myFirst = false;
  function toggleMyFirst() {
    myFirst = !myFirst;
    document.getElementById('sortToggleBtn')?.classList.toggle('active', myFirst);
    renderResults(searchData);
  }

  function showResults(cards) {
    searchData = cards;
    checkedSet.clear();
    updateFloatBtn();
    myFirst = false;
    if (!cards.length) {
      results.innerHTML = `<div class="results-status" style="text-align:center;padding:32px 0">검색 결과가 없어요</div>`;
      return;
    }
    renderResults(cards);
  }

  function renderResults(data) {
    let sorted = [...data];
    if (myFirst) sorted = [...sorted.filter(i => i._cat === 'my'), ...sorted.filter(i => i._cat !== 'my')];
    let html = `
      <div class="results-status">
        <strong>${data.length}건</strong>
        <button class="sort-toggle ${myFirst ? 'active' : ''}" id="sortToggleBtn" onclick="toggleMyFirst()">
          <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
          내 매물 위로
        </button>
      </div>`;
    sorted.forEach((item, idx) => {
      const p = item.property || {};
      const type = p.type || '';
      const typeClass = type === '매매' ? 'type-sale' : type === '전세' ? 'type-jeonse' : 'type-rent';
      const tradeStatus = item.trade_status === '계약중' ? '계약중' : item.trade_status === '완료' ? '완료' : '계약가능';
      const tradeClass = tradeStatus === '계약가능' ? 'trade-available' : tradeStatus === '계약중' ? 'trade-ongoing' : 'trade-done';
      const fromLabel = item._cat === 'my' ? '내 매물' : (item.agent?.business_name || '공유');
      const fromClass = item._cat === 'my' ? 'from-my' : 'from-shared';
      const name = p.complex || p.location || '매물';
      const loc = p.location || '';
      const detail = [p.area, p.floor].filter(Boolean).join(' · ');
      html += `
        <div class="li" id="li-${idx}" onclick="toggleCheck(${idx})">
          <div class="li-check"><svg viewBox="0 0 24 24"><polyline points="4 12 9 17 20 6"/></svg></div>
          <span class="li-type ${typeClass}">${type}</span>
          <span class="li-price">${p.price || ''}</span>
          <div class="li-info">
            <div class="li-name">${name}${loc && loc !== name ? ' · ' + loc : ''}</div>
            <div class="li-detail">${detail}</div>
          </div>
          <span class="li-trade ${tradeClass}">${tradeStatus}</span>
          <span class="li-from ${fromClass}">${fromLabel}</span>
          <button class="li-btn-detail" onclick="event.stopPropagation(); openDetailById('${item.id}', '${item._cat || 'my'}')">상세</button>
        </div>`;
    });
    results.innerHTML = html;
  }

  function goRegister() {
    if (!currentUser) { showLogin(); return; }
    document.getElementById('regInput').value = '';
    document.getElementById('regOverlay').classList.add('show');
    document.getElementById('regModal').classList.add('show');
    setTimeout(() => document.getElementById('regInput').focus(), 300);
  }
  function closeRegister() {
    document.getElementById('regModal').classList.remove('show');
    setTimeout(() => document.getElementById('regOverlay').classList.remove('show'), 300);
  }
  async function saveMemo() {
    const text = document.getElementById('regInput').value.trim();
    if (!text) { showToast('메모 내용을 입력해주세요'); return; }
    const btn = document.querySelector('.reg-save-bottom');
    btn.textContent = '저장 중...'; btn.disabled = true;
    const { error } = await supabaseClient.from('memos').insert({
      agent_id: currentUser.id,
      content: text,
      is_read: false
    });
    btn.textContent = '저장하기'; btn.disabled = false;
    if (error) { showToast('저장 실패: ' + error.message); return; }
    closeRegister();
    showToast('✅ 메모 저장됨! PC에서 확인하세요');
  }

  // ── 체크 선택 ──
  const checkedSet = new Set();
  const floatBtn = document.getElementById('floatCardBtn');
  const floatCount = document.getElementById('floatCount');

  function toggleCheck(idx) {
    const el = document.getElementById('li-' + idx);
    if (checkedSet.has(idx)) { checkedSet.delete(idx); el.classList.remove('checked'); }
    else { checkedSet.add(idx); el.classList.add('checked'); }
    updateFloatBtn();
  }
  function updateFloatBtn() {
    if (checkedSet.size > 0) { floatBtn.classList.add('visible','active'); floatCount.textContent = '(' + checkedSet.size + '건)'; }
    else { floatBtn.classList.remove('visible','active'); floatCount.textContent = ''; }
  }
  function showFloatBtn() { floatBtn.classList.add('visible'); }
  function hideFloatBtn() { floatBtn.classList.remove('visible','active'); }

  let cardItems = [];
  let cardIdx = 0;

  function makeCards() {
    if (checkedSet.size === 0) return;
    cardItems = [];
    checkedSet.forEach(idx => { if (searchData[idx]) cardItems.push(searchData[idx]); });
    cardIdx = 0;
    renderCard();
    document.getElementById('cardOverlay').classList.add('show');
  }

  function renderCard() {
    if (!cardItems.length) return;
    const item = cardItems[cardIdx];
    const p = item.property || {};
    const agent = item.agent || {};
    document.getElementById('cardPager').innerHTML = `<strong>${cardIdx + 1}</strong> / ${cardItems.length}`;
    document.getElementById('cardNav').style.display = cardItems.length > 1 ? 'flex' : 'none';
    const typeClass = (p.type || '') === '매매' ? 'sale' : (p.type || '') === '전세' ? 'jeonse' : 'rent';
    const tags = (p.features || []).map(t => `<span class="cf-tag">${t}</span>`).join('');
    const agentName = agent.business_name || agent.name || '';
    const memo = item.agent_comment ? `<div class="cf-memo"><div class="cf-memo-label">💬 ${agentName}의 한마디</div><div class="cf-memo-text">${item.agent_comment}</div></div>` : '';
    document.getElementById('cardFrame').innerHTML = `
      <div class="cf-top"><span class="cf-type ${typeClass}">${p.type || ''}</span><span class="cf-size">${p.area || ''}</span></div>
      <div class="cf-name">${p.complex || p.location || ''}</div>
      <div class="cf-location">${p.location || ''}</div>
      <div class="cf-price">${p.price || ''}</div>
      <div class="cf-specs">
        <div class="cf-spec"><div class="cf-spec-label">면적</div><div class="cf-spec-value">${p.area || '-'}</div></div>
        <div class="cf-spec"><div class="cf-spec-label">층수</div><div class="cf-spec-value">${p.floor || '-'}</div></div>
      </div>
      ${tags ? `<div class="cf-tags">${tags}</div>` : ''}
      <div class="cf-agent"><span class="cf-agent-name">${agentName}</span><span class="cf-agent-phone">${agent.phone || ''}</span></div>
      ${memo}`;
  }

  function prevCard() { if (cardIdx > 0) { cardIdx--; renderCard(); } }
  function nextCard() { if (cardIdx < cardItems.length - 1) { cardIdx++; renderCard(); } }
  function closeCardPreview() { document.getElementById('cardOverlay').classList.remove('show'); }

  // ── 공유 시트 ──
  function sendToCustomer() {
    openShareSheet();
  }

  function openShareSheet() {
    const count = cardItems.length;
    document.getElementById('shareSheetTitle').textContent = `매물 ${count}개 공유하기`;
    document.getElementById('shareOverlay').classList.add('show');
    setTimeout(() => document.getElementById('shareSheet').classList.add('show'), 10);
  }
  function closeShareSheet() {
    document.getElementById('shareSheet').classList.remove('show');
    setTimeout(() => document.getElementById('shareOverlay').classList.remove('show'), 300);
  }

  function getShareLink() {
    const ids = cardItems.map(c => c.id);
    const agentParam = currentUser ? '&agent=' + currentUser.id : '';
    const base = 'https://kangmin79.github.io/hwik-web/property_view.html';
    return ids.length === 1 ? `${base}?id=${ids[0]}${agentParam}` : `${base}?ids=${ids.join(',')}${agentParam}`;
  }

  async function shareKakao() {
    const link = getShareLink();
    const first = cardItems[0]?.property || {};
    const agent = cardItems[0]?.agent || {};
    const agentName = agent.business_name || agent.name || '중개사';
    const name = first.complex || first.location || '매물';
    const title = cardItems.length === 1 ? `${name} 매물` : `${name} 외 ${cardItems.length}개 매물`;
    const desc = cardItems.length === 1
      ? [first.type, first.price, first.area, first.floor].filter(Boolean).join(' · ')
      : `${agentName}이 보내는 매물 ${cardItems.length}개`;
    const imageUrl = currentUser ? `${SUPABASE_URL}/storage/v1/object/public/og-images/agents/${currentUser.id}.png?t=${Date.now()}` : '';
    const content = { title, description: desc, link: { mobileWebUrl: link, webUrl: link } };
    if (imageUrl) { content.imageUrl = imageUrl; content.imageWidth = 800; content.imageHeight = 420; }
    closeShareSheet();
    if (typeof Kakao === 'undefined' || !Kakao.isInitialized()) {
      showToast('카카오 SDK 로드 중입니다. 잠시 후 다시 시도해주세요.');
      return;
    }
    Kakao.Share.sendDefault({ objectType: 'feed', content, buttons: [{ title: '카드로 보기', link: { mobileWebUrl: link, webUrl: link } }] });
  }

  function copyLink() {
    const link = getShareLink();
    navigator.clipboard.writeText(link).then(() => {
      closeShareSheet();
      showToast('🔗 링크 복사됨!');
    });
  }

  function showToast(msg) {
    let t = document.getElementById('mobileToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'mobileToast';
      t.style.cssText = 'position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;border:1px solid rgba(255,255,255,0.2);white-space:nowrap;transition:opacity 0.3s;';
      document.body.appendChild(t);
    }
    t.textContent = msg; t.style.opacity = '1';
    setTimeout(() => { t.style.opacity = '0'; }, 2000);
  }

  async function openDetailById(cardId, cat = 'my') {
    try {
      const { data } = await supabaseClient.from('cards').select('*').eq('id', cardId).maybeSingle();
      if (!data) return;
      const p = data.property || {};
      const item = {
        ...data,
        type: p.type || '',
        shortPrice: p.price || '',
        name: p.complex || p.location || '',
        location: p.location || '',
        size: p.area || '',
        floor: p.floor || '',
        rooms: p.room || '',
        direction: (p.features || []).join(', ') || '',
        status: data.trade_status || '',
        memo: data.private_note?.memo || '',
        memoPrivate: data.private_note?.memo || '',
        tags: p.features || [],
        cat: cat,
      };
      openDetail(item);
    } catch(e) { console.error(e); }
  }

  // ── 검색창 포커스 → 드롭다운 (구글 방식 — 로그인 체크는 검색 시점에)
  // 입력 중이면 드롭다운 닫기
  searchInput.addEventListener('input', () => {
    if (searchInput.value.trim()) {
      closeDropdown();
    } else {
      openDropdown();
    }
  });

  // 바깥 터치하면 드롭다운 닫기
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrap')) {
      closeDropdown();
    }
  });

  function openDropdown() {
    if (container.classList.contains('active')) return; // 검색 결과 상태에서는 안 열기
    dropdown.classList.add('show');
    searchInput.classList.add('dropdown-open');
  }

  function closeDropdown() {
    dropdown.classList.remove('show');
    searchInput.classList.remove('dropdown-open');
  }

  // 추천 항목 선택
  function pickSuggest(el) {
    const text = el.querySelector('.suggest-text').textContent;
    searchInput.value = text;
    closeDropdown();
    doSearch();
  }

  // ── 로그인 ──


  // ── 빠른 검색 (현황 바 탭) ──
  function doQuickSearch(cat) {
    searchInput.value = cat === 'my' ? '내 매물 전체' : '공유받은 매물';
    doSearch(true);
  }


  // ── 검색 ──
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doSearch();
  });

    // ── 상세 모달 ──
  const detailOverlay = document.getElementById('detailOverlay');
  const detailModal = document.getElementById('detailModal');
  let currentItem = null;

  let currentTags = [];

  function openDetail(item) {
    currentItem = item;
    currentTags = [...(item.tags || [])];
    const isShared = item.cat === 'shared';
    const typeClass = item.type === '매매' ? 'type-sale' : item.type === '전세' ? 'type-jeonse' : 'type-rent';
    
    document.getElementById('dmType').className = 'dm-type-badge ' + typeClass;
    document.getElementById('dmType').textContent = item.type;
    const tradeStatus = item.status === '계약중' ? '계약중' : item.status === '완료' ? '완료' : '계약가능';
    const tradeClass = tradeStatus === '계약가능' ? 'trade-available' : tradeStatus === '계약중' ? 'trade-ongoing' : 'trade-done';
    const dmTrade = document.getElementById('dmTrade');
    dmTrade.className = 'li-trade ' + tradeClass;
    dmTrade.textContent = tradeStatus;
    document.getElementById('dmPrice').value = item.shortPrice;
    document.getElementById('dmName').value = item.name;
    document.getElementById('dmLocation').value = item.location;
    document.getElementById('dmSize').value = item.size;
    document.getElementById('dmFloor').value = item.floor;
    document.getElementById('dmRooms').value = item.rooms;
    document.getElementById('dmDirection').value = item.direction;
    document.getElementById('dmMemoPublic').value = item.memo || '';
    document.getElementById('dmTagInput').value = '';

    // 공유 매물: readonly, 비공개 숨김
    const inputs = detailModal.querySelectorAll('.dm-input, .dm-textarea');
    inputs.forEach(el => {
      if (isShared) { el.readOnly = true; el.style.opacity = '0.7'; }
      else { el.readOnly = false; el.style.opacity = '1'; }
    });

    // 비공개 메모
    const privateField = document.getElementById('dmPrivateField');
    if (isShared) {
      privateField.style.display = 'none';
    } else {
      privateField.style.display = 'block';
      document.getElementById('dmMemoPrivate').value = item.memoPrivate || '';
    }

    // 태그 입력
    const tagInputWrap = document.getElementById('dmTagInputWrap');
    tagInputWrap.style.display = isShared ? 'none' : 'flex';

    renderTags();

    // 하단 버튼: 공유면 닫기만, 내 매물이면 취소/저장
    const actCancel = document.getElementById('dmActCancel');
    const actSave = document.getElementById('dmActSave');
    if (isShared) {
      actCancel.textContent = '닫기';
      actSave.style.display = 'none';
    } else {
      actCancel.textContent = '취소';
      actSave.style.display = 'flex';
    }

    // 헤더 제목
    document.querySelector('.dm-title').textContent = isShared ? '공유 매물 (읽기 전용)' : '매물 상세';

    detailOverlay.classList.add('show');
    setTimeout(() => detailModal.classList.add('show'), 10);
  }

  function renderTags() {
    const container = document.getElementById('dmTags');
    const isShared = currentItem?.cat === 'shared';
    container.innerHTML = currentTags.map((t, i) => 
      isShared 
        ? `<span class="dm-tag" style="cursor:default">${t}</span>`
        : `<button class="dm-tag" onclick="removeTag(${i})">${t}<span class="tag-x">×</span></button>`
    ).join('');
  }

  function addTag() {
    const input = document.getElementById('dmTagInput');
    const val = input.value.trim();
    if (!val) return;
    if (currentTags.includes(val)) { input.value = ''; return; }
    currentTags.push(val);
    input.value = '';
    renderTags();
  }

  function removeTag(idx) {
    currentTags.splice(idx, 1);
    renderTags();
  }

  function closeDetail() {
    detailModal.classList.remove('show');
    setTimeout(() => detailOverlay.classList.remove('show'), 300);
  }

  function saveDetail() {
    alert('저장되었습니다');
    closeDetail();
  }

</script>

</body>
</html>
