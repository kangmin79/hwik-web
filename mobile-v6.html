<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --hwik-dark: #1a1a2e;
    --hwik-dark-light: #242442;
    --hwik-yellow: #FFD43B;
    --hwik-yellow-hover: #FFC800;
    --bg: #f8f8fa;
    --white: #ffffff;
    --gray-100: #f0f0f3;
    --gray-200: #e2e2e8;
    --gray-400: #8e8e9a;
    --gray-600: #5a5a6e;
    --text: #1a1a2e;
  }

  html, body {
    height: 100%;
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ── 레이아웃 ── */
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 0 24px;
    padding-bottom: 18%;
    transition: justify-content 0.4s ease;
  }

  .container.active {
    justify-content: flex-start;
    padding-top: 40px;
  }

  /* ── 로고 ── */
  .logo {
    margin-bottom: 48px;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .logo-text {
    font-size: 68px;
    font-weight: 900;
    letter-spacing: -3px;
    color: var(--hwik-dark);
    transition: all 0.3s ease;
  }

  .logo-dot {
    width: 12px;
    height: 12px;
    background: var(--hwik-yellow);
    border-radius: 50%;
    margin-top: 28px;
    transition: all 0.3s ease;
  }

  .logo:hover .logo-text { color: var(--hwik-dark-light); }
  .logo:hover .logo-dot { transform: scale(1.3); background: var(--hwik-yellow-hover); }

  .container.active .logo { margin-bottom: 20px; }
  .container.active .logo-text { font-size: 32px; }
  .container.active .logo-dot { width: 8px; height: 8px; margin-top: 14px; }

  .tagline {
    font-size: 14px;
    font-weight: 400;
    color: #94a3b8;
    margin-top: -36px;
    margin-bottom: 40px;
    letter-spacing: 0.5px;
    transition: all 0.4s ease;
  }

  .container.active .tagline { display: none; }

  /* ── 검색 영역 ── */
  .search-wrap {
    width: 100%;
    max-width: 540px;
    position: relative;
  }

  .search-box {
    position: relative;
    width: 100%;
  }

  .search-input {
    width: 100%;
    padding: 18px 56px 18px 22px;
    font-size: 17px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    border: 1.5px solid #e2e8f0;
    border-radius: 28px;
    outline: none;
    background: #ffffff;
    color: var(--text);
    transition: all 0.25s ease;
    -webkit-appearance: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.02);
  }

  .search-input::placeholder { color: #94a3b8; font-weight: 300; }

  .search-input:focus {
    border-color: #0ea5e9;
    box-shadow: 0 4px 20px rgba(14,165,233,0.12), 0 0 0 3px rgba(14,165,233,0.08);
  }

  /* 드롭다운 열리면 검색창 하단 모서리 제거 */
  .search-input.dropdown-open {
    border-radius: 28px 28px 0 0;
    border-bottom-color: var(--gray-100);
  }

  /* ── 좌우 버튼 ── */
  .btn-left {
    position: absolute;
    left: 6px;
    top: 50%;
    transform: translateY(-50%);
  }

  .btn-right {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
  }

  .icon-btn {
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .icon-btn:active { transform: scale(0.9); }

  .icon-btn svg {
    width: 20px;
    height: 20px;
    stroke-width: 2.5;
    fill: none;
  }

  .btn-search { background: var(--hwik-yellow); }
  .btn-search:hover { background: var(--hwik-yellow-hover); }
  .btn-search svg { stroke: var(--hwik-dark); }

  .btn-register { background: var(--hwik-dark); }
  .btn-register:hover { background: var(--hwik-dark-light); }
  .btn-register svg { stroke: var(--hwik-yellow); }

  /* ── 추천 드롭다운 ── */
  .suggest-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--white);
    border: 2px solid var(--hwik-dark);
    border-top: 1px solid var(--gray-100);
    border-radius: 0 0 20px 20px;
    padding: 4px 0 8px;
    z-index: 50;
    box-shadow: 0 8px 24px rgba(26,26,46,0.1);
    max-height: 60vh;
    overflow-y: auto;
  }
  .suggest-dropdown .recent-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px 4px;
  }

  .suggest-dropdown.show { display: block; }

  .suggest-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.1s ease;
    font-size: 15px;
    color: var(--text);
    font-weight: 400;
  }

  .suggest-item:hover { background: var(--gray-100); }
  .suggest-item:active { background: var(--gray-200); }

  .suggest-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .suggest-icon svg {
    width: 16px;
    height: 16px;
    stroke: var(--gray-400);
    stroke-width: 2;
    fill: none;
  }

  .suggest-text {
    flex: 1;
  }

  .suggest-label {
    font-size: 11px;
    color: var(--gray-400);
    font-weight: 300;
    padding: 10px 20px 4px;
  }

  /* ── 결과 ── */
  .results {
    display: none;
    width: 100%;
    max-width: 540px;
    margin-top: 16px;
    overflow-y: auto;
    max-height: calc(100vh - 240px);
    padding-bottom: 90px;
    -webkit-overflow-scrolling: touch;
  }

  .container.active .results { display: block; }
  .results::-webkit-scrollbar { display: none; }
  .results { scrollbar-width: none; }

  .results-status {
    font-size: 14px;
    color: var(--gray-400);
    font-weight: 300;
    margin-bottom: 16px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .results-status strong { color: var(--hwik-dark); font-weight: 700; }

  .sort-toggle {
    display: flex; align-items: center; gap: 4px;
    padding: 5px 10px;
    border: 1.5px solid var(--gray-200);
    border-radius: 20px;
    background: var(--white);
    font-size: 11px; font-weight: 600;
    color: var(--gray-400);
    cursor: pointer; font-family: inherit;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .sort-toggle.active {
    border-color: var(--hwik-dark);
    background: var(--hwik-dark);
    color: var(--hwik-yellow);
  }
  .sort-toggle:active { transform: scale(0.95); }
  .sort-toggle svg { width: 11px; height: 11px; stroke: currentColor; stroke-width: 2.5; fill: none; }

  .searching { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--gray-400); font-weight: 300; padding-left: 4px; }
  .dot-pulse { display: flex; gap: 4px; }
  .dot-pulse span { width: 6px; height: 6px; border-radius: 50%; background: var(--hwik-yellow); animation: pulse 1.2s ease infinite; }
  .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
  .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }

  /* ── 리스트 아이템 ── */
  .li {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 12px 14px;
    margin-bottom: 6px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }
  .li-row1 { display: flex; align-items: center; gap: 8px; }
  .li-row2 { display: flex; align-items: center; gap: 6px; }
  .li.my { background: #FFFBEB; }
  .li.shared { background: #F0F1FF; }
  .li.my:hover { background: #FFF6D6; }
  .li.shared:hover { background: #E8E9FF; }
  .li.checked.my { background: #FFF0B3; box-shadow: inset 0 0 0 1.5px #E6C200; }
  .li.checked.shared { background: #DDDEFF; box-shadow: inset 0 0 0 1.5px #7C8CF8; }
  .li:nth-child(2){animation-delay:.05s}
  .li:nth-child(3){animation-delay:.1s}
  .li:nth-child(4){animation-delay:.15s}
  .li:nth-child(5){animation-delay:.2s}
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .li-check {
    width: 20px; height: 20px;
    border: 2px solid var(--gray-200);
    border-radius: 5px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .li-check svg { width: 14px; height: 14px; stroke: var(--white); stroke-width: 3; fill: none; display: none; }
  .li.checked .li-check { background: var(--hwik-dark); border-color: var(--hwik-dark); }
  .li.checked .li-check svg { display: block; }

  .li-type {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .type-sale { background: #FFE8E8; color: #C62828; }
  .type-jeonse { background: #E3F2FD; color: #1565C0; }
  .type-rent { background: #E8F5E9; color: #2E7D32; }
  .type-client { background: rgba(78,205,196,0.15); color: #4ecdc4; border: 1px solid rgba(78,205,196,0.4); }

  /* 손님 카드 스타일 */
  .li.client {
    border-left: 3px solid #4ecdc4;
    background: rgba(78,205,196,0.04);
  }

  .li-price {
    font-size: 15px;
    font-weight: 900;
    color: var(--hwik-dark);
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 50px;
  }

  .li-info {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }

  .li-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--hwik-dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  .li-detail {
    font-size: 11px;
    color: var(--gray-400);
    font-weight: 400;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .li-from {
    font-size: 10px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .li-from.from-my { color: #9E8600; background: #FFF8E1; }
  .li-from.from-shared { color: #4A52B5; background: #EDEFFF; }

  .li-trade {
    font-size: 10px; font-weight: 600;
    white-space: nowrap; flex-shrink: 0;
    padding: 2px 6px; border-radius: 4px;
  }
  .li-trade.trade-available { background: rgba(34,197,94,0.12); color: #16a34a; }
  .li-trade.trade-ongoing   { background: rgba(250,204,21,0.15); color: #ca8a04; }
  .li-trade.trade-done      { background: rgba(120,120,120,0.12); color: #888; }

  /* 공유 시트 — my_cards.html 동일 스타일 */
  .share-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(3px); z-index:1100; }
  .share-overlay.show { display:block; }
  .share-sheet {
    position:fixed; bottom:-100%; left:50%; transform:translateX(-50%);
    width:min(400px, 92vw);
    background:#1a2535; border-radius:24px 24px 0 0;
    padding:12px 20px calc(32px + env(safe-area-inset-bottom)); z-index:1101;
    transition:bottom 0.35s cubic-bezier(0.4,0,0.2,1);
    border-top:1px solid rgba(255,255,255,0.08);
  }
  .share-sheet.show { bottom:0; }
  .share-sheet-handle { width:36px; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; margin:0 auto 16px; }
  .share-sheet-title { font-size:13px; font-weight:600; color:#6b7280; text-align:center; margin-bottom:20px; letter-spacing:0.05em; }
  .share-sheet-btns { display:flex; justify-content:center; gap:20px; margin-bottom:20px; }
  .share-opt { display:flex; flex-direction:column; align-items:center; gap:8px; background:none; border:none; cursor:pointer; transition:transform 0.15s; }
  .share-opt:active { transform:translateY(-3px); }
  .share-opt-icon { width:56px; height:56px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:26px; transition:all 0.15s; }
  .share-opt.kakao .share-opt-icon { background:#FEE500; }
  .share-opt.copy .share-opt-icon { background:rgba(78,205,196,0.15); border:1.5px solid rgba(78,205,196,0.25); }
  .share-opt-label { font-size:12px; color:#9ca3af; font-weight:500; }
  .share-sheet-cancel { width:100%; padding:14px; border-radius:12px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); color:#9ca3af; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.15s; }
  .share-sheet-cancel:active { background:rgba(255,255,255,0.1); color:#fff; }

  .li-btn-detail {
    padding: 5px 10px;
    font-size: 11px; font-weight: 600;
    color: var(--gray-600);
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 6px;
    cursor: pointer; font-family: inherit;
    flex-shrink: 0;
    transition: all 0.15s ease;
  }
  .li-btn-detail:active { transform: scale(0.93); background: var(--gray-100); }

  /* ── 플로팅 카드 만들기 버튼 ── */
  .float-card-btn {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    padding: 14px 32px;
    background: var(--gray-200);
    color: var(--gray-400);
    border: none; border-radius: 16px;
    font-size: 15px; font-weight: 700;
    font-family: inherit;
    cursor: default;
    box-shadow: 0 6px 24px rgba(26,26,46,0.1);
    z-index: 90;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .float-card-btn.visible { transform: translateX(-50%) translateY(0); }
  .float-card-btn.active {
    background: var(--hwik-dark);
    color: var(--hwik-yellow);
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(26,26,46,0.3);
  }
  .float-card-btn.active:active { transform: translateX(-50%) scale(0.95); }
  .float-card-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; }

  /* ── 로그인 시트 ── */
  .overlay { display: none; position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.3); z-index: 100; animation: fi .2s ease; }
  .overlay.show { display: block; }
  @keyframes fi { from{opacity:0}to{opacity:1} }

  .login-sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-radius: 20px 20px 0 0;
    padding: 28px 24px 36px;
    z-index: 101;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    text-align: center;
  }
  .login-sheet.show { transform: translateY(0); }
  .login-sheet-bar { width: 36px; height: 4px; background: var(--gray-200); border-radius: 2px; margin: 0 auto 20px; }

  .kakao-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; max-width: 320px; margin: 0 auto;
    padding: 14px 0;
    background: #FEE500; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; color: #3C1E1E;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s ease;
  }
  .kakao-btn:active { transform: scale(0.97); }
  .kakao-btn svg { width: 20px; height: 20px; }

  /* ── 상세 모달 (풀스크린) ── */
  .detail-overlay {
    display: none;
    position: fixed; top:0;left:0;right:0;bottom:0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
  }
  .detail-overlay.show { display: block; animation: fi .2s ease; }

  .detail-modal {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #f8f8fa;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .detail-modal.show { transform: translateY(0); }
  .detail-modal::-webkit-scrollbar { display: none; }

  .dm-header {
    position: sticky; top: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    z-index: 10;
  }
  .dm-back {
    width: 36px; height: 36px;
    border: none; border-radius: 50%;
    background: #f0f0f3;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .dm-back:active { transform: scale(0.9); }
  .dm-back svg { width: 18px; height: 18px; stroke: #1a1a2e; stroke-width: 2.5; fill: none; }
  .dm-title { font-size: 16px; font-weight: 700; color: #1a1a2e; }

  .dm-body { padding: 20px; display:flex; flex-direction:column; gap:16px; }

  .dm-type-price {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px;
  }
  .dm-type-badge { font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 5px; }

  .dm-field { margin-bottom: 16px; }
  .dm-label {
    font-size: 11px; font-weight: 500; color: #666;
    margin-bottom: 6px;
  }
  .dm-input {
    width: 100%;
    padding: 12px 14px;
    background: #1a1a2e;
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    font-size: 15px; font-family: inherit; font-weight: 400;
    color: #fff;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .dm-input:focus { border-color: #4ECDC4; background: #1e1e36; }
  .dm-input::placeholder { color: #555; font-weight: 300; }

  .dm-row {
    display: flex; gap: 10px;
  }
  .dm-row .dm-field { flex: 1; }

  .dm-textarea {
    width: 100%;
    padding: 12px 14px;
    background: #1a1a2e;
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    font-size: 14px; font-family: inherit; font-weight: 400;
    color: #fff;
    outline: none; resize: none;
    min-height: 60px;
    line-height: 1.5;
    transition: border-color 0.15s ease;
  }
  .dm-textarea:focus { border-color: #4ECDC4; background: #1e1e36; }
  .dm-textarea::placeholder { color: #555; font-weight: 300; }

  .dm-memo-label-icon {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 500; margin-bottom: 6px;
  }
  .dm-memo-private { color: #E67E22; }
  .dm-memo-public { color: #4ECDC4; }


  .dm-actions {
    display: flex; gap: 8px;
    margin-top: 20px;

<body>

<div class="container" id="container">
  
  <div class="logo" onclick="resetAll()">

  <div class="pwa-sheet" id="pwaSheet">
    <div class="pwa-sheet-handle"></div>
    <div class="pwa-sheet-hero">
      <div class="pwa-sheet-icon">휙</div>
      <div class="pwa-sheet-info">

    </div>

      </div>
      <div class="pwa-sheet-benefit">
        <span class="pwa-sheet-benefit-icon">🔔</span>
        <span class="pwa-sheet-benefit-text"><strong>로그인 유지</strong> — 매번 로그인할 필요 없어요</span>
      </div>
      <div class="pwa-sheet-benefit">
        <span class="pwa-sheet-benefit-icon">📱</span>
        <span class="pwa-sheet-benefit-text"><strong>홈 화면 아이콘</strong> — 전화 끊고 바로 휙!</span>
      </div>
    </div>
    <button class="pwa-sheet-install-btn" onclick="confirmPwaInstall()">설치하기</button>
    <button class="pwa-sheet-later" onclick="closePwaSheet()">나중에 할게요</button>
  </div>

  <!-- ★ 손님 미니 CRM 바텀시트 -->
  <div class="crm-overlay" id="crmOverlay" onclick="closeCRM()"></div>
  <div class="crm-sheet" id="crmSheet">
    <div class="crm-sheet-handle"></div>

<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js"></script>
<script>
  // ── 플레이스홀더 순환 ──
  const container = document.getElementById('container');
  const searchInput = document.getElementById('searchInput');
  const dropdown = document.getElementById('dropdown');
  const results = document.getElementById('results');

// ── 앱 상태 + 유틸 ──
  const appState = { tab: 'home', selected: [], isLoggedIn: false, results: [], loading: false };
  function haptic(ms = 30) { try { navigator.vibrate?.(ms); } catch(_e) {} }

// ── Supabase + Kakao 초기화 ──
  const SUPABASE_URL = HWIK_CONFIG.SUPABASE_URL;
  const SUPABASE_KEY = HWIK_CONFIG.SUPABASE_KEY;
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { clockSkewInSeconds: 300 }
  });

  // 카카오 SDK 초기화 (my_cards.html 동일 패턴)
  window.addEventListener('load', function() {
    if (typeof Kakao !== 'undefined' && !Kakao.isInitialized()) {
      Kakao.init(HWIK_CONFIG.KAKAO_JS_KEY);
    }
  });

  const overlay = document.getElementById('overlay');
  const loginSheet = document.getElementById('loginSheet');
  let currentUser = null;
  let searchData = [];
  let searchController = null;

  // 로그인 상태 확인
  supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (session?.user) { currentUser = session.user; onLoggedIn(); }
  });
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (session?.user) { currentUser = session.user; onLoggedIn(); }
    else { currentUser = null; }
  });

  async function onLoggedIn() {
    closeLogin();
    showHomeWidgets();
    // ?client=ID 파라미터 처리 (텔레그램 알림에서 진입)
    const _clientParam = new URLSearchParams(location.search).get('client');
    if (_clientParam) setTimeout(() => openClientCRM(_clientParam), 800);

    // ★ loadMyCount와 프로필 체크를 병렬 실행
    const [, profileResult] = await Promise.all([
      loadMyCount(),
      supabaseClient.from('profiles').select('id').eq('id', currentUser.id).maybeSingle()
    ]);

    if (!profileResult.data) {
      setTimeout(() => showPcGuideToast(), 800);
    }
  }

  function showPcGuideToast() {
    const existing = document.getElementById('pcGuideToast');
    if (existing) existing.remove();

    const toast = document.createElement('div');
    toast.id = 'pcGuideToast';
    toast.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:22px;">💻</span>
        <div>
          <div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:2px;">매물카드는 PC에서 만들어요</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.2px;">hwik.kr</div>
        </div>
      </div>
    `;
    toast.style.cssText = `
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20, 20, 35, 0.95);
      border: 1px solid rgba(250,204,21,0.2);
      border-radius: 16px;
      padding: 14px 20px;
      z-index: 9999;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      backdrop-filter: blur(12px);
    `;
    document.body.appendChild(toast);

    // 등장
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) translateY(0)';
      });
    });

    // 3.5초 후 사라짐
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(-50%) translateY(10px)';
      setTimeout(() => toast.remove(), 400);
    }, 3500);
  }

  async function loadMyCount() {
    if (!currentUser) return;
    updateTabBadges();
  }

  // 검색창 포커스
  searchInput.addEventListener('focus', () => {
    if (!currentUser) { searchInput.blur(); showLogin(); return; }
    // 키보드 올라올 때 검색창이 보이도록 스크롤
    setTimeout(() => {
      searchInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
    openDropdown();
  });
  searchInput.addEventListener('input', () => {
    if (searchInput.value.trim()) closeDropdown(); else openDropdown();
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrap')) closeDropdown();
  });

  function openDropdown() {
    if (container.classList.contains('active')) return;
    renderRecent();
    dropdown.classList.add('show');
    searchInput.classList.add('dropdown-open');
  }
  function closeDropdown() {
    dropdown.classList.remove('show');
    searchInput.classList.remove('dropdown-open');
  }
  function pickSuggest(el) {
    searchInput.value = el.querySelector('.suggest-text').textContent;
    closeDropdown(); doSearch();
  }

  // ── 로그인 ──
  function showLogin() {
    overlay.classList.add('show');
    setTimeout(() => loginSheet.classList.add('show'), 10);
    // ★ 뒤로가기로 로그인 시트 닫기 지원
    history.pushState({ login: true }, '');
  }
  function closeLogin() {
    loginSheet.classList.remove('show');
    setTimeout(() => overlay.classList.remove('show'), 300);
  }
  function doKakaoLogin() {
    supabaseClient.auth.signInWithOAuth({
      provider: 'kakao',
      options: { redirectTo: 'https://hwik.kr/mobile-v6.html' }
    });
  }
  function showHomeWidgets() {
    document.getElementById('bottomTabBar').classList.add('visible');
    renderRecent();
    // updateTabBadges는 loadMyCount()에서 호출되므로 중복 제거
  }

  // ── 하단 탭 전환 ──
  function switchTab(tab) {
    haptic(15);
    // 탭 버튼 active 처리
    ['home','my','alert','memo'].forEach(t => {
      document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1))?.classList.toggle('active', t === tab);
    });
    // 알림 화면 토글 + 검색창 토글
    const alertPanel = document.getElementById('alertPanel');
    if (alertPanel) alertPanel.style.display = tab === 'alert' ? '' : 'none';
    if (tab !== 'alert') {
      container.classList.remove('alert-mode');
      document.body.classList.remove('alert-scroll');
      const searchWrap = document.querySelector('.search-wrap');
      if (searchWrap) searchWrap.style.display = '';
      const logo = document.querySelector('.logo');
      if (logo) logo.style.display = '';
      const tagline = document.querySelector('.tagline');
      if (tagline) tagline.style.display = '';
    }

    if (tab === 'home') {
      resetAll();
    } else if (tab === 'my') {
      history.pushState({ tab: 'my' }, '');
      doQuickSearch('my');
    } else if (tab === 'alert') {
      history.pushState({ tab: 'alert' }, '');
      container.classList.add('active', 'alert-mode');
      document.body.classList.add('alert-scroll');
      results.innerHTML = '';
      document.querySelector('.search-wrap').style.display = 'none';
      document.querySelector('.logo').style.display = 'none';
      document.querySelector('.tagline').style.display = 'none';
      loadMobileAlerts();
    } else if (tab === 'memo') {
      goRegister();
      const badge = document.getElementById('badgeMemo');
      if (badge) { badge.textContent = ''; badge.classList.remove('show'); }
    }
  }

  async function updateTabBadges() {
    if (!currentUser) return;
    try {
      const [cardsResult, memosResult, matchResult, interestResult, overdueResult] = await Promise.all([
        supabaseClient.from('cards').select('id', { count: 'exact', head: true }).eq('agent_id', currentUser.id),
        supabaseClient.from('memos').select('id', { count: 'exact', head: true }).eq('agent_id', currentUser.id).eq('is_read', false),
        supabaseClient.from('match_notifications').select('id', { count: 'exact', head: true }).eq('agent_id', currentUser.id).eq('is_read', false),
        supabaseClient.from('card_interests').select('id', { count: 'exact', head: true }).eq('agent_id', currentUser.id),
        supabaseClient.from('client_notes').select('id', { count: 'exact', head: true }).eq('agent_id', currentUser.id).eq('alert_done', false).lt('alert_date', new Date().toISOString())
      ]);
      setBadge('badgeMy', cardsResult.count);
      setBadge('badgeMemo', memosResult.count);
      const alertCount = (matchResult.count || 0) + (interestResult.count || 0) + (overdueResult.count || 0);
      setBadge('badgeAlert', alertCount);
    } catch(e) {}
  }

  function setBadge(id, count) {
    const el = document.getElementById(id);
    if (!el) return;
    if (count > 0) {
      el.textContent = count > 99 ? '99+' : count;
      el.classList.add('show');
    } else {
      el.textContent = '';
      el.classList.remove('show');
    }
  }

  // ── 최근 검색 ──
  let recentSearches = JSON.parse(localStorage.getItem('hwik_recent') || '[]');

  function addRecent(query) {
    recentSearches = recentSearches.filter(q => q !== query);
    recentSearches.unshift(query);
    if (recentSearches.length > 3) recentSearches = recentSearches.slice(0, 3);
    localStorage.setItem('hwik_recent', JSON.stringify(recentSearches));
  }
  function renderRecent() {
    const recentEl = document.getElementById('recentInDropdown');
    const staticEl = document.getElementById('suggestStatic');
    if (!recentEl) return;
    if (!recentSearches.length) {
      recentEl.innerHTML = '';
      if (staticEl) staticEl.style.display = '';
      return;
    }
    if (staticEl) staticEl.style.display = 'none';
    recentEl.innerHTML = `
      <div class="recent-header" style="padding:10px 16px 4px;">
        <span class="recent-title">최근 검색</span>
        <button class="recent-clear" onclick="clearAllRecent()">전체 삭제</button>
      </div>
      ${recentSearches.map((q, i) => `
        <div class="suggest-item" onclick="pickRecent(${i})">
          <div class="suggest-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg></div>
          <span class="suggest-text">${esc(q)}</span>
          <button class="recent-item-del" onclick="event.stopPropagation();deleteRecent(${i})">×</button>
        </div>
      `).join('')}
    `;
  }
  function pickRecent(idx) { searchInput.value = recentSearches[idx] || ''; doSearch(); }
  function deleteRecent(idx) {
    recentSearches.splice(idx, 1);
    localStorage.setItem('hwik_recent', JSON.stringify(recentSearches));
    renderRecent();
  }
  function clearAllRecent() {
    recentSearches = [];
    localStorage.removeItem('hwik_recent');
    renderRecent();
  }
  // ★ 현재 검색 모드 상태 (my | shared)
  let currentSearchMode = 'my';

  function doQuickSearch(cat) {
    currentSearchMode = cat === 'my' ? 'my' : 'shared';
    searchInput.value = cat === 'my' ? '내 매물 전체' : '공유받은 매물';
    doSearch(true);
  }

  // ── 검색 ──
  searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !appState.loading) doSearch(); });

  async function doSearch(skipRecent = false) {
    if (!currentUser) { showLogin(); return; }
    if (appState.loading) return;
    const rawQuery = searchInput.value.trim();
    if (!rawQuery) return;

    // ★ "손님"으로 시작하면 자동 client 모드
    const isClientSearch = rawQuery.startsWith('손님');
    const query = isClientSearch ? rawQuery.replace(/^손님\s*/, '').trim() || rawQuery : rawQuery;
    const searchMode = isClientSearch ? 'client' : currentSearchMode;

    if (!skipRecent) addRecent(rawQuery);
    closeDropdown();
    container.classList.add('active');
    searchInput.blur();
    if (searchController) searchController.abort();
    searchController = new AbortController();
    appState.loading = true;
    results.innerHTML = `
      <div class="searching">
        <div class="dot-pulse"><span></span><span></span><span></span></div>
        ${isClientSearch ? '🙋 내 손님 중에서 검색 중' : `"${query}" 검색 중`}
      </div>`;
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/search-property`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
        body: JSON.stringify({ query, agent_id: currentUser.id, limit: 30, search_mode: searchMode }),
        signal: searchController.signal
      });
      const data = await res.json();
      // ★ 적용된 필터 저장 (renderResults에서 표시)
      window._lastAppliedFilters = data.applied_filters || [];
      showResults(data.results || [], isClientSearch);
    } catch(e) {
      if (e.name === 'AbortError') return;
      results.innerHTML = `<div class="results-status" style="text-align:center;padding:32px 0;color:#f87171">검색 오류가 발생했어요</div>`;
    } finally {
      appState.loading = false;
    }
  }

  function resetAll() {
    container.classList.remove('active');
    searchInput.value = '';
    results.innerHTML = '';
    searchData = [];
    currentSearchMode = 'my';
    closeDropdown();
    checkedSet.clear();
    hideFloatBtn();
    const alertPanel = document.getElementById('alertPanel');
    if (alertPanel) alertPanel.style.display = 'none';
    if (currentUser) showHomeWidgets();
  }

  let myFirst = false;
  function toggleMyFirst() {
    myFirst = !myFirst;
    document.getElementById('sortToggleBtn')?.classList.toggle('active', myFirst);
    renderResults(searchData);
  }

  function showResults(cards, isClientSearch = false) {
    searchData = cards;
    checkedSet.clear();
    updateFloatBtn();
    myFirst = false;
    if (!cards.length) {
      results.innerHTML = `<div class="results-status" style="text-align:center;padding:32px 0">
        ${isClientSearch ? '🙋 조건에 맞는 손님이 없어요' : '검색 결과가 없어요'}
      </div>`;
      return;
    }
    renderResults(cards, isClientSearch);
  }

  function renderResults(data, isClientSearch = false) {
    let sorted = [...data];
    if (myFirst) sorted = [...sorted.filter(i => i._cat === 'my'), ...sorted.filter(i => i._cat !== 'my')];
    // ★ 적용된 필터 표시
    const af = window._lastAppliedFilters || [];
    const filterBadge = (af.length > 0 && !isClientSearch)
      ? `<div style="padding:6px 12px;font-size:11px;color:#facc15;background:rgba(250,204,21,0.08);border-radius:6px;margin-bottom:6px;">🤖 ${af.join(' · ')}</div>`
      : '';
    let html = `
      ${filterBadge}
      <div class="results-status">
        <strong>${data.length}건</strong>
        ${!isClientSearch ? `<button class="sort-toggle ${myFirst ? 'active' : ''}" id="sortToggleBtn" onclick="toggleMyFirst()">
          <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
          내 매물 위로
        </button>` : ''}
      </div>`;
    sorted.forEach((item, idx) => {
      const p = item.property || {};
      const isClient = isClientSearch || item._cat === 'client' || p.type === '손님';

      if (isClient) {
        const price = esc(p.price || '');
        const location = esc(p.location || '');
        const area = esc(p.area || '');
        const features = (p.features || []).slice(0, 3).map(f => esc(f)).join(' · ');
        const safeId = esc(item.id);
        html += `
          <div class="li client" id="li-${idx}">
            <div class="li-row1">
              <span class="li-type type-client">손님</span>
              <span class="li-price">${price}</span>
              <span style="flex:1"></span>
              <button class="li-btn-detail" onclick="event.stopPropagation(); openDetailById('${safeId}', 'client')">상세</button>
            </div>
            <div class="li-row2">
              <div class="li-name">${location}</div>
              <div class="li-detail">${[area, features].filter(Boolean).join(' · ')}</div>
            </div>
          </div>`;
        return;
      }

      const type = esc(p.type || '');
      const typeClass = (p.type || '') === '매매' ? 'type-sale' : (p.type || '') === '전세' ? 'type-jeonse' : 'type-rent';
      const tradeStatus = item.trade_status === '계약중' ? '계약중' : item.trade_status === '완료' ? '완료' : '계약가능';
      const tradeClass = tradeStatus === '계약가능' ? 'trade-available' : tradeStatus === '계약중' ? 'trade-ongoing' : 'trade-done';
      const fromLabel = item._cat === 'my' ? '내 매물' : esc(item.agent?.business_name || '공유');
      const fromClass = item._cat === 'my' ? 'from-my' : 'from-shared';
      const name = esc(p.complex || p.location || '매물');
      const loc = esc(p.location || '');
      const detail = [p.area, p.floor].filter(Boolean).map(v => esc(v)).join(' · ');
      const safeId = esc(item.id);
      const safeCat = esc(item._cat || 'my');
      const photoCount = (item.photos || []).length;

      html += `
        <div class="li ${item._cat === 'my' ? 'my' : 'shared'}" id="li-${idx}" onclick="toggleCheck(${idx})">
          <div class="li-row1">
            <div class="li-check"><svg viewBox="0 0 24 24"><polyline points="4 12 9 17 20 6"/></svg></div>
            <span class="li-type ${typeClass}">${type}</span>
            <span class="li-price">${esc(p.price || '')}</span>
            <span class="li-trade ${tradeClass}">${tradeStatus}</span>
            <span style="flex:1"></span>
            ${photoCount > 0 ? `<span style="font-size:11px;color:#888;font-weight:500;flex-shrink:0;margin-right:4px;">📷 ${photoCount}</span>` : ''}
            <button class="li-btn-detail" onclick="event.stopPropagation(); openDetailById('${safeId}', '${safeCat}')">상세</button>
          </div>
          <div class="li-row2">
            <div class="li-name">${name}${loc && loc !== name ? ' · ' + loc : ''}</div>
            <div class="li-detail">${[p.area, p.floor].filter(Boolean).map(v => esc(v)).join(' · ')}</div>
          </div>
        </div>`;
    });
    results.innerHTML = html;
  }

  // ★ 모바일 알림 로드
  async function loadMobileAlerts() {
    const panel = document.getElementById('alertPanel');
    if (!panel || !currentUser) return;
    panel.innerHTML = '<div style="text-align:center;padding:40px 0;color:#94a3b8;">알림 로딩 중...</div>';

    try {
      const today = new Date().toISOString().slice(0, 10);
      const [matchRes, interestRes, overdueRes, upcomingRes] = await Promise.all([
        supabaseClient.from('match_notifications').select('id, card_id, client_card_id, similarity, created_at')
          .eq('agent_id', currentUser.id).eq('is_read', false).order('created_at', { ascending: false }).limit(20),
        supabaseClient.from('card_interests').select('id, card_id, created_at')
          .eq('agent_id', currentUser.id).order('created_at', { ascending: false }).limit(20),
        supabaseClient.from('client_notes').select('id, client_card_id, content, alert_date, type')
          .eq('agent_id', currentUser.id).eq('alert_done', false).not('alert_date', 'is', null).lt('alert_date', new Date().toISOString())
          .order('alert_date', { ascending: true }).limit(20),
        supabaseClient.from('client_notes').select('id, client_card_id, content, alert_date, type')
          .eq('agent_id', currentUser.id).eq('alert_done', false).not('alert_date', 'is', null).gte('alert_date', new Date().toISOString())
          .order('alert_date', { ascending: true }).limit(20),
      ]);

      // 매물 ID + 손님 ID 모으기 (병렬 조회)
      const cardIds = [...new Set([
        ...(matchRes.data || []).map(m => m.card_id),
        ...(interestRes.data || []).map(i => i.card_id),
      ])].filter(Boolean);
      const clientIds = [...new Set([
        ...(overdueRes.data || []).map(o => o.client_card_id),
        ...(upcomingRes.data || []).map(u => u.client_card_id),
        ...(matchRes.data || []).map(m => m.client_card_id),
      ])].filter(Boolean);

      let cardMap = {}, clientMap = {};
      const [cardsRes, clientsRes] = await Promise.all([
        cardIds.length ? supabaseClient.from('cards').select('id, property').in('id', cardIds) : { data: [] },
        clientIds.length ? supabaseClient.from('cards').select('id, property').in('id', clientIds) : { data: [] }
      ]);
      if (cardsRes.data) cardsRes.data.forEach(c => { cardMap[c.id] = c.property || {}; });
      if (clientsRes.data) clientsRes.data.forEach(c => { clientMap[c.id] = c.property || {}; });

      let html = `<div style="padding:8px 0 4px;">
        <span style="font-size:22px;font-weight:900;color:#1a1a2e;letter-spacing:-0.5px;">알림</span>
      </div>`;

      // 알림 카드 렌더 헬퍼
      function alertCard(accentColor, label, rightText, content, clientCardId, highlightNoteId) {
        const click = clientCardId ? `onclick="openClientCRM('${clientCardId}'${highlightNoteId ? ",'" + highlightNoteId + "'" : ''})"` : '';
        const isOverdue = accentColor === '#ef4444';
        return `<div ${click} style="padding:16px;margin-bottom:10px;background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04);${clientCardId ? 'cursor:pointer;' : ''}position:relative;overflow:hidden;">
          <div style="position:absolute;top:0;left:0;bottom:0;width:4px;background:${accentColor};border-radius:4px 0 0 4px;"></div>
          <div style="padding-left:8px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <span style="font-size:11px;color:#fff;font-weight:600;background:${accentColor};padding:3px 10px;border-radius:20px;">${label}</span>
              <span style="font-size:12px;color:#64748b;font-weight:500;">${rightText}</span>
            </div>
            <div style="font-size:15px;color:#1a1a2e;font-weight:600;line-height:1.5;">${content}</div>
            ${clientCardId ? `<div style="margin-top:8px;font-size:12px;color:${accentColor};font-weight:500;">상세보기 →</div>` : ''}
          </div>
        </div>`;
      }

      // 지연 일정
      const overdue = overdueRes.data || [];
      if (overdue.length) {
        html += `<div style="display:flex;align-items:center;gap:8px;margin:20px 0 12px;">
          <span style="font-size:15px;font-weight:800;color:#ef4444;">지연</span>
          <span style="font-size:12px;color:#fff;background:#ef4444;padding:2px 10px;border-radius:20px;font-weight:600;">${overdue.length}</span>
        </div>`;
        overdue.forEach(a => {
          const cp = clientMap[a.client_card_id] || {};
          const clientName = [cp.price, cp.location].filter(Boolean).join(' · ') || '손님';
          const ad = new Date(a.alert_date);
          html += alertCard('#ef4444',`${ad.getMonth()+1}/${ad.getDate()} 지연`, esc(clientName), esc(a.content), a.client_card_id, a.id);
        });
      }

      // 손님 관심 표시
      const interests = interestRes.data || [];
      if (interests.length) {
        html += `<div style="display:flex;align-items:center;gap:8px;margin:24px 0 12px;">
          <span style="font-size:15px;font-weight:800;color:#f59e0b;">관심 표시</span>
          <span style="font-size:12px;color:#fff;background:#f59e0b;padding:2px 10px;border-radius:20px;font-weight:600;">${interests.length}</span>
        </div>`;
        interests.forEach(i => {
          const p = cardMap[i.card_id] || {};
          const name = [p.complex, p.location, p.price].filter(Boolean).join(' · ') || '매물';
          const time = new Date(i.created_at).toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
          html += alertCard('#facc15','❤️ 관심 매물', time, `손님이 "${esc(name)}" 보고싶어요`, null);
        });
      }

      // 자동 매칭
      const matches = matchRes.data || [];
      if (matches.length) {
        html += `<div style="display:flex;align-items:center;gap:8px;margin:24px 0 12px;">
          <span style="font-size:15px;font-weight:800;color:#4ecdc4;">새 매칭</span>
          <span style="font-size:12px;color:#fff;background:#4ecdc4;padding:2px 10px;border-radius:20px;font-weight:600;">${matches.length}</span>
        </div>`;
        matches.forEach(m => {
          const p = cardMap[m.card_id] || {};
          const cp = clientMap[m.client_card_id] || {};
          const propName = [p.complex, p.location, p.price].filter(Boolean).join(' · ') || '매물';
          const clientName = [cp.price, cp.location].filter(Boolean).join(' · ') || '손님';
          html += alertCard('#4ecdc4','매칭', esc(clientName), esc(propName), m.client_card_id);
        });
      }

      // 예정 일정
      const upcoming = upcomingRes.data || [];
      if (upcoming.length) {
        html += `<div style="display:flex;align-items:center;gap:8px;margin:24px 0 12px;">
          <span style="font-size:15px;font-weight:800;color:#64748b;">예정</span>
          <span style="font-size:12px;color:#fff;background:#94a3b8;padding:2px 10px;border-radius:20px;font-weight:600;">${upcoming.length}</span>
        </div>`;
        upcoming.forEach(a => {
          const cp = clientMap[a.client_card_id] || {};
          const clientName = [cp.price, cp.location].filter(Boolean).join(' · ') || '손님';
          const ad = new Date(a.alert_date);
          html += alertCard('#94a3b8',`${ad.getMonth()+1}/${ad.getDate()} ${esc(a.type||'일정')}`, esc(clientName), esc(a.content), a.client_card_id, a.id);
        });
      }

      if (!html) {
        html = '<div style="text-align:center;padding:60px 0;color:#94a3b8;font-size:14px;">알림이 없어요</div>';
      }

      panel.innerHTML = html;
    } catch(e) {
      panel.innerHTML = '<div style="text-align:center;padding:40px 0;color:#f87171;">알림 로딩 실패</div>';
    }
  }

  // ★ 손님 미니 CRM 바텀시트

                <div style="font-size:12px;color:#94a3b8;margin-top:2px;">${dateStr}${past?' (지남)':''}</div>

              <div style="display:flex;gap:6px;">
                <button onclick="completeCRMNote('${n.id}','${clientCardId}')" style="padding:6px 12px;border-radius:8px;border:none;background:#10b981;color:#fff;font-size:12px;font-weight:600;cursor:pointer;">완료</button>
                <button onclick="deleteCRMNote('${n.id}','${clientCardId}')" style="padding:6px 12px;border-radius:8px;border:none;background:#f1f5f9;color:#64748b;font-size:12px;cursor:pointer;">삭제</button>
              </div>
            </div>
          </div>`;
        });
        html += `</div>`;
      }

      // 최근 메모
      const notes = allNotes.filter(n => !n.alert_date || n.alert_done);
      if (notes.length) {
        html += `<div style="padding:0 20px 24px;">
          <div style="font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:10px;">최근 기록</div>`;
        notes.forEach(n => {
          const d = new Date(n.created_at);
          const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
          const typeLabel = n.type || '메모';
          const typeColors = { '방문':'#4ecdc4', '상담':'#0ea5e9', '계약':'#f59e0b', '매물소개':'#a78bfa', '메모':'#94a3b8' };
          const tc = typeColors[typeLabel] || '#94a3b8';
          const isHighlight = highlightNoteId && n.id === highlightNoteId;
          html += `<div id="crm-note-${n.id}" style="padding:12px 14px;margin-bottom:8px;background:${isHighlight ? '#fffbeb' : '#fff'};border-radius:10px;border:1px solid ${isHighlight ? '#f59e0b' : '#f0f0f3'};${isHighlight ? 'box-shadow:0 0 0 2px rgba(245,158,11,0.2);' : ''}">
            ${isHighlight ? '<div style="font-size:10px;color:#f59e0b;font-weight:700;margin-bottom:6px;">📌 이 알림에서 열림</div>' : ''}
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
              <div style="display:flex;align-items:center;gap:6px;">
                <span style="width:6px;height:6px;border-radius:50%;background:${tc};flex-shrink:0;"></span>
                <span style="font-size:12px;color:${tc};font-weight:600;">${esc(typeLabel)}</span>
              </div>
              <span style="font-size:12px;color:#64748b;font-weight:500;">${dateStr}</span>
            </div>
            <div style="font-size:14px;color:#374151;line-height:1.5;padding-left:12px;">${esc(n.content)}</div>
          </div>`;
        });
        html += `</div>`;
      } else {
        html += `<div style="padding:20px;text-align:center;color:#c0c0c0;font-size:13px;">아직 메모가 없어요</div>`;
      }

      content.innerHTML = html;
      // 하이라이트 메모로 스크롤
      if (highlightNoteId) {
        setTimeout(() => {
          const el = document.getElementById('crm-note-' + highlightNoteId);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });

  function getShareLink() {
    const ids = cardItems.map(c => c.id);
    const agentParam = currentUser ? '&agent=' + currentUser.id : '';
    const base = 'https://hwik.kr/property_view.html';
    return ids.length === 1 ? `${base}?id=${ids[0]}${agentParam}` : `${base}?ids=${ids.join(',')}${agentParam}`;

  async function shareKakao() {
    const link = getShareLink();
    const first = cardItems[0]?.property || {};
    const agent = cardItems[0]?.agent || {};
    const agentName = agent.business_name || agent.name || '중개사';
    const name = first.complex || first.location || '매물';
    const title = cardItems.length === 1 ? `${name} 매물` : `${name} 외 ${cardItems.length}개 매물`;
    const desc = cardItems.length === 1
      ? [first.type, first.price, first.area, first.floor].filter(Boolean).join(' · ')
      : `${agentName}이 보내는 매물 ${cardItems.length}개`;
    const imageUrl = currentUser ? `${SUPABASE_URL}/storage/v1/object/public/og-images/agents/${currentUser.id}.png?t=${Date.now()}` : '';
    const content = { title, description: desc, link: { mobileWebUrl: link, webUrl: link } };
    if (imageUrl) { content.imageUrl = imageUrl; content.imageWidth = 800; content.imageHeight = 420; }
    closeShareSheet();
    if (typeof Kakao === 'undefined' || !Kakao.isInitialized()) {
      showToast('카카오 SDK 로드 중입니다. 잠시 후 다시 시도해주세요.');
      return;
    }
    Kakao.Share.sendDefault({ objectType: 'feed', content, buttons: [{ title: '카드로 보기', link: { mobileWebUrl: link, webUrl: link } }] });
  }

  function copyLink() {
    const link = getShareLink();
    navigator.clipboard.writeText(link).then(() => {
      closeShareSheet();
      showToast('🔗 링크 복사됨!');

  function showToast(msg) {
    let t = document.getElementById('mobileToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'mobileToast';
      t.style.cssText = 'position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;border:1px solid rgba(255,255,255,0.2);white-space:nowrap;transition:opacity 0.3s;';
      document.body.appendChild(t);
    }
    t.textContent = msg; t.style.opacity = '1';
    setTimeout(() => { t.style.opacity = '0'; }, 2000);
  }

  async function openDetailById(cardId, cat = 'my') {
    try {
      // ★ searchData 캐시에서 먼저 찾기 (불필요한 API 호출 제거)
      let data = searchData.find(c => c.id === cardId);
      if (!data) {
        const selectCols = cat === 'shared'
          ? 'id, property, agent, style, color, agent_comment, photos, lat, lng, trade_status, created_at, agent_id'
          : '*';
        const res = await supabaseClient.from('cards_view').select(selectCols).eq('id', cardId).maybeSingle();
        data = res.data;
      }
      if (!data) return;
      const p = data.property || {};
      const item = {
        ...data,
        type: p.type || '',
        shortPrice: p.price || '',
        name: p.complex || p.location || '',
        location: p.location || '',
        size: p.area || '',
        floor: p.floor || '',
        rooms: p.room || '',
        direction: (p.features || []).join(', ') || '',
        status: data.trade_status || '',
        memo: cat === 'shared' ? '' : (data.agent_comment || ''),
        memoPrivate: cat === 'shared' ? '' : (data.private_note?.memo || ''),
        tags: p.features || [],
        photos: data.photos || [],
        cat: cat,
      };
      openDetail(item);
    } catch(e) { console.error(e); }
  }

    // ── 상세 모달 ──
  const detailOverlay = document.getElementById('detailOverlay');

  let currentItem = null;

  let currentTags = [];

  function openDetail(item) {
    currentItem = item;
    const isShared = item.cat === 'shared';
    const typeClass = item.type === '매매' ? 'type-sale' : item.type === '전세' ? 'type-jeonse' : 'type-rent';

    // 거래유형 + 상태
    document.getElementById('dmType').className = 'dm-type-badge ' + typeClass;
    document.getElementById('dmType').textContent = item.type || '';
    const tradeStatus = item.status === '계약중' ? '계약중' : item.status === '완료' ? '완료' : '계약가능';
    const tradeClass = tradeStatus === '계약가능' ? 'trade-available' : tradeStatus === '계약중' ? 'trade-ongoing' : 'trade-done';
    const dmTrade = document.getElementById('dmTrade');
    dmTrade.className = 'li-trade ' + tradeClass;
    dmTrade.textContent = tradeStatus;

    // 가격, 이름, 위치
    document.getElementById('dmPrice').textContent = item.shortPrice || '-';
    document.getElementById('dmName').textContent = item.name || '-';
    document.getElementById('dmLocation').textContent = item.location || '';

    // 평수/층수 - 있는 것만 표시
    const sizeFloor = [];
    if (item.size) sizeFloor.push(`<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:14px;color:#1a1a2e;font-weight:500;"><span style="font-size:10px;color:#94a3b8;display:block;margin-bottom:3px;font-weight:400;">평수</span>${esc(item.size)}</div>`);
    if (item.floor) sizeFloor.push(`<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:14px;color:#1a1a2e;font-weight:500;"><span style="font-size:10px;color:#94a3b8;display:block;margin-bottom:3px;font-weight:400;">층수</span>${esc(item.floor)}</div>`);
    document.getElementById('dmSizeFloor').innerHTML = sizeFloor.join('');

    // 방구조/향 - 있는 것만 표시
    const roomsDir = [];
    if (item.rooms) roomsDir.push(`<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:14px;color:#1a1a2e;font-weight:500;"><span style="font-size:10px;color:#94a3b8;display:block;margin-bottom:3px;font-weight:400;">방구조</span>${esc(item.rooms)}</div>`);
    if (item.direction) roomsDir.push(`<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:14px;color:#1a1a2e;font-weight:500;"><span style="font-size:10px;color:#94a3b8;display:block;margin-bottom:3px;font-weight:400;">향</span>${esc(item.direction)}</div>`);
    document.getElementById('dmRoomsDirection').innerHTML = roomsDir.join('');

    // 태그
    const tags = item.tags || [];
    document.getElementById('dmTags').innerHTML = tags.map(t =>
      `<span style="background:rgba(78,205,196,0.12);color:#4ecdc4;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;">${esc(t)}</span>`
    ).join('');

    // ★ 썸네일 표시
    const photos = item.photos || [];
    const thumbEl = document.getElementById('dmThumb');
    const thumbImg = document.getElementById('dmThumbImg');
    const thumbCount = document.getElementById('dmThumbCount');
    if (thumbEl && photos.length > 0) {
      thumbImg.src = photos[0];
      thumbCount.textContent = photos.length > 1 ? photos.length : '';
      thumbEl.style.display = 'block';
    } else if (thumbEl) {
      thumbEl.style.display = 'none';
    }

    // 비공개 메모 (내 매물만)
    const privateField = document.getElementById('dmPrivateField');
    if (isShared || !item.memoPrivate) {
      privateField.style.display = 'none';
    } else {
      privateField.style.display = 'block';
      document.getElementById('dmMemoPrivate').textContent = item.memoPrivate;
    }

    // 손님에게 한마디
    const publicField = document.getElementById('dmPublicField');
    if (!item.memo) {
      publicField.style.display = 'none';
    } else {
      publicField.style.display = 'block';
      document.getElementById('dmMemoPublic').textContent = item.memo;
    }

    document.querySelector('.dm-title').textContent = isShared ? '공유 매물' : '매물 상세';

    detailOverlay.classList.add('show');
    setTimeout(() => detailModal.classList.add('show'), 10);
    // 뒤로가기 가로채기
    history.pushState({ detail: true }, '');
  }

  function renderTags() {
    const container = document.getElementById('dmTags');
    const isShared = currentItem?.cat === 'shared';
    container.innerHTML = currentTags.map((t, i) => 
      isShared 
        ? `<span class="dm-tag" style="cursor:default">${esc(t)}</span>`
        : `<button class="dm-tag" onclick="removeTag(${i})">${esc(t)}<span class="tag-x">×</span></button>`
    ).join('');
  }

  function addTag() {
    const input = document.getElementById('dmTagInput');
    const val = input.value.trim();
    if (!val) return;
    if (currentTags.includes(val)) { input.value = ''; return; }
    currentTags.push(val);
    input.value = '';
    renderTags();
  }

  function removeTag(idx) {
    currentTags.splice(idx, 1);
    renderTags();
  }

  function shareFromDetail() {
    if (!currentItem) return;
    openShareSheet([currentItem]);
  }

  // ★ 상세 모달 썸네일 클릭 → property_view 갤러리로 이동
  function openDetailGallery() {
    if (!currentItem?.id) return;
    const url = `https://hwik.kr/property_view.html?id=${currentItem.id}&agent=${currentUser?.id || ''}`;
    window.open(url, '_blank');
  }

  function closeDetail() {
    detailModal.classList.remove('show');
    setTimeout(() => detailOverlay.classList.remove('show'), 300);
  }

  // ★ 뒤로가기 통합 처리 (메모/상세/로그인 모달 + 앱 종료 방지)
  history.replaceState({ hwik: 'home' }, '');

  window.addEventListener('popstate', (e) => {
    // 1. 매물 상세 모달
    if (detailModal.classList.contains('show')) {
      detailModal.classList.remove('show');
      setTimeout(() => detailOverlay.classList.remove('show'), 300);
      return;
    }
    // 2. CRM 바텀시트
    const crmSheet = document.getElementById('crmSheet');
    if (crmSheet && crmSheet.classList.contains('show')) {
      closeCRM();
      return;
    }
    // 3. 메모 모달
    const regModal = document.getElementById('regModal');
    if (regModal && regModal.classList.contains('show')) {
      regModal.classList.remove('show');
      setTimeout(() => document.getElementById('regOverlay').classList.remove('show'), 300);
      return;
    }
    // 3. PWA 설치 시트
    const pwaSheet = document.getElementById('pwaSheet');
    if (pwaSheet && pwaSheet.classList.contains('show')) {
      closePwaSheet();
      return;
    }
    // 4. 로그인 시트
    if (loginSheet.classList.contains('show')) {
      loginSheet.classList.remove('show');
      setTimeout(() => overlay.classList.remove('show'), 300);
      return;
    }
    // 5. 홈이 아닌 탭 → 홈으로
    const activeTab = document.querySelector('.tab-btn.active');
    if (activeTab && activeTab.id !== 'tabHome') {
      switchTab('home');
      history.pushState({ hwik: 'home' }, '');
      return;
    }
    // 6. 홈에서 뒤로가기 → 앱 종료 방지
    history.pushState({ hwik: 'home' }, '');
  });

  function saveDetail() {
    alert('저장되었습니다');
    closeDetail();
  }

  // ── PWA 설치 (커스텀 시트 → 네이티브 팝업) ──
  let _pwaPrompt = null;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    _pwaPrompt = e;
    if (!window.matchMedia('(display-mode: standalone)').matches) {
      document.getElementById('pwaInstallTab').classList.add('visible');
    }
  });

  window.addEventListener('appinstalled', () => {
    _pwaPrompt = null;
    document.getElementById('pwaInstallTab').classList.remove('visible');
    closePwaSheet();
    showToast('✅ 휙이 설치됐어요!');
  });

  // ★ 탭 바의 설치 버튼 → 커스텀 시트 열기
  function triggerPwaInstall() {
    if (_pwaPrompt) {
      document.getElementById('pwaSheetOverlay').classList.add('show');
      setTimeout(() => document.getElementById('pwaSheet').classList.add('show'), 10);
      history.pushState({ pwa: true }, '');
    } else {
      showToast('브라우저 메뉴(⋮) → "홈 화면에 추가"를 탭하세요');
    }
  }

  // ★ 커스텀 시트에서 "설치하기" → 네이티브 팝업
  function confirmPwaInstall() {
    if (_pwaPrompt) {
      _pwaPrompt.prompt();
      _pwaPrompt.userChoice.then((result) => {
        if (result.outcome === 'accepted') {
          document.getElementById('pwaInstallTab').classList.remove('visible');
        }
        _pwaPrompt = null;
        closePwaSheet();
      });
    }
  }

  function closePwaSheet() {
    document.getElementById('pwaSheet').classList.remove('show');
    setTimeout(() => document.getElementById('pwaSheetOverlay').classList.remove('show'), 300);
  }

</script>

<script>
// ── 서비스워커 등록 + 자동 업데이트 ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('/hwik-web/sw.js');

      // 새 버전 감지 시 토스트 + 자동 적용
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // 새 버전 있음 → 즉시 적용 후 새로고침
            newWorker.postMessage('SKIP_WAITING');
          }
        });
      });

      // 워커 교체 완료 → 자동 새로고침
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });

    } catch(e) {
      console.warn('[휙 SW 등록 실패]', e);
    }
  });
}
</script>
