  # ── sitemap + 정적 페이지 빌드 (17개 job 완료 후) ────────
  build:
    name: sitemap + 정적 페이지 빌드
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [sync-seoul, sync-incheon, sync-gyeonggi, sync-busan, sync-daegu, sync-gwangju, sync-daejeon, sync-ulsan,
            sync-sejong, sync-chungbuk, sync-chungnam, sync-jeonbuk, sync-jeonnam, sync-gyeongbuk, sync-gyeongnam, sync-gangwon, sync-jeju]
    if: ${{ !cancelled() && !contains(needs.*.result, 'cancelled') }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil playwright
      - name: Playwright 브라우저 설치
        run: python -m playwright install chromium --with-deps
      - name: danji_pages DB 집계 (변경된 단지만)
        run: python build_danji_from_v2.py --changed-only --hours 36 2>&1 | tee /tmp/log_danji_v2.txt; exit ${PIPESTATUS[0]}
      - name: 동 정적 페이지 빌드
        run: python build_dong_pages.py 2>&1 | tee /tmp/log_dong.txt; exit ${PIPESTATUS[0]}
      - name: 구 정적 페이지 빌드
        run: python build_gu_pages.py 2>&1 | tee /tmp/log_gu.txt; exit ${PIPESTATUS[0]}
      - name: 단지 정적 HTML 빌드 (dong/gu 슬러그 완비 후)
        run: python build_danji_pages.py 2>&1 | tee /tmp/log_danji_pages.txt; exit ${PIPESTATUS[0]}
      - name: 랭킹 정적 페이지 빌드
        run: python build_ranking_pages.py 2>&1 | tee /tmp/log_ranking.txt; exit ${PIPESTATUS[0]}
      - name: sitemap 재생성 (모든 HTML 빌드 완료 후)
        run: python sync_trades.py --sitemap-only 2>&1 | tee /tmp/log_sitemap.txt; exit ${PIPESTATUS[0]}

      # ── pre-push 브라우저 검증 게이트 ──────────────────────
      # 빌드 결과를 runner-local http.server 로 서빙해서 Chromium 으로 열고
      # 주요 페이지(허브/gu/dong/danji/ranking/shell/depth-1/depth-2/주변단지)
      # 를 검증. 하나라도 실패하면 이 스텝이 exit 1 → 이후 "커밋 및 푸시"
      # 스텝이 실행되지 않아 나쁜 상태가 원격에 올라가지 않는다.
      #
      # 이 게이트가 왜 존재하는지:
      #   2026-04-11~12 2일 연속 extract_css_js() 회귀로 13,000개 단지 페이지가
      #   자동 빌드에 의해 덮어써져 production 이 터졌다. HEAD 200 OK 만으로는
      #   "서버는 응답 정상, 브라우저에선 리치 UI 비어있음" 상황을 못 잡는다.
      #   verify_browser.py 로 실제 Chromium DOM 체크를 빌드 직후·push 전에
      #   실행해 나쁜 상태가 원격에 올라가기 전에 차단한다.
      #
      # 관련 메모: memory/feedback_long_session_regressions.md
      - name: pre-push 브라우저 검증 게이트
        run: |
          set -e
          python -m http.server 8000 &>/tmp/http_server.log &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT
          sleep 2
          echo "브라우저 검증 시작 (localhost:8000)"
          VERIFY_HOST=http://localhost:8000 python verify_browser.py 2>&1 | tee verify_result.txt; exit ${PIPESTATUS[0]}

      - name: 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A sitemap.xml sitemap_seoul.xml sitemap_metro.xml sitemap_cities.xml sitemap_pages.xml danji/ dong/ gu/ ranking/
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "자동 빌드: sitemap + 단지 페이지 ($(date -u +%Y-%m-%d))"
            git pull --rebase origin main
            git push
          fi

      # ── 빌드 실패 시 자동 수정 에이전트 ──────────────────────
      # 실패 로그를 Claude API로 분석 → Python 스크립트 버그면 자동 수정 후 커밋·푸시
      # 외부 API 장애·네트워크 오류는 수정 불가로 분류 → 기존 실패 이메일로 진행
      # 안전 장치: danji/app.js, style.css, workflows/ 는 절대 수정 안 함
      # 최대 2회 자동 재시도 (retry_count 파라미터)
      - name: 자동 수정 에이전트
        id: autofix
        if: failure() && (github.event.inputs.retry_count == '' || fromJSON(github.event.inputs.retry_count || '0') < 2)
        continue-on-error: true
        run: |
          # 모든 로그 합치기
          cat /tmp/log_*.txt > /tmp/build_fail.txt 2>/dev/null || true

          # auto_fix.py 실행
          python auto_fix.py --log /tmp/build_fail.txt
          FIX_EXIT=$?

          if [ $FIX_EXIT -eq 0 ]; then
            echo "fix_result=fixed" >> $GITHUB_OUTPUT

            # 수정된 Python 파일만 커밋
            git config user.name  "hwik-autofix[bot]"
            git config user.email "autofix@hwik.kr"
            git add -A *.py
            if ! git diff --cached --quiet; then
              RETRY_NUM="${{ github.event.inputs.retry_count || '0' }}"
              git commit -m "fix(auto): 빌드 실패 자동 수정 retry=${RETRY_NUM}"
              git pull --rebase origin main
              git push
              echo "✅ 수정 커밋 푸시 완료"

              # 다음 retry_count로 워크플로우 재실행 시도
              NEXT=$(( RETRY_NUM + 1 ))
              gh workflow run sync-trades.yml \
                --field mode=daily \
                --field retry_count=$NEXT \
                && echo "🔄 재실행 예약 (retry $NEXT/2)" \
                || echo "⚠️  재실행 예약 실패 (내일 새벽 1시 자동 실행)"
            else
              echo "⚠️  커밋할 변경 없음"
              echo "fix_result=no_change" >> $GITHUB_OUTPUT
            fi
          elif [ $FIX_EXIT -eq 2 ]; then
            echo "fix_result=not_fixable" >> $GITHUB_OUTPUT
          else
            echo "fix_result=error" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 빌드 실패 시 알림 이메일 ──
      - name: 실패 이메일
        if: failure()
        run: |
          python - <<'PYEOF'
          import smtplib, os, re
          from email.mime.text import MIMEText

          today = os.popen("date +%Y-%m-%d").read().strip()
          run_url = f"https://github.com/{os.environ.get('GITHUB_REPOSITORY','')}/actions/runs/{os.environ.get('GITHUB_RUN_ID','')}"

          # ── 로그에서 마지막 의미있는 줄 추출 ──
          def read_log(path, n=5):
              try:
                  with open(path, encoding="utf-8") as f:
                      lines = [l.rstrip() for l in f if l.strip()]
                  return "\n".join(lines[-n:]) if lines else "(로그 없음)"
              except:
                  return "(로그 없음)"

          # 어느 단계에서 멈췄는지 추정
          logs = {
              "단지 집계"   : read_log("/tmp/log_danji_v2.txt"),
              "단지 HTML"   : read_log("/tmp/log_danji_pages.txt"),
              "sitemap"     : read_log("/tmp/log_sitemap.txt"),
          }

          # 브라우저 검증 결과
          try:
              with open("verify_result.txt", encoding="utf-8") as f:
                  verify_out = f.read()[-1500:]
          except:
              verify_out = "(브라우저 검증 로그 없음)"

          # 급감 가드 감지
          danji_log = read_log("/tmp/log_danji_pages.txt", 10)
          guard_msg = ""
          if "급감 감지" in danji_log:
              guard_msg = "⚠️  급감 가드 발동 — DB 데이터가 기존 HTML 수의 99% 미만\n"

          # 자동 수정 에이전트 결과
          autofix_status = ""
          try:
              with open("/tmp/autofix_status.txt", encoding="utf-8") as f:
                  status = f.read().strip()
              if status.startswith("fixed:"):
                  autofix_status = f"🤖 자동 수정 적용됨: {status.split(':',1)[1]} — 재실행 예약됨\n"
              elif status.startswith("not_fixable:"):
                  autofix_status = f"🤖 자동 수정 불가: {status.split(':',1)[1]}\n"
              else:
                  autofix_status = f"🤖 자동 수정 실패: {status}\n"
          except:
              autofix_status = "🤖 자동 수정 미실행\n"

          log_section = ""
          for name, log in logs.items():
              if log != "(로그 없음)":
                  log_section += f"[{name}]\n{log}\n\n"

          body = "\n".join([
              f"[휙] {today} 자동 빌드 실패 - production은 이전 상태 그대로",
              "",
              "[자동 수정 결과]",
              autofix_status,
              "[자동으로 한 것]",
              "- 빌드 중단 (문제 발견 시점에서 즉시 멈춤)",
              "- GitHub push 안 함 -> hwik.kr 영향 없음",
              guard_msg,
              "[실패 원인 로그]",
              log_section,
              "[브라우저 검증 결과]",
              verify_out,
              "",
              "[지금 해야 할 것]",
              f"1) Actions 로그에서 빨간 스텝 확인: {run_url}",
              "2) 자동 수정됐으면 → 재실행 예약됨 (또는 수동 실행)",
              "3) 수동 수정 필요하면 → GitHub Actions -> sync-trades -> Run workflow",
              "",
              "[흔한 원인]",
              "- 국토부 API 일시 오류 (내일 자동 해결)",
              "- 급감 가드 발동 (Supabase 조회 오류, 내일 재시도)",
              "- danji/app.js 또는 style.css 회귀 (코드 확인 필요)",
          ])

          # 자동 수정 적용됐으면 제목에 표시
          if "자동 수정 적용됨" in autofix_status:
              subject = f"[휙][AUTO-FIXED] {today} 빌드 실패 → 자동 수정 완료"
          else:
              subject = f"[휙][FAIL] {today} 자동 빌드 실패 — production 영향 없음"

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = subject
          msg["From"] = os.environ["SMTP_USER"]
          msg["To"] = os.environ["REPORT_EMAIL"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["SMTP_USER"], os.environ["SMTP_PASS"])
              s.send_message(msg)
          print(f"이메일 발송 → {os.environ['REPORT_EMAIL']}")
          PYEOF

      - name: SEO + 데이터 검증 + 빌드 요약 이메일 발송
        run: |
          python verify_seo.py > seo_result.txt 2>&1 || true
          cat seo_result.txt
          python verify_data.py > data_result.txt 2>&1 || true
          cat data_result.txt
          python - <<'PYEOF'
          import smtplib, os, re, requests
          from email.mime.text import MIMEText

          today = os.popen("date +%Y-%m-%d").read().strip()
          run_url = f"https://github.com/{os.environ.get('GITHUB_REPOSITORY','')}/actions/runs/{os.environ.get('GITHUB_RUN_ID','')}"

          # ── 로그 파일에서 핵심 줄 추출 ──
          def last_line(path, keyword):
              try:
                  with open(path, encoding="utf-8") as f:
                      lines = [l.strip() for l in f if keyword in l]
                  return lines[-1] if lines else "-"
              except:
                  return "-"

          danji_v2  = last_line("/tmp/log_danji_v2.txt", "완료:")
          danji_pg  = last_line("/tmp/log_danji_pages.txt", "페이지 생성")
          sitemap   = last_line("/tmp/log_sitemap.txt", "sitemap.xml 생성")

          # ── 오늘 새로 수집된 거래 건수 (DB 직접 조회) ──
          trade_count = "-"
          try:
              sb_url = os.environ.get("SUPABASE_URL", "https://jqaxejgzkchxbfzgzyzi.supabase.co")
              sb_key = os.environ.get("SUPABASE_SERVICE_ROLE_KEY", "")
              resp = requests.get(
                  f"{sb_url}/rest/v1/trade_raw_v2",
                  headers={"apikey": sb_key, "Authorization": f"Bearer {sb_key}",
                           "Prefer": "count=exact", "Range": "0-0"},
                  params={"select": "id", "created_at": f"gte.{today}T00:00:00"},
                  timeout=10,
              )
              if resp.status_code in (200, 206):
                  m = re.search(r"/(\d+)", resp.headers.get("Content-Range", ""))
                  trade_count = f"{int(m.group(1)):,}건" if m else "-"
          except:
              pass

          # ── SEO / 데이터 검증 결과 ──
          with open("seo_result.txt", encoding="utf-8") as f:
              seo = f.read()
          with open("data_result.txt", encoding="utf-8") as f:
              data = f.read()

          seo_ok  = "모든 검증 통과" in seo
          data_ok = "모든 데이터 정합성 검증 통과" in data
          if seo_ok and data_ok:
              status = "ALL PASS ✓"
          else:
              parts = []
              if not seo_ok:  parts.append("SEO")
              if not data_ok: parts.append("DATA")
              status = ", ".join(parts) + " FAIL ✗"

          build_summary = "\n".join([
              f"[빌드 요약 ({today})]",
              f"실거래 신규 수집 : {trade_count}",
              f"단지 집계        : {danji_v2}",
              f"단지 HTML        : {danji_pg}",
              f"sitemap          : {sitemap}",
              f"Actions 로그     : {run_url}",
              "",
          ])

          body = build_summary + "\n" + "=" * 60 + "\n\n" + seo + "\n\n" + "=" * 60 + "\n\n" + data

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = f"[휙] {today} 자동 빌드 완료 — {status}"
          msg["From"] = os.environ["SMTP_USER"]
          msg["To"] = os.environ["REPORT_EMAIL"]

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["SMTP_USER"], os.environ["SMTP_PASS"])
              s.send_message(msg)
          print(f"이메일 발송 완료 → {os.environ['REPORT_EMAIL']}")
          PYEOF
