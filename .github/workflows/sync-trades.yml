name: 실거래가 동기화

on:
  schedule:
    # 매일 새벽 1시 (KST) = UTC 16:00 전일
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - init
      region:
        description: '지역 (비우면 전체 병렬 실행)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - seoul
          - incheon
          - gyeonggi
          - busan
          - daegu
          - gwangju
          - daejeon
          - ulsan
          - sejong
          - chungbuk
          - chungnam
          - jeonbuk
          - jeonnam
          - gyeongbuk
          - gyeongnam
          - gangwon
          - jeju

concurrency:
  group: sync-trades
  cancel-in-progress: true

permissions:
  contents: write

# ── 공통 환경변수 ──────────────────────────────────────
env:
  GOV_SERVICE_KEY: ${{ secrets.GOV_SERVICE_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}
  REPORT_EMAIL: bgtrfvcdewsx77@gmail.com

jobs:
  # ── 서울 ──────────────────────────────────────────────
  sync-seoul:
    name: 수집 (서울)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'seoul'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - name: 서울 수집 (v2)
        run: |
          FLAG=$( [ "${{ github.event.inputs.mode }}" = "init" ] && echo "--init" || echo "--months 3" )
          ok=0
          for attempt in 1 2 3; do
            if python collect_trades_v2.py --region seoul $FLAG; then
              ok=1; break
            fi
            echo "[$attempt/3] 실패, 30초 후 재시도..."
            [ $attempt -lt 3 ] && sleep 30
          done
          [ $ok -eq 1 ]  # 3회 모두 실패 시 명시적 exit 1

  # ── 인천 ──────────────────────────────────────────────
