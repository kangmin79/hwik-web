name: 실거래가 동기화

on:
  schedule:
    # 매일 새벽 3시 (KST) = UTC 18:00 전일
    # 사용자가 5시에 기상해서 수집·빌드·검증·이메일을 한 번에 확인할 수 있도록 02:00→03:00 으로 2시간 미룸 (2026-04-12).
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - init
      region:
        description: '지역 (비우면 전체 병렬 실행)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - seoul
          - incheon
          - gyeonggi
          - busan
          - daegu
          - gwangju
          - daejeon
          - ulsan

permissions:
  contents: write

# ── 공통 환경변수 ──────────────────────────────────────
env:
  GOV_SERVICE_KEY: ${{ secrets.GOV_SERVICE_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}
  REPORT_EMAIL: bgtrfvcdewsx77@gmail.com

jobs:
  # ── 서울 ──────────────────────────────────────────────
  sync-seoul:
    name: 수집 (서울)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'seoul'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - name: 서울 수집 (v2)
        run: |
          FLAG=$( [ "${{ github.event.inputs.mode }}" = "init" ] && echo "--init" || echo "" )
          python collect_trades_v2.py --region seoul $FLAG

  # ── 인천 ──────────────────────────────────────────────
  sync-incheon:
    name: 수집 (인천)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'incheon'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - name: 인천 수집 (v2)
        run: |
          FLAG=$( [ "${{ github.event.inputs.mode }}" = "init" ] && echo "--init" || echo "" )
          python collect_trades_v2.py --region incheon $FLAG

  # ── 경기 ──────────────────────────────────────────────
  sync-gyeonggi:
    name: 수집 (경기)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'gyeonggi'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - name: 경기 수집 (v2)
        run: |
          FLAG=$( [ "${{ github.event.inputs.mode }}" = "init" ] && echo "--init" || echo "" )
          python collect_trades_v2.py --region gyeonggi $FLAG

  # ── 부산 ──────────────────────────────────────────────
  sync-busan:
    name: 수집 (부산)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'busan'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - name: 부산 수집 (v2)
        run: |
          FLAG=$( [ "${{ github.event.inputs.mode }}" = "init" ] && echo "--init" || echo "" )
          python collect_trades_v2.py --region busan $FLAG

  # ── 대구 ──────────────────────────────────────────────
  sync-daegu:
    name: 수집 (대구)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'daegu'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - name: 대구 수집 (v2)
        run: |
          FLAG=$( [ "${{ github.event.inputs.mode }}" = "init" ] && echo "--init" || echo "" )
          python collect_trades_v2.py --region daegu $FLAG

  # ── 광주 ──────────────────────────────────────────────
  sync-gwangju:
    name: 수집 (광주)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'gwangju'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - name: 광주 수집 (v2)
        run: |
          FLAG=$( [ "${{ github.event.inputs.mode }}" = "init" ] && echo "--init" || echo "" )
          python collect_trades_v2.py --region gwangju $FLAG

  # ── 대전 ──────────────────────────────────────────────
  sync-daejeon:
    name: 수집 (대전)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'daejeon'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - name: 대전 수집 (v2)
        run: |
          FLAG=$( [ "${{ github.event.inputs.mode }}" = "init" ] && echo "--init" || echo "" )
          python collect_trades_v2.py --region daejeon $FLAG

  # ── 울산 ──────────────────────────────────────────────
  sync-ulsan:
    name: 수집 (울산)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'ulsan'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - name: 울산 수집 (v2)
        run: |
          FLAG=$( [ "${{ github.event.inputs.mode }}" = "init" ] && echo "--init" || echo "" )
          python collect_trades_v2.py --region ulsan $FLAG

  # ── sitemap + 정적 페이지 빌드 (8개 job 완료 후) ────────
  build:
    name: sitemap + 정적 페이지 빌드
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [sync-seoul, sync-incheon, sync-gyeonggi, sync-busan, sync-daegu, sync-gwangju, sync-daejeon, sync-ulsan]
    if: ${{ !cancelled() && contains(needs.*.result, 'success') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil playwright
      - name: Playwright 브라우저 설치
        run: python -m playwright install chromium --with-deps
      - name: sitemap 재생성
        run: python sync_trades.py --sitemap-only
      - name: danji_pages DB 집계 (trade_raw_v2 → danji_pages)
        run: python build_danji_from_v2.py --region all
      - name: 단지 정적 HTML 빌드 (danji_pages → HTML)
        run: python build_danji_pages.py
      - name: 단지 OG 이미지 생성 (변경분만)
        run: python build_og_images.py
      - name: 동 OG 이미지 생성 (변경분만)
        run: python build_og_images_dong.py
      - name: 동 정적 페이지 빌드
        run: python build_dong_pages.py
      - name: 구 정적 페이지 빌드
        run: python build_gu_pages.py
      - name: 랭킹 정적 페이지 빌드
        run: python build_ranking_pages.py

      # ── pre-push 브라우저 검증 게이트 ──────────────────────
      # 빌드 결과를 runner-local http.server 로 서빙해서 Chromium 으로 열고
      # 주요 페이지(허브/gu/dong/danji/ranking/shell/depth-1/depth-2/주변단지)
      # 를 검증. 하나라도 실패하면 이 스텝이 exit 1 → 이후 "커밋 및 푸시"
      # 스텝이 실행되지 않아 나쁜 상태가 원격에 올라가지 않는다.
      #
      # 이 게이트가 왜 존재하는지:
      #   2026-04-11~12 2일 연속 extract_css_js() 회귀로 13,000개 단지 페이지가
      #   자동 빌드에 의해 덮어써져 production 이 터졌다. HEAD 200 OK 만으로는
      #   "서버는 응답 정상, 브라우저에선 리치 UI 비어있음" 상황을 못 잡는다.
      #   verify_browser.py 로 실제 Chromium DOM 체크를 빌드 직후·push 전에
      #   실행해 나쁜 상태가 원격에 올라가기 전에 차단한다.
      #
      # 관련 메모: memory/feedback_long_session_regressions.md
      - name: pre-push 브라우저 검증 게이트
        run: |
          set -e
          python -m http.server 8000 &>/tmp/http_server.log &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT
          sleep 2
          echo "브라우저 검증 시작 (localhost:8000)"
          VERIFY_HOST=http://localhost:8000 python verify_browser.py

      - name: 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml danji/ dong/ gu/ ranking/
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "자동 빌드: sitemap + 단지 페이지 ($(date -u +%Y-%m-%d))"
            git push
          fi

      # ── 게이트 실패 시 알림 이메일 (push 가 일어나지 않았음을 명시) ──
      - name: 게이트 실패 이메일
        if: failure()
        run: |
          python - <<'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText

          today = os.popen("date -u +%Y-%m-%d").read().strip()
          run_url = f"https://github.com/{os.environ.get('GITHUB_REPOSITORY','')}/actions/runs/{os.environ.get('GITHUB_RUN_ID','')}"
          body = (
              "[휙] 자동 빌드 pre-push 게이트 실패\n\n"
              "브라우저 검증(verify_browser.py) 이 실패해 GitHub Actions 가\n"
              "sitemap.xml / danji/ / dong/ / gu/ / ranking/ 변경을 원격에\n"
              "푸시하지 않고 중단했습니다. production 은 이전 상태 그대로이며\n"
              "오늘 치 실거래가 데이터도 repo 에는 반영되지 않았습니다.\n\n"
              "확인 방법:\n"
              f"  1) 워크플로 로그 열기: {run_url}\n"
              "  2) 'pre-push 브라우저 검증 게이트' 스텝의 로그에서 실패 페이지 확인\n"
              "  3) 로컬에서 `python build_danji_pages.py` 등 관련 빌드 재현 후\n"
              "     `python verify_browser.py` 로 로컬 디버그\n\n"
              "자주 실패하는 원인:\n"
              "  - danji/app.js 또는 danji/style.css 덮어쓰기 회귀\n"
              "    → memory/feedback_long_session_regressions.md 참고\n"
              "  - build_*.py 가 엉뚱한 경로를 만들거나 리다이렉트 셸로 축소\n"
              "  - 새 단지 데이터 형식이 기존 렌더러와 호환 안 됨\n\n"
              "이 이메일은 자동 빌드가 '안전하게' 중단됐다는 뜻입니다.\n"
              "production 에는 아무 영향 없습니다 — 천천히 원인 파악 후 재실행하세요.\n"
          )
          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = f"[휙][BLOCKED] {today} 자동 빌드 — pre-push 게이트 실패 (push 안 됨)"
          msg["From"] = os.environ["SMTP_USER"]
          msg["To"] = os.environ["REPORT_EMAIL"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["SMTP_USER"], os.environ["SMTP_PASS"])
              s.send_message(msg)
          print(f"게이트 실패 이메일 발송 → {os.environ['REPORT_EMAIL']}")
          PYEOF

      - name: SEO + 데이터 검증 + 이메일 발송
        run: |
          python verify_seo.py > seo_result.txt 2>&1 || true
          cat seo_result.txt
          python verify_data.py > data_result.txt 2>&1 || true
          cat data_result.txt
          python - <<'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText

          with open("seo_result.txt", encoding="utf-8") as f:
              seo = f.read()
          with open("data_result.txt", encoding="utf-8") as f:
              data = f.read()

          body = seo + "\n\n" + "=" * 70 + "\n\n" + data
          today = os.popen("date -u +%Y-%m-%d").read().strip()

          seo_ok = "모든 검증 통과" in seo
          data_ok = "모든 데이터 정합성 검증 통과" in data
          if seo_ok and data_ok:
              status = "ALL PASS ✓"
          else:
              parts = []
              if not seo_ok: parts.append("SEO")
              if not data_ok: parts.append("DATA")
              status = ", ".join(parts) + " FAIL ✗"

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = f"[휙] {today} 검증: {status}"
          msg["From"] = os.environ["SMTP_USER"]
          msg["To"] = os.environ["REPORT_EMAIL"]

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["SMTP_USER"], os.environ["SMTP_PASS"])
              s.send_message(msg)
          print(f"이메일 발송 완료 → {os.environ['REPORT_EMAIL']}")
          PYEOF
