      - name: SEO + 데이터 검증 + 빌드 요약 이메일 발송
        run: |
          python verify_seo.py > seo_result.txt 2>&1 || true
          cat seo_result.txt
          python verify_data.py > data_result.txt 2>&1 || true
          cat data_result.txt
          python - <<'PYEOF'
          import smtplib, os, re, requests
          from email.mime.text import MIMEText

          today = os.popen("date +%Y-%m-%d").read().strip()
          run_url = f"https://github.com/{os.environ.get('GITHUB_REPOSITORY','')}/actions/runs/{os.environ.get('GITHUB_RUN_ID','')}"

          # ── 로그 파일에서 핵심 줄 추출 ──
          def last_line(path, keyword):
              try:
                  with open(path, encoding="utf-8") as f:
                      lines = [l.strip() for l in f if keyword in l]
                  return lines[-1] if lines else "-"
              except:
                  return "-"

          danji_v2  = last_line("/tmp/log_danji_v2.txt", "완료:")
          danji_pg  = last_line("/tmp/log_danji_pages.txt", "페이지 생성")
          og_danji  = last_line("/tmp/log_og.txt", "OG 이미지")
          og_dong   = last_line("/tmp/log_og_dong.txt", "OG 이미지")
          sitemap   = last_line("/tmp/log_sitemap.txt", "sitemap.xml 생성")

          # ── 오늘 새로 수집된 거래 건수 (DB 직접 조회) ──
          trade_count = "-"
          try:
              sb_url = os.environ.get("SUPABASE_URL", "https://jqaxejgzkchxbfzgzyzi.supabase.co")
              sb_key = os.environ.get("SUPABASE_SERVICE_ROLE_KEY", "")
              resp = requests.get(
                  f"{sb_url}/rest/v1/trade_raw_v2",
                  headers={"apikey": sb_key, "Authorization": f"Bearer {sb_key}",
                           "Prefer": "count=exact", "Range": "0-0"},
                  params={"select": "id", "created_at": f"gte.{today}T00:00:00"},
                  timeout=10,
              )
              if resp.status_code in (200, 206):
                  m = re.search(r"/(\d+)", resp.headers.get("Content-Range", ""))
                  trade_count = f"{int(m.group(1)):,}건" if m else "-"
          except:
              pass

          # ── SEO / 데이터 검증 결과 ──
          with open("seo_result.txt", encoding="utf-8") as f:
              seo = f.read()
          with open("data_result.txt", encoding="utf-8") as f:
              data = f.read()

          seo_ok  = "모든 검증 통과" in seo
          data_ok = "모든 데이터 정합성 검증 통과" in data
          if seo_ok and data_ok:
              status = "ALL PASS ✓"
          else:
              parts = []
              if not seo_ok:  parts.append("SEO")
              if not data_ok: parts.append("DATA")
              status = ", ".join(parts) + " FAIL ✗"

          build_summary = f"""━━━ 빌드 요약 ({today}) ━━━
실거래 신규 수집 : {trade_count}
단지 집계        : {danji_v2}
단지 HTML        : {danji_pg}
OG 이미지 (단지) : {og_danji}
OG 이미지 (동)   : {og_dong}
sitemap          : {sitemap}
Actions 로그     : {run_url}
"""

          body = build_summary + "\n" + "=" * 60 + "\n\n" + seo + "\n\n" + "=" * 60 + "\n\n" + data

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = f"[휙] {today} 자동 빌드 완료 — {status}"
          msg["From"] = os.environ["SMTP_USER"]
          msg["To"] = os.environ["REPORT_EMAIL"]

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["SMTP_USER"], os.environ["SMTP_PASS"])
              s.send_message(msg)
          print(f"이메일 발송 완료 → {os.environ['REPORT_EMAIL']}")
          PYEOF
