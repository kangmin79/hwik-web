name: 실거래가 동기화

on:
  schedule:
    # 매일 새벽 1시 (KST) = UTC 16:00 전일
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - init
      region:
        description: '지역 (비우면 전체 병렬 실행)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - seoul
          - incheon
          - gyeonggi

permissions:
  contents: write

# ── 공통 환경변수 ──────────────────────────────────────
env:
  GOV_SERVICE_KEY: ${{ secrets.GOV_SERVICE_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}
  REPORT_EMAIL: bgtrfvcdewsx77@gmail.com

jobs:
  # ── 서울 ──────────────────────────────────────────────
  sync-seoul:
    name: 수집 (서울)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'seoul'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil
      - name: 서울 동기화
        run: |
          FLAG=$( [ "${{ github.event.inputs.mode }}" = "init" ] && echo "--init" || echo "" )
          python sync_trades.py --seoul $FLAG

  # ── 인천 ──────────────────────────────────────────────
  sync-incheon:
    name: 수집 (인천)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'incheon'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil
      - name: 인천 동기화
        run: |
          FLAG=$( [ "${{ github.event.inputs.mode }}" = "init" ] && echo "--init" || echo "" )
          python sync_trades.py --incheon $FLAG

  # ── 경기 ──────────────────────────────────────────────
  sync-gyeonggi:
    name: 수집 (경기)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'gyeonggi'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil
      - name: 경기 동기화
        run: |
          FLAG=$( [ "${{ github.event.inputs.mode }}" = "init" ] && echo "--init" || echo "" )
          python sync_trades.py --gyeonggi $FLAG

  # ── sitemap + 정적 페이지 빌드 (3개 job 완료 후) ────────
  build:
    name: sitemap + 정적 페이지 빌드
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [sync-seoul, sync-incheon, sync-gyeonggi]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil playwright
      - name: Playwright 브라우저 설치
        run: python -m playwright install chromium --with-deps
      - name: sitemap 재생성
        run: python sync_trades.py --aggregate-only
      - name: 단지 OG 이미지 생성 (변경분만)
        run: python build_og_images.py
      - name: 동 OG 이미지 생성 (변경분만)
        run: python build_og_images_dong.py
      - name: 단지 정적 페이지 빌드
        run: python build_danji_pages.py
      - name: 동 정적 페이지 빌드
        run: python build_dong_pages.py
      - name: 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml danji/ dong/
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "자동 빌드: sitemap + 단지 페이지 ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: SEO + 데이터 검증 + 이메일 발송
        run: |
          python verify_seo.py > seo_result.txt 2>&1 || true
          cat seo_result.txt
          python verify_data.py > data_result.txt 2>&1 || true
          cat data_result.txt
          python - <<'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText

          with open("seo_result.txt", encoding="utf-8") as f:
              seo = f.read()
          with open("data_result.txt", encoding="utf-8") as f:
              data = f.read()

          body = seo + "\n\n" + "=" * 70 + "\n\n" + data
          today = os.popen("date -u +%Y-%m-%d").read().strip()

          seo_ok = "모든 검증 통과" in seo
          data_ok = "모든 데이터 정합성 검증 통과" in data
          if seo_ok and data_ok:
              status = "ALL PASS ✓"
          else:
              parts = []
              if not seo_ok: parts.append("SEO")
              if not data_ok: parts.append("DATA")
              status = ", ".join(parts) + " FAIL ✗"

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = f"[휙] {today} 검증: {status}"
          msg["From"] = os.environ["SMTP_USER"]
          msg["To"] = os.environ["REPORT_EMAIL"]

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["SMTP_USER"], os.environ["SMTP_PASS"])
              s.send_message(msg)
          print(f"이메일 발송 완료 → {os.environ['REPORT_EMAIL']}")
          PYEOF
