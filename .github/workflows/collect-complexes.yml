      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region jeonnam

  collect-gyeongbuk:
    name: 단지 수집 (경북)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'gyeongbuk'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region gyeongbuk

  collect-gyeongnam:
    name: 단지 수집 (경남)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'gyeongnam'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region gyeongnam

  collect-gangwon:
    name: 단지 수집 (강원)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'gangwon'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
