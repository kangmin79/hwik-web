name: 신규 단지 수집 (월 1회)

on:
  schedule:
    # 매월 1일 오전 9시 (KST) = UTC 00:00
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      region:
        description: '지역 (비우면 전체 병렬 실행)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - seoul
          - incheon
          - gyeonggi
          - busan
          - daegu
          - gwangju
          - daejeon
          - ulsan
          - sejong
          - chungbuk
          - chungnam
          - jeonbuk
          - jeonnam
          - gyeongbuk
          - gyeongnam
          - gangwon
          - jeju

permissions:
  contents: write

env:
  GOV_SERVICE_KEY: ${{ secrets.GOV_SERVICE_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}
  REPORT_EMAIL: bgtrfvcdewsx77@gmail.com

# ── 공통 pip 설치 스텝 ──
x-pip-install: &pip-install
  run: pip install requests python-dateutil urllib3

jobs:
  # ── 단계 1: collect_complexes (지역별 병렬) ─────────────────
  collect-seoul:
    name: 단지 수집 (서울)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'seoul'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region seoul

  collect-incheon:
    name: 단지 수집 (인천)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'incheon'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region incheon

  collect-gyeonggi:
    name: 단지 수집 (경기)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'gyeonggi'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region gyeonggi

  collect-busan:
    name: 단지 수집 (부산)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'busan'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region busan

  collect-daegu:
    name: 단지 수집 (대구)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'daegu'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region daegu

  collect-gwangju:
    name: 단지 수집 (광주)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'gwangju'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region gwangju

  collect-daejeon:
    name: 단지 수집 (대전)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'daejeon'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region daejeon

  collect-ulsan:
    name: 단지 수집 (울산)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'ulsan'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region ulsan

  collect-sejong:
    name: 단지 수집 (세종)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'sejong'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region sejong

  collect-chungbuk:
    name: 단지 수집 (충북)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'chungbuk'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region chungbuk

  collect-chungnam:
    name: 단지 수집 (충남)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'chungnam'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region chungnam

  collect-jeonbuk:
    name: 단지 수집 (전북)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'jeonbuk'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region jeonbuk

  collect-jeonnam:
    name: 단지 수집 (전남)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'jeonnam'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
