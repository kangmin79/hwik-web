      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region gangwon

  collect-jeju:
    name: 단지 수집 (제주)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.region == '' ||
      github.event.inputs.region == 'jeju'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3
      - run: python collect_complexes.py --region jeju

  # ── 단계 2: pyeongs + match_apt_seq (collect 완료 후 순차) ──
  post-collect:
    name: 평형 수집 + aptSeq 매칭
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs:
      - collect-seoul
      - collect-incheon
      - collect-gyeonggi
      - collect-busan
      - collect-daegu
      - collect-gwangju
      - collect-daejeon
      - collect-ulsan
      - collect-sejong
      - collect-chungbuk
      - collect-chungnam
      - collect-jeonbuk
      - collect-jeonnam
      - collect-gyeongbuk
      - collect-gyeongnam
      - collect-gangwon
      - collect-jeju
    if: ${{ !cancelled() && contains(needs.*.result, 'success') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests python-dateutil urllib3

      - name: 평형 수집 (pyeongs 비어있는 신규 단지)
        run: |
          REGION="${{ github.event.inputs.region }}"
          if [ -z "$REGION" ]; then
            python collect_pyeongs_v2.py --region all
          else
            python collect_pyeongs_v2.py --region "$REGION"
          fi

      - name: aptSeq 매칭 (신규 단지)
        run: |
          REGION="${{ github.event.inputs.region }}"
          if [ -z "$REGION" ]; then
            python match_apt_seq.py --region all
          else
            python match_apt_seq.py --region "$REGION"
          fi

      - name: 완료 이메일
        if: always()
        run: |
          python - <<'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText

          today = os.popen("date -u +%Y-%m-%d").read().strip()
          run_url = f"https://github.com/{os.environ.get('GITHUB_REPOSITORY','')}/actions/runs/{os.environ.get('GITHUB_RUN_ID','')}"
          body = (
              f"[휙] {today} 월별 신규 단지 수집 완료\n\n"
              f"워크플로 로그: {run_url}\n\n"
              "collect_complexes → collect_pyeongs_v2 → match_apt_seq 순서로 실행됨.\n"
              "다음 단계: sync-trades.yml 수동 실행(init 모드)으로 신규 단지 실거래가 수집 가능.\n"
          )
          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = f"[휙] {today} 월별 단지 수집 완료"
          msg["From"] = os.environ["SMTP_USER"]
          msg["To"] = os.environ["REPORT_EMAIL"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["SMTP_USER"], os.environ["SMTP_PASS"])
              s.send_message(msg)
          print(f"완료 이메일 → {os.environ['REPORT_EMAIL']}")
          PYEOF
