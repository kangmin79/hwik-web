name: Agent Auto-Improve Loop

on:
  schedule:
    - cron: '*/10 * * * *'   # 10분마다
  workflow_dispatch:          # 수동 실행 가능

jobs:
  eval-and-improve:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Run eval-agent (Haiku data collection)
        id: eval
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://jqaxejgzkchxbfzgzyzi.supabase.co/functions/v1/eval-agent" \
            -H "x-hwik-internal: ${{ secrets.HWIK_INTERNAL_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 180)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP: $HTTP_CODE"
          echo "$BODY" | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              print(f'Run: {d.get(\"run_id\",\"?\")[:8]}')
              print(f'Score: {d.get(\"accuracy\",\"?\")} ({d.get(\"pass\",\"?\")} / {d.get(\"total\",\"?\")})')
              print(f'Time: {d.get(\"duration_ms\",0)//1000}s')
              if d.get('auto_improve_triggered'):
                  print('AUTO-IMPROVE TRIGGERED!')
              fails = d.get('failures', [])
              if fails:
                  print(f'Failures ({len(fails)}):')
                  for f in fails[:3]:
                      print(f'  [{f[\"id\"]}] {f[\"message\"]} → {f[\"actual\"]}')
          except Exception as e:
              print('Parse error:', e)
              print(sys.stdin.read()[:200])
          " || echo "Response: $BODY"

      - name: Summary
        if: always()
        run: echo "Eval complete. Results saved to Supabase."
