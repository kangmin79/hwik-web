<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카카오맵 길찾기 테스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0f1117; color: #e2e8f0; padding: 24px 16px; }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
  .card { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #1a1d27; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; margin-bottom: 10px; text-decoration: none; color: #e2e8f0; cursor: pointer; transition: background 0.2s; }
  .card:hover { background: #22263a; }
  .icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 12px; flex-shrink: 0; }
  .left { display: flex; align-items: center; }
  .name { font-size: 14px; font-weight: 600; }
  .desc { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; flex-shrink: 0; }
  .arrow { color: #4b5563; margin-left: 6px; font-size: 14px; }
  .section-label { font-size: 11px; color: #6b7280; font-weight: 600; letter-spacing: 0.05em; margin: 20px 0 8px; }
  #env-badge { font-size: 11px; color: #facc15; background: rgba(250,204,21,0.1); padding: 4px 10px; border-radius: 20px; display: inline-block; margin-bottom: 16px; }
</style>
</head>
<body>
<h2>🗺 길찾기 테스트</h2>
<div id="env-badge">환경 감지 중...</div>
<p class="sub">매물: 마포구 공덕동 삼성래미안</p>

<div class="section-label">🚶 도보</div>

<div class="card" onclick="go('kakaomap://route?sp=37.5449,126.9514&spName=삼성래미안(매물)&ep=37.5443,126.9521&epName=공덕역&by=foot','https://map.kakao.com/?sName=마포구공덕동삼성래미안2차&eName=공덕역&by=foot')">
  <div class="left"><div class="icon" style="background:rgba(226,75,74,0.15);">🚇</div><div><div class="name">공덕역 (5·6호선)</div><div class="desc">도보 길찾기</div></div></div>
  <div style="display:flex;align-items:center;"><span class="badge" style="background:rgba(226,75,74,0.15);color:#e24b4a;">지하철</span><span class="arrow">›</span></div>
</div>

<div class="card" onclick="go('kakaomap://route?sp=37.5449,126.9514&spName=삼성래미안(매물)&ep=37.5462,126.9488&epName=공덕초등학교&by=foot','https://map.kakao.com/?sName=마포구공덕동삼성래미안2차&eName=공덕초등학교&by=foot')">
  <div class="left"><div class="icon" style="background:rgba(29,158,117,0.15);">🏫</div><div><div class="name">공덕초등학교</div><div class="desc">도보 길찾기</div></div></div>
  <div style="display:flex;align-items:center;"><span class="badge" style="background:rgba(29,158,117,0.15);color:#1d9e75;">학교</span><span class="arrow">›</span></div>
</div>

<div class="card" onclick="go('kakaomap://route?sp=37.5449,126.9514&spName=삼성래미안(매물)&ep=37.5435,126.9500&epName=공덕동버스정류장&by=foot','https://map.kakao.com/?sName=마포구공덕동삼성래미안2차&eName=공덕동버스정류장&by=foot')">
  <div class="left"><div class="icon" style="background:rgba(55,138,221,0.15);">🚌</div><div><div class="name">공덕동 버스정류장</div><div class="desc">도보 길찾기</div></div></div>
  <div style="display:flex;align-items:center;"><span class="badge" style="background:rgba(55,138,221,0.15);color:#378add;">버스</span><span class="arrow">›</span></div>
</div>

<div class="section-label">🚍 대중교통</div>

<div class="card" onclick="go('kakaomap://route?sp=37.5449,126.9514&spName=삼성래미안(매물)&ep=37.5443,126.9521&epName=공덕역&by=publictransit','https://map.kakao.com/?sName=마포구공덕동삼성래미안2차&eName=공덕역&by=publictransit')">
  <div class="left"><div class="icon" style="background:rgba(250,204,21,0.15);">🗺</div><div><div class="name">공덕역 대중교통</div><div class="desc">버스 + 지하철 환승 경로</div></div></div>
  <div style="display:flex;align-items:center;"><span class="badge" style="background:rgba(250,204,21,0.15);color:#facc15;">대중교통</span><span class="arrow">›</span></div>
</div>

<p style="margin-top:20px;font-size:11px;color:#4b5563;text-align:center;">모바일: 카카오맵 앱 · PC: 카카오맵 웹으로 자동 연결</p>

<script>
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
document.getElementById('env-badge').textContent = isMobile ? '📱 모바일 — 앱으로 열림' : '💻 PC — 웹으로 열림';
function go(appUrl, webUrl) {
  if (isMobile) {
    const start = Date.now();
    window.location.href = appUrl;
    setTimeout(() => { if (Date.now() - start < 2000) window.location.href = webUrl; }, 400);
  } else {
    window.open(webUrl, '_blank');
  }
}
</script>
</body>
</html>
