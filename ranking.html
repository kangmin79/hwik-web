<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이동 중... - 휙</title>
<meta name="robots" content="noindex, follow">
<meta name="description" content="휙 아파트 순위 페이지로 이동합니다.">
<link rel="canonical" href="https://hwik.kr/ranking/">
<meta http-equiv="refresh" content="3; url=https://hwik.kr/ranking/">
<style>
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f8f8fa;color:#1a1a2e;}
.box{max-width:430px;margin:80px auto;padding:40px 24px;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.06);text-align:center;}
.logo{width:48px;height:48px;background:#f5c842;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#1a1a2e;margin:0 auto 16px;}
h1{font-size:16px;margin:0 0 8px;font-weight:600;}
p{font-size:13px;color:#6b7280;margin:0 0 20px;line-height:1.6;}
a{display:inline-block;padding:10px 20px;background:#1a1a2e;color:#fff;text-decoration:none;border-radius:8px;font-size:13px;}
.spinner{width:24px;height:24px;border:3px solid #e5e7eb;border-top-color:#f5c842;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">휙</div>
  <div class="spinner"></div>
  <h1>새 페이지로 이동 중입니다</h1>
  <p>페이지 주소가 변경되었습니다.<br>잠시만 기다려 주세요.</p>
  <a href="https://hwik.kr/ranking/">바로 이동</a>
</div>
<script>
(function(){
  var VALID_REGIONS = {seoul:1, incheon:1, gyeonggi:1, busan:1, daegu:1, gwangju:1, daejeon:1, ulsan:1, all:1};
  var VALID_TYPES = {price:1, sqm:1, jeonse:1, jeonse_low:1};
  var p = new URLSearchParams(location.search);
  // ?gu=<한글구> — 옛 SPA가 구별 랭킹을 가졌던 시절의 잔재 URL.
  // 현재는 /gu/<name>.html 로 통합 → 거기로 보낸다 (gu.html 과 동일 규칙).
  var gu = (p.get('gu') || '').trim();
  if (gu) {
    var guSlug = gu.replace(/\s+/g, '-');
    location.replace('/gu/' + encodeURIComponent(guSlug));
    return;
  }
  var region = (p.get('region') || '').trim().toLowerCase();
  var type = (p.get('type') || '').trim().toLowerCase();
  if (VALID_REGIONS[region] && VALID_TYPES[type]) {
    location.replace('/ranking/' + region + '-' + type);
  } else if (VALID_REGIONS[region]) {
    location.replace('/ranking/' + region + '-price');
  } else {
    location.replace('/ranking/');
  }
})();
</script>
</body>
</html>
