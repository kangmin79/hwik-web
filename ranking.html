<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>서울 아파트 순위 - 휙</title>
<meta name="description" id="meta-desc" content="서울 아파트 매매가, ㎡당 가격, 전세가율 순위를 확인하세요.">
<meta name="keywords" id="meta-keywords" content="서울 아파트 순위, 비싼 아파트, ㎡당 가격 순위, 전세가율 순위">
<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
<meta property="og:type" content="website">
<meta property="og:site_name" content="휙">
<meta property="og:locale" content="ko_KR">
<meta property="og:title" id="og-title" content="서울 아파트 순위 - 휙">
<meta property="og:description" id="og-desc" content="서울 아파트 매매가, ㎡당 가격, 전세가율 순위를 확인하세요.">
<meta property="og:image" content="https://hwik.kr/og-image.png">
<meta property="og:url" id="og-url" content="https://hwik.kr/ranking.html">
<link rel="canonical" id="canonical" href="https://hwik.kr/ranking.html">
<meta name="google-site-verification" content="R2ye41AVVTRs8BxEXyEafFSTqMSiHKdb9zgTklrktSI" />
<meta name="naver-site-verification" content="367bd1e77a8ad48b74e345be3e4a0f8125c2c4e1" />
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2DVQXMLC9J"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-2DVQXMLC9J');</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --dark:#1a1a2e; --yellow:#f5c842; --yellow-dim:rgba(245,200,66,0.15); --bg:#f8f8fa; --surface:#fff; --card:#f3f4f6; --border:#e5e7eb; --text:#1a1a2e; --sub:#6b7280; --muted:#9ca3af; --red:#e24b4a; --green:#639922; --radius:10px; }
html,body { height:100%; font-family:'Noto Sans KR',-apple-system,sans-serif; background:var(--bg); color:var(--text); }
.wrap { max-width:430px; margin:0 auto; background:var(--surface); min-height:100vh; }
.header { background:var(--dark); padding:16px; }
.header-top { display:flex; align-items:center; gap:12px; }
.logo { width:36px; height:36px; background:var(--yellow); border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:var(--dark); cursor:pointer; }
.header-name { font-size:17px; font-weight:500; color:#fff; }
.header-sub { font-size:12px; color:rgba(255,255,255,0.6); margin-top:2px; }
.breadcrumb { padding:10px 16px; font-size:11px; color:var(--muted); }
.breadcrumb a { color:var(--sub); text-decoration:none; }
.breadcrumb span { margin:0 4px; }
.tabs { display:flex; border-bottom:1px solid var(--border); overflow-x:auto; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex-shrink:0; padding:12px 16px; text-align:center; font-size:13px; color:var(--sub); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; white-space:nowrap; }
.tab.active { color:var(--text); font-weight:500; border-bottom-color:var(--yellow); }
.section { padding:16px; }
.section-title { font-size:14px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.section-title::before { content:''; display:inline-block; width:3px; height:14px; background:var(--yellow); border-radius:2px; }
.rank-item { display:flex; align-items:center; padding:14px; background:var(--surface); border-radius:var(--radius); cursor:pointer; transition:all .15s; box-shadow:0 1px 4px rgba(0,0,0,0.05); gap:12px; }
.rank-item:active { transform:scale(0.98); }
.rank-num { font-size:16px; font-weight:700; color:var(--yellow); min-width:28px; text-align:center; }
.rank-num.top3 { color:var(--red); }
.rank-info { flex:1; }
.rank-name { font-size:13px; font-weight:600; }
.rank-sub { font-size:11px; color:var(--sub); margin-top:2px; }
.rank-price { text-align:right; }
.rank-main { font-size:14px; font-weight:700; }
.rank-detail { font-size:11px; color:var(--sub); margin-top:2px; }
.divider { height:8px; background:var(--card); }
.seo-section { padding:16px; border-top:1px solid var(--border); background:var(--card); }
.seo-text { font-size:11px; color:var(--muted); line-height:1.7; }
.seo-source { margin-top:8px; font-size:10px; color:var(--muted); }
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:80vh; gap:12px; }
.loading-spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--yellow); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.faq-section { padding:16px; }
.faq-item { border-bottom:1px solid var(--border); padding:12px 0; }
.faq-item:last-child { border-bottom:none; }
.faq-q { font-size:13px; font-weight:500; margin-bottom:4px; }
.faq-a { font-size:12px; color:var(--sub); line-height:1.6; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading"><div class="loading-spinner"></div><div class="loading-text">순위 불러오는 중...</div></div>
</div>
<script>
const sb = supabase.createClient(HWIK_CONFIG.SUPABASE_URL, HWIK_CONFIG.SUPABASE_KEY);

let ALL_DATA = [];
let currentType = 'price';

async function loadData() {
  const params = new URLSearchParams(location.search);
  const gu = params.get('gu');
  currentType = params.get('type') || 'price';

  let query = sb.from('danji_pages')
    .select('id,complex_name,location,categories,recent_trade,jeonse_rate,total_units,build_year');

  if (gu) query = query.ilike('location', gu + '%');
  query = query.order('complex_name').limit(2000);

  const { data, error } = await query;
  if (error || !data) { document.getElementById('app').innerHTML = '<div class="loading"><div>데이터 로드 실패</div></div>'; return; }

  // 데이터 가공
  ALL_DATA = [];
  data.forEach(d => {
    const rt = d.recent_trade || {};
    const cats = d.categories || [];
    let price = null, area = null, py = 0;
    for (const c of cats) {
      const t = rt[c];
      if (t && t.price) { price = t.price; area = c; py = Math.round(parseInt(c)/3.3058); break; }
    }
    if (!price) return;
    const areaNum = parseFloat(area) || 0;
    ALL_DATA.push({
      id: d.id, name: d.complex_name, location: d.location,
      price, area, areaNum, py, sqmPrice: areaNum > 0 ? Math.round(price / areaNum) : 0,
      jr: d.jeonse_rate, buildYear: d.build_year, units: d.total_units,
    });
  });

  render(gu);
}

function render(gu) {
  const areaLabel = gu || '서울';
  const pageUrl = 'https://hwik.kr/ranking.html?' + (gu ? 'gu='+encodeURIComponent(gu)+'&' : '') + 'type=' + currentType;

  // SEO
  const typeLabels = { price: '매매가', sqm: '㎡당 가격', jeonse: '전세가율 높은', jeonse_low: '전세가율 낮은' };
  const typeLabel = typeLabels[currentType] || '매매가';
  document.title = areaLabel + ' 아파트 ' + typeLabel + ' 순위 TOP 50 - 휙';
  document.getElementById('og-title').content = document.title;
  document.getElementById('canonical').href = pageUrl;
  document.getElementById('og-url').content = pageUrl;

  // 정렬
  let sorted = [...ALL_DATA];
  if (currentType === 'price') sorted.sort((a,b) => b.price - a.price);
  else if (currentType === 'sqm') sorted = sorted.filter(d => d.sqmPrice > 0).sort((a,b) => b.sqmPrice - a.sqmPrice);
  else if (currentType === 'jeonse') sorted = sorted.filter(d => d.jr && d.jr > 0).sort((a,b) => b.jr - a.jr);
  else if (currentType === 'jeonse_low') sorted = sorted.filter(d => d.jr && d.jr > 0).sort((a,b) => a.jr - b.jr);

  const top50 = sorted.slice(0, 50);

  const html = `
    <header class="header"><div class="header-top">
      <a class="logo" href="/" style="text-decoration:none;">휙</a>
      <div><h1 class="header-name">${esc(areaLabel)} 아파트 순위</h1><div class="header-sub">${typeLabel} TOP 50</div></div>
    </div></header>

    <nav class="breadcrumb"><a href="/">휙</a><span>&gt;</span>${gu ? '<a href="gu.html">서울</a><span>&gt;</span><a href="gu.html?name='+encodeURIComponent(gu)+'">'+esc(gu)+'</a><span>&gt;</span>' : ''}<a href="ranking.html">순위</a></nav>

    <div class="tabs">
      <div class="tab${currentType==='price'?' active':''}" onclick="switchType('price','${gu||''}')">매매가</div>
      <div class="tab${currentType==='sqm'?' active':''}" onclick="switchType('sqm','${gu||''}')">㎡당 가격</div>
      <div class="tab${currentType==='jeonse'?' active':''}" onclick="switchType('jeonse','${gu||''}')">전세가율↑</div>
      <div class="tab${currentType==='jeonse_low'?' active':''}" onclick="switchType('jeonse_low','${gu||''}')">전세가율↓</div>
    </div>

    <div class="section">
      <div class="section-title">${esc(areaLabel)} ${esc(typeLabel)} TOP 50</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${top50.map((d,i) => {
          let mainVal, subVal;
          if (currentType === 'price') { mainVal = formatPrice(d.price); subVal = d.sqmPrice ? formatPrice(d.sqmPrice)+'/㎡' : ''; }
          else if (currentType === 'sqm') { mainVal = formatPrice(d.sqmPrice)+'/㎡'; subVal = '매매 '+formatPrice(d.price)+' · '+d.area+'㎡'; }
          else { mainVal = (d.jr||0)+'%'; subVal = '매매 '+formatPrice(d.price); }
          return `<a class="rank-item" style="text-decoration:none;color:inherit;" href="danji.html?id=${encodeURIComponent(d.id)}">
            <div class="rank-num${i<3?' top3':''}">${i+1}</div>
            <div class="rank-info"><div class="rank-name">${esc(d.name)}</div><div class="rank-sub">${esc(d.location)}${d.buildYear?' · '+d.buildYear+'년':''}${d.area?' · 전용'+d.area+'㎡':''}</div></div>
            <div class="rank-price"><div class="rank-main">${mainVal}</div><div class="rank-detail">${subVal}</div></div>
          </a>`;
        }).join('')}
      </div>
    </div>

    <div class="divider"></div>

    <div class="faq-section">
      <div class="section-title">자주 묻는 질문</div>
      ${top50[0] ? `<div class="faq-item"><div class="faq-q">${esc(areaLabel)}에서 가장 비싼 아파트는?</div><div class="faq-a">${esc(top50[0].name)} (${esc(top50[0].location)})이 ${formatPrice(top50[0].price)}으로 1위입니다.</div></div>` : ''}
      ${top50[0] && currentType==='sqm' ? `<div class="faq-item"><div class="faq-q">${esc(areaLabel)} ㎡당 가격 1위는?</div><div class="faq-a">${esc(top50[0].name)}이 전용면적 기준 ${formatPrice(top50[0].sqmPrice)}/㎡으로 1위입니다.</div></div>` : ''}
    </div>

    <div class="seo-section"><div class="seo-text">${esc(areaLabel)} 아파트 ${esc(typeLabel)} 순위 TOP 50. ${top50[0]?esc(top50[0].name)+'('+formatPrice(top50[0].price)+')이 1위.':''} 국토교통부 실거래가 기반.</div><div class="seo-source">데이터 출처: 국토교통부 실거래가 공개시스템 · 매일 업데이트</div></div>
  `;
  document.getElementById('app').innerHTML = html;

  // JSON-LD
  const ld = {"@context":"https://schema.org","@graph":[
    {"@type":"BreadcrumbList","itemListElement":[
      {"@type":"ListItem","position":1,"name":"휙","item":"https://hwik.kr"},
      {"@type":"ListItem","position":2,"name":"순위","item":"https://hwik.kr/ranking.html"},
    ]},
    {"@type":"ItemList","name":areaLabel+" 아파트 "+typeLabel+" 순위","numberOfItems":top50.length,
     "itemListElement":top50.slice(0,20).map((d,i)=>({"@type":"ListItem","position":i+1,"name":d.name,"url":"https://hwik.kr/danji.html?id="+encodeURIComponent(d.id)}))}
  ]};
  const s = document.createElement('script'); s.type='application/ld+json'; s.textContent=JSON.stringify(ld); document.head.appendChild(s);
}

function switchType(type, gu) {
  currentType = type;
  const url = 'ranking.html?' + (gu ? 'gu='+encodeURIComponent(gu)+'&' : '') + 'type=' + type;
  history.replaceState(null, '', url);
  render(gu || null);
}

loadData();
</script>
</body>
</html>
