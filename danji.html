<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --dark: #1a1a2e;
  --yellow: #f5c842;
  --yellow-dim: rgba(245,200,66,0.15);
  --yellow-bg: rgba(245,200,66,0.04);
  --bg: #f8f8fa;
  --surface: #ffffff;
  --card: #f3f4f6;
  --border: #e5e7eb;
  --text: #1a1a2e;
  --sub: #6b7280;
  --muted: #9ca3af;
  --red: #e24b4a;
  --green: #639922;
  --radius: 10px;
}
html,body { height:100%; font-family:'Noto Sans KR',-apple-system,sans-serif; background:var(--bg); color:var(--text); }
.wrap { max-width:430px; margin:0 auto; background:var(--surface); min-height:100vh; }

/* 헤더 */
.header { background:var(--dark); padding:16px; }
.header-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.logo { width:36px; height:36px; background:var(--yellow); border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:var(--dark); flex-shrink:0; }
.header-name { font-size:17px; font-weight:500; color:#fff; }
.header-sub { font-size:12px; color:rgba(255,255,255,0.6); margin-top:2px; }
.tags { display:flex; gap:8px; flex-wrap:wrap; }
.tag { padding:4px 10px; background:rgba(245,200,66,0.15); border-radius:20px; font-size:11px; color:rgba(255,255,255,0.9); }
.tag-subway { background:rgba(100,180,255,0.2); }
.tag-school { background:rgba(100,220,150,0.2); }

/* 탭 */
.tabs { display:flex; border-bottom:1px solid var(--border); }
.tab { flex:1; padding:12px; text-align:center; font-size:13px; color:var(--sub); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; -webkit-tap-highlight-color:transparent; }
.tab:active { transform:scale(0.97); }
.tab.active { color:var(--text); font-weight:500; border-bottom-color:var(--yellow); }

/* 평형 */
.pyeong-row { padding:12px 16px; display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.pyeong-row::-webkit-scrollbar { display:none; }
.pyeong-row::after { content:''; min-width:8px; flex-shrink:0; }
.pyeong-btn { padding:6px 14px; border-radius:20px; font-size:12px; cursor:pointer; white-space:nowrap; flex-shrink:0; border:1px solid var(--border); background:var(--card); color:var(--sub); transition:all .15s; -webkit-tap-highlight-color:transparent; }
.pyeong-btn.active { background:var(--yellow); border-color:var(--yellow); color:var(--dark); font-weight:500; }

/* 지표 */
.metrics { padding:0 16px 10px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.metric { background:var(--surface); border-radius:var(--radius); padding:12px 10px; border:1px solid var(--border); position:relative; overflow:hidden; }
.metric::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--border); }
.metric.accent-yellow::before { background:var(--yellow); }
.metric.accent-red::before { background:var(--red); }
.metric.accent-green::before { background:var(--green); }
.metric.accent-blue::before { background:#5b9ef5; }
.metric-label { font-size:10px; color:var(--sub); margin-bottom:4px; letter-spacing:-0.3px; }
.metric-value { font-size:16px; font-weight:700; }
.metric-change { font-size:10px; margin-top:3px; font-weight:500; }
.metric-change.down { color:var(--red); }
.metric-change.up { color:var(--green); }
.metric-change.neutral { color:var(--sub); }

/* 그래프 */
.chart-section { padding:0 16px 12px; }
.chart-title { font-size:12px; color:var(--sub); margin-bottom:8px; }
.chart-wrap { position:relative; height:180px; }

/* 실거래 목록 */
.section-title { font-size:14px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.section-title::before { content:''; display:inline-block; width:3px; height:14px; background:var(--yellow); border-radius:2px; }
.section { padding:16px; }
.trade-list { display:flex; flex-direction:column; gap:8px; }
.trade-item { display:flex; justify-content:space-between; padding:12px 14px; background:var(--surface); border-radius:var(--radius); border-left:3px solid var(--yellow); box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.trade-price { font-size:16px; font-weight:700; color:var(--dark); }
.trade-detail { font-size:11px; color:var(--sub); margin-top:3px; }
.trade-date { font-size:11px; color:var(--muted); align-self:center; white-space:nowrap; }

/* 구분선 */
.divider { height:8px; background:var(--card); }

/* 휙 매물 */
.listing-badge { font-size:11px; padding:3px 10px; background:var(--yellow-dim); border-radius:20px; color:#ba7517; font-weight:500; }
.listing-item { display:flex; justify-content:space-between; padding:14px; border:1.5px solid var(--yellow); border-radius:var(--radius); background:var(--yellow-bg); cursor:pointer; box-shadow:0 1px 4px rgba(245,200,66,0.15); transition:transform .15s; }
.listing-item:active { transform:scale(0.98); }
.listing-link { font-size:11px; color:#ba7517; align-self:center; font-weight:500; }
.listing-empty { text-align:center; padding:20px 16px; border:1.5px dashed var(--yellow); border-radius:var(--radius); background:var(--yellow-bg); }
.listing-empty-text { font-size:13px; color:var(--sub); margin-bottom:8px; }
.listing-empty-cta { font-size:12px; font-weight:600; color:#ba7517; cursor:pointer; }

/* 주변 단지 */
.nearby-item { display:flex; justify-content:space-between; align-items:center; padding:14px; background:var(--surface); border-radius:var(--radius); cursor:pointer; transition:all .15s; box-shadow:0 1px 4px rgba(0,0,0,0.05); }
.nearby-item:active { transform:scale(0.98); }
.nearby-item:hover { box-shadow:0 2px 8px rgba(0,0,0,0.08); }
.nearby-name { font-size:13px; font-weight:600; }
.nearby-sub { font-size:11px; color:var(--sub); margin-top:2px; }
.nearby-price { font-size:14px; font-weight:700; text-align:right; }
.nearby-diff { font-size:11px; text-align:right; margin-top:2px; padding:1px 6px; border-radius:4px; display:inline-block; }
.nearby-diff.cheaper { background:rgba(99,153,34,0.1); color:var(--green); }
.nearby-diff.pricier { background:rgba(226,75,74,0.1); color:var(--red); }

/* CTA */
.cta-section { padding:16px; border-top:1px solid var(--border); }
.btn-primary { width:100%; padding:14px; background:var(--yellow); border:none; border-radius:var(--radius); font-size:14px; font-weight:500; color:var(--dark); cursor:pointer; margin-bottom:8px; font-family:inherit; transition:transform .1s; }
.btn-primary:active { transform:scale(0.97); }
.btn-secondary { width:100%; padding:12px; background:transparent; border:1px solid var(--border); border-radius:var(--radius); font-size:13px; color:var(--sub); cursor:pointer; font-family:inherit; transition:transform .1s; }
.btn-secondary:active { transform:scale(0.97); }
/* SEO */
.seo-section { padding:16px; border-top:1px solid var(--border); background:var(--card); }
.seo-text { font-size:11px; color:var(--muted); line-height:1.7; }
.seo-more { color:var(--sub); cursor:pointer; }
.seo-source { margin-top:8px; font-size:10px; color:var(--muted); }

/* breadcrumb */
.breadcrumb { padding:10px 16px; font-size:11px; color:var(--muted); }
.breadcrumb a { color:var(--sub); text-decoration:none; }
.breadcrumb span { margin:0 4px; }

/* FAQ */
.faq-section { padding:16px; }
.faq-item { border-bottom:1px solid var(--border); padding:12px 0; }
.faq-item:last-child { border-bottom:none; }
.faq-q { font-size:13px; font-weight:500; margin-bottom:4px; }
.faq-a { font-size:12px; color:var(--sub); line-height:1.6; }

/* 로딩 */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:80vh; gap:12px; }
.loading-spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--yellow); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:13px; color:var(--sub); }

/* 에러 */
.error { text-align:center; padding:60px 20px; }
.error-icon { font-size:48px; margin-bottom:12px; }
.error-msg { font-size:14px; color:var(--sub); }
</style>

    <div class="loading-spinner"></div>
    <div class="loading-text">단지 정보 불러오는 중...</div>
  </div>
  <noscript>
    <div style="padding:20px;text-align:center;">
      <h1>아파트 실거래가 시세 - 휙</h1>
      <p>이 페이지는 JavaScript가 필요합니다.</p>
      <p>검색엔진용 전체 콘텐츠: <a href="https://api.hwik.kr/functions/v1/danji-page?id=" id="noscript-link">여기에서 확인</a></p>
    </div>

<script>
const sb = supabase.createClient(HWIK_CONFIG.SUPABASE_URL, HWIK_CONFIG.SUPABASE_KEY);
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

let DATA = null;
let currentTab = '매매';
let currentPyeong = null;
let chart = null;
let volumeChart = null;

// ── 유틸 ──
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function formatPrice(manwon) {
  if (!manwon) return '-';
  const uk = Math.floor(manwon / 10000);
  const rest = manwon % 10000;
  if (uk > 0 && rest > 0) {
    const cheon = Math.floor(rest / 1000);
    return cheon > 0 ? `${uk}억 ${cheon}천` : `${uk}억 ${rest}`;
  }
  if (uk > 0) return `${uk}억`;
  return `${manwon.toLocaleString()}만`;
}

// 현재 평형의 평수 (공급면적 기준 우선, 없으면 전용)
function getCurrentPy() {
  if (!DATA || !currentPyeong) return 0;
  const pm = (DATA.pyeongs_map || {})[currentPyeong];
  if (pm && pm.supply > 0) return Math.round(pm.supply / 3.3058);
  return Math.round(parseInt(currentPyeong) / 3.3058);
}

function distText(m) {
  if (!m) return '';
  return m >= 1000 ? (m/1000).toFixed(1) + 'km' : m + 'm';
}

function walkMin(m) {
  if (!m) return '';
  return Math.round(m / 67) + '분'; // 도보 평균 80m/분 → 67m/분 보수적
}

// ── 캐시 ──
function cacheKey(id) { return 'danji_' + id; }

function saveCache(id, data) {
  try {
    localStorage.setItem(cacheKey(id), JSON.stringify({ data, ts: Date.now() }));
  } catch(e) {}
}

function loadCache(id) {
  try {
    const raw = localStorage.getItem(cacheKey(id));
    if (!raw) return null;
    const { data, ts } = JSON.parse(raw);
    return { data, ts };
  } catch(e) { return null; }
}

function applyData(data) {
  DATA = data;
  // SEO 메타 업데이트
  document.title = `${data.complex_name} 실거래가 시세 - 휙`;
  const desc = `${data.complex_name} ${data.location} ${data.total_units || ''}세대 ${data.build_year || ''}년 아파트 실거래가, 전세가, 시세 추이`;
  document.getElementById('og-title').content = document.title;
  document.getElementById('og-desc').content = desc;
  document.getElementById('tw-title').content = document.title;
  document.getElementById('tw-desc').content = desc;
  document.querySelector('meta[name="description"]').content = desc;
  const id = new URLSearchParams(location.search).get('id');
  document.getElementById('canonical').href = `https://hwik.kr/danji.html?id=${id}`;
  // 첫 번째 평형 선택
  const cats = data.categories || [];
  // 기본 평형: 전용 84㎡(국민평수 34평)에 가장 가까운 것 선택
  if (cats.length > 0 && !currentPyeong) {
    const target = 84;
    let bestCat = cats[0], bestDiff = 999;
    cats.forEach(c => {
      const diff = Math.abs(parseInt(c) - target);
      if (diff < bestDiff) { bestDiff = diff; bestCat = c; }
    });
    currentPyeong = bestCat;
  }
  render();
}

// ── 데이터 로드 (stale-while-revalidate) ──
async function loadData() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { showError('단지 ID가 없습니다'); return; }

  // 1. 캐시 있으면 즉시 렌더 (로딩 스피너 제거)
  const cached = loadCache(id);
  if (cached) {
    applyData(cached.data);
  }

  // 2. Supabase에서 최신 데이터 요청 (5초 타임아웃)
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);

    const { data, error } = await sb.from('danji_pages').select('*').eq('id', id).single();
    clearTimeout(timeout);

    if (!error && data) {
      saveCache(id, data);
      applyData(data);
    } else if (!cached) {
      showError('단지 정보를 찾을 수 없습니다');
    }
  } catch (e) {
    // 네트워크 에러 — 캐시 있으면 그대로, 없으면 에러
    if (!cached) showError('네트워크 오류. 잠시 후 다시 시도해주세요.');
  }
}

// ── 렌더링 ──
function render() {
  const d = DATA;
  if (!d) return;

  const cats = d.categories || [];
  const recent = d.recent_trade || {};
  const high = d.all_time_high || {};
  const subway = d.nearby_subway || [];
  const school = d.nearby_school || [];
  const nearby = d.nearby_complex || [];
  const listings = d.active_listings || [];

  // 지하철/학교 태그
  const tagHtml = [
    ...subway.map(s => `<div class="tag tag-subway">${esc(s.name)} ${walkMin(s.distance)}</div>`),
    ...school.slice(0,2).map(s => `<div class="tag tag-school">${esc(s.name)} ${walkMin(s.distance)}</div>`)
  ].join('');

  // 평형 버튼 — pyeongs_map 있으면 공급면적 표시, 없으면 전용면적
  const pm = d.pyeongs_map || {};
  const pyeongHtml = cats.map(c => {
    let label;
    if (pm[c] && pm[c].supply > 0) {
      const supplyPy = Math.round(pm[c].supply / 3.3058);
      label = `${supplyPy}평(${Math.round(pm[c].supply)}㎡)`;
    } else {
      label = `전용 ${c}㎡`;
    }
    const active = c === currentPyeong ? ' active' : '';
    return `<div class="pyeong-btn${active}" data-cat="${esc(c)}">${esc(label)}</div>`;
  }).join('');

  // 현재 평형 기준 지표
  const tradeKey = currentPyeong;
  const jeonseKey = currentPyeong + '_jeonse';
  const wolseKey = currentPyeong + '_wolse';

  let recentData, highData;
  if (currentTab === '매매') {
    recentData = recent[tradeKey];
    highData = high[tradeKey];
  } else if (currentTab === '전세') {
    recentData = recent[jeonseKey];
    highData = high[jeonseKey];
  } else {
    recentData = recent[wolseKey];
    highData = null;
  }

  const recentPrice = recentData ? recentData.price : null;
  const highPrice = highData ? highData.price : null;

  // 전세가율
  const jeonseData = recent[jeonseKey];
  const saleData = recent[tradeKey];
  let jeonseRate = d.jeonse_rate;
  if (jeonseData && saleData && saleData.price > 0) {
    jeonseRate = Math.round(jeonseData.price / saleData.price * 1000) / 10;
  }

  // 지표 변화량 (역대최고 대비)
  let changeHtml = '';
  if (recentPrice && highPrice) {
    const diff = recentPrice - highPrice;
    if (diff < 0) changeHtml = `<div class="metric-change down">▼ ${formatPrice(Math.abs(diff))}</div>`;
    else if (diff > 0) changeHtml = `<div class="metric-change up">▲ ${formatPrice(diff)}</div>`;
    else changeHtml = `<div class="metric-change neutral">보합</div>`;
  }

  // 최근 거래 목록 (현재 선택 평형 + 탭 기준)
  const tradeKeyFull = currentPyeong + (currentTab === '전세' ? '_jeonse' : (currentTab === '월세' ? '_wolse' : ''));
  const ph = (d.price_history || {})[tradeKeyFull] || [];
  const pyNum = getCurrentPy();
  const pyLabel = pyNum > 0 ? currentPyeong + '㎡(' + pyNum + '평)' : (currentPyeong ? currentPyeong + '㎡' : '');

  // price_history에 개별 거래가 있으면 그걸 사용
  let tradeItems = [];
  if (ph.length > 0 && ph[0].date) {
    tradeItems = ph.slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
  } else {
    // 폴백: recent_trade에서 현재 키만
    const val = recent[tradeKeyFull];
    if (val) tradeItems = [val];
  }

  const tradeListHtml = tradeItems.slice(0,5).map(t => `
    <div class="trade-item">
      <div>
        <div class="trade-price">${formatPrice(t.price)}</div>
        <div class="trade-detail">${pyLabel}${t.floor ? ' · ' + t.floor + '층' : ''}</div>
      </div>
      <div class="trade-date">${esc(t.date || '')}</div>
    </div>
  `).join('');

  // 휙 매물
  const listingCount = {};
  listings.forEach(l => { listingCount[l.type] = (listingCount[l.type]||0) + 1; });
  const listingBadge = Object.entries(listingCount).map(([k,v]) => `${k} ${v}`).join(' · ');
  const listingHtml = listings.slice(0,3).map(l => `
    <div class="listing-item" onclick="location.href='property_view.html?id=${esc(l.id)}'">
      <div>
        <div class="trade-price">${esc(l.type)} ${formatPrice(l.price)}</div>
        <div class="trade-detail">${l.floor ? l.floor+'층' : ''} ${l.area ? '· '+l.area+'㎡' : ''} ${l.move_in ? '· '+esc(l.move_in) : ''}</div>
      </div>
      <div class="listing-link">상세보기</div>
    </div>
  `).join('');

  // 주변 단지 (현재 선택 평형 기준으로 비교)
  const curArea = parseInt(currentPyeong) || 84;
  const myPrice = recentPrice;
  const nearbyFiltered = nearby.map(n => {
    const prices = n.prices || {};
    // 현재 평형 ±10㎡ 내에서 가장 가까운 평형 찾기
    let bestKey = null, bestDiff = 999;
    for (const k of Object.keys(prices)) {
      const diff = Math.abs(parseInt(k) - curArea);
      if (diff <= 10 && diff < bestDiff) { bestDiff = diff; bestKey = k; }
    }
    if (!bestKey) return null; // 비슷한 평형 없으면 제외
    const p = prices[bestKey];
    return { ...n, matchedPrice: p.price, matchedExclu: p.exclu, matchedSupply: p.supply };
  }).filter(Boolean);

  const nearbyHtml = nearbyFiltered.map(n => {
    let diffHtml = '';
    if (n.matchedPrice && myPrice) {
      const diff = n.matchedPrice - myPrice;
      if (diff > 0) diffHtml = `<div class="nearby-diff pricier">▲ ${formatPrice(diff)} 비쌈</div>`;
      else if (diff < 0) diffHtml = `<div class="nearby-diff cheaper">▼ ${formatPrice(Math.abs(diff))} 저렴</div>`;
      else diffHtml = `<div class="nearby-diff" style="color:var(--sub)">동일</div>`;
    }
    const areaLabel = n.matchedSupply ? Math.round(n.matchedSupply/3.3058)+'평' : '전용'+n.matchedExclu+'㎡';
    return `
    <div class="nearby-item" onclick="location.href='danji.html?id=${esc(n.id)}'">
      <div>
        <div class="nearby-name">${esc(n.name)}</div>
        <div class="nearby-sub">${esc(n.location)} ${n.distance ? '· '+distText(n.distance) : ''} · ${areaLabel}</div>
      </div>
      <div style="text-align:right">
        <div class="nearby-price">${n.matchedPrice ? formatPrice(n.matchedPrice) : '-'}</div>
        ${diffHtml}
      </div>
    </div>`;
  }).join('');

  // SEO 텍스트 — DB가 아닌 실제 데이터 기반으로 자동 생성
  const seoParts = [];
  // 기본 정보 (확실한 것만)
  const seoBasic = [esc(d.complex_name), '은(는)'];
  if (d.address) seoBasic.push(esc(d.address) + '에 위치한');
  if (d.build_year) seoBasic.push(d.build_year + '년 준공');
  seoBasic.push('아파트입니다.');
  if (d.total_units) seoBasic.push('총 ' + d.total_units.toLocaleString() + '세대 규모입니다.');
  seoParts.push(seoBasic.join(' '));

  // 단지 스펙 (확실한 것만)
  const specParts = [];
  if (d.top_floor) specParts.push('최고 ' + d.top_floor + '층');
  if (parseInt(d.parking || 0) > 0) {
    specParts.push('주차 ' + parseInt(d.parking).toLocaleString() + '대');

  if (d.heating) specParts.push(d.heating);
  if (d.builder) specParts.push('시공 ' + d.builder);
  if (specParts.length > 0) seoParts.push(specParts.join(', ') + '.');

  // 평형 (DB categories 기반)
  if (cats.length > 0) {

  // 학교 (DB nearby_school 기반)

  // 시세 (실제 거래 데이터 기반)

  if (jeonseRate) {

  }

  const seoFull = seoParts.join(' ');
  const seoShort = seoFull.length > 120 ? seoFull.slice(0,120) : seoFull;

  // 조합

  $('#app').innerHTML = `

      <div class="tags">${tagHtml}</div>
    </header>

    <!-- 탭 -->
    <div class="tabs">
      <div class="tab${currentTab==='매매'?' active':''}" data-tab="매매">매매</div>

    <!-- 평형 -->

// ── 차트 (scatter — 점 하나 = 실거래 1건) ──
function drawChart() {
  const canvas = document.getElementById('priceChart');
  if (!canvas) return;

  if (chart) { chart.destroy(); chart = null; }
  if (volumeChart) { volumeChart.destroy(); volumeChart = null; }

  // 월세는 보증금/월세 두 축이라 그래프 불가
  if (currentTab === '월세') {
    canvas.parentElement.innerHTML = '';
    const volCanvas = document.getElementById('volumeChart');
    if (volCanvas) volCanvas.parentElement.innerHTML = '';
    // 거래량/실거래가 타이틀도 숨김
    document.querySelectorAll('.chart-title').forEach(el => el.style.display = 'none');
    return;
  }
  document.querySelectorAll('.chart-title').forEach(el => el.style.display = '');

  const suffix = currentTab === '전세' ? '_jeonse' : (currentTab === '월세' ? '_wolse' : '');
  const key = currentPyeong + (suffix || '');
  const ph = (DATA.price_history || {})[key] || [];

  // price_history: [{date:"2024-03-15", price:131000, floor:12}, ...]
  // 또는 이전 포맷: [{month:"2024-03", avg_price:131000, count:2}, ...]
  let points = [];

  if (ph.length > 0 && ph[0].date) {
    // 신규 포맷: 개별 거래
    points = ph.map(p => ({
      x: p.date,
      y: Math.round(p.price / 100) / 100, // 억 단위
      floor: p.floor || '',
      date: p.date,
      price: p.price,
    }));
  } else if (ph.length > 0 && ph[0].month) {
    // 이전 포맷(월평균) 호환: 점 1개로 표시
    points = ph.map(p => ({
      x: p.month + '-15',
      y: Math.round(p.avg_price / 100) / 100,
      floor: '',
      date: p.month,
      price: p.avg_price,
    }));
  }

  // 폴백: price_history 없으면 현재 평형의 recent_trade만
  if (points.length === 0) {
    const recent = DATA.recent_trade || {};
    const targetKey = key; // currentPyeong + suffix
    for (const [k, v] of Object.entries(recent)) {
      // 현재 선택한 평형+탭에 해당하는 키만
      if (k !== targetKey) continue;
      if (v.price && v.date) {
        points.push({
          x: v.date,
          y: Math.round(v.price / 100) / 100,
          floor: v.floor || '',
          date: v.date,
          price: v.price,
        });
      }
    }
  }

  points.sort((a, b) => a.x.localeCompare(b.x));

  if (points.length === 0) {
    canvas.parentElement.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:12px;color:var(--sub);">거래 데이터가 없습니다</div>';
    return;
  }

  const yValues = points.map(p => p.y);
  const min = Math.floor(Math.min(...yValues) * 0.92);
  const max = Math.ceil(Math.max(...yValues) * 1.05);

  // 점 개수에 따라 크기/투명도 조절
  const ptCount = points.length;
  const ptRadius = ptCount > 200 ? 2.5 : ptCount > 50 ? 3.5 : 5;
  const ptAlpha = ptCount > 200 ? 0.35 : ptCount > 50 ? 0.5 : 0.7;

  chart = new Chart(canvas, {
    type: 'scatter',
    data: {
      datasets: [{
        data: points.map(p => ({ x: p.x, y: p.y })),
        backgroundColor: `rgba(245,200,66,${ptAlpha})`,
        borderColor: 'rgba(245,200,66,0.3)',
        borderWidth: 0.5,
        pointRadius: ptRadius,
        pointHoverRadius: 7,
        pointHoverBackgroundColor: '#f5c842',
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: 'nearest',
        intersect: false,
        axis: 'x',
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          displayColors: false,
          callbacks: {
            title: ctx => {
              const i = ctx[0].dataIndex;
              return points[i].date;
            },
            beforeBody: ctx => {
              const p = points[ctx[0].dataIndex];
              const tabLabel = currentTab || '매매';
              const py = getCurrentPy();
              const pyLabel = py > 0 ? py + '평(전용' + currentPyeong + '㎡)' : '전용 ' + (currentPyeong || '') + '㎡';
              const parts = [tabLabel];
              if (pyLabel) parts.push(pyLabel);
              return parts.join(' · ');
            },
            label: ctx => {
              const p = points[ctx.dataIndex];
              return formatPrice(p.price) + (p.floor ? '  ' + p.floor + '층' : '');
            }
          }
        }
      },
      scales: {
        x: {
          type: 'category',
          labels: [...new Set(points.map(p => p.x))],
          grid: { display: false },
          ticks: {
            font: { size: 10 },
            color: '#aaa',
            maxTicksLimit: 8,
            maxRotation: 0,
            callback: function(val, i) {
              const label = this.getLabelForValue(val);
              if (!label) return '';
              const parts = label.split('-');
              return parts.length >= 2 ? parts[0].slice(2) + '.' + parts[1] : label;
            }
          }
        },
        y: {
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 10 }, color: '#aaa', callback: v => v + '억' },
          min, max
        }
      }
    }
  });

  // ── 거래량 바 차트 ──
  const volCanvas = document.getElementById('volumeChart');
  if (volCanvas && points.length > 1) {
    // 월별 거래 건수 집계
    const monthlyCounts = {};
    points.forEach(p => {
      const ym = p.x.slice(0, 7); // "2025-03"
      monthlyCounts[ym] = (monthlyCounts[ym] || 0) + 1;
    });
    const volMonths = Object.keys(monthlyCounts).sort();
    const volCounts = volMonths.map(m => monthlyCounts[m]);
    const volLabels = volMonths.map(m => { const p = m.split('-'); return p[0].slice(2) + '.' + p[1]; });

    volumeChart = new Chart(volCanvas, {
      type: 'bar',
      data: {
        labels: volLabels,
        datasets: [{
          data: volCounts,
          backgroundColor: 'rgba(245,200,66,0.35)',
          borderRadius: 2,
          barPercentage: 0.6,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ctx.parsed.y + '건' } }
        },
        scales: {
          x: { display: false },
          y: { display: false }
        }
      }
    });
  }
}

// ── JSON-LD 구조화 데이터 (SEO) ──
function injectJsonLd() {
  if (!DATA) return;
  const d = DATA;
  const locParts = (d.location || '').split(' ');
  const guName = locParts[0] || '';
  const canonUrl = `https://hwik.kr/danji.html?id=${new URLSearchParams(location.search).get('id')}`;

  const subway = d.nearby_subway || [];
  const recentFirst = d.categories && d.categories[0] ? (d.recent_trade || {})[d.categories[0]] : null;
  const highFirst = d.categories && d.categories[0] ? (d.all_time_high || {})[d.categories[0]] : null;
  const jeonseFirst = d.categories && d.categories[0] ? (d.recent_trade || {})[d.categories[0] + '_jeonse'] : null;
  let jr = d.jeonse_rate;
  if (jeonseFirst && recentFirst && recentFirst.price > 0) jr = Math.round(jeonseFirst.price / recentFirst.price * 1000) / 10;

  const faq = [
    { q: `${d.complex_name} 최근 실거래가는?`, a: recentFirst ? `${d.complex_name} 최근 매매 실거래가는 ${formatPrice(recentFirst.price)}입니다.${recentFirst.date ? ' ('+recentFirst.date+' 기준)' : ''}` : '최근 거래 내역을 확인 중입니다.' },
    { q: `${d.complex_name} 전세가율은?`, a: jr ? `${d.complex_name}의 전세가율은 약 ${jr}%입니다.` : '전세가율 정보를 확인 중입니다.' },
    { q: `${d.complex_name} 근처 지하철역은?`, a: subway.length > 0 ? subway.map(s => `${s.name}(${s.line || ''}) 도보 ${walkMin(s.distance)}`).join(', ') : '주변 지하철 정보를 확인 중입니다.' },
    { q: `${d.complex_name} 3년 내 최고가는?`, a: highFirst ? `${d.complex_name} 3년 내 최고가는 ${formatPrice(highFirst.price)}입니다.${highFirst.date ? ' ('+highFirst.date+')' : ''}` : '3년 내 최고가 정보를 확인 중입니다.' },
  ];

  const ld = {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Residence",
        "name": d.complex_name,
        "address": { "@type": "PostalAddress", "addressLocality": d.location, "streetAddress": d.address, "addressRegion": "서울특별시", "addressCountry": "KR" },
        "geo": { "@type": "GeoCoordinates", "latitude": d.lat, "longitude": d.lng },
        "description": d.seo_text || '',
        "numberOfRooms": d.total_units,
        "yearBuilt": d.build_year,
      },
      {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "휙", "item": "https://hwik.kr" },
          { "@type": "ListItem", "position": 2, "name": `서울 ${guName}`, "item": `https://hwik.kr/danji.html?gu=${encodeURIComponent(guName)}` },
          { "@type": "ListItem", "position": 3, "name": d.complex_name, "item": canonUrl },
        ]
      },
      {
        "@type": "FAQPage",
        "mainEntity": faq.map(f => ({
          "@type": "Question",
          "name": f.q,
          "acceptedAnswer": { "@type": "Answer", "text": f.a }
        }))
      }
    ]
  };
  const script = document.createElement('script');
  script.type = 'application/ld+json';
  script.textContent = JSON.stringify(ld);
  document.head.appendChild(script);
}

// ── 실행 ──
loadData().then(() => { injectJsonLd(); });
</script>
</body>
</html>
