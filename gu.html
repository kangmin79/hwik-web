<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --dark:#1a1a2e; --yellow:#f5c842; --yellow-dim:rgba(245,200,66,0.15); --yellow-bg:rgba(245,200,66,0.04); --bg:#f8f8fa; --surface:#fff; --card:#f3f4f6; --border:#e5e7eb; --text:#1a1a2e; --sub:#6b7280; --muted:#9ca3af; --red:#e24b4a; --green:#639922; --radius:10px; }
html,body { height:100%; font-family:'Noto Sans KR',-apple-system,sans-serif; background:var(--bg); color:var(--text); }
.wrap { max-width:430px; margin:0 auto; background:var(--surface); min-height:100vh; }
.header { background:var(--dark); padding:16px; }
.header-top { display:flex; align-items:center; gap:12px; }
.logo { width:36px; height:36px; background:var(--yellow); border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:var(--dark); cursor:pointer; }
.header-name { font-size:17px; font-weight:500; color:#fff; }
.header-sub { font-size:12px; color:rgba(255,255,255,0.6); margin-top:2px; }
.breadcrumb { padding:10px 16px; font-size:11px; color:var(--muted); }
.breadcrumb a { color:var(--sub); text-decoration:none; }
.breadcrumb span { margin:0 4px; }
.section { padding:16px; }
.section-title { font-size:14px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.section-title::before { content:''; display:inline-block; width:3px; height:14px; background:var(--yellow); border-radius:2px; }
.metrics { padding:0 16px 12px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.metric { background:var(--card); border-radius:var(--radius); padding:12px; }
.metric-label { font-size:10px; color:var(--sub); margin-bottom:4px; }
.metric-value { font-size:15px; font-weight:500; }
.metric-sub { font-size:10px; color:var(--muted); margin-top:2px; }
.divider { height:8px; background:var(--card); }
.danji-item { display:flex; justify-content:space-between; align-items:center; padding:14px; background:var(--surface); border-radius:var(--radius); cursor:pointer; transition:all .15s; box-shadow:0 1px 4px rgba(0,0,0,0.05); border-left:3px solid var(--yellow); }
.danji-item:active { transform:scale(0.98); }
.danji-name { font-size:13px; font-weight:600; }
.danji-sub { font-size:11px; color:var(--sub); margin-top:2px; }
.danji-price { font-size:14px; font-weight:700; text-align:right; }
.danji-rate { font-size:11px; color:var(--sub); text-align:right; margin-top:2px; }
.dong-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.dong-item { padding:12px; background:var(--card); border-radius:var(--radius); cursor:pointer; transition:all .15s; }
.dong-item:active { transform:scale(0.97); }
.dong-name { font-size:13px; font-weight:500; }
.dong-count { font-size:11px; color:var(--sub); margin-top:2px; }
.gu-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.gu-item { padding:14px; background:var(--card); border-radius:var(--radius); cursor:pointer; transition:all .15s; border-left:3px solid var(--yellow); }
.gu-item:active { transform:scale(0.97); }
.gu-name { font-size:14px; font-weight:600; }
.gu-info { font-size:11px; color:var(--sub); margin-top:4px; }
.trade-item { display:flex; justify-content:space-between; padding:12px 14px; background:var(--surface); border-radius:var(--radius); border-left:3px solid var(--yellow); box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.trade-price { font-size:16px; font-weight:700; }
.trade-detail { font-size:11px; color:var(--sub); margin-top:3px; }
.trade-date { font-size:11px; color:var(--muted); align-self:center; }
.faq-section { padding:16px; }
.faq-item { border-bottom:1px solid var(--border); padding:12px 0; }
.faq-item:last-child { border-bottom:none; }
.faq-q { font-size:13px; font-weight:500; margin-bottom:4px; }
.faq-a { font-size:12px; color:var(--sub); line-height:1.6; }
.seo-section { padding:16px; border-top:1px solid var(--border); background:var(--card); }
.seo-text { font-size:11px; color:var(--muted); line-height:1.7; }
.seo-source { margin-top:8px; font-size:10px; color:var(--muted); }
.cta-section { padding:16px; border-top:1px solid var(--border); }
.btn-primary { width:100%; padding:14px; background:var(--yellow); border:none; border-radius:var(--radius); font-size:14px; font-weight:500; color:var(--dark); cursor:pointer; font-family:inherit; transition:transform .1s; }
.btn-primary:active { transform:scale(0.97); }
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:80vh; gap:12px; }
.loading-spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--yellow); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:13px; color:var(--sub); }
.error { text-align:center; padding:60px 20px; }
.error-msg { font-size:14px; color:var(--sub); }
</style>

<body>
<div class="wrap" id="app">
  <div class="loading"><div class="loading-spinner"></div><div class="loading-text">불러오는 중...</div></div>
</div>
<script>
const sb = supabase.createClient(HWIK_CONFIG.SUPABASE_URL, HWIK_CONFIG.SUPABASE_KEY);
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function formatPrice(m) { if (!m) return '-'; const u=Math.floor(m/10000),r=m%10000; if(u>0&&r>0){const c=Math.floor(r/1000);return c>0?u+'억 '+c+'천':u+'억 '+r;} if(u>0)return u+'억'; return m.toLocaleString()+'만'; }

const GU_LIST = ['종로구','중구','용산구','성동구','광진구','동대문구','중랑구','성북구','강북구','도봉구','노원구','은평구','서대문구','마포구','양천구','강서구','구로구','금천구','영등포구','동작구','관악구','서초구','강남구','송파구','강동구'];

async function loadData() {
  const params = new URLSearchParams(location.search);
  const guName = params.get('name');

  if (!guName) {
    renderGuList();
    return;
  }

  // 구별 상세 페이지
  const { data, error } = await sb.from('danji_pages')
    .select('id,complex_name,location,categories,recent_trade,all_time_high,jeonse_rate,total_units,build_year,nearby_subway')
    .ilike('location', guName + '%')
    .order('complex_name');

  if (error || !data || data.length === 0) {
    document.getElementById('app').innerHTML = '<div class="error"><div style="font-size:48px;margin-bottom:12px;">🏠</div><div class="error-msg">'+esc(guName)+' 데이터가 없습니다</div></div>';
    return;
  }

  renderGuDetail(guName, data);
}

function renderGuList() {
  document.title = '서울 구별 아파트 시세 - 휙';
  document.getElementById('og-title').content = document.title;

  const html = `
    <header class="header"><div class="header-top">
      <a class="logo" href="/" style="text-decoration:none;'">휙</div>
      <div><div class="header-name">서울 아파트 시세</div><div class="header-sub">25개 구별 실거래가</div></div>
    </div></header>
    <nav class="breadcrumb"><a href="/">휙</a><span>&gt;</span>서울 구별 시세</nav>
    <div class="section">
      <div class="section-title">서울 25개 구</div>
      <div class="gu-grid">
        ${GU_LIST.map(g => `<a class="gu-item" style="text-decoration:none;color:inherit;" href='gu.html?name=${encodeURIComponent(g)}'"><div class="gu-name">${esc(g)}</div><div class="gu-info">아파트 시세 보기 →</div></div>`).join('')}
      </div>
    </div>
    <div class="seo-section"><div class="seo-text">서울 25개 구의 아파트 실거래가, 전세가, 시세 추이를 확인하세요. 국토교통부 실거래가 공개시스템 데이터 기반.</div><div class="seo-source">데이터 출처: 국토교통부 실거래가 공개시스템 · 매일 업데이트</div></div>
  `;
  document.getElementById('app').innerHTML = html;
  injectJsonLd(null, null);
}

function renderGuDetail(guName, data) {
  document.title = guName + ' 아파트 실거래가 시세 - 휙';
  const desc = guName + ' 아파트 ' + data.length + '개 단지 실거래가, 전세가, 시세 추이를 한눈에 확인하세요.';
  document.getElementById('og-title').content = document.title;
  document.getElementById('og-desc').content = desc;
  document.getElementById('tw-title').content = document.title;
  document.getElementById('tw-desc').content = desc;
  document.getElementById('meta-desc').content = desc;
  document.getElementById('meta-keywords').content = guName+' 아파트 시세,'+guName+' 실거래가,'+guName+' 전세,'+guName+' 부동산';
  const pageUrl = 'https://hwik.kr/gu.html?name=' + encodeURIComponent(guName);
  document.getElementById('canonical').href = pageUrl;
  document.getElementById('og-url').content = pageUrl;

  // 집계
  let totalUnits = 0, priceSum = 0, priceCount = 0, jeonseSum = 0, jeonseCount = 0, jrSum = 0, jrCount = 0;
  const trades = [];
  const dongMap = {};

  data.forEach(d => {
    totalUnits += d.total_units || 0;
    const rt = d.recent_trade || {};
    const cats = d.categories || [];

    // 동 분류
    const parts = (d.location || '').split(' ');
    const dong = parts[1] || '';
    if (dong) {
      if (!dongMap[dong]) dongMap[dong] = { count: 0, prices: [] };
      dongMap[dong].count++;
    }

    // 첫 평형 기준 가격
    for (const c of cats) {
      const t = rt[c];
      if (t && t.price) {
        priceSum += t.price;
        priceCount++;
        trades.push({ name: d.complex_name, location: d.location, id: d.id, price: t.price, date: t.date, floor: t.floor, area: c });
        if (dong && dongMap[dong]) dongMap[dong].prices.push(t.price);
        break;
      }
    }

    // 전세가율
    if (d.jeonse_rate && d.jeonse_rate > 0 && d.jeonse_rate < 200) {
      jrSum += d.jeonse_rate;
      jrCount++;
    }
  });

  const avgPrice = priceCount > 0 ? Math.round(priceSum / priceCount) : null;
  const avgJr = jrCount > 0 ? Math.round(jrSum / jrCount * 10) / 10 : null;

  // 최근 거래 정렬
  trades.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  // ㎡당 가격 TOP 10 (전용면적 기준)
  const sqmList = [];
  data.forEach(d => {
    const rt = d.recent_trade || {};
    const cats = d.categories || [];
    for (const c of cats) {
      const t = rt[c];
      const areaNum = parseFloat(c);
      if (t && t.price && areaNum > 0) {
        sqmList.push({ name: d.complex_name, id: d.id, location: d.location, price: t.price, area: c, sqmPrice: Math.round(t.price / areaNum) });
        break;
      }
    }
  });
  sqmList.sort((a, b) => b.sqmPrice - a.sqmPrice);

  // 동 정렬
  const dongList = Object.entries(dongMap).sort((a, b) => b[1].count - a[1].count);

  const html = `
    <header class="header"><div class="header-top">
      <a class="logo" href="/" style="text-decoration:none;'">휙</div>
      <div><h1 class="header-name">${esc(guName)} 아파트 시세</h1><div class="header-sub">${data.length}개 단지 · ${totalUnits.toLocaleString()}세대</div></div>
    </div></header>

    <nav class="breadcrumb"><a href="/">휙</a><span>&gt;</span><a href="gu.html">서울</a><span>&gt;</span>${esc(guName)}</nav>

    <div class="metrics">
      <div class="metric"><div class="metric-label">단지 수</div><div class="metric-value">${data.length}개</div></div>
      <div class="metric"><div class="metric-label">평균 매매가</div><div class="metric-value">${avgPrice ? formatPrice(avgPrice) : '-'}</div></div>
      <div class="metric"><div class="metric-label">평균 전세가율</div><div class="metric-value">${avgJr ? avgJr + '%' : '-'}</div></div>
    </div>

    <div class="divider"></div>

    <!-- 큐레이션 섹션 -->
    ${(() => {
      // 전세가율 높은 TOP 3
      const jrTop = data.filter(d => d.jeonse_rate && d.jeonse_rate > 30 && d.jeonse_rate < 150)
        .sort((a,b) => b.jeonse_rate - a.jeonse_rate).slice(0,3);
      // 최근 거래 활발한 TOP 3 (price_history 개수 기준 → recent_trade 키 개수로 대체)
      const activeTop = data.filter(d => d.recent_trade && Object.keys(d.recent_trade).length > 0)
        .sort((a,b) => Object.keys(b.recent_trade||{}).length - Object.keys(a.recent_trade||{}).length).slice(0,3);

      let html = '';
      if (jrTop.length > 0) {
        html += '<div class="section"><div class="section-title">전세가율 높은 단지</div><div style="display:flex;flex-direction:column;gap:8px;">';
        jrTop.forEach((d,i) => {
          html += '<a class="danji-item" style="text-decoration:none;color:inherit;" href=\\'danji.html?id='+encodeURIComponent(d.id)+'\\'"><div><div class="danji-name">'+(i+1)+'. '+esc(d.complex_name)+'</div><div class="danji-sub">'+esc(d.location)+'</div></div><div><div class="danji-price">'+d.jeonse_rate+'%</div><div class="danji-rate">전세가율</div></div></div>';
        });
        html += '</div></div>';
      }
      if (activeTop.length > 0) {
        html += '<div class="section"><div class="section-title">거래 활발한 단지</div><div style="display:flex;flex-direction:column;gap:8px;">';
        activeTop.forEach((d,i) => {
          const rt = d.recent_trade || {};
          const cats = d.categories || [];
          let price = null;
          for (const c of cats) { if (rt[c] && rt[c].price) { price = rt[c].price; break; } }
          html += '<a class="danji-item" style="text-decoration:none;color:inherit;" href=\\'danji.html?id='+encodeURIComponent(d.id)+'\\'"><div><div class="danji-name">'+(i+1)+'. '+esc(d.complex_name)+'</div><div class="danji-sub">'+esc(d.location)+'</div></div><div><div class="danji-price">'+(price?formatPrice(price):'-')+'</div></div></div>';
        });
        html += '</div>';
      }
      return html;
    })()}

    <div class="divider"></div>

    <div class="section">
      <div class="section-title">동별 단지</div>
      <div class="dong-grid">
        ${dongList.map(([dong, info]) => {
          const avgP = info.prices.length > 0 ? formatPrice(Math.round(info.prices.reduce((a,b)=>a+b,0)/info.prices.length)) : '';
          return `<a class="dong-item" style="text-decoration:none;color:inherit;" href='dong.html?gu=${encodeURIComponent(guName)}&dong=${encodeURIComponent(dong)}'"><div class="dong-name">${esc(dong)}</div><div class="dong-count">${info.count}개 단지${avgP ? ' · 평균 '+avgP : ''}</div></div>`;
        }).join('')}
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="section-title">㎡당 가격 TOP 10 <span style="font-size:10px;color:var(--muted);font-weight:400;">(전용면적 기준)</span></div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${sqmList.slice(0, 10).map((d, i) => `<a class="danji-item" style="text-decoration:none;color:inherit;" href='danji.html?id=${encodeURIComponent(d.id)}'"><div><div class="danji-name">${i+1}. ${esc(d.name)}</div><div class="danji-sub">${esc(d.location)} · 전용${d.area}㎡</div></div><div><div class="danji-price">${formatPrice(d.price)}</div><div class="danji-rate">${formatPrice(d.sqmPrice)}/㎡</div></div></div>`).join('')}
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="section-title">최근 거래</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${trades.slice(0, 10).map(t => `<a class="trade-item" style="text-decoration:none;color:inherit;" href='danji.html?id=${encodeURIComponent(t.id)}'"><div><div class="trade-price">${formatPrice(t.price)}</div><div class="trade-detail">${esc(t.name)} · ${t.area}㎡${t.floor ? ' · '+t.floor+'층' : ''}</div></div><div class="trade-date">${esc(t.date||'')}</div></div>`).join('')}
      </div>
    </div>

    <div class="divider"></div>

    <div class="faq-section">
      <div class="section-title">자주 묻는 질문</div>
      <div class="faq-item"><div class="faq-q">${esc(guName)} 아파트 평균 시세는?</div><div class="faq-a">${esc(guName)} ${data.length}개 단지 평균 매매가는 ${avgPrice ? formatPrice(avgPrice) : '정보 확인 중'}입니다.</div></div>
      ${avgJr ? `<div class="faq-item"><div class="faq-q">${esc(guName)} 전세가율은?</div><div class="faq-a">${esc(guName)} 평균 전세가율은 ${avgJr}%입니다.</div></div>` : ''}
      ${sqmList.length > 0 ? `<div class="faq-item"><div class="faq-q">${esc(guName)}에서 가장 비싼 아파트는?</div><div class="faq-a">전용면적 ㎡당 가격 기준 ${esc(sqmList[0].name)}이(가) ${formatPrice(sqmList[0].sqmPrice)}/㎡으로 가장 높습니다.</div></div>` : ''}
      <div class="faq-item"><div class="faq-q">${esc(guName)} 아파트 단지 수는?</div><div class="faq-a">${esc(guName)}에는 총 ${data.length}개 아파트/오피스텔 단지, ${totalUnits.toLocaleString()}세대가 있습니다.</div></div>
    </div>

    <div class="divider"></div>

    <div class="cta-section">
      <a class="btn-primary" style="display:block;text-align:center;text-decoration:none;" href='mobile-v6.html'">${esc(guName)} 매물 전체보기</a>
    </div>

    <div class="seo-section">
      <div class="seo-text">${esc(guName)}의 아파트 실거래가, 전세가, 시세 추이를 확인하세요. ${data.length}개 단지, ${totalUnits.toLocaleString()}세대 규모. ${avgPrice ? '평균 매매가 '+formatPrice(avgPrice)+'.' : ''} ${avgJr ? '평균 전세가율 '+avgJr+'%.' : ''} 국토교통부 실거래가 공개시스템 데이터 기반.</div>
      <div class="seo-source">데이터 출처: 국토교통부 실거래가 공개시스템 · 매일 업데이트</div>
    </div>
  `;
  document.getElementById('app').innerHTML = html;
  injectJsonLd(guName, data);
}

function injectJsonLd(guName, data) {
  const ld = { "@context": "https://schema.org", "@graph": [] };

  if (guName && data) {
    ld["@graph"].push({
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "휙", "item": "https://hwik.kr" },
        { "@type": "ListItem", "position": 2, "name": "서울 구별 시세", "item": "https://hwik.kr/gu.html" },
        { "@type": "ListItem", "position": 3, "name": guName, "item": "https://hwik.kr/gu.html?name=" + encodeURIComponent(guName) },
      ]
    });
    // ItemList
    ld["@graph"].push({
      "@type": "ItemList",
      "name": guName + " 아파트 시세",
      "numberOfItems": data.length,
      "itemListElement": data.slice(0, 20).map((d, i) => ({
        "@type": "ListItem",
        "position": i + 1,
        "name": d.complex_name,
        "url": "https://hwik.kr/danji.html?id=" + encodeURIComponent(d.id),
      }))
    });
  } else {
    ld["@graph"].push({
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "휙", "item": "https://hwik.kr" },
        { "@type": "ListItem", "position": 2, "name": "서울 구별 시세", "item": "https://hwik.kr/gu.html" },
      ]
    });
  }

  const script = document.createElement('script');
  script.type = 'application/ld+json';
  script.textContent = JSON.stringify(ld);
  document.head.appendChild(script);
}

loadData();
</script>
</body>
</html>
