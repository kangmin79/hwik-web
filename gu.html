<script>
const sb = supabase.createClient(HWIK_CONFIG.SUPABASE_URL, HWIK_CONFIG.SUPABASE_KEY);
// makeSlug → /makeSlug.js (외부 파일)

const REGIONS = {
  seoul:    { label: '서울', sub: '25개 구', list: ['종로구','중구','용산구','성동구','광진구','동대문구','중랑구','성북구','강북구','도봉구','노원구','은평구','서대문구','마포구','양천구','강서구','구로구','금천구','영등포구','동작구','관악구','서초구','강남구','송파구','강동구'] },
  incheon:  { label: '인천', sub: '10개 구·군', list: ['중구','동구','미추홀구','연수구','남동구','부평구','계양구','서구','강화군','옹진군'] },
  gyeonggi: { label: '경기', sub: '40개 시·구', list: ['수원시 장안구','수원시 권선구','수원시 팔달구','수원시 영통구','성남시 수정구','성남시 중원구','성남시 분당구','의정부시','안양시 만안구','안양시 동안구','부천시','평택시','안산시 상록구','안산시 단원구','고양시 덕양구','고양시 일산동구','고양시 일산서구','과천시','구리시','남양주시','오산시','시흥시','군포시','의왕시','하남시','용인시 처인구','용인시 기흥구','용인시 수지구','파주시','이천시','안성시','김포시','화성시','광주시','양주시','포천시','여주시','연천군','가평군','양평군'] },
};

// guName이 어느 지역인지 찾기
function detectRegion(guName) {
  for (const [key, r] of Object.entries(REGIONS)) {
    if (r.list.includes(guName)) return key;
  }
  return 'seoul';
}

async function loadData() {
  const params = new URLSearchParams(location.search);
  const guName = params.get('name');

  if (!guName) {
    renderGuList();
    return;
  }

  // 구별 상세 페이지
  const { data, error } = await sb.from('danji_pages')
    .select('id,complex_name,location,address,categories,recent_trade,all_time_high,jeonse_rate,total_units,build_year,nearby_subway')
    .ilike('location', guName + '%')
    .not('id', 'like', 'offi-%')
    .order('complex_name');

  if (error || !data || data.length === 0) {
    document.getElementById('app').innerHTML = '<div class="error"><div style="font-size:48px;margin-bottom:12px;">🏠</div><div class="error-msg">'+esc(guName)+' 데이터가 없습니다</div></div>';
    return;
  }

  renderGuDetail(guName, data);
}

let currentRegion = 'seoul';

function renderGuList() {
  document.title = '서울·인천·경기 아파트 시세 - 휙';
  document.getElementById('og-title').content = document.title;
  const listUrl = 'https://hwik.kr/gu.html' + (currentRegion !== 'seoul' ? '?tab=' + currentRegion : '');
  document.getElementById('canonical').href = listUrl;
  document.getElementById('og-url').content = listUrl;

  const r = REGIONS[currentRegion];
  const tabsHtml = Object.entries(REGIONS).map(([key, v]) =>
    `<div class="tab${key===currentRegion?' active':''}" onclick="currentRegion='${key}';renderGuList();">${v.label}</div>`
  ).join('');

  const html = `
    <header class="header"><div class="header-top">
      <a class="logo" href="/" style="text-decoration:none;">휙</a>
      <div><div class="header-name">${esc(r.label)} 아파트 시세</div><div class="header-sub">${esc(r.sub)} 실거래가</div></div>
    </div></header>
    <nav class="breadcrumb"><a href="/">휙</a><span>&gt;</span>${esc(r.label)} 시세</nav>
    <div style="display:flex;border-bottom:1px solid var(--border);">
      ${tabsHtml}
    </div>
    <div class="section">
      <div class="section-title">${esc(r.label)} ${esc(r.sub)}</div>
      <div class="gu-grid">
        ${r.list.map(g => `<a class="gu-item" style="text-decoration:none;color:inherit;" href="gu.html?name=${encodeURIComponent(g)}"><div class="gu-name">${esc(g)}</div><div class="gu-info">아파트 시세 보기 →</div></a>`).join('')}
      </div>
    </div>
    <div class="seo-section"><div class="seo-text">${esc(r.label)} ${esc(r.sub)}의 아파트 실거래가, 전세가, 시세 추이를 확인하세요. 국토교통부 실거래가 공개시스템 데이터 기반.</div><div class="seo-source">실거래가 출처: 국토교통부 · 최종 데이터 확인: ${new Date().toISOString().slice(0,10)}</div></div>
  `;
  document.getElementById('app').innerHTML = html;
  injectJsonLd(null, null);
}

function renderGuDetail(guName, data) {
  const regionLabel = REGIONS[detectRegion(guName)].label;
  document.title = guName + ' 아파트 실거래가 시세 - 휙';
  const desc = regionLabel + ' ' + guName + ' 아파트 ' + data.length + '개 단지 실거래가, 전세가, 시세 추이를 한눈에 확인하세요.';
  document.getElementById('og-title').content = document.title;
  document.getElementById('og-desc').content = desc;
  document.getElementById('tw-title').content = document.title;
  document.getElementById('tw-desc').content = desc;
  document.getElementById('meta-desc').content = desc;
  const pageUrl = 'https://hwik.kr/gu.html?name=' + encodeURIComponent(guName);
  document.getElementById('canonical').href = pageUrl;
  document.getElementById('og-url').content = pageUrl;

  // 집계
  let totalUnits = 0, priceSum = 0, priceCount = 0, jeonseSum = 0, jeonseCount = 0, jrSum = 0, jrCount = 0;
  const trades = [];
  const dongMap = {};

  data.forEach(d => {
    totalUnits += d.total_units || 0;
    const rt = d.recent_trade || {};
    const cats = d.categories || [];

    // 동 분류
    const parts = (d.location || '').split(' ');
    const dong = parts[1] || '';
    if (dong) {
      if (!dongMap[dong]) dongMap[dong] = { count: 0, prices: [] };
      dongMap[dong].count++;
    }

    // 첫 평형 기준 가격
    for (const c of cats) {
      const t = rt[c];
      if (t && t.price) {
        priceSum += t.price;
        priceCount++;
        trades.push({ name: d.complex_name, location: d.location, address: d.address, id: d.id, price: t.price, date: t.date, floor: t.floor, area: c });
        if (dong && dongMap[dong]) dongMap[dong].prices.push(t.price);
        break;
      }
    }

    // 전세가율
    if (d.jeonse_rate && d.jeonse_rate > 0 && d.jeonse_rate < 200) {
      jrSum += d.jeonse_rate;
      jrCount++;
    }
  });

  const avgPrice = priceCount > 0 ? Math.round(priceSum / priceCount) : null;
  const avgJr = jrCount > 0 ? Math.round(jrSum / jrCount * 10) / 10 : null;

  // 최근 거래 정렬
  trades.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  // ㎡당 가격 TOP 10 (전용면적 기준)
  const sqmList = [];
  data.forEach(d => {
    const rt = d.recent_trade || {};
    const cats = d.categories || [];
    for (const c of cats) {
      const t = rt[c];
      const areaNum = parseFloat(c);
      if (t && t.price && areaNum > 0) {
        sqmList.push({ name: d.complex_name, id: d.id, location: d.location, address: d.address, price: t.price, area: c, sqmPrice: Math.round(t.price / areaNum) });
        break;
      }
    }
  });
  sqmList.sort((a, b) => b.sqmPrice - a.sqmPrice);

  // 동 정렬
  const dongList = Object.entries(dongMap).sort((a, b) => b[1].count - a[1].count);

  const html = `
    <header class="header"><div class="header-top">
      <a class="logo" href="/" style="text-decoration:none;">휙</a>
      <div><h1 class="header-name">${esc(guName)} 아파트 시세</h1><div class="header-sub">${data.length}개 단지 · ${totalUnits.toLocaleString()}세대</div></div>
    </div></header>

    <nav class="breadcrumb"><a href="/">휙</a><span>&gt;</span><a href="gu.html">${esc(REGIONS[detectRegion(guName)].label)}</a><span>&gt;</span>${esc(guName)}</nav>

    <div class="metrics">
      <div class="metric"><div class="metric-label">단지 수</div><div class="metric-value">${data.length}개</div></div>
      <div class="metric"><div class="metric-label">평균 매매가</div><div class="metric-value">${avgPrice ? formatPrice(avgPrice) : '-'}</div></div>
      <div class="metric"><div class="metric-label">평균 전세가율</div><div class="metric-value">${avgJr ? avgJr + '%' : '-'}</div></div>
    </div>

    <div class="divider"></div>

    <!-- 큐레이션 섹션 -->
    ${(() => {
      // 매매가 높은 TOP 3 (최고가 면적 기준)
      const priceTop = data.map(d => {
        const rt = d.recent_trade || {};
        const cats = d.categories || [];
        let maxPrice = 0;
        for (const c of cats) { if (rt[c] && rt[c].price > maxPrice) maxPrice = rt[c].price; }
        return { d, maxPrice };
      }).filter(r => r.maxPrice > 0)
        .sort((a, b) => b.maxPrice - a.maxPrice).slice(0, 3);

      // 전세가율 높은 TOP 3
      const jrTop = data.filter(d => d.jeonse_rate && d.jeonse_rate > 30 && d.jeonse_rate < 150)
        .sort((a,b) => b.jeonse_rate - a.jeonse_rate).slice(0,3);

      let html = '';
      if (priceTop.length > 0) {
        html += '<div class="section"><div class="section-title">매매가 높은 단지</div><div style="display:flex;flex-direction:column;gap:8px;">';
        priceTop.forEach(({d, maxPrice}, i) => {
          html += '<a class="danji-item" style="text-decoration:none;color:inherit;" href="/danji/'+encodeURIComponent(makeSlug(d.complex_name,d.location,d.id,d.address))+'"><div><div class="danji-name">'+(i+1)+'. '+esc(d.complex_name)+'</div><div class="danji-sub">'+esc(d.location)+'</div></div><div><div class="danji-price">'+formatPrice(maxPrice)+'</div><div class="danji-rate">최고가 기준</div></div></a>';
        });
        html += '</div></div><div class="divider"></div>';
      }
      if (jrTop.length > 0) {
        html += '<div class="section"><div class="section-title">전세가율 높은 단지</div><div style="display:flex;flex-direction:column;gap:8px;">';
        jrTop.forEach((d,i) => {
          html += '<a class="danji-item" style="text-decoration:none;color:inherit;" href="/danji/'+encodeURIComponent(makeSlug(d.complex_name,d.location,d.id,d.address))+'"><div><div class="danji-name">'+(i+1)+'. '+esc(d.complex_name)+'</div><div class="danji-sub">'+esc(d.location)+'</div></div><div><div class="danji-price">'+d.jeonse_rate+'%</div><div class="danji-rate">전세가율</div></div></a>';
        });
        html += '</div></div>';
      }
      return html;
    })()}

    <div class="divider"></div>

    <div class="section">
      <div class="section-title">동별 단지</div>
      <div class="dong-grid">
        ${dongList.map(([dong, info]) => {
          const avgP = info.prices.length > 0 ? formatPrice(Math.round(info.prices.reduce((a,b)=>a+b,0)/info.prices.length)) : '';
          return `<a class="dong-item" style="text-decoration:none;color:inherit;" href="dong.html?gu=${encodeURIComponent(guName)}&dong=${encodeURIComponent(dong)}"><div class="dong-name">${esc(dong)}</div><div class="dong-count">${info.count}개 단지${avgP ? ' · 평균 '+avgP : ''}</div></a>`;
        }).join('')}
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="section-title">㎡당 가격 TOP 10 <span style="font-size:10px;color:var(--muted);font-weight:400;">(전용면적 기준)</span></div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${sqmList.slice(0, 10).map((d, i) => `<a class="danji-item" style="text-decoration:none;color:inherit;" href="/danji/${encodeURIComponent(makeSlug(d.name,d.location,d.id,d.address))}"><div><div class="danji-name">${i+1}. ${esc(d.name)}</div><div class="danji-sub">${esc(d.location)} · 전용${d.area}㎡</div></div><div><div class="danji-price">${formatPrice(d.price)}</div><div class="danji-rate">${formatPrice(d.sqmPrice)}/㎡</div></div></a>`).join('')}
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="section-title">최근 거래</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${trades.slice(0, 10).map(t => `<a class="trade-item" style="text-decoration:none;color:inherit;" href="/danji/${encodeURIComponent(makeSlug(t.name,'',t.id,t.address))}"><div><div class="trade-price">${formatPrice(t.price)}</div><div class="trade-detail">${esc(t.name)} · ${t.area}㎡${t.floor ? ' · '+t.floor+'층' : ''}</div></div><div class="trade-date">${esc(t.date||'')}</div></a>`).join('')}
      </div>
    </div>

    <div class="divider"></div>

    <div class="faq-section">
      <div class="section-title">자주 묻는 질문</div>
      <div class="faq-item"><div class="faq-q">${esc(guName)} 아파트 평균 시세는?</div><div class="faq-a">${esc(guName)} ${data.length}개 단지 평균 매매가는 ${avgPrice ? formatPrice(avgPrice) : '정보 확인 중'}입니다.</div></div>
      ${avgJr ? `<div class="faq-item"><div class="faq-q">${esc(guName)} 전세가율은?</div><div class="faq-a">${esc(guName)} 평균 전세가율은 ${avgJr}%입니다.</div></div>` : ''}
      ${sqmList.length > 0 ? `<div class="faq-item"><div class="faq-q">${esc(guName)}에서 가장 비싼 아파트는?</div><div class="faq-a">전용면적 ㎡당 가격 기준 ${esc(sqmList[0].name)}이(가) ${formatPrice(sqmList[0].sqmPrice)}/㎡으로 가장 높습니다.</div></div>` : ''}
      <div class="faq-item"><div class="faq-q">${esc(guName)} 아파트 단지 수는?</div><div class="faq-a">${esc(guName)}에는 총 ${data.length}개 아파트/오피스텔 단지, ${totalUnits.toLocaleString()}세대가 있습니다.</div></div>
    </div>

    <div class="divider"></div>

    <div class="cta-section">
      <a class="btn-primary" style="display:block;text-align:center;text-decoration:none;" href="mobile-v6.html">${esc(guName)} 매물 전체보기</a>
    </div>

    <div class="seo-section">
      <div class="seo-text">${esc(guName)}의 아파트 실거래가, 전세가, 시세 추이를 확인하세요. ${data.length}개 단지, ${totalUnits.toLocaleString()}세대 규모. ${avgPrice ? '평균 매매가 '+formatPrice(avgPrice)+'.' : ''} ${avgJr ? '평균 전세가율 '+avgJr+'%.' : ''} 국토교통부 실거래가 공개시스템 데이터 기반.</div>
      <div class="seo-source">실거래가 출처: 국토교통부 · 최종 데이터 확인: ${new Date().toISOString().slice(0,10)}</div>
    </div>
  `;
  document.getElementById('app').innerHTML = html;
  injectJsonLd(guName, data);
}

function injectJsonLd(guName, data) {
  const ld = { "@context": "https://schema.org", "@graph": [] };

  if (guName && data) {
    ld["@graph"].push({
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": guName + " 아파트 평균 매매가는?",
          "acceptedAnswer": { "@type": "Answer", "text": guName + " 아파트 실거래가 기반 평균 매매가는 휙(hwik.kr)에서 확인하세요. 국토교통부 실거래가 공개시스템 데이터 기반." }
        },
        {
          "@type": "Question",
          "name": guName + " 아파트 전세가율은?",
          "acceptedAnswer": { "@type": "Answer", "text": guName + " 아파트 전세가율(전세가/매매가 비율)은 hwik.kr/gu.html?name=" + encodeURIComponent(guName) + " 에서 단지별로 확인할 수 있습니다." }
        }
      ]
    });
    const _rLabel = REGIONS[detectRegion(guName)].label;
    ld["@graph"].push({
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "휙", "item": "https://hwik.kr" },
        { "@type": "ListItem", "position": 2, "name": _rLabel + " 구별 시세", "item": "https://hwik.kr/gu.html" },
        { "@type": "ListItem", "position": 3, "name": guName },
      ]
    });
    // ItemList
    ld["@graph"].push({
      "@type": "ItemList",
      "name": guName + " 아파트 시세",
      "numberOfItems": data.length,
      "itemListElement": data.slice(0, 20).map((d, i) => ({
        "@type": "ListItem",
        "position": i + 1,
        "name": d.complex_name,
        "url": "https://hwik.kr/danji/" + encodeURIComponent(makeSlug(d.complex_name, d.location, d.id, d.address)),
      }))
    });
  } else {
    ld["@graph"].push({
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "휙", "item": "https://hwik.kr" },
        { "@type": "ListItem", "position": 2, "name": "서울 구별 시세" },
      ]
    });
  }

  const script = document.createElement('script');
  script.type = 'application/ld+json';
  script.textContent = JSON.stringify(ld);
  document.head.appendChild(script);
}

loadData();
</script>
</body>
</html>
