<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휙 검색 테스트</title>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        h1 { color: #facc15; margin-bottom: 20px; }
        h2 { color: #0ea5e9; margin: 20px 0 10px; font-size: 16px; }
        .test-group { background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .test-item { padding: 10px 0; border-bottom: 1px solid #334155; }
        .test-item:last-child { border-bottom: none; }
        .test-header { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .test-header:hover { opacity: 0.8; }
        .query { font-weight: 700; color: #facc15; min-width: 180px; }
        .expect { color: #94a3b8; font-size: 13px; min-width: 150px; }
        .result { font-weight: 600; min-width: 50px; }
        .count { color: #64748b; font-size: 12px; }
        .pass { color: #4ade80; }
        .fail { color: #f87171; }
        .match-detail { display: none; margin-top: 8px; padding: 10px; background: #0f172a; border-radius: 8px; font-size: 12px; }
        .match-detail.open { display: block; }
        .match-card { padding: 6px 0; border-bottom: 1px solid #1e293b; }
        .match-card:last-child { border-bottom: none; }
        .match-field { display: inline-block; padding: 1px 6px; border-radius: 4px; margin: 1px 2px; font-size: 11px; }
        .match-field.hit { background: rgba(250,204,21,0.2); color: #facc15; border: 1px solid rgba(250,204,21,0.3); }
        .match-field.miss { background: rgba(100,116,139,0.1); color: #475569; }
        .summary { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; gap: 30px; }
        .summary-item { text-align: center; }
        .summary-num { font-size: 32px; font-weight: 800; }
        .summary-label { font-size: 13px; color: #94a3b8; }
        button { padding: 10px 20px; border-radius: 8px; border: none; background: #facc15; color: #0f172a; font-weight: 700; cursor: pointer; font-size: 14px; }
        button:hover { opacity: 0.9; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <h1>휙 검색 기능 테스트 v2</h1>
    <div id="loginArea" style="margin-bottom:16px;padding:12px;background:#1e293b;border-radius:12px;display:flex;align-items:center;gap:12px;">
        <span style="color:#94a3b8">로그인 필요 →</span>
        <button onclick="kakaoLogin()" style="background:#FEE500;color:#000;padding:8px 16px">카카오 로그인</button>
        <span id="loginStatus" style="color:#94a3b8"></span>
    </div>
    <div class="btn-group">
        <button onclick="runAllTests()">전체 테스트 실행</button>
        <button onclick="downloadResults()" style="background:#0ea5e9;color:#fff">결과 다운로드 (TXT)</button>
    </div>
    <div class="summary" id="summary" style="display:none">
        <div class="summary-item"><div class="summary-num" id="totalCount">0</div><div class="summary-label">전체</div></div>
        <div class="summary-item"><div class="summary-num pass" id="passCount">0</div><div class="summary-label">통과</div></div>
        <div class="summary-item"><div class="summary-num fail" id="failCount">0</div><div class="summary-label">실패</div></div>
    </div>
    <div id="results"></div>

<script>
    const SUPABASE_URL = HWIK_CONFIG.SUPABASE_URL;
    const SUPABASE_KEY = HWIK_CONFIG.SUPABASE_KEY;
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    Kakao.init(HWIK_CONFIG.KAKAO_JS_KEY);
    async function kakaoLogin() {
        document.getElementById('loginStatus').textContent = '로그인 중...';
        try {
            await sbClient.auth.signInWithOAuth({ provider: 'kakao', options: { redirectTo: window.location.href } });
        } catch(e) { document.getElementById('loginStatus').textContent = '실패: ' + e.message; }
    }
    sbClient.auth.getSession().then(({ data }) => {
        if (data.session) {
            document.getElementById('loginStatus').textContent = '로그인됨 ✓';
            document.getElementById('loginArea').style.background = '#1a3a2a';
        }
    });

    let allCards = [];
    const _categoryKo = { apartment:'아파트', officetel:'오피스텔', room:'원투룸', commercial:'상가', office:'사무실' };

    function categorizeProperty(text, roomField, area, floor) {
        const r = (roomField || '').toLowerCase();
        if (r.includes('아파트') || r.includes('apt')) return '아파트';
        if (r.includes('오피스텔') || r.includes('officetel')) return '오피스텔';
        if (r.includes('상가') || r.includes('점포')) return '상가';
        if (r.includes('사무실') || r.includes('오피스')) return '사무실';
        if (r.includes('원룸') || r.includes('투룸') || r.includes('빌라') || r.includes('주택')) return '원투룸';
        const t = (text || '').toLowerCase();
        if (t.includes('상가') || t.includes('점포') || t.includes('매장')) return '상가';
        if (t.includes('사무실') || t.includes('업무용')) return '사무실';
        if (t.includes('오피스텔')) return '오피스텔';
        const aptBrands = ['아파트','자이','래미안','힐스테이트','푸르지오','더샵','롯데캐슬','e편한세상','아이파크','sk뷰','엘스','리센츠','트리지움','헬리오시티','올림픽파크','아크로','반포자이','은마','주공','현대아파트','파크리오','한화꿈에그린','우남푸루미아','두산위브','타워팰리스','목동 신시가지','도곡 렉슬','레이크팰리스','포레온'];
        if (aptBrands.some(b => t.includes(b))) return '아파트';
        if (t.includes('원룸') || t.includes('투룸') || t.includes('빌라') || t.includes('연립') || t.includes('주택') || t.includes('다세대')) return '원투룸';
        return '기타';
    }

    // 가격 파싱 (my_cards.html과 동일)
    function _parsePriceToMan(s) {
        if (!s) return null;
        const m1 = s.match(/(\d+)\s*억\s*(\d*)\s*천?/);
        if (m1) return parseInt(m1[1]) * 10000 + (parseInt(m1[2]) || 0) * (s.includes('천') ? 1000 : 0);
        const m2 = s.match(/(\d+)\s*만/);
        if (m2) return parseInt(m2[1]);
        const m3 = s.match(/(\d+)/);
        if (m3) return parseInt(m3[1]);
        return null;
    }

    const _minWords = ['이상','초과','넘는','부터'];
    const _maxWords = ['이하','미만','아래','까지'];

    function _extractPriceConditions(words) {
        let minPrice = null, maxPrice = null;
        const textWords = [];
        for (let i = 0; i < words.length; i++) {
            const w = words[i];
            if (_minWords.includes(w) && i > 0) {
                const price = _parsePriceToMan(words[i-1]);
                if (price) { minPrice = price; textWords.pop(); continue; }
            }
            if (_maxWords.includes(w) && i > 0) {
                const price = _parsePriceToMan(words[i-1]);
                if (price) { maxPrice = price; textWords.pop(); continue; }
            }
            // 붙여쓰기: "3억이상"
            for (const mw of _minWords) {
                if (w.endsWith(mw)) {
                    const price = _parsePriceToMan(w.replace(mw, ''));
                    if (price) { minPrice = price; continue; }
                }
            }
            for (const mw of _maxWords) {
                if (w.endsWith(mw)) {
                    const price = _parsePriceToMan(w.replace(mw, ''));
                    if (price) { maxPrice = price; continue; }
                }
            }
            textWords.push(w);
        }
        return { textWords, minPrice, maxPrice };
    }

    // ★ 매칭 추적 검색 — 어떤 단어가 어떤 필드에서 매칭됐는지 반환
    function localSearchWithTrace(query, cards) {
        const q = query.toLowerCase();
        const allWords = q.split(/\s+/).filter(w => w.length > 0);
        const { textWords: words, minPrice, maxPrice } = _extractPriceConditions(allWords);

        return cards.map(c => {
            const p = c.property || {};
            const pn = c.private_note || {};
            const categoryKo = _categoryKo[p.category] || '';
            const categoryFromFn = categorizeProperty([p.complex, p.location, p.price, p.type].filter(Boolean).join(' '), p.room, p.area, p.floor);

            // 필드별로 분리
            const fields = {
                'type': p.type || '',
                'price': p.price || '',
                'complex': p.complex || '',
                'location': p.location || '',
                'address': p.address || '',
                'area': p.area || '',
                'floor': p.floor || '',
                'room': p.room || '',
                'category': p.category || '',
                'categoryKo': categoryKo,
                'categoryFn': categoryFromFn,
                'features': (p.features || []).join(' '),
                'moveIn': p.moveIn || '',
                'comment': c.agent_comment || '',
                'memo': pn?.memo || '',
                'status': c.trade_status || '계약가능',
            };

            // 각 단어별 매칭 필드 추적
            const wordMatches = {};
            let allMatch = true;
            for (const w of words) {
                const matchedFields = [];
                for (const [fname, fval] of Object.entries(fields)) {
                    if (fval.toLowerCase().includes(w)) {
                        matchedFields.push(fname);
                    }
                }
                wordMatches[w] = matchedFields;
                if (matchedFields.length === 0) allMatch = false;
            }

            // 가격 조건 필터
            if (allMatch && minPrice !== null && (c.price_number || 0) < minPrice) allMatch = false;
            if (allMatch && maxPrice !== null && (c.price_number || 0) > maxPrice) allMatch = false;

            return { card: c, matched: allMatch, wordMatches, fields, minPrice, maxPrice };
        }).filter(r => r.matched);
    }

    // ★ 테스트 케이스 — 현실적 + 가혹한 검색어
    const TEST_CASES = [
        // 기본 단일 검색
        { group: '기본 검색', query: '매매', expect: '매매 매물 포함', check: r => r.length > 0 },
        { group: '기본 검색', query: '전세', expect: '전세 매물 포함', check: r => r.length > 0 },
        { group: '기본 검색', query: '월세', expect: '월세 매물 포함', check: r => r.length > 0 },
        { group: '기본 검색', query: '아파트', expect: '아파트 매물', check: r => r.length > 0 },
        { group: '기본 검색', query: '오피스텔', expect: '오피스텔 매물', check: r => r.length > 0 },
        { group: '기본 검색', query: '상가', expect: '상가 매물', check: r => r.length > 0 },
        { group: '기본 검색', query: '사무실', expect: '사무실 매물', check: r => r.length > 0 },
        { group: '기본 검색', query: '원투룸', expect: '원투룸 매물', check: r => r.length > 0 },

        // 현실적 복합 검색
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '마포 전세 3억', expect: '마포+전세+3억', check: r => r.length > 0 },
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '강남 아파트 매매', expect: '강남+아파트+매매', check: r => r.length > 0 },
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '역세권 풀옵션 원룸', expect: '역세권+풀옵션+원룸', check: r => r.length > 0 },
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '남향 올수리', expect: '남향+올수리', check: r => r.length > 0 },
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '잠실 학군', expect: '잠실+학군', check: r => r.length > 0 },
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '투룸 주차', expect: '투룸+주차', check: r => r.length > 0 },
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '상가 1층', expect: '1층 상가', check: r => r.length > 0 },
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '사무실 강남', expect: '강남 사무실', check: r => r.length > 0 },
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '애견', expect: '애견가능 매물', check: r => r.length > 0 },
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '한강뷰', expect: '한강뷰 매물', check: r => r.length > 0 },
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '신축 오피스텔', expect: '신축+오피스텔', check: r => r.length > 0 },
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '즉시입주 마포', expect: '즉시입주+마포', check: r => r.length > 0 },
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '공덕', expect: '공덕 매물', check: r => r.length > 0 },
        { group: '현실 검색 (중개사가 실제로 칠 법한)', query: '래미안', expect: '래미안 매물', check: r => r.length > 0 },

        // 가혹한 검색 (지저분, 모호, 약어)
        { group: '가혹한 검색 (지저분/모호)', query: '마포 월세 풀옵 역세', expect: '마포+월세+풀옵션+역세권', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '강남 전세 아파트 남향', expect: '4개 조건 AND', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '송파 매매 30평', expect: '송파+매매+30평', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '잠실 엘스', expect: '잠실 엘스 매물', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '반포 한강', expect: '반포+한강뷰', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '코엑스', expect: '코엑스 관련 매물', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '테라스', expect: '테라스 매물', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '복층', expect: '복층 매물', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '루프탑', expect: '루프탑 매물', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '가산', expect: '가산 지역 매물', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '법조', expect: '법조단지 관련', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '계약가능 마포', expect: '마포+계약가능', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '스타트업 사무실', expect: '스타트업 관련 사무실', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '카페', expect: '카페 관련 상가', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '55억', expect: '55억 매물', check: r => r.length > 0 },
        { group: '가혹한 검색 (지저분/모호)', query: '수익률', expect: '수익률 언급 매물', check: r => r.length > 0 },

        // 손님 검색
        { group: '손님 검색', query: '손님', expect: '손님 요청', check: r => r.length > 0 },
        { group: '손님 검색', query: '손님 마포', expect: '마포 손님 요청', check: r => r.length > 0 },
        { group: '손님 검색', query: '손님 강남', expect: '강남 손님 요청', check: r => r.length > 0 },

        // 결과 없어야 정상
        // 가격 조건 검색
        { group: '가격 조건 검색', query: '3억 이상', expect: '3억 이상 매물', check: r => r.length > 0 && r.every(c => (c.price_number||0) >= 30000) },
        { group: '가격 조건 검색', query: '5억 이하', expect: '5억 이하 매물', check: r => r.length > 0 && r.every(c => (c.price_number||0) <= 50000) },
        { group: '가격 조건 검색', query: '3억 이상 아파트', expect: '3억+아파트', check: r => r.length > 0 },
        { group: '가격 조건 검색', query: '10억 이상 매매', expect: '10억+매매', check: r => r.length > 0 },
        { group: '가격 조건 검색', query: '2억 미만 전세', expect: '2억 미만+전세', check: r => r.length > 0 },
        { group: '가격 조건 검색', query: '1억 이하 월세', expect: '1억 이하+월세', check: r => r.length > 0 },

        // 새 지역 검색
        { group: '새 지역 검색', query: '용산', expect: '용산 매물', check: r => r.length > 0 },
        { group: '새 지역 검색', query: '노원', expect: '노원 매물', check: r => r.length > 0 },
        { group: '새 지역 검색', query: '영등포', expect: '영등포 매물', check: r => r.length > 0 },
        { group: '새 지역 검색', query: '광진', expect: '광진 매물', check: r => r.length > 0 },
        { group: '새 지역 검색', query: '여의도', expect: '여의도 매물', check: r => r.length > 0 },

        // 특수 태그
        { group: '특수 태그 검색', query: '초역세권', expect: '초역세권 매물', check: r => r.length > 0 },
        { group: '특수 태그 검색', query: '더블역세권', expect: '더블역세권 매물', check: r => r.length > 0 },
        { group: '특수 태그 검색', query: '드레스룸', expect: '드레스룸 매물', check: r => r.length > 0 },
        { group: '특수 태그 검색', query: '리모델링', expect: '리모델링 매물', check: r => r.length > 0 },
        { group: '특수 태그 검색', query: '공원뷰', expect: '공원뷰 매물', check: r => r.length > 0 },
        { group: '특수 태그 검색', query: '산뷰', expect: '산뷰 매물', check: r => r.length > 0 },

        // 결과 없음
        { group: '결과 없음 (정상)', query: '제주도 바다뷰', expect: '0개', check: r => r.length === 0 },
        { group: '결과 없음 (정상)', query: 'xyz123', expect: '0개', check: r => r.length === 0 },
    ];

    // ★ 로그
    let _fullLog = '';
    function log(msg) { _fullLog += msg + '\n'; }

    function downloadResults() {
        if (!_fullLog) { alert('먼저 테스트를 실행하세요'); return; }
        const blob = new Blob([_fullLog], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `hwik_search_test_${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
    }

    // ★ 테스트 실행
    async function runAllTests() {
        const resultsEl = document.getElementById('results');
        resultsEl.innerHTML = '<div style="color:#94a3b8;padding:20px;text-align:center">매물 데이터 로드 중...</div>';

        const { data, error } = await sbClient
            .from('cards')
            .select('id, property, agent, agent_comment, private_note, trade_status, search_text, price_number, created_at')
            .order('created_at', { ascending: false })
            .limit(500);

        if (error) { resultsEl.innerHTML = `<div class="fail">DB 로드 실패: ${error.message}</div>`; return; }

        allCards = data || [];
        _fullLog = '';
        log(`=== 휙 검색 테스트 v2 ===`);
        log(`날짜: ${new Date().toLocaleString()}`);
        log(`매물: ${allCards.length}개`);
        log('');

        let pass = 0, fail = 0;
        const groups = {};
        const allTestDetails = [];

        for (const tc of TEST_CASES) {
            const traced = localSearchWithTrace(tc.query, allCards);
            const results = traced.map(t => t.card);
            const ok = tc.check(results);
            if (ok) pass++; else fail++;
            if (!groups[tc.group]) groups[tc.group] = [];

            const detail = { ...tc, results, traced, ok };
            groups[tc.group].push(detail);
            allTestDetails.push(detail);

            // 로그
            log(`${ok ? 'PASS' : 'FAIL'} | "${tc.query}" → ${results.length}개 | ${tc.expect}`);
            traced.slice(0, 3).forEach(t => {
                const p = t.card.property || {};
                const matchInfo = Object.entries(t.wordMatches).map(([w, fields]) => `"${w}"→[${fields.join(',')}]`).join(' ');
                log(`  ${p.type||'?'} ${p.price||''} ${p.complex||''} ${p.location||''} | 매칭: ${matchInfo}`);
            });
            if (traced.length > 3) log(`  ... 외 ${traced.length - 3}개`);
            log('');
        }

        // 요약
        document.getElementById('summary').style.display = 'flex';
        document.getElementById('totalCount').textContent = TEST_CASES.length;
        document.getElementById('passCount').textContent = pass;
        document.getElementById('failCount').textContent = fail;

        // HTML 렌더링
        let html = '';
        for (const [groupName, tests] of Object.entries(groups)) {
            html += `<div class="test-group"><h2>${groupName}</h2>`;
            tests.forEach((t, idx) => {
                const uid = `detail_${groupName.replace(/\s/g,'')}_${idx}`;
                html += `<div class="test-item">`;
                html += `<div class="test-header" onclick="document.getElementById('${uid}').classList.toggle('open')">`;
                html += `<span class="result ${t.ok ? 'pass' : 'fail'}">${t.ok ? 'PASS' : 'FAIL'}</span>`;
                html += `<span class="query">"${esc(t.query)}"</span>`;
                html += `<span class="expect">${esc(t.expect)}</span>`;
                html += `<span class="count">${t.results.length}개 ▼</span>`;
                html += `</div>`;

                // 매칭 상세 (접기/펼치기)
                html += `<div class="match-detail" id="${uid}">`;
                if (t.traced.length === 0) {
                    html += `<div style="color:#f87171">매칭된 매물 없음</div>`;
                }
                t.traced.slice(0, 10).forEach(tr => {
                    const p = tr.card.property || {};
                    html += `<div class="match-card">`;
                    html += `<div><strong>${p.type||'?'} ${p.price||''}</strong> ${p.complex||''} · ${p.location||''}</div>`;
                    html += `<div style="margin-top:4px">`;
                    // 각 검색어별 매칭 필드 표시
                    for (const [word, fields] of Object.entries(tr.wordMatches)) {
                        html += `<span style="color:#facc15;margin-right:4px">"${esc(word)}"</span>→ `;
                        if (fields.length > 0) {
                            fields.forEach(f => { html += `<span class="match-field hit">${f}</span>`; });
                        } else {
                            html += `<span class="match-field miss">미매칭</span>`;
                        }
                        html += `&nbsp;&nbsp;`;
                    }
                    html += `</div></div>`;
                });
                if (t.traced.length > 10) html += `<div style="color:#64748b;margin-top:4px">... 외 ${t.traced.length - 10}개</div>`;
                html += `</div></div>`;
            });
            html += '</div>';
        }

        resultsEl.innerHTML = html;
    }
</script>
</body>
</html>
