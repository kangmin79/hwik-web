<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>휙 검색 테스트</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

.card { background: #161b2e; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.06); }
.row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

.btn-blue { background: #3b82f6; color: white; }

.btn-purple { background: #8b5cf6; color: white; }

.tag-ok { background: rgba(16,185,129,0.2); color: #34d399; }
.tag-fail { background: rgba(239,68,68,0.2); color: #f87171; }
.tag-warn { background: rgba(245,158,11,0.2); color: #fbbf24; }

<body>

<h1>휙 검색 분석기</h1>
<p style="color:#888;margin-bottom:20px">매물/손님 생성(+임베딩) → 100개 검색 → 매물별 노출 이유 &amp; 순위 기준 분석</p>

<!-- ===== 1. 로그인 ===== -->
<div class="card">
  <h2 style="margin-top:0">1. 로그인</h2>
  <div id="loginArea" class="row">
    <button onclick="doKakaoLogin()" style="background:#FEE500;color:#3C1E1E;font-size:16px;padding:12px 28px;border:none;border-radius:8px;cursor:pointer;font-weight:600">카카오 로그인</button>
    <span id="localWarning" style="display:none;color:#fbbf24;font-size:13px"></span>
  </div>
  <div id="loggedInArea" class="row" style="display:none">
    <span id="loginStatus" class="status status-ok"></span>
    <button class="btn-red" onclick="doLogout()" style="font-size:12px;padding:6px 14px">로그아웃</button>
  </div>
</div>

<!-- ===== 2. 데이터 생성 ===== -->
<div class="card">
  <h2 style="margin-top:0">2. 테스트 데이터 (삽입 + 임베딩 자동)</h2>
  <div class="row">
    <button class="btn-green" id="btnGenMy" onclick="generateAll()" disabled>매물 3750개 (25구×150) + 손님 250명 생성</button>
    <button class="btn-red" onclick="cleanupTestData()" id="btnCleanup">테스트 데이터 삭제</button>
    <span id="genCount" style="font-size:13px;color:#888"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="genProgress" style="width:0%"></div></div>
  <div class="log" id="genLog">대기 중...</div>
</div>

<!-- ===== 3. 검색 테스트 ===== -->
<div class="card">
  <h2 style="margin-top:0">3. 검색 테스트</h2>
  <div class="row">
    <button class="btn-blue" id="btnRunTest" onclick="runAllTests()" disabled>전체 테스트 실행</button>
    <span id="testProgress" style="font-size:13px;color:#888">0 / --</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="testProgressBar" style="width:0%"></div></div>
</div>

<!-- ===== 3.5 손님 매칭 테스트 ===== -->
<div class="card">
  <h2 style="margin-top:0">3.5 손님 매칭 정확도 테스트</h2>
  <p style="color:#888;font-size:13px;margin-bottom:12px">손님 메모 → match-properties API → 매칭된 매물이 손님 조건에 맞는지 검증</p>
  <div class="row">
    <button class="btn-purple" id="btnMatchTest" onclick="runMatchTest()" disabled>손님 매칭 테스트</button>
    <span id="matchProgress" style="font-size:13px;color:#888">대기</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="matchProgressBar" style="width:0%"></div></div>
  <div id="matchResults" style="display:none;margin-top:12px"></div>
</div>

<!-- ===== 4. 결과 요약 ===== -->
<div class="card" id="resultSummary" style="display:none">
  <h2 style="margin-top:0">4. 결과 요약</h2>
  <div class="summary-grid" id="summaryGrid"></div>
  <div id="catSummary" style="margin-top:12px"></div>
</div>

<!-- ===== 5. 상세 결과 ===== -->
<div class="card" id="resultDetail" style="display:none">
  <h2 style="margin-top:0">5. 상세 결과 — 매물별 노출 이유</h2>
  <div class="row" style="margin-bottom:12px">
    <button class="btn-green" onclick="downloadJSON()">JSON 다운로드</button>
    <button class="btn-blue" onclick="downloadCSV()">CSV 다운로드</button>
    <select id="filterResult" onchange="renderResultTable()">
      <option value="all">전체</option>
      <option value="fail">실패만</option>
      <option value="warn">경고만</option>
      <option value="ok">정상만</option>
      <option value="empty">결과없음</option>
    </select>
  </div>
  <div id="resultBody"></div>
</div>

var SITE_URL = 'https://hwik.kr';

function doKakaoLogin() {
    // 로컬 file:// 에서는 hwik.kr로 리다이렉트
    var redirectUrl = SITE_URL + '/search_test.html';
    sb.auth.signInWithOAuth({ provider: 'kakao', options: { redirectTo: redirectUrl } });
}

async function doLogout() {
    await sb.auth.signOut(); currentUser = null;
    document.getElementById('loginArea').style.display = '';
    document.getElementById('loggedInArea').style.display = 'none';
    enableButtons(false);
}

function onLoginSuccess() {
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('loggedInArea').style.display = 'flex';
    document.getElementById('loginStatus').textContent = currentUser.email || currentUser.id.slice(0,12);
    enableButtons(true);
}

function enableButtons(on) {
    document.getElementById('btnGenMy').disabled = !on;
    document.getElementById('btnRunTest').disabled = !on;
    document.getElementById('btnMatchTest').disabled = !on;
}

// 페이지 로드 시 세션 체크
document.addEventListener('DOMContentLoaded', async function() {
    // 로컬 파일 경고
    if (location.protocol === 'file:') {
        document.getElementById('localWarning').style.display = '';
        document.getElementById('localWarning').textContent = '로컬 파일 → 로그인 시 hwik.kr/search_test.html 로 이동됩니다';
    }

    // 테스트 수 동적 표시
    document.getElementById('testProgress').textContent = '0 / ' + SEARCH_TESTS.length;

    // 세션 체크
    var res = await sb.auth.getSession();
    var session = res.data ? res.data.session : null;
    if (session && session.user) {
        currentUser = session.user;
        onLoginSuccess();
    }
});

function rand(a){return a[Math.floor(Math.random()*a.length)]} function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a} function randFloat(a,b){return+(Math.random()*(b-a)+a).toFixed(3)} function uuid(){return crypto.randomUUID()}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}

function priceText(m){if(m>=10000){var e=Math.floor(m/10000),r=m%10000;if(r>=1000)return e+'억'+Math.floor(r/1000)+'천';if(r>0)return e+'억'+r;return e+'억'}if(m>=1000)return Math.floor(m/1000)+'천'+(m%1000>0?m%1000:'');return''+m}

// ★ 실제 DB 데이터 캐시 (generateAll에서 로드)
var DB_APARTMENTS = []; // apartments 테이블에서 가져온 실제 단지
var DB_SUBWAYS = [];    // facilities 테이블에서 가져온 역
var DB_SCHOOLS = [];    // facilities 테이블에서 가져온 학교

function makeProperty(agentId, category, tradeType, forceDist) {
    var complex='',area='',floor='',room='',price='',priceNum=0,features=[],comment='',location='',lat=0,lng=0,address='',coordType='test';

    // ★ 카테고리별 실제 좌표 기반 배치
    var dist = forceDist || rand(DISTRICTS); // 구 지정 또는 랜덤
    if((category==='apartment'||category==='officetel') && DB_APARTMENTS.length>0){
        // 아파트/오피스텔: 해당 구의 실제 DB 단지 사용
        var guApts = DB_APARTMENTS.filter(function(a){return a.sgg===dist.gu});
        var apt = guApts.length>0 ? rand(guApts) : rand(DB_APARTMENTS);
        complex=apt.kapt_name||'';
        location=(apt.sgg||dist.gu)+' '+(apt.umd_nm||rand(dist.dongs));
        address=apt.doro_juso||('서울시 '+location);
        lat=parseFloat(apt.lat)||0;
        lng=parseFloat(apt.lon)||0;
        coordType='db_match';
        if(category==='officetel') complex=(complex.indexOf('오피스텔')>=0?complex:complex+' 오피스텔');
    } else if(category==='room'){
        // 원투룸/빌라: 해당 구 좌표 근처에 배치
        var dong=rand(dist.dongs);
        lat=dist.lat+randFloat(-0.008,0.008);
        lng=dist.lng+randFloat(-0.008,0.008);
        location=dist.gu+' '+dong;
        address='서울시 '+location;
        coordType='station_nearby';
    } else if(category==='commercial'){
        // 상가: 해당 구 좌표 기반 + 근처 아파트 참조
        var dong=rand(dist.dongs);
        lat=dist.lat+randFloat(-0.006,0.006);
        lng=dist.lng+randFloat(-0.006,0.006);
        location=dist.gu+' '+dong;
        var nearAptName='';
        if(DB_APARTMENTS.length>0){var guApts=DB_APARTMENTS.filter(function(a){return a.sgg===dist.gu});if(guApts.length>0){var na=rand(guApts);nearAptName=na.kapt_name;lat=parseFloat(na.lat)+randFloat(-0.003,0.003);lng=parseFloat(na.lon)+randFloat(-0.003,0.003)}}
        address='서울시 '+location+(nearAptName?' '+nearAptName+' 근처':'');
        coordType='apt_nearby';
    } else if(category==='office'){
        // 사무실: 해당 구 좌표 기반
        var dong=rand(dist.dongs);
        lat=dist.lat+randFloat(-0.005,0.005);
        lng=dist.lng+randFloat(-0.005,0.005);
        location=dist.gu+' '+dong;
        address='서울시 '+location;
        coordType='district_based';
    } else {
        // 폴백
        var dong=rand(dist.dongs);
        location=dist.gu+' '+dong;
        address='서울시 '+location;
        lat=dist.lat+randFloat(-0.01,0.01);
        lng=dist.lng+randFloat(-0.01,0.01);
    }

    // 매물 상세 생성
    if(category==='apartment'){
        if(!complex) complex=rand(APT_NAMES)+(randInt(1,3)>1?'':' '+randInt(1,10)+'차');
        var p=rand([49,59,74,84,101,114,134,162,198]); // 실제 아파트 면적
        area=p+'㎡('+Math.round(p*0.3025)+'평)';
        floor=randInt(1,35)+'층';
        room=rand(['2룸','3룸','4룸','5룸']);
        features=shuffle(FEATURES_POOL).slice(0,randInt(1,5));
        if(tradeType==='매매'){priceNum=randInt(15000,350000);price=priceText(priceNum);comment=complex+' '+priceText(priceNum)+' 매매'}
        else if(tradeType==='전세'){priceNum=randInt(10000,180000);price=priceText(priceNum);comment=complex+' 전세 '+priceText(priceNum)}
        else{var d=randInt(1000,15000),mn=randInt(30,300);priceNum=d;price=priceText(d)+'/'+mn;comment=complex+' 월세 '+priceText(d)+'/'+mn}
    }
    else if(category==='officetel'){
        if(!complex) complex=rand(OFFICETEL_NAMES)+' 오피스텔';
        var p=rand([16,18,21,24,28,33,39,46]);
        area=p+'㎡('+Math.round(p*0.3025)+'평)';
        floor=randInt(1,30)+'층';
        room=rand(['원룸','1.5룸','투룸']);
        features=shuffle(FEATURES_POOL).slice(0,randInt(1,3));
        if(tradeType==='매매'){priceNum=randInt(8000,60000);price=priceText(priceNum);comment='오피스텔 '+complex+' '+priceText(priceNum)+' 매매'}
        else if(tradeType==='전세'){priceNum=randInt(5000,30000);price=priceText(priceNum);comment='오피스텔 '+complex+' 전세 '+priceText(priceNum)}
        else{var d=randInt(300,5000),mn=randInt(25,150);priceNum=d;price=priceText(d)+'/'+mn;comment='오피스텔 '+complex+' 월세 '+priceText(d)+'/'+mn}
    }
    else if(category==='room'){
        complex=rand(VILLA_NAMES);
        var p=rand([10,13,16,18,21,26,33]);
        area=p+'㎡('+Math.round(p*0.3025)+'평)';
        floor=randInt(1,6)+'층';
        room=rand(['원룸','투룸','쓰리룸']);
        features=shuffle(FEATURES_POOL).slice(0,randInt(1,3));
        // 근처 역 이름을 코멘트에 포함 (검색에 도움)
        var nearStation=(DB_SUBWAYS.length>0)?rand(DB_SUBWAYS).name:'';
        if(tradeType==='매매'){priceNum=randInt(5000,35000);price=priceText(priceNum);comment=room+' '+location+' '+priceText(priceNum)+' 매매'+(nearStation?' '+nearStation+' 도보권':'')}
        else if(tradeType==='전세'){priceNum=randInt(3000,18000);price=priceText(priceNum);comment=room+' '+location+' 전세 '+priceText(priceNum)+(nearStation?' '+nearStation+' 근처':'')}
        else{var d=randInt(100,3000),mn=randInt(15,100);priceNum=d;price=priceText(d)+'/'+mn;comment=room+' '+location+' 월세 '+priceText(d)+'/'+mn}
    }
    else if(category==='commercial'){
        var biz=rand(COMMERCIAL_TYPES);
        complex=biz+(randInt(1,3)>1?' 가능':' 추천');
        var p=rand([10,15,20,25,30,40,50,66,99,132]);
        area=p+'㎡('+Math.round(p*0.3025)+'평)';
        floor=rand(['1층','지하1층','2층','1~2층','3층']);
        room='상가';
        features=shuffle(['대로변','코너','주차가능','유동인구多','전면넓음','대형간판','층고높음','화장실남녀분리']).slice(0,randInt(0,3));
        var nearApt=(DB_APARTMENTS.length>0&&randInt(1,2)===1)?rand(DB_APARTMENTS).kapt_name+' 단지 앞':'';
        if(tradeType==='매매'){priceNum=randInt(5000,150000);price=priceText(priceNum);comment=biz+' 상가 '+location+' 매매 '+priceText(priceNum)+(nearApt?' '+nearApt:'')}
        else if(tradeType==='전세'){priceNum=randInt(3000,50000);price=priceText(priceNum);comment='상가 '+location+' 전세 '+priceText(priceNum)+' '+biz+' 추천'+(nearApt?' '+nearApt:'')}
        else{var d=randInt(500,10000),mn=randInt(50,800);priceNum=d;price=priceText(d)+'/'+mn;comment=biz+' 상가 '+location+' 월세 '+priceText(d)+'/'+mn+(nearApt?' '+nearApt:'')}
    }
    else{
        var desc=rand(OFFICE_DESCS);
        complex=desc;
        var p=rand([15,20,25,33,45,60,80,100,132,165]);
        area=p+'㎡('+Math.round(p*0.3025)+'평)';
        floor=randInt(2,25)+'층';
        room='사무실';
        features=shuffle(['역세권','주차가능','엘리베이터','회의실포함','인터넷포함','전용화장실','탕비실','층분리','간판가능']).slice(0,randInt(0,3));
        var nearSt=(DB_SUBWAYS.length>0)?rand(DB_SUBWAYS).name+' 도보 '+randInt(1,10)+'분':'';
        if(tradeType==='매매'){priceNum=randInt(10000,150000);price=priceText(priceNum);comment='사무실 '+location+' 매매 '+priceText(priceNum)+(nearSt?' '+nearSt:'')}
        else if(tradeType==='전세'){priceNum=randInt(3000,40000);price=priceText(priceNum);comment='사무실 '+location+' 전세 '+priceText(priceNum)+(nearSt?' '+nearSt:'')}
        else{var d=randInt(500,8000),mn=randInt(30,500);priceNum=d;price=priceText(d)+'/'+mn;comment='사무실 '+location+' 월세 '+priceText(d)+'/'+mn+(nearSt?' '+nearSt:'')}
    }
    var catKo = CATEGORY_KO[category]||category;
    var searchText = [tradeType,catKo,price,location,complex,area,features.join(' '),comment,address].filter(Boolean).join(' ');
    return {id:uuid(),agent_id:agentId,property:{type:tradeType,price:price,location:location,address:address,complex:complex,area:area,floor:floor,room:room,features:features,moveIn:rand(['즉시입주','협의','2026.04','2026.05','2026.06','2026.07','2026.08']),category:category},agent_comment:comment,price_number:priceNum,trade_status:randInt(1,5)<=4?'계약가능':'계약중',lat:lat,lng:lng,coord_type:coordType,search_text:searchText,style:rand(['a','b','c']),color:rand(['#FF6B35','#3b82f6','#10b981','#8b5cf6']),photos:[],private_note:{memo:'테스트-'+comment,rawText:''},status:'active'};
}

function makeClient(agentId) {
    var dist=rand(DISTRICTS),dong=rand(dist.dongs),tt=rand(['매매','전세','월세']),cat=rand(['apartment','officetel','room','commercial','office']);
    var catKo=CATEGORY_KO[cat]||cat,priceRange='',memo='',feats=shuffle(FEATURES_POOL).slice(0,randInt(0,3));
    var locDetail=randInt(1,3)===1?(dist.gu+' '+dong):dist.gu; // 가끔 동까지 포함
    if(tt==='매매'){var b=cat==='apartment'?randInt(15000,300000):randInt(5000,80000);priceRange=priceText(b)+'~'+priceText(Math.round(b*1.3));memo=locDetail+' '+catKo+' '+tt+' '+priceRange+' 원함. '+rand(['신혼부부','투자','실거주','학군','직장근처','은퇴자금','갈아타기','상속','증여'])}
    else if(tt==='전세'){var b=cat==='apartment'?randInt(10000,150000):randInt(2000,30000);priceRange=priceText(b)+' 이내';memo=locDetail+' 근처 '+catKo+' '+tt+' '+priceRange+'. '+rand(['급구','내년 2월 만기','이번달 입주','가족 거주','회사근처','학교근처','6월까지','다음달 만기'])}
    else{var d=randInt(100,8000),mn=randInt(15,200);priceRange='보증금 '+priceText(d)+' 월세 '+mn+' 이내';memo=locDetail+' '+catKo+' '+tt+' '+priceRange+'. '+rand(['1인가구','사무용','자취','통학','신입사원','프리랜서','외국인','커플','반려동물 있음'])}
    if(feats.length>0) memo+=' '+feats.join(' ')+' 선호';
    return {id:uuid(),agent_id:agentId,property:{type:'손님',price:priceRange,location:locDetail,complex:null,area:null,floor:null,room:null,features:feats,moveIn:rand(['즉시','협의','2026.04','2026.05','2026.06','2026.07']),category:cat},agent_comment:null,price_number:null,trade_status:'계약가능',lat:dist.lat+randFloat(-0.008,0.008),lng:dist.lng+randFloat(-0.008,0.008),search_text:'손님 '+tt+' '+catKo+' '+locDetail+' '+priceRange+' '+memo,private_note:{memo:memo,rawText:memo},style:'a',color:'#3b82f6',photos:[],status:'active'};
}

function makeMessyClient(agentId) {

    var template=rand(MESSY_TEMPLATES);
    var memo=template(dist, gu);
    // 지저분한 메모에서 최소한의 정보 추출 시도 (일부러 불완전하게)
    var tt=null,cat=null;
    if(/매매|ㅁㅁ/.test(memo)) tt='매매';
    else if(/전세|ㅈㅅ|젼세/.test(memo)) tt='전세';
    else if(/월세|ㅇㅅ|웜세/.test(memo)) tt='월세';
    if(/아파트|아빠트|apt/i.test(memo)) cat='apartment';
    else if(/오피스텔|옵텔|officetel/i.test(memo)) cat='officetel';
    else if(/원룸|투룸|빌라/.test(memo)) cat='room';
    else if(/상가|상과|점포|매장/.test(memo)) cat='commercial';
    else if(/사무실|오피스/.test(memo)) cat='office';
    return {id:uuid(),agent_id:agentId,property:{type:'손님',price:'',location:gu,complex:null,area:null,floor:null,room:null,features:[],moveIn:null,category:cat},agent_comment:null,price_number:null,trade_status:'계약가능',lat:dist.lat+randFloat(-0.008,0.008),lng:dist.lng+randFloat(-0.008,0.008),search_text:'손님 '+(tt||'')+' '+(CATEGORY_KO[cat]||'')+' '+gu+' '+memo,private_note:{memo:memo,rawText:memo},style:'a',color:'#3b82f6',photos:[],status:'active'};
}

// ===== 데이터 생성 + 임베딩 자동 =====
async function generateAll() {
    if(!currentUser) return alert('먼저 로그인하세요');
    document.getElementById('btnGenMy').disabled = true;

    var sess = await sb.auth.getSession();
    var token = sess.data && sess.data.session ? sess.data.session.access_token : null;
    if(!token) return alert('세션 토큰 없음 - 다시 로그인');

    var PER_DISTRICT = 150;  // 구별 150개
    var TOTAL_PROPERTIES = DISTRICTS.length * PER_DISTRICT;  // 25구 × 150 = 3750
    var TOTAL_CLIENTS_CLEAN = 100;
    var TOTAL_CLIENTS_MESSY = 100;
    var TOTAL_CLIENTS_EXTRA = 50;
    var TOTAL_ALL = TOTAL_PROPERTIES + TOTAL_CLIENTS_CLEAN + TOTAL_CLIENTS_MESSY + TOTAL_CLIENTS_EXTRA;

    // ===== 0단계: 실제 DB 데이터 로드 (아파트 단지, 역, 학교) =====
    document.getElementById('genLog').textContent = '=== 실제 DB 데이터 로드 중... ===';
    try {
        var aptRes = await sb.from('apartments').select('kapt_name,sgg,umd_nm,lat,lon,doro_juso').limit(5000);
        if(aptRes.data && aptRes.data.length>0) {
            DB_APARTMENTS = aptRes.data;
            addLog('아파트 단지 '+DB_APARTMENTS.length+'개 로드');
        } else { addLog('⚠ 아파트 데이터 없음 — 랜덤 생성 모드'); }

        var subRes = await sb.from('facilities').select('name,latitude,longitude').eq('type','subway').limit(500);
        if(subRes.data && subRes.data.length>0) {
            DB_SUBWAYS = subRes.data;
            addLog('지하철역 '+DB_SUBWAYS.length+'개 로드');
        }

        var schRes = await sb.from('facilities').select('name,latitude,longitude').eq('type','school').limit(500);
        if(schRes.data && schRes.data.length>0) {
            DB_SCHOOLS = schRes.data;
            addLog('학교 '+DB_SCHOOLS.length+'개 로드');
        }
    } catch(e) { addLog('⚠ DB 로드 실패: '+e.message+' — 랜덤 생성 모드'); }
    addLog('');

    // ===== 1단계: 매물 5000개 생성 (25구 × 200개, 실제 단지 데이터 기반) =====
    document.getElementById('genLog').textContent += '\n=== 매물 ' + TOTAL_PROPERTIES + '개 생성 중 (25구 × '+PER_DISTRICT+'개)... ===';
    var cats=['apartment','officetel','room','commercial','office'];
    var types=['매매','전세','월세'];
    // 구별 150개: 아파트60 + 오피스텔30 + 원투룸30 + 상가15 + 사무실15
    var perDistCat = {apartment:60, officetel:30, room:30, commercial:15, office:15};
    var cards=[];
    for(var di=0; di<DISTRICTS.length; di++){
        var dist = DISTRICTS[di];
        for(var ci=0; ci<cats.length; ci++){
            var catCount = perDistCat[cats[ci]];
            for(var i=0; i<catCount; i++){
                var tt = types[i % 3]; // 거래유형 균등 분배
                cards.push(makeProperty(currentUser.id, cats[ci], tt, dist));
            }
        }
    }
    cards = shuffle(cards);
    addLog('생성할 매물: '+cards.length+'개 ('+DISTRICTS.length+'구 × '+PER_DISTRICT+'개)');

    var batchSize=50, inserted=0;
    for(var i=0;i<cards.length;i+=batchSize){
        var batch=cards.slice(i,i+batchSize);
        var res=await sb.from('cards').insert(batch);
        if(res.error){addLog('X 오류: '+res.error.message)}
        else{inserted+=batch.length;for(var j=0;j<batch.length;j++)insertedCardIds.push(batch[j].id)}
        if(inserted % 200 === 0 || inserted === cards.length) {
            setProgress(Math.round(inserted/TOTAL_ALL*30)); // 0~30%
            addLog('  매물 '+inserted+'/'+TOTAL_PROPERTIES);
        }
    }
    addLog('매물 '+inserted+'개 삽입 완료\n');

    // ===== 2단계: 깔끔한 손님 100명 =====
    addLog('=== 깔끔한 손님 '+TOTAL_CLIENTS_CLEAN+'명 생성 중... ===');
    var cleanClients=[];
    for(var i=0;i<TOTAL_CLIENTS_CLEAN;i++) cleanClients.push(makeClient(currentUser.id));
    var clientInserted=0;
    for(var i=0;i<cleanClients.length;i+=batchSize){
        var batch=cleanClients.slice(i,i+batchSize);
        var res=await sb.from('cards').insert(batch);
        if(res.error){addLog('X 손님 오류: '+res.error.message)}
        else{clientInserted+=batch.length;for(var j=0;j<batch.length;j++)insertedCardIds.push(batch[j].id)}
        setProgress(30+Math.round(clientInserted/(TOTAL_CLIENTS_CLEAN+TOTAL_CLIENTS_MESSY)*10)); // 30~40%
    }
    addLog('깔끔한 손님 '+clientInserted+'명 삽입 완료\n');

    // ===== 3단계: 지저분한 손님 100명 =====
    addLog('=== 지저분한 손님 '+TOTAL_CLIENTS_MESSY+'명 생성 중... ===');
    var messyClients=[];
    for(var i=0;i<TOTAL_CLIENTS_MESSY;i++) messyClients.push(makeMessyClient(currentUser.id));
    var messyInserted=0;
    for(var i=0;i<messyClients.length;i+=batchSize){
        var batch=messyClients.slice(i,i+batchSize);
        var res=await sb.from('cards').insert(batch);
        if(res.error){addLog('X 지저분 손님 오류: '+res.error.message)}
        else{messyInserted+=batch.length;for(var j=0;j<batch.length;j++)insertedCardIds.push(batch[j].id)}
        setProgress(35+Math.round(messyInserted/TOTAL_CLIENTS_MESSY*5)); // 35~40%
    }
    addLog('지저분한 손님 '+messyInserted+'명 삽입 완료\n');

    // ===== 3.5단계: 추가 손님 50명 (실전 중개사 스타일) =====
    addLog('=== 추가 손님 50명 생성 중... ===');
    var extraClients=[];
    for(var i=0;i<25;i++) extraClients.push(makeClient(currentUser.id));
    for(var i=0;i<25;i++) extraClients.push(makeMessyClient(currentUser.id));
    var extraInserted=0;
    for(var i=0;i<extraClients.length;i+=batchSize){
        var batch=extraClients.slice(i,i+batchSize);
        var res=await sb.from('cards').insert(batch);
        if(res.error){addLog('X 추가 손님 오류: '+res.error.message)}
        else{extraInserted+=batch.length;for(var j=0;j<batch.length;j++)insertedCardIds.push(batch[j].id)}
    }
    addLog('추가 손님 '+extraInserted+'명 삽입 완료\n');

    // ===== 4단계: 임베딩 자동 생성 =====
    var allCards = cards.concat(cleanClients).concat(messyClients).concat(extraClients);
    addLog('=== 임베딩 생성 중 ('+allCards.length+'개, 약 '+(Math.round(allCards.length*0.15/60))+'분 소요)... ===');
    var embedDone=0, embedFail=0;
    // 동시 요청 3개씩 (속도 3배)
    var concurrency = 3;
    for(var i=0;i<allCards.length;i+=concurrency){
        var batch = allCards.slice(i, i+concurrency);
        var promises = batch.map(function(card) {
            return fetch(SUPABASE_URL+'/functions/v1/embed-card',{
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
                body:JSON.stringify({card_id:card.id,text:card.search_text})
            }).then(function(r){return r.json()}).then(function(d){
                if(d.error) throw new Error(d.error);
                embedDone++;
            }).catch(function(e){embedFail++;if(embedFail<=5)addLog('X 임베딩실패: '+e.message)});
        });
        await Promise.all(promises);
        if((embedDone+embedFail)%100===0 || i+concurrency>=allCards.length){
            addLog('  임베딩 '+(embedDone+embedFail)+'/'+allCards.length+' (성공:'+embedDone+' 실패:'+embedFail+')');
            setProgress(40+Math.round((embedDone+embedFail)/allCards.length*60)); // 40~100%
        }
        await new Promise(function(r){setTimeout(r,50)});
    }

    setProgress(100);
    var totalClients = clientInserted + messyInserted + extraInserted;
    addLog('\n==============================');
    addLog('완료! 매물:'+inserted+' 손님:'+totalClients+'(깔끔:'+clientInserted+' 지저분:'+messyInserted+' 추가:'+extraInserted+') 임베딩:'+embedDone+'/'+allCards.length);
    addLog('==============================');
    addLog('\n구별 '+PER_DISTRICT+'개 분포:');
    addLog('  아파트: 60개/구 ('+60*DISTRICTS.length+'개) — 실제 단지 '+DB_APARTMENTS.length+'개 활용');
    addLog('  오피스텔: 30개/구 ('+30*DISTRICTS.length+'개)');
    addLog('  원투룸: 30개/구 ('+30*DISTRICTS.length+'개)');
    addLog('  상가: 15개/구 ('+15*DISTRICTS.length+'개)');
    addLog('  사무실: 15개/구 ('+15*DISTRICTS.length+'개)');
    addLog('  총: '+DISTRICTS.length+'개 구 × '+PER_DISTRICT+'개 = '+TOTAL_PROPERTIES+'개');
    addLog('  지하철역: '+DB_SUBWAYS.length+'개 | 학교: '+DB_SCHOOLS.length+'개 참조');
    document.getElementById('genCount').textContent = '삽입: '+(inserted+totalClients)+'개 | 임베딩: '+embedDone+'개';
    document.getElementById('btnGenMy').disabled = false;
}

async function cleanupTestData() {
    if(!insertedCardIds.length) return alert('삭제할 테스트 데이터 없음 (이번 세션 생성분만)');
    if(!confirm(insertedCardIds.length+'개 삭제?')) return;
    addLog('\n삭제 중...');
    for(var i=0;i<insertedCardIds.length;i+=50){
        await sb.from('cards').delete().in('id',insertedCardIds.slice(i,i+50));
    }
    addLog(insertedCardIds.length+'개 삭제 완료');
    insertedCardIds=[];
    document.getElementById('genCount').textContent='';
}

// ===== 검색 실행 =====
async function runSingleSearch(query, mode) {
    var start = Date.now();
    try {
        var resp = await fetch(SUPABASE_URL+'/functions/v1/search-property', {
            method:'POST',
            headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY},
            body:JSON.stringify({query:query,agent_id:currentUser.id,limit:50,search_mode:mode})
        });
        var data = await resp.json();
        return {
            results: data.results||[],
            parsed: data.parsed||null,
            applied_filters: data.applied_filters||[],
            ranking: data.ranking||'unknown',
            top_score: data.top_score||null,
            time: Date.now()-start,
            error: data.error||null
        };
    } catch(e) {
        return {results:[],parsed:null,applied_filters:[],time:Date.now()-start,error:e.message};
    }
}

// ===== 새 평가 기준 함수 =====
function determineStatus(test, searchResult) {
    var results = searchResult.results;
    var expect = test.expect;
    var parsed = searchResult.parsed;

    // EMPTY: no results
    if (!results || results.length === 0) return 'empty';

    // Check parsing accuracy
    var parseOk = true;
    if (expect.trade_type && (!parsed || !parsed.filters || parsed.filters.trade_type !== expect.trade_type)) parseOk = false;
    if (expect.category && (!parsed || !parsed.filters || parsed.filters.property_type !== expect.category)) parseOk = false;
    if (expect.location && (!parsed || !parsed.filters || !parsed.filters.location)) parseOk = false;

    // Check top 10 match rate
    var top10 = results.slice(0, 10);
    var matchCount = 0;
    for (var i = 0; i < top10.length; i++) {
        if (isResultMatch(top10[i], expect)) matchCount++;
    }
    var matchRate = top10.length > 0 ? Math.round(matchCount / top10.length * 100) : 0;

    // Check ranking quality (top 3 price proximity)
    var rankingOk = true;
    if (expect.max_price || expect.min_price) {
        var targetPrice = expect.max_price || expect.min_price;
        var top3 = results.slice(0, 3);
        var priceMatchCount = 0;
        for (var i = 0; i < top3.length; i++) {
            var pn = top3[i].price_number || 0;
            if (pn > 0 && Math.abs(pn - targetPrice) / targetPrice <= 0.3) priceMatchCount++;
        }
        if (top3.length > 0 && priceMatchCount === 0) rankingOk = false;
    }

    // Determine status
    if (matchRate >= 30 && parseOk) return 'ok';
    if (matchRate > 0 || (parseOk && results.length > 0)) return 'warn';
    return 'fail';
}

function isResultMatch(r, expect) {
    if (expect.trade_type && r.property && r.property.type !== expect.trade_type) return false;
    if (expect.category && r.property && r.property.category !== expect.category) return false;
    if (expect.location) {
        var loc = (r.property && r.property.location) || r.search_text || '';
        if (!loc.includes(expect.location)) return false;
    }
    if (expect.max_price && r.price_number && r.price_number > expect.max_price * 1.1) return false;
    if (expect.min_price && r.price_number && r.price_number < expect.min_price * 0.9) return false;
    if (expect.feature) {
        var feats = (r.property && r.property.features) ? r.property.features.join(' ') : '';
        var st = r.search_text || '';
        if (!feats.includes(expect.feature) && !st.includes(expect.feature)) return false;
    }
    if (expect.complex) {
        var complex = (r.property && r.property.complex) || '';
        var st = r.search_text || '';
        if (!complex.includes(expect.complex) && !st.includes(expect.complex)) return false;
    }
    return true;
}

// ===== 매물별 노출 이유 분석 =====
function analyzeResultDetailed(test, searchResult) {
    var results = searchResult.results;
    var expect = test.expect;
    var parsed = searchResult.parsed;

    // 서버 해석 요약
    var serverInterpretation = '(파싱 데이터 없음)';
    if (parsed && parsed.filters) {
        var f = parsed.filters;
        var parts = [];
        if(f.trade_type) parts.push('거래:'+f.trade_type);
        if(f.property_type) parts.push('종류:'+f.property_type);
        if(f.min_price) parts.push('min:'+f.min_price);
        if(f.max_price) parts.push('max:'+f.max_price);
        if(f.location) parts.push('지역:'+f.location);
        if(f.nearby) parts.push('근처:'+f.nearby);
        if(f.sort) parts.push('정렬:'+f.sort);
        if(f.trade_status) parts.push('상태:'+f.trade_status);
        if(parsed.semantic) parts.push('벡터:"'+parsed.semantic+'"');
        if(parsed.features&&parsed.features.length) parts.push('특징:'+parsed.features.join(','));
        serverInterpretation = parts.join(' | ');
    }

    // 정렬 방식 판별
    var sortMethod = '유사도순(기본)';
    if(parsed&&parsed.filters){
        var s=parsed.filters.sort;
        if(s==='newest')sortMethod='최신순';
        else if(s==='price_asc')sortMethod='가격낮은순';
        else if(s==='price_desc')sortMethod='가격높은순';
        else if(!s){
            if(parsed.filters.date_filter)sortMethod='최신순(자동)';
            else if(parsed.filters.min_price||parsed.filters.max_price)sortMethod='가격낮은순(자동)';
        }
    }

    // 파싱 정확도 체크
    var parseOk = true;
    if (expect.trade_type && (!parsed || !parsed.filters || parsed.filters.trade_type !== expect.trade_type)) parseOk = false;
    if (expect.category && (!parsed || !parsed.filters || parsed.filters.property_type !== expect.category)) parseOk = false;
    if (expect.location && (!parsed || !parsed.filters || !parsed.filters.location)) parseOk = false;

    // 랭킹 품질 체크 (상위 3개 가격 근접도)
    var rankingOk = true;
    if (expect.max_price || expect.min_price) {
        var targetPrice = expect.max_price || expect.min_price;
        var top3 = results.slice(0, 3);
        var priceMatchCount = 0;
        for (var i = 0; i < top3.length; i++) {
            var pn = top3[i].price_number || 0;
            if (pn > 0 && Math.abs(pn - targetPrice) / targetPrice <= 0.3) priceMatchCount++;
        }
        if (top3.length > 0 && priceMatchCount === 0) rankingOk = false;
    }

    // 매물별 상세 분석 (top 10 기준 매칭률)
    var perItem = [];
    var matchCount = 0;
    var top10MatchCount = 0;

    for (var ri = 0; ri < results.length; ri++) {
        var r = results[ri];
        var checks = {};
        var reasons = [];
        var allMatch = true;

        // 유사도
        var sim = r.similarity != null ? r.similarity : null;
        checks.similarity = sim;
        if(sim !== null) reasons.push('유사도:'+sim.toFixed(3));
        else reasons.push('키워드폴백(유사도없음)');

        // 거래유형
        if(expect.trade_type){
            var match = r.property && r.property.type === expect.trade_type;
            checks.trade_type = match;
            if(!match) allMatch=false;
        }
        // 카테고리
        if(expect.category){
            var cardCat = r.property ? r.property.category : '';
            var match = cardCat === expect.category;
            checks.category = match;
            if(!match) allMatch=false;
        }
        // 가격 (±10% for new criteria)
        if(expect.max_price){
            var pn = r.price_number||0;
            var match = pn <= expect.max_price * 1.1;
            checks.price = match;
            checks.price_val = pn;
            if(!match) allMatch=false;
        }
        if(expect.min_price){
            var pn = r.price_number||0;
            var match = pn >= expect.min_price * 0.9;
            if(checks.price !== undefined) checks.price = checks.price && match;
            else checks.price = match;
            checks.price_val = pn;
            if(!match) allMatch=false;
        }
        // 지역
        if(expect.location){
            var loc = ((r.property||{}).location||'')+' '+((r.property||{}).complex||'')+(r.search_text||'');
            var match = loc.indexOf(expect.location) !== -1;
            checks.location = match;
            if(!match) allMatch=false;
        }
        // 특징
        if(expect.feature){
            var feats = ((r.property||{}).features||[]).join(' ')+' '+(r.search_text||'');
            var match = feats.indexOf(expect.feature) !== -1;
            checks.feature = match;
            if(!match) allMatch=false;
        }
        // 단지명
        if(expect.complex){
            var cx = ((r.property||{}).complex||'')+(r.search_text||'');
            var match = cx.indexOf(expect.complex) !== -1;
            checks.complex = match;
            if(!match) allMatch=false;
        }
        // 거래상태
        if(expect.status){
            var match = (r.trade_status||'계약가능') === expect.status;
            checks.status = match;
            if(!match) allMatch=false;
        }

        // 노출 이유 문장 생성
        var whyShown = [];
        if(sim!==null && sim > 0) whyShown.push('벡터유사도 '+sim.toFixed(3));
        else whyShown.push('키워드매칭');

        // 왜 이 순위?
        var whyRank = sortMethod;
        if(ri===0) whyRank += ' (최상위)';

        if(allMatch) {
            matchCount++;
            if(ri < 10) top10MatchCount++;
        }

        perItem.push({
            rank: ri+1,
            type: (r.property||{}).type||'?',
            category: (r.property||{}).category||'?',
            price: (r.property||{}).price||'?',
            price_number: r.price_number,
            location: (r.property||{}).location||'?',
            complex: (r.property||{}).complex||'',
            similarity: sim,
            score: r._score || null,
            scoreDetail: r._scoreDetail || null,
            checks: checks,
            allMatch: allMatch,
            whyShown: whyShown.join(' + '),
            whyRank: whyRank,
            rankReason: (function(){
                var reasons = [];
                var sd = r._scoreDetail;
                if(!sd) return '점수 없음';
                if(sd.price && sd.price.score >= 40) reasons.push('가격 적합('+sd.price.score+'점)');
                else if(sd.price && sd.price.score < 0) reasons.push('가격 초과('+sd.price.score+'점)');
                else if(sd.price) reasons.push('가격('+sd.price.score+'점)');
                if(sd.area && sd.area.score > 0) reasons.push('면적('+sd.area.score+'점: '+sd.area.reason+')');
                if(sd.room && sd.room.score > 0) reasons.push('방수('+sd.room.score+'점)');
                if(sd.location && sd.location.score > 0) reasons.push('위치('+sd.location.score+'점: '+sd.location.reason+')');
                if(sd.status && sd.status.score > 0) reasons.push(sd.status.value+'('+sd.status.score+'점)');
                if(sd.fresh && sd.fresh.score > 0) reasons.push('최신('+sd.fresh.score+'점: '+sd.fresh.reason+')');
                if(sd.features && sd.features.score > 0) reasons.push('특징('+sd.features.reason+')');
                // What's holding it back
                var negatives = [];
                if(sd.price && sd.price.score < 20) negatives.push('가격 부적합');
                if(sd.location && sd.location.score === 0 && expect.location) negatives.push('위치 불일치');
                if(sd.status && sd.status.score <= 0) negatives.push(sd.status.value);
                if(negatives.length > 0) reasons.push('▼ '+negatives.join(', '));
                return reasons.join(' | ');
            })(),
            trade_status: r.trade_status||'계약가능',
            area: (r.property||{}).area||'?'
        });
    }

    var top10Count = Math.min(results.length, 10);
    var top10MatchRate = top10Count > 0 ? Math.round(top10MatchCount / top10Count * 100) : 0;
    var matchRate = results.length > 0 ? Math.round(matchCount/results.length*100) : 0;

    // 새 평가 기준으로 status 결정
    var status = determineStatus(test, searchResult);

    return {
        matchCount: matchCount,
        matchRate: matchRate,
        top10MatchRate: top10MatchRate,
        status: status,
        totalResults: results.length,
        serverInterpretation: serverInterpretation,
        sortMethod: sortMethod,
        appliedFilters: searchResult.applied_filters,
        parseAccuracy: parseOk,
        rankingQuality: rankingOk,
        ranking: searchResult.ranking || 'unknown',
        topScore: searchResult.top_score || null,
        perItem: perItem
    };
}

// ===== 손님 매칭 정확도 테스트 =====
async function runMatchTest() {
    if(!currentUser) return alert('먼저 로그인하세요');
    document.getElementById('btnMatchTest').disabled = true;
    var prog = document.getElementById('matchProgress');
    var bar = document.getElementById('matchProgressBar');
    var resultDiv = document.getElementById('matchResults');
    prog.textContent = '손님 카드 조회 중...';

    // 1. 내 손님 카드 가져오기
    var clientRes = await sb.from('cards')
        .select('id, property, private_note, search_text, lat, lng')
        .eq('agent_id', currentUser.id)
        .eq('property->>type', '손님')
        .order('created_at', {ascending:false})
        .limit(500);
    var clients = clientRes.data || [];
    if(clients.length === 0) { prog.textContent = '손님 카드 없음'; document.getElementById('btnMatchTest').disabled=false; return; }

    prog.textContent = '0 / ' + clients.length + ' 매칭 중...';
    var results = [];
    var totalScore = 0;

    for(var i = 0; i < clients.length; i++) {
        var client = clients[i];
        var cp = client.property || {};
        var memo = (client.private_note && client.private_note.memo) || '';
        var allText = [cp.price, cp.location, memo, (cp.features||[]).join(' ')].filter(Boolean).join(' ');

        // 손님 조건 추출 (테스트 검증용)
        var expectedTrade = null;
        if(/매매|ㅁㅁ/.test(allText)) expectedTrade = '매매';
        else if(/전세|ㅈㅅ/.test(allText)) expectedTrade = '전세';
        else if(/월세|ㅇㅅ/.test(allText)) expectedTrade = '월세';

        var expectedCat = cp.category || null;

        var expectedLoc = null;
        var locMatch = allText.match(/(강남|서초|송파|마포|용산|성동|광진|영등포|강동|동작|관악|종로|중구|강서|양천|구로|노원|서대문|은평|중랑|도봉|동대문|성북|금천|강북)/);
        if(locMatch) expectedLoc = locMatch[1];
        if(cp.location) { var lm = cp.location.match(/(강남|서초|송파|마포|용산|성동|광진|영등포|강동|동작|관악|종로|중구|강서|양천|구로|노원|서대문|은평|중랑|도봉|동대문|성북|금천|강북)/); if(lm) expectedLoc = lm[1]; }

        var expectedMaxPrice = null;
        var pm = allText.match(/(\d+)\s*억\s*(?:\d*천?)?\s*(?:이내|이하|미만|까지)/);
        if(pm) expectedMaxPrice = parseInt(pm[1]) * 10000;

        // 2. match-properties API 호출
        var start = Date.now();
        var matchData = null;
        try {
            var resp = await fetch(SUPABASE_URL+'/functions/v1/match-properties', {
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY},
                body:JSON.stringify({client_card_id:client.id, agent_id:currentUser.id, limit:10, threshold:0.15})
            });
            matchData = await resp.json();
        } catch(e) { matchData = {error:e.message}; }
        var elapsed = Date.now() - start;

        // 3. 매칭 결과 검증
        var matched = (matchData && matchData.results) || [];
        var checks = { trade:0, category:0, location:0, price:0, total:matched.length };

        for(var j = 0; j < matched.length; j++) {
            var m = matched[j];
            var mp = m.property || {};
            // 거래유형 일치
            if(!expectedTrade || mp.type === expectedTrade) checks.trade++;
            // 카테고리 일치
            if(!expectedCat || mp.category === expectedCat) checks.category++;
            // 지역 일치
            if(!expectedLoc) { checks.location++; }
            else {
                var mLoc = mp.location || '';
                if(mLoc.includes(expectedLoc)) checks.location++;
            }
            // 가격 범위 내
            if(!expectedMaxPrice) { checks.price++; }
            else {
                var pn = m.price_number || 0;
                if(pn <= expectedMaxPrice * 1.2) checks.price++;  // 20% 여유
            }
        }

        var accuracy = matched.length > 0 ? {
            trade: Math.round(checks.trade / matched.length * 100),
            category: Math.round(checks.category / matched.length * 100),
            location: Math.round(checks.location / matched.length * 100),
            price: Math.round(checks.price / matched.length * 100),
        } : { trade:0, category:0, location:0, price:0 };

        var avgAccuracy = matched.length > 0 ? Math.round((accuracy.trade + accuracy.category + accuracy.location + accuracy.price) / 4) : 0;
        totalScore += avgAccuracy;

        var status = 'empty';
        if(matched.length > 0) {
            if(avgAccuracy >= 70) status = 'ok';
            else if(avgAccuracy >= 30) status = 'warn';
            else status = 'fail';
        }

        results.push({
            clientId: client.id,
            memo: memo.slice(0, 80),
            expected: { trade:expectedTrade, cat:expectedCat, loc:expectedLoc, maxPrice:expectedMaxPrice },
            serverParsed: { trade:matchData?.wanted_trade_type, cat:matchData?.wanted_category, loc:matchData?.wanted_location, price:matchData?.wanted_price },
            matchCount: matched.length,
            accuracy: accuracy,
            avgAccuracy: avgAccuracy,
            status: status,
            time: elapsed,
            topResults: matched.slice(0,5).map(function(m){
                return {
                    type:m.property?.type, cat:m.property?.category,
                    loc:m.property?.location, price:m.price_number,
                    complex:m.property?.complex, score:m._score||null,
                    sim:m.similarity,
                    area: m.property?.area,
                    status: m.trade_status
                };
            }),
            error: matchData?.error || null
        });

        bar.style.width = Math.round((i+1)/clients.length*100)+'%';
        prog.textContent = (i+1)+' / '+clients.length+' (평균 정확도: '+Math.round(totalScore/(i+1))+'%)';
        await new Promise(function(r){setTimeout(r,100)});
    }

    // 4. 결과 표시
    var okCount = results.filter(function(r){return r.status==='ok'}).length;
    var warnCount = results.filter(function(r){return r.status==='warn'}).length;
    var failCount = results.filter(function(r){return r.status==='fail'}).length;
    var emptyCount = results.filter(function(r){return r.status==='empty'}).length;
    var avgScore = Math.round(totalScore / results.length);

    var html = '<div class="summary-grid">';
    html += '<div class="summary-item"><div class="summary-num" style="color:#34d399">'+okCount+'</div><div class="summary-label">정확 (≥70%)</div></div>';
    html += '<div class="summary-item"><div class="summary-num" style="color:#fbbf24">'+warnCount+'</div><div class="summary-label">부분 (30~69%)</div></div>';
    html += '<div class="summary-item"><div class="summary-num" style="color:#f87171">'+failCount+'</div><div class="summary-label">부정확 (<30%)</div></div>';
    html += '<div class="summary-item"><div class="summary-num" style="color:#666">'+emptyCount+'</div><div class="summary-label">매칭 없음</div></div>';
    html += '<div class="summary-item"><div class="summary-num" style="color:#8be9fd">'+avgScore+'%</div><div class="summary-label">평균 정확도</div></div>';
    html += '</div>';

    // 항목별 정확도
    var allTrade=0,allCat=0,allLoc=0,allPrice=0,cnt=0;
    results.forEach(function(r){ if(r.matchCount>0){ allTrade+=r.accuracy.trade; allCat+=r.accuracy.category; allLoc+=r.accuracy.location; allPrice+=r.accuracy.price; cnt++; }});
    if(cnt>0){
        html += '<div style="margin:12px 0;font-size:13px">';
        html += '<b>항목별 평균:</b> 거래유형 '+Math.round(allTrade/cnt)+'% | 카테고리 '+Math.round(allCat/cnt)+'% | 지역 '+Math.round(allLoc/cnt)+'% | 가격 '+Math.round(allPrice/cnt)+'%';
        html += '</div>';
    }

    // 상세 테이블
    html += '<div class="table-wrap" style="max-height:60vh"><table>';
    html += '<tr><th>#</th><th>손님 메모</th><th>조건</th><th>서버 파싱</th><th>매칭수</th><th>거래</th><th>카테</th><th>지역</th><th>가격</th><th>평균</th><th>상위 매물</th><th>시간</th></tr>';
    for(var i=0;i<results.length;i++){
        var r = results[i];
        var rowColor = r.status==='ok'?'rgba(16,185,129,0.08)':r.status==='warn'?'rgba(245,158,11,0.08)':r.status==='fail'?'rgba(239,68,68,0.08)':'';
        var exp = r.expected;
        var srv = r.serverParsed || {};
        html += '<tr style="background:'+rowColor+'">';
        html += '<td>'+(i+1)+'</td>';
        html += '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(r.memo)+'">'+esc(r.memo.slice(0,50))+'</td>';
        html += '<td style="font-size:11px">'+(exp.trade||'-')+' '+(exp.cat||'-')+' '+(exp.loc||'-')+' '+(exp.maxPrice?'≤'+exp.maxPrice:'')+'</td>';
        html += '<td style="font-size:11px">'+(srv.trade||'-')+' '+(srv.cat||'-')+' '+(srv.loc||'-')+'</td>';
        html += '<td>'+r.matchCount+'</td>';
        html += '<td><span class="tag '+(r.accuracy.trade>=70?'tag-ok':r.accuracy.trade>=30?'tag-warn':'tag-fail')+'">'+r.accuracy.trade+'%</span></td>';
        html += '<td><span class="tag '+(r.accuracy.category>=70?'tag-ok':r.accuracy.category>=30?'tag-warn':'tag-fail')+'">'+r.accuracy.category+'%</span></td>';
        html += '<td><span class="tag '+(r.accuracy.location>=70?'tag-ok':r.accuracy.location>=30?'tag-warn':'tag-fail')+'">'+r.accuracy.location+'%</span></td>';
        html += '<td><span class="tag '+(r.accuracy.price>=70?'tag-ok':r.accuracy.price>=30?'tag-warn':'tag-fail')+'">'+r.accuracy.price+'%</span></td>';
        html += '<td><b>'+r.avgAccuracy+'%</b></td>';
        html += '<td style="font-size:10px">';
        r.topResults.forEach(function(t){ html += (t.type||'')+' '+(t.loc||'')+' '+(t.complex||'')+' '+(t.price?t.price:'')+'<br>'; });
        html += '</td>';
        html += '<td style="font-size:11px">'+r.time+'ms</td>';
        html += '</tr>';
    }
    html += '</table></div>';

    // JSON 저장 버튼
    html += '<div style="margin-top:12px"><button class="btn-green" onclick="downloadMatchResults()">결과 JSON 저장</button></div>';

    resultDiv.innerHTML = html;
    resultDiv.style.display = 'block';
    document.getElementById('btnMatchTest').disabled = false;

    // 결과 저장용
    window._matchTestResults = {
        test_date: new Date().toISOString(),
        agent_id: currentUser.id,
        total_clients: results.length,
        summary: { ok:okCount, warn:warnCount, fail:failCount, empty:emptyCount, avgAccuracy:avgScore },
        accuracy: cnt>0 ? { trade:Math.round(allTrade/cnt), category:Math.round(allCat/cnt), location:Math.round(allLoc/cnt), price:Math.round(allPrice/cnt) } : {},
        results: results
    };
}

function downloadMatchResults() {
    if(!window._matchTestResults) return alert('테스트 결과 없음');
    var blob = new Blob([JSON.stringify(window._matchTestResults, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'hwik_match_analysis_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
}

// ===== 검색 테스트 =====
async function runAllTests() {
    if(!currentUser) return alert('먼저 로그인하세요');
    document.getElementById('btnRunTest').disabled = true;
    testResults = [];
    var mode = 'my';
    var total = SEARCH_TESTS.length;

    for(var i=0;i<total;i++){
        var test = SEARCH_TESTS[i];
        document.getElementById('testProgress').textContent = (i+1)+' / '+total+' "'+test.query+'"';
        document.getElementById('testProgressBar').style.width = Math.round((i+1)/total*100)+'%';

        var searchResult = await runSingleSearch(test.query, mode);
        var analysis = analyzeResultDetailed(test, searchResult);

        testResults.push({
            index: i+1,
            query: test.query,
            category: test.cat,
            expect: test.expect,
            totalResults: analysis.totalResults,
            matchCount: analysis.matchCount,
            matchRate: analysis.matchRate,
            top10MatchRate: analysis.top10MatchRate,
            status: analysis.status,
            time: searchResult.time,
            error: searchResult.error,
            serverInterpretation: analysis.serverInterpretation,
            sortMethod: analysis.sortMethod,
            appliedFilters: analysis.appliedFilters,
            parsed: searchResult.parsed,
            parseAccuracy: analysis.parseAccuracy,
            rankingQuality: analysis.rankingQuality,
            ranking: analysis.ranking,
            topScore: analysis.topScore,
            perItem: analysis.perItem
        });

        await new Promise(function(r){setTimeout(r,300)});
    }

    document.getElementById('testProgress').textContent = '완료! '+total+'개';
    document.getElementById('btnRunTest').disabled = false;
    showResults();
}

// ===== 결과 표시 =====
function showResults() {
    document.getElementById('resultSummary').style.display = 'block';
    document.getElementById('resultDetail').style.display = 'block';

    var total=testResults.length;
    var ok=0,warn=0,fail=0,empty=0;
    testResults.forEach(function(r){if(r.status==='ok')ok++;else if(r.status==='warn')warn++;else if(r.status==='fail')fail++;else empty++});
    var avgTime = Math.round(testResults.reduce(function(s,r){return s+r.time},0)/total);
    var withR = testResults.filter(function(r){return r.totalResults>0});
    var avgTop10Match = withR.length>0 ? Math.round(withR.reduce(function(s,r){return s+(r.top10MatchRate||0)},0)/withR.length) : 0;

    // 랭킹 방식 집계
    var rankScore=0, rankNewest=0, rankOther=0;
    testResults.forEach(function(r){
        if(r.ranking==='score') rankScore++;
        else if(r.ranking==='newest') rankNewest++;
        else rankOther++;
    });

    document.getElementById('summaryGrid').innerHTML =
        '<div class="summary-item"><div class="summary-num" style="color:#34d399">'+ok+'</div><div class="summary-label">OK (Top10 >=30% + 파싱OK)</div></div>'+
        '<div class="summary-item"><div class="summary-num" style="color:#fbbf24">'+warn+'</div><div class="summary-label">WARN (부분 매칭)</div></div>'+
        '<div class="summary-item"><div class="summary-num" style="color:#f87171">'+fail+'</div><div class="summary-label">FAIL (0% 또는 파싱실패)</div></div>'+
        '<div class="summary-item"><div class="summary-num" style="color:#93c5fd">'+empty+'</div><div class="summary-label">EMPTY (결과없음)</div></div>'+
        '<div class="summary-item"><div class="summary-num">'+avgTop10Match+'%</div><div class="summary-label">평균 Top10 매칭률</div></div>'+
        '<div class="summary-item"><div class="summary-num">'+avgTime+'ms</div><div class="summary-label">평균 응답시간</div></div>'+
        '<div class="summary-item"><div class="summary-num" style="font-size:16px">score:'+rankScore+' / newest:'+rankNewest+' / etc:'+rankOther+'</div><div class="summary-label">랭킹 방식 분포</div></div>';

    // 랭킹 품질 분석
    var allScores = [];
    testResults.forEach(function(t){
        if(t.perItem) t.perItem.forEach(function(p){ if(p.score !== null) allScores.push(p.score); });
    });
    allScores.sort(function(a,b){return b-a});
    var scoreDistribution = {
        excellent: allScores.filter(function(s){return s>=50}).length,
        good: allScores.filter(function(s){return s>=30 && s<50}).length,
        fair: allScores.filter(function(s){return s>=10 && s<30}).length,
        low: allScores.filter(function(s){return s>=0 && s<10}).length,
        negative: allScores.filter(function(s){return s<0}).length,
    };
    var top5Avg = 0, bot5Avg = 0, separation = 0;
    if(allScores.length >= 10) {
        for(var si=0;si<5;si++) top5Avg += allScores[si];
        top5Avg /= 5;
        for(var si=allScores.length-5;si<allScores.length;si++) bot5Avg += allScores[si];
        bot5Avg /= 5;
        separation = allScores.length > 0 ? ((top5Avg - bot5Avg) / allScores.length) : 0;
    }

    // 랭킹 품질 표시 추가
    var rankQualityHtml = '<div class="summary-item"><div class="summary-num" style="font-size:14px">'+scoreDistribution.excellent+'/'+scoreDistribution.good+'/'+scoreDistribution.fair+'/'+scoreDistribution.low+'/'+scoreDistribution.negative+'</div><div class="summary-label">점수분포 (50+/30+/10+/0+/음수)</div></div>';
    rankQualityHtml += '<div class="summary-item"><div class="summary-num" style="font-size:16px">'+top5Avg.toFixed(1)+' vs '+bot5Avg.toFixed(1)+'</div><div class="summary-label">Top5 vs Bottom5 평균점수</div></div>';
    rankQualityHtml += '<div class="summary-item"><div class="summary-num">'+separation.toFixed(3)+'</div><div class="summary-label">랭킹 분리도 (높을수록 좋음)</div></div>';
    document.getElementById('summaryGrid').innerHTML += rankQualityHtml;

    // 카테고리별
    var cats={};
    testResults.forEach(function(r){
        if(!cats[r.category]) cats[r.category]={ok:0,warn:0,fail:0,empty:0,t:0,matchSum:0,matchCnt:0};
        cats[r.category][r.status]++;
        cats[r.category].t++;
        if(r.totalResults>0){ cats[r.category].matchSum+=(r.top10MatchRate||0); cats[r.category].matchCnt++; }
    });
    var h='<h3>카테고리별</h3><table><tr><th>카테고리</th><th>수</th><th style="color:#34d399">OK</th><th style="color:#fbbf24">WARN</th><th style="color:#f87171">FAIL</th><th style="color:#93c5fd">EMPTY</th><th>평균 Top10 매칭률</th></tr>';
    Object.keys(cats).forEach(function(c){
        var d=cats[c];
        var avgM = d.matchCnt>0 ? Math.round(d.matchSum/d.matchCnt) : 0;
        h+='<tr><td>'+c+'</td><td>'+d.t+'</td><td>'+d.ok+'</td><td>'+d.warn+'</td><td>'+d.fail+'</td><td>'+d.empty+'</td><td>'+avgM+'%</td></tr>';
    });
    document.getElementById('catSummary').innerHTML = h+'</table>';

    renderResultTable();
}

function ck(v){return v===true?'<span class="chk">O</span>':v===false?'<span class="cross">X</span>':'<span class="na">-</span>'}
function simBar(v){if(v===null)return'<span class="na">N/A</span>';var pct=Math.round(v*100);var col=pct>=70?'#34d399':pct>=40?'#fbbf24':'#f87171';return'<span class="sim-bar" style="width:'+Math.max(pct*0.6,3)+'px;background:'+col+'"></span>'+pct+'%'}

function renderResultTable() {
    var filter = document.getElementById('filterResult').value;
    var filtered = filter==='all' ? testResults : testResults.filter(function(r){return r.status===filter});
    var html = '';

    filtered.forEach(function(r) {
        var sc = r.status==='ok'?'tag-ok':r.status==='warn'?'tag-warn':r.status==='fail'?'tag-fail':'tag-info';
        var expectStr = Object.keys(r.expect).map(function(k){return k+':'+r.expect[k]}).join(', ');

        html += '<div class="card" style="padding:14px;margin-bottom:10px">';
        // 헤더
        html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
        var parseTag = r.parseAccuracy ? '<span class="tag tag-ok">파싱OK</span>' : '<span class="tag tag-fail">파싱X</span>';
        var rankTag = r.rankingQuality ? '<span class="tag tag-ok">랭킹OK</span>' : '<span class="tag tag-warn">랭킹X</span>';
        html += '<div><strong style="font-size:16px">#'+r.index+' "'+r.query+'"</strong> <span class="tag tag-info">'+r.category+'</span> <span class="tag '+sc+'">Top10:'+(r.top10MatchRate||0)+'% (전체:'+r.matchRate+'% '+r.matchCount+'/'+r.totalResults+')</span> '+parseTag+' '+rankTag+' <span class="tag tag-purple">'+r.time+'ms</span></div>';
        html += '</div>';

        // 서버 해석
        html += '<div class="parsed-box">';
        html += '<b>서버 해석:</b> '+r.serverInterpretation+'<br>';
        html += '<b>정렬기준:</b> '+r.sortMethod+' | <b>적용필터:</b> '+(r.appliedFilters.length?r.appliedFilters.join(', '):'없음');
        html += '<br><b>기대조건:</b> '+(expectStr||'(없음)');
        html += '</div>';

        if(r.error) {
            html += '<div style="color:#f87171;margin-top:8px">에러: '+r.error+'</div>';
        }

        // 매물별 상세
        if(r.perItem.length > 0) {
            html += '<div class="detail-box">';
            html += '<div class="detail-row header"><div>#</div><div>매물정보</div><div>유사도</div><div>점수</div><div>거래</div><div>종류</div><div>가격</div><div>지역</div><div>노출이유 / 순위기준</div></div>';

            var maxShow = 10;
            for(var pi=0;pi<Math.min(r.perItem.length,maxShow);pi++){
                var p = r.perItem[pi];
                var bg = p.allMatch ? 'rgba(16,185,129,0.05)' : 'rgba(239,68,68,0.03)';
                html += '<div class="detail-row" style="background:'+bg+'">';
                html += '<div>'+p.rank+'</div>';
                html += '<div style="font-size:11px"><b>'+p.type+'</b> '+p.category+' '+p.price+' <span style="color:#888">'+p.location+'</span>'+(p.complex?' '+p.complex:'')+'</div>';
                html += '<div>'+simBar(p.similarity)+'</div>';
                html += '<div style="font-size:10px;color:#aaa">'+(p.score!==null?p.score.toFixed(2):'-')+'</div>';
                html += '<div>'+ck(p.checks.trade_type)+'</div>';
                html += '<div>'+ck(p.checks.category)+'</div>';
                html += '<div>'+(p.checks.price!==undefined?ck(p.checks.price)+'<span style="font-size:10px;color:#888"> '+priceText(p.price_number||0)+'</span>':'<span class="na">-</span>')+'</div>';
                html += '<div>'+ck(p.checks.location)+'</div>';
                html += '<div style="font-size:11px;color:#aaa">'+p.whyShown+' | <b>'+p.whyRank+'</b></div>';
                html += '</div>';
            }
            if(r.perItem.length > maxShow) {
                html += '<div style="text-align:center;padding:6px;color:#666;font-size:11px">... 외 '+(r.perItem.length-maxShow)+'건 (다운로드에서 전체 확인)</div>';
            }
            html += '</div>';
        } else if(r.totalResults===0) {
            html += '<div style="color:#888;margin-top:8px;font-size:13px">결과 없음 — 해당 조건의 매물이 없거나 벡터 유사도가 낮음</div>';
        }

        html += '</div>';
    });

    document.getElementById('resultBody').innerHTML = html;
}

// ===== 다운로드 =====
function downloadJSON() {
    var data = {
        test_date: new Date().toISOString(),
        agent_id: currentUser?currentUser.id:null,
        total_tests: testResults.length,
        summary: {
            ok:testResults.filter(function(r){return r.status==='ok'}).length,
            warn:testResults.filter(function(r){return r.status==='warn'}).length,
            fail:testResults.filter(function(r){return r.status==='fail'}).length,
            empty:testResults.filter(function(r){return r.status==='empty'}).length,
        },
        results: testResults.map(function(r){
            return {
                index:r.index, query:r.query, category:r.category, expect:r.expect,
                totalResults:r.totalResults, matchCount:r.matchCount, matchRate:r.matchRate,
                top10MatchRate:r.top10MatchRate,
                status:r.status, time:r.time, error:r.error,
                serverInterpretation:r.serverInterpretation, sortMethod:r.sortMethod,
                appliedFilters:r.appliedFilters,
                parsed:r.parsed,
                parseAccuracy:r.parseAccuracy,
                rankingQuality:r.rankingQuality,
                ranking:r.ranking,
                topScore:r.topScore,
                perItem:r.perItem
            };
        })
    };
    var blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='hwik_search_analysis_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}

function downloadCSV() {
    // 매물별 상세 CSV (모든 결과를 1행=1매물로)
    var headers = ['검색번호','검색어','카테고리','기대조건','순위','매물거래유형','매물카테고리','매물가격','매물가격숫자','매물지역','매물단지','유사도','거래유형일치','카테고리일치','가격일치','지역일치','노출이유','순위기준','서버해석','정렬기준','응답시간(ms)'];
    var rows = [];
    testResults.forEach(function(r){
        if(r.perItem.length===0){
            rows.push([r.index,'"'+r.query+'"',r.category,'"'+Object.keys(r.expect).map(function(k){return k+':'+r.expect[k]}).join(', ')+'"',
                0,'','','','','','','','','','','','결과없음','','"'+r.serverInterpretation+'"',r.sortMethod,r.time]);
        }
        r.perItem.forEach(function(p){
            rows.push([
                r.index,'"'+r.query+'"',r.category,
                '"'+Object.keys(r.expect).map(function(k){return k+':'+r.expect[k]}).join(', ')+'"',
                p.rank,p.type,p.category,'"'+p.price+'"',p.price_number||'','"'+p.location+'"','"'+p.complex+'"',
                p.similarity!==null?p.similarity.toFixed(4):'',
                p.checks.trade_type===true?'O':p.checks.trade_type===false?'X':'-',
                p.checks.category===true?'O':p.checks.category===false?'X':'-',
                p.checks.price===true?'O':p.checks.price===false?'X':'-',
                p.checks.location===true?'O':p.checks.location===false?'X':'-',
                '"'+p.whyShown+'"','"'+p.whyRank+'"',
                '"'+r.serverInterpretation+'"',r.sortMethod,r.time
            ]);
        });
    });
    var csv = '\uFEFF'+headers.join(',')+'\n'+rows.map(function(r){return r.join(',')}).join('\n');
    var blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='hwik_search_analysis_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
