  function edit(id){
    const c=Data.cache.myCards.find(x=>x.id===id);if(!c)return;const p=c.property||{},m=document.getElementById('editModal');if(!m)return;_editNewPhotos=[];
    m.innerHTML=`<div class="modal-content edit-modal"><div class="modal-header">매물 수정<button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('show')">✕</button></div><div class="modal-body">
      <div class="edit-grid"><div class="edit-field"><label>거래유형</label><select id="eType"><option ${p.type==='매매'?'selected':''}>매매</option><option ${p.type==='전세'?'selected':''}>전세</option><option ${p.type==='월세'?'selected':''}>월세</option></select></div><div class="edit-field"><label>가격</label><input id="ePrice" value="${esc(p.price||'')}"></div><div class="edit-field"><label>단지명</label><input id="eComplex" value="${esc(p.complex||'')}"></div><div class="edit-field"><label>위치</label><input id="eLocation" value="${esc(p.location||'')}"></div><div class="edit-field"><label>면적</label><input id="eArea" value="${esc(p.area||'')}"></div><div class="edit-field"><label>층</label><input id="eFloor" value="${esc(p.floor||'')}"></div></div>
      <div class="edit-field" style="margin-top:12px;"><label>특징 태그</label><div class="edit-tags" id="eTags">${(p.features||[]).map(f=>`<span class="edit-chip">${esc(f)} <button onclick="this.parentElement.remove()">✕</button></span>`).join('')}<input class="edit-tag-input" placeholder="태그 추가 (Enter)" onkeydown="if(event.key==='Enter'){event.preventDefault();PanelCards.addTag(this)}"></div></div>
      <div class="edit-field" style="margin-top:12px;"><label>사진</label><div class="edit-photos" id="ePhotos">${(c.photos||[]).map(u=>`<div class="edit-photo-thumb"><img src="${u}"><button onclick="this.parentElement.remove()">✕</button></div>`).join('')}<button class="edit-photo-add" onclick="document.getElementById('ePhotoIn').click()">+</button><input type="file" id="ePhotoIn" accept="image/*" multiple style="display:none" onchange="PanelCards.addPhotos(event)"></div></div>
      <div class="edit-field" style="margin-top:12px;"><label>손님에게 한마디</label><textarea id="eComment" class="edit-textarea">${esc(c.agent_comment||'')}</textarea></div>
      <div class="edit-buttons"><button class="btn-cancel" onclick="this.closest('.modal-overlay').classList.remove('show')">취소</button><button class="btn-primary" style="width:auto;padding:10px 24px;" onclick="PanelCards.saveEdit('${c.id}')">저장</button></div>
    </div></div>`;m.classList.add('show');
  }
  function addPhotos(e){Array.from(e.target.files||[]).forEach(f=>{_editNewPhotos.push(f);const url=URL.createObjectURL(f),cont=document.getElementById('ePhotos'),add=cont?.querySelector('.edit-photo-add');if(add)add.insertAdjacentHTML('beforebegin',`<div class="edit-photo-thumb new"><img src="${url}"><button onclick="this.parentElement.remove()">✕</button></div>`);});e.target.value='';}
  function addTag(inp){const v=inp.value.trim();if(!v)return;inp.insertAdjacentHTML('beforebegin',`<span class="edit-chip">${esc(v)} <button onclick="this.parentElement.remove()">✕</button></span>`);inp.value='';}

  async function saveEdit(id){
    const c=Data.cache.myCards.find(x=>x.id===id);if(!c)return;const prop={...(c.property||{})};
    prop.type=document.getElementById('eType').value;prop.price=document.getElementById('ePrice').value;prop.complex=document.getElementById('eComplex').value;prop.location=document.getElementById('eLocation').value;prop.area=document.getElementById('eArea').value;prop.floor=document.getElementById('eFloor').value;
    prop.features=Array.from(document.querySelectorAll('#eTags .edit-chip')).map(el=>el.textContent.replace('✕','').trim());
    const existPhotos=Array.from(document.querySelectorAll('#ePhotos .edit-photo-thumb:not(.new) img')).map(i=>i.src);
    let newUrls=[];if(_editNewPhotos.length)newUrls=await Data.uploadPhotos(id,_editNewPhotos);
    const coords=await Data.matchCoords(prop);if(coords.lat){prop.lat=coords.lat;prop.lng=coords.lng;}
    const _pf=Data.parsePriceFields(prop.price,prop.type);
    await Auth.sb.from('cards').update({property:prop,photos:[...existPhotos,...newUrls],agent_comment:document.getElementById('eComment').value,price_number:_pf.price_number,deposit:_pf.deposit,monthly_rent:_pf.monthly_rent}).eq('id',id);

  async function chgStatus(id,st){await Data.updateTradeStatus(id,st);Toast.show('상태 변경: '+st);await Data.loadMyCards(0,true);renderList();}

  async function _renderDone(){
    const cards=await Data.loadCompletedCards(),el=document.getElementById('doneList');if(!el)return;
    if(!cards.length){el.innerHTML='<div class="empty"><div class="empty-icon">📊</div>완료된 거래가 없어요</div>';return;}
    const now=new Date(),tm=cards.filter(c=>{const d=new Date(c.updated_at);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}),total=cards.reduce((s,c)=>s+(c.price_number||0),0);
    const lastM=cards.filter(c=>{const d=new Date(c.updated_at),lm=now.getMonth()===0?11:now.getMonth()-1,ly=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();return d.getMonth()===lm&&d.getFullYear()===ly;});

  function _parseNote(text){
    const r={type:'메모',content:text,alert_date:null,hasTime:false,timeStr:'',urgent:false};if(!text)return r;
    const t=text;
    // 타입 판별
    if(/방문|현장|보러|봤|투어|임장|이사|입주|퇴거|명도/.test(t))r.type='방문';
    else if(/상담|전화|통화|연락|문의|콜백|콜|부재|재연락|답장|회신|문자/.test(t))r.type='상담';
    else if(/계약|사인|도장|잔금|입금|중도금|계약금|특약|날인/.test(t))r.type='계약';
    else if(/보내|전송|카톡|소개|공유|휙/.test(t))r.type='매물소개';
    // 긴급
    if(/급|빨리|긴급|ASAP|당장|즉시/.test(t))r.urgent=true;
    // 시간 파싱
    let hour=null,minute=0;
    const pmM=t.match(/오후\s*(\d{1,2})\s*시?\s*(?:(\d{1,2})\s*분|반)?/);
    if(pmM){hour=parseInt(pmM[1]);if(hour<12)hour+=12;minute=pmM[2]?parseInt(pmM[2]):(/오후.*반/.test(t)?30:0);}
    if(hour===null){const amM=t.match(/오전\s*(\d{1,2})\s*시?\s*(?:(\d{1,2})\s*분|반)?/);if(amM){hour=parseInt(amM[1]);minute=amM[2]?parseInt(amM[2]):(/오전.*반/.test(t)?30:0);}}
    if(hour===null){const hm=t.match(/(\d{1,2})\s*시\s*반/);if(hm){hour=parseInt(hm[1]);minute=30;if(hour>=1&&hour<=6&&!/오전|새벽/.test(t))hour+=12;}
      else{const tm=t.match(/(\d{1,2})\s*시\s*(?:(\d{1,2})\s*분)?/);if(tm){hour=parseInt(tm[1]);minute=parseInt(tm[2])||0;if(hour>=1&&hour<=6&&!/오전|새벽/.test(t))hour+=12;}}}
    if(hour===null){if(/새벽/.test(t))hour=6;else if(/아침/.test(t))hour=9;else if(/점심/.test(t))hour=12;else if(/오후/.test(t))hour=14;else if(/저녁/.test(t))hour=18;else if(/퇴근\s*후|퇴근후/.test(t))hour=19;else if(/밤/.test(t))hour=21;}
    if(hour!==null){r.hasTime=true;r.timeStr=hour<12?`오전 ${hour}시${minute?minute+'분':''}`:hour===12?`낮 12시${minute?minute+'분':''}`:`오후 ${hour-12}시${minute?minute+'분':''}`;}
    // 날짜 파싱
    const now=new Date();let bd=null;const dayN={일:0,월:1,화:2,수:3,목:4,금:5,토:6};
    const nwD=t.match(/다음\s*주\s*(일|월|화|수|목|금|토)/);if(nwD){bd=new Date(now);bd.setDate(bd.getDate()+(7-now.getDay())+dayN[nwD[1]]);}
    if(!bd){const twD=t.match(/이번\s*주\s*(일|월|화|수|목|금|토)/);if(twD){bd=new Date(now);const diff=dayN[twD[1]]-now.getDay();bd.setDate(bd.getDate()+(diff>=0?diff:diff+7));}}
    if(!bd){
      if(/오늘/.test(t))bd=new Date(now);
      else if(/내일/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+1);}
      else if(/모레/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+2);}
      else if(/글피/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+3);}
      else if(/주말/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+((6-now.getDay()+7)%7||7));}
      else if(/다음\s*주/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+7);}
      else{const nD=t.match(/(\d+)\s*일\s*[후뒤]/);if(nD){bd=new Date(now);bd.setDate(bd.getDate()+parseInt(nD[1]));}
        if(!bd){const dm=t.match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/);if(dm){const m=parseInt(dm[1])-1,d=parseInt(dm[2]);let y=now.getFullYear();if(m<now.getMonth()||(m===now.getMonth()&&d<now.getDate()))y++;bd=new Date(y,m,d);}}
        if(!bd){const sm=t.match(/(?<!\d)(\d{1,2})\/(\d{1,2})(?!\d)/);if(sm&&parseInt(sm[1])<=12&&parseInt(sm[2])<=31){const m=parseInt(sm[1])-1,d=parseInt(sm[2]);let y=now.getFullYear();if(m<now.getMonth()||(m===now.getMonth()&&d<now.getDate()))y++;bd=new Date(y,m,d);}}
        if(!bd){const dowM=t.match(/(일|월|화|수|목|금|토)\s*요일/);if(dowM){bd=new Date(now);bd.setDate(bd.getDate()+((dayN[dowM[1]]-now.getDay()+7)%7||7));}}
      }
    }
    if(!bd&&/콜백|재연락|다시\s*전화|다시\s*연락|팔로업|follow/i.test(t))bd=new Date(now);
    if(!bd&&hour!==null)bd=new Date(now);
    if(bd){if(hour!==null)bd.setHours(hour,minute,0,0);else bd.setHours(9,0,0,0);r.alert_date=bd.toISOString();}
    return r;
  }

  // ── 손님 카드 재파싱 (수정) ──
  async function editClient(cardId){
    const card=Data.cache.clientCards.find(c=>c.id===cardId)||Hub.current?.data;
    if(!card)return;const p=card.property||{};
    const m=document.getElementById('editModal');if(!m)return;
    m.innerHTML=`<div class="modal-content"><div class="modal-header">손님 정보 수정<button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('show')">✕</button></div><div class="modal-body">
      <textarea id="clientEditText" class="reg-textarea" style="min-height:160px;" placeholder="손님 조건을 다시 입력하세요">${esc(p.rawText||[p.type,p.price,p.location,p.complex,p.area,...(p.features||[])].filter(Boolean).join(' '))}</textarea>
      <div class="edit-buttons"><button class="btn-cancel" onclick="this.closest('.modal-overlay').classList.remove('show')">취소</button><button class="btn-primary" style="width:auto;padding:10px 24px;" id="clientEditBtn" onclick="PanelClient.saveClientEdit('${cardId}')">AI로 재분석</button></div>
    </div></div>`;m.classList.add('show');

  async function saveClientEdit(cardId){
    const text=document.getElementById('clientEditText')?.value?.trim();if(!text)return;
    const btn=document.getElementById('clientEditBtn');btn.textContent='분석 중...';btn.disabled=true;
    try{
      const res=await fetch(`${HWIK_CONFIG.SUPABASE_URL}/functions/v1/parse-property`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+Auth.getToken()},body:JSON.stringify({text})});
      const r=await res.json();if(r.error)throw new Error(r.error);
      // 필요한 필드만 property에 저장 (embedding/search_text 등 제외)
      const property={
        type:r.type||null,price:r.price||null,location:r.location||null,address:r.address||null,
        complex:r.complex||null,area:r.area||null,floor:r.floor||null,room:r.room||null,
        features:r.features||[],moveIn:r.moveIn||null,category:r.category||null,rawText:text
      };
      await Auth.sb.from('cards').update({
        property,
        price_number:r.price_number||null,deposit:r.deposit||null,monthly_rent:r.monthly_rent||null,
        wanted_trade_type:r.wanted_trade_type||null,
        contact_name:r.contact_name||null,contact_phone:r.contact_phone||null,
        embedding:r.embedding||null,search_text:r.search_text||null
      }).eq('id',cardId).eq('agent_id',Auth.user.id);
      document.getElementById('editModal').classList.remove('show');
      Data.updateEmbedding(cardId);Data.updateClientLocation(cardId);
      Toast.show('수정 완료');await Data.loadClientCards(0,true);_renderList();
    }catch(e){Toast.show('저장 실패: '+e.message);}
    btn.textContent='AI로 재분석';btn.disabled=false;
  }

  async function saveContact(cardId){
    const name=document.getElementById('clName')?.value?.trim(),phone=document.getElementById('clPhone')?.value?.trim();
    await Auth.sb.from('cards').update({contact_name:name||null,contact_phone:phone||null}).eq('id',cardId);
    Toast.show('저장 완료');
    // 허브 현재 데이터 업데이트
    if(Hub.current?.data?.id===cardId){Hub.current.data.contact_name=name;Hub.current.data.contact_phone=phone;}
  }

  return { render, setSort, onQ, onQEnter, renderSub, pvNote, saveNote, noteDel, noteDone, reMatch, editClient, saveClientEdit, saveContact };
})();

const PanelAlert = (() => {
  let calYear, calMonth, calAlerts=[];

  async function render(el){
    const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth()+1;
    const alerts=await Data.loadAlerts();
    let h=`<div class="panel-inner">${Hub.panelHead('알림')}`;

    // 지연 일정
    if(alerts.overdue.length){h+=`<div class="section-label" style="color:#ef4444;">지연된 일정 (${alerts.overdue.length})</div>`;alerts.overdue.forEach(a=>h+=`<div class="alert-item"><div class="alert-dot" style="background:#ef4444;"></div><div><div class="alert-text">${esc(a.content||a.type||'일정')}</div><div class="alert-date">${new Date(a.alert_date).toLocaleDateString('ko-KR')} (지연)</div></div></div>`);}
    // 매칭 알림
    if(alerts.matches.length){h+=`<div class="section-label" style="color:var(--primary);">매칭 알림 (${alerts.matches.length})</div>`;alerts.matches.forEach(m=>h+=`<div class="alert-item"><div class="alert-dot" style="background:${m.is_read?'#94a3b8':'var(--primary)'}"></div><div><div class="alert-text">🏠 매칭 매물 발견</div><div class="alert-date">${new Date(m.created_at).toLocaleDateString('ko-KR')}</div></div></div>`);}
    // 메모
    if(alerts.memos.length){h+=`<div class="section-label" style="color:#f59e0b;">모바일 메모 (${alerts.memos.length})</div>`;alerts.memos.forEach(m=>h+=`<div class="alert-item" style="${m.is_read?'opacity:0.5':''}"><div class="alert-dot" style="background:${m.is_read?'#94a3b8':'#f59e0b'}"></div><div><div class="alert-text">${esc(m.content||'메모')}</div><div class="alert-date">${new Date(m.created_at).toLocaleDateString('ko-KR')}</div></div></div>`);}

    if(!alerts.overdue.length&&!alerts.matches.length&&!alerts.memos.length)h+='<div class="empty"><div class="empty-icon">🔔</div>새 알림이 없어요</div>';

    // 달력
    h+=`<div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px;"><div class="cal-header"><button class="cal-nav" onclick="PanelAlert.calNav(-1)">◀</button><div class="cal-title" id="calTitle">${calYear}년 ${calMonth}월</div><button class="cal-nav" onclick="PanelAlert.calNav(1)">▶</button></div><div id="calGrid"></div></div></div>`;
    el.innerHTML=h;
    await _renderCal();
  }

  async function _renderCal(){
    calAlerts=await Data.loadCalendarAlerts(calYear,calMonth);
    document.getElementById('calTitle').textContent=`${calYear}년 ${calMonth}월`;
    const grid=document.getElementById('calGrid');if(!grid)return;
    const first=new Date(calYear,calMonth-1,1),last=new Date(calYear,calMonth,0);
    const startDay=first.getDay(),days=last.getDate(),today=new Date();
    const alertDates={};calAlerts.forEach(a=>{const d=new Date(a.alert_date).getDate();if(!alertDates[d])alertDates[d]=[];alertDates[d].push(a);});

    let html='';['일','월','화','수','목','금','토'].forEach(d=>html+=`<div class="cal-day-label">${d}</div>`);
    for(let i=0;i<startDay;i++)html+='<div class="cal-day"></div>';
    for(let d=1;d<=days;d++){
      const isToday=d===today.getDate()&&calMonth===today.getMonth()+1&&calYear===today.getFullYear();
      const hasAlert=alertDates[d];const hasOverdue=hasAlert?.some(a=>new Date(a.alert_date)<today&&!a.alert_done);
      html+=`<div class="cal-day${isToday?' today':''}${hasAlert?' has-alert':''}${hasOverdue?' has-overdue':''}">${d}</div>`;
    }
    grid.innerHTML=`<div class="cal-grid">${html}</div>`;
  }

  async function calNav(dir){calMonth+=dir;if(calMonth>12){calMonth=1;calYear++;}if(calMonth<1){calMonth=12;calYear--;}await _renderCal();}

  return { render, calNav };
})();

(()=>{
  const MAX=10;let cnt=0,seen=new Set();
  function log(msg,src,line,col,err){try{const k=`${msg}|${src}|${line}`;if(seen.has(k)||cnt>=MAX)return;seen.add(k);cnt++;
    Auth.sb?.from('error_logs').insert({user_id:Auth.user?.id||null,error_message:String(msg).slice(0,500),error_source:src||'',page_url:location.pathname,severity:'mid'}).then(()=>{});}catch(_){}}

})();

// ── ① 비활성 자동복귀 (3분) ──
function _initIdleReturn(){
  let idleTimer=null;
  const IDLE_MS=3*60*1000; // 3분
  function reset(){
    clearTimeout(idleTimer);
    // 패널이 열려있을 때만 타이머 작동
    idleTimer=setTimeout(()=>{
      if(Hub.activePanel){Hub.back();Hub.closePanel();Hub.render();}
    },IDLE_MS);
  }
  ['mousemove','mousedown','keydown','touchstart','scroll'].forEach(ev=>document.addEventListener(ev,reset,{passive:true}));
  reset();
}

// ── ② 메인 허브 브리딩 애니메이션 (3분마다) ──
function _initHubBreathing(){
  let _idleTimer=null, _isAnimating=false;

  // 유휴 상태 감지 → 순차 호버 시작
  function resetIdle(){
    clearTimeout(_idleTimer);
    _idleTimer=setTimeout(startSequence, 5000); // 5초 무동작 후 시작
  }
  ['mousemove','mousedown','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,resetIdle,{passive:true}));
  resetIdle();

  async function startSequence(){
    if(_isAnimating)return;
    const nodes=document.querySelectorAll('.hub-node');
    if(!nodes.length){resetIdle();return;}
    _isAnimating=true;

    // 노드 순서대로 호버 효과
    for(let i=0;i<nodes.length;i++){
      // 중간에 사용자 조작하면 중단
      if(!_idleTimer){_isAnimating=false;return;}
      const n=nodes[i];
      const inner=n.querySelector('.hub-node-inner');
      if(inner){
        inner.style.transition='all 0.4s ease';
        inner.style.borderColor='rgba(99,102,241,0.4)';
        inner.style.boxShadow='0 2px 4px rgba(0,0,0,0.06),0 10px 24px rgba(0,0,0,0.12),0 24px 56px rgba(0,0,0,0.10)';
        inner.style.transform='translateY(-4px)';
        // 펄스도 실행
        Pulse.start(n.dataset.key);
      }
      await new Promise(r=>setTimeout(r,800));
      if(inner){
        inner.style.borderColor='';
        inner.style.boxShadow='';
        inner.style.transform='';
        Pulse.stop(n.dataset.key);
      }
      await new Promise(r=>setTimeout(r,200));
    }
    _isAnimating=false;
    // 한 바퀴 돌고 다시 대기
    if(_idleTimer)_idleTimer=setTimeout(startSequence, 3000);
  }
}

// ── 배경 손님 매칭 체크 (지연 실행) ──
async function _bgCheckMatches(){
  // 로그인 직후 세션이 안정될 때까지 대기
  await new Promise(r=>setTimeout(r,3000));
  try{
    if(!Auth.user)return;
    const {data:cards}=await Auth.sb.from('cards').select('id,property').eq('agent_id',Auth.user.id).limit(50);
    if(!cards?.length)return;
    const clientCards=cards.filter(c=>c.property?.type==='손님'&&!c.property?.embedding);
    // 최대 3개만 처리 (과부하 방지)
    const {data:sess}=await Auth.sb.auth.getSession();
    if(!sess?.session?.access_token)return;
    for(const c of clientCards.slice(0,3)){
      Data.updateEmbedding(c.id);
      await new Promise(r=>setTimeout(r,2000));
    }
  }catch(_){}
}

// ── PWA 설치 ──
let _pwaEvent=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_pwaEvent=e;
  const hdr=document.querySelector('.header-right');if(hdr)hdr.insertAdjacentHTML('afterbegin','<button class="btn-nav btn-nav-new" onclick="App.installPwa()" id="pwaBtn" style="font-size:11px;">📲 설치</button>');
});
App.installPwa=async function(){if(!_pwaEvent)return;_pwaEvent.prompt();const r=await _pwaEvent.userChoice;if(r.outcome==='accepted')document.getElementById('pwaBtn')?.remove();_pwaEvent=null;};

// 이탈 방지
window.addEventListener('beforeunload',e=>{const b=document.getElementById('leaveBanner');if(b&&b.style.display==='block'){e.preventDefault();e.returnValue='';}});
// 모바일 리다이렉트
if(/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)&&!location.search.includes('desktop'))location.href='../mobile-v6.html';

// 리사이즈 시 허브 재배치
let _resizeTimer;window.addEventListener('resize',()=>{clearTimeout(_resizeTimer);_resizeTimer=setTimeout(()=>{if(!Hub.activePanel)Hub.render();},200);});

// 시작
Auth.init();
document.addEventListener('DOMContentLoaded', async()=>{await Auth.check();App.init();});
</script>
