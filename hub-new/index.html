            ${(p.features||[]).length?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;">${p.features.map(f=>`${featTag(f)}`).join('')}</div>`:''}
            ${p.moveIn?`<div style="color:var(--text-light);font-size:11px;margin-top:4px;">입주: ${esc(p.moveIn)}</div>`:''}
          </div>
        </div>`;
      };
      if(myR.length){html+=`<div style="font-size:13px;font-weight:700;color:var(--primary);margin:12px 0 8px;">내 매물 (${myR.length>5?'상위 5건':myR.length+'건'})</div>`+myR.slice(0,5).map(c=>_renderSearchCard(c,true)).join('');}
      if(shR.length){html+=`<div style="font-size:13px;font-weight:700;color:#22c55e;margin:16px 0 8px;">공유 매물 (${shR.length}건)</div>`+shR.map(c=>_renderSearchCard(c,false)).join('');}
      if(!shR.length&&!myR.length)html='<div class="empty"><div class="empty-icon">🔍</div>검색 결과가 없어요</div>';
      el.innerHTML=html;
    }
  }

  return { render, openRoom, manageRoom, openRoomModal, createRoom, accept, reject, renameRoom, deleteRoom, leaveRoom, invite, unshare, onSearch, onSearchEnter, setCat };
})();

/* ═══════════════════════════════════════════════════════════
   13. PanelAlert — 알림 + 달력
   ═══════════════════════════════════════════════════════════ */
const PanelAlert = (() => {
  let calYear, calMonth, calAlerts=[];

  async function render(el){
    const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth()+1;
    const alerts=await Data.loadAlerts();

    // 모든 알림을 시간순 통합
    const all=[];
    alerts.overdue.forEach(a=>all.push({type:'overdue',icon:'⚠️',label:esc(a.content||a.type||'일정'),sub:new Date(a.alert_date).toLocaleDateString('ko-KR')+' (지연)',time:new Date(a.alert_date),color:'#ef4444',read:false,id:a.id}));
    alerts.matches.forEach(m=>all.push({type:'match',icon:'🏠',label:'매칭 매물 발견',sub:new Date(m.created_at).toLocaleDateString('ko-KR'),time:new Date(m.created_at),color:'var(--primary)',read:m.is_read,id:m.id}));
    alerts.memos.forEach(m=>all.push({type:'memo',icon:'📝',label:esc(m.content||'메모'),sub:new Date(m.created_at).toLocaleDateString('ko-KR'),time:new Date(m.created_at),color:'#f59e0b',read:m.is_read,id:m.id}));
    // 공유방 초대 알림
    (alerts.invites||[]).forEach(inv=>{all.push({type:'invite',icon:'📩',label:`${esc(inv.name)} 공유방 초대`,sub:new Date(inv.created_at).toLocaleDateString('ko-KR'),time:new Date(inv.created_at),color:'#8b5cf6',read:false,id:'inv_'+inv.roomId,roomId:inv.roomId});});
    // 7. 우선순위 정렬: 안 읽은 것 우선 → 긴급도(지연>매칭>메모) → 최신순
    const _priority={'overdue':4,'invite':3.5,'match':2,'memo':1};
    all.sort((a,b)=>{
      if(a.read!==b.read)return a.read?1:-1;
      const pa=_priority[a.type]||0,pb=_priority[b.type]||0;
      if(pa!==pb)return pb-pa;
      return b.time-a.time;
    });

    let h=`<div class="panel-inner">${Hub.panelHead('알림')}`;
    if(!all.length)h+='<div class="empty"><div class="empty-icon">🔔</div>새 알림이 없어요</div>';
    else{
      // 8. 그룹핑: 같은 타입 안 읽은 것 묶기
      let lastType='';
      const unreadByType={};all.filter(a=>!a.read).forEach(a=>{unreadByType[a.type]=(unreadByType[a.type]||0)+1;});
      const shownGroup={};
      all.forEach(a=>{
        // 안 읽은 매칭이 3건 이상이면 그룹 헤더
        if(!a.read&&!shownGroup[a.type]&&unreadByType[a.type]>=3){
          shownGroup[a.type]=true;
          const typeLabel={'overdue':'지연된 일정','invite':'공유방 초대','match':'매칭 매물 발견','memo':'새 메모'}[a.type]||'알림';
          h+=`<div style="padding:8px 12px;border-radius:8px;background:${a.color}15;border:1px solid ${a.color}30;margin-bottom:6px;display:flex;align-items:center;gap:8px;">
            <span style="font-size:16px;">${a.icon}</span>
            <div style="flex:1;font-size:13px;font-weight:700;color:${a.color};">${typeLabel} ${unreadByType[a.type]}건</div>
            <div style="width:8px;height:8px;border-radius:50%;background:${a.color};"></div>
          </div>`;
          return;
        }
        if(!a.read&&shownGroup[a.type])return; // 그룹화된 것은 개별 표시 안 함
        if(a.type==='invite'){
          h+=`<div class="tl-item" style="flex-wrap:wrap;gap:8px;">
            <span style="font-size:16px;flex-shrink:0;">${a.icon}</span>
            <div style="flex:1;min-width:0;"><div class="tl-text">${a.label}</div><div class="tl-date">${a.sub}</div></div>
            <div style="display:flex;gap:6px;flex-shrink:0;">
              <button onclick="PanelAlert.acceptInvite('${a.roomId}')" style="padding:5px 12px;border-radius:8px;border:none;background:#8b5cf6;color:#fff;font-size:12px;font-weight:700;cursor:pointer;">수락</button>
              <button onclick="PanelAlert.rejectInvite('${a.roomId}')" style="padding:5px 12px;border-radius:8px;border:none;background:#374151;color:#9ca3af;font-size:12px;font-weight:700;cursor:pointer;">거절</button>
            </div>
          </div>`;
        } else {
        const _isOverdue=a.type==='overdue';
        h+=`<div class="tl-item" style="${a.read?'opacity:0.5;':''}${_isOverdue?'background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:10px 12px;':''}">
          <span style="font-size:16px;flex-shrink:0;">${a.icon}</span>
          <div style="flex:1;"><div class="tl-text" style="${_isOverdue?'color:#dc2626;font-weight:700;':''}">${a.label}</div><div class="tl-date">${a.sub}</div></div>
          <div style="width:8px;height:8px;border-radius:50%;background:${a.read?'#cbd5e1':a.color};flex-shrink:0;"></div>
        </div>`;
        }
      });
    }

    // 달력
    h+=`<div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px;"><div id="calDetail" style="margin-bottom:12px;max-height:300px;overflow-y:auto;"></div><div class="cal-header"><button class="cal-nav" onclick="PanelAlert.calNav(-1)">◀</button><div class="cal-title" id="calTitle">${calYear}년 ${calMonth}월</div><button class="cal-nav" onclick="PanelAlert.calNav(1)">▶</button></div><div id="calGrid"></div></div></div>`;
    el.innerHTML=h;

    // 3. 읽음 처리 — 패널 열면 자동
    _markAllRead(alerts);
    await _renderCal();
  }

  async function _markAllRead(alerts){
    const uid=Auth.user?.id;if(!uid)return;
    const unreadMatches=alerts.matches.filter(m=>!m.is_read).map(m=>m.id);
    const unreadMemos=alerts.memos.filter(m=>!m.is_read).map(m=>m.id);
    const ops=[];
    if(unreadMatches.length)ops.push(Auth.sb.from('match_notifications').update({is_read:true}).in('id',unreadMatches));
    if(unreadMemos.length)ops.push(Auth.sb.from('memos').update({is_read:true}).in('id',unreadMemos));
    if(ops.length){await Promise.all(ops);await Data.loadCounts();Hub.render();}
  }

  async function _renderCal(){
    calAlerts=await Data.loadCalendarAlerts(calYear,calMonth);
    document.getElementById('calTitle').textContent=`${calYear}년 ${calMonth}월`;
    const grid=document.getElementById('calGrid');if(!grid)return;
    const first=new Date(calYear,calMonth-1,1),last=new Date(calYear,calMonth,0);
    const startDay=first.getDay(),days=last.getDate(),today=new Date();
    const alertDates={};calAlerts.forEach(a=>{const d=new Date(a.alert_date).getDate();if(!alertDates[d])alertDates[d]=[];alertDates[d].push(a);});
    // 미완료 먼저, 완료는 아래로
    Object.values(alertDates).forEach(arr=>arr.sort((a,b)=>(a.alert_done?1:0)-(b.alert_done?1:0)));

    let html='';['일','월','화','수','목','금','토'].forEach((d,i)=>html+=`<div class="cal-day-label" style="${i===0?'color:#ef4444;':''}${i===6?'color:#3b82f6;':''}">${d}</div>`);
    for(let i=0;i<startDay;i++)html+='<div class="cal-day" style="min-height:0;border:none;cursor:default;"></div>';
    for(let d=1;d<=days;d++){
      const isToday=d===today.getDate()&&calMonth===today.getMonth()+1&&calYear===today.getFullYear();
      const evts=alertDates[d]||[];
      let evtHtml='';
      evts.slice(0,3).forEach(a=>{
        const past=new Date(a.alert_date)<today&&!a.alert_done;
        const cls=a._isMatch?'match':a._isLog?'log':a.alert_done?'done':past?'overdue':'schedule';
        evtHtml+=`<span class="cal-evt ${cls}">${esc((a.content||a.type||'').slice(0,15))}</span>`;
      });
      if(evts.length>3)evtHtml+=`<span style="font-size:9px;font-weight:600;color:var(--text-light);">+${evts.length-3}건</span>`;
      const hasOverdue=evts.some(a=>new Date(a.alert_date)<today&&!a.alert_done);
      const dayOfWeek=(startDay+d-1)%7;
      const dayClass=dayOfWeek===0?' sun':dayOfWeek===6?' sat':'';
      html+=`<div class="cal-day${isToday?' today':''}${hasOverdue?' overdue-day':''}${dayClass}" onclick="PanelAlert.selectDate(${d})"><div class="cal-num">${d}</div>${evtHtml}</div>`;
    }
    grid.innerHTML=`<div class="cal-grid">${html}</div>`;
  }

  function selectDate(day){
    document.querySelectorAll('.cal-day').forEach(el=>{el.classList.remove('selected');if(el.querySelector('.cal-num')?.textContent==day)el.classList.add('selected');});
    const detail=document.getElementById('calDetail');if(!detail)return;
    const evts=(calAlerts||[]).filter(a=>{const d=new Date(a.alert_date);return d.getDate()===day&&d.getMonth()+1===calMonth&&d.getFullYear()===calYear;}).sort((a,b)=>(a.alert_done?1:0)-(b.alert_done?1:0));
    const today=new Date();
    const clients=Data.cache.clientCards||[];
    const clientMap={};clients.forEach(c=>{clientMap[c.id]=c.contact_name||c.property?.location||'손님';});
    let h=`<div style="font-size:14px;font-weight:800;margin-bottom:8px;">${calMonth}월 ${day}일 <span style="font-size:12px;font-weight:600;color:var(--text-sub);">(${evts.length}건)</span></div>`;
    // 입력란을 맨 위에
    h+=`<div style="display:flex;gap:6px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);">
      <input type="text" id="personalMemoInput" placeholder="내 일정 입력 (예: 세무서 방문)" style="flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-size:13px;" onkeydown="if(event.key==='Enter')PanelAlert.addPersonal(${day})">
      <button onclick="PanelAlert.addPersonal(${day})" style="padding:8px 14px;border-radius:8px;border:none;background:#f59e0b;color:#fff;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;">추가</button>
    </div>`;
    if(!evts.length)h+=`<div style="padding:8px 0;font-size:13px;color:var(--text-light);">일정 없음</div>`;
    evts.forEach(a=>{
      const past=new Date(a.alert_date)<today&&!a.alert_done;
      const done=a.alert_done;
      const clientName=clientMap[a.client_card_id]||'';
      const isPersonal=!a.client_card_id;
      h+=`<div class="tl-item" style="${done?'opacity:0.5;':''}${past?'background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:10px 12px;':''}cursor:pointer;" onclick="${isPersonal?'':`PanelAlert.goToClient('${a.client_card_id}')`}">
        ${renderTag(a.type||'메모')}${past?renderTag('지연'):''}
        <div style="flex:1;">
          ${isPersonal?`<div style="font-size:11px;font-weight:700;color:#f59e0b;margin-bottom:2px;">📌 내 일정</div>`:clientName?`<div style="font-size:11px;font-weight:700;color:var(--primary);margin-bottom:2px;">🙋 ${esc(clientName)}</div>`:''}
          <div class="tl-text" style="${done?'text-decoration:line-through;':''}${past?'color:#dc2626;font-weight:700;':''}">${esc(a.content||'')}</div>
          <div class="tl-date">${new Date(a.alert_date).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}${past?' ⚠️ 지연':''}${done?' ✅':''}</div>
        </div>
        ${!done&&!a._isMatch&&!a._isLog?`<button onclick="event.stopPropagation();PanelAlert.doneAlert('${a.id}',${day})" style="padding:4px 10px;border-radius:6px;border:none;background:#10b981;color:#fff;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;">완료</button>`:''}
      </div>`;
    });
    detail.innerHTML=h;
  }

  async function goToClient(cardId){
    if(!cardId)return;
    let card=(Data.cache.clientCards||[]).find(c=>c.id===cardId);
    // 캐시에 없으면 DB에서 직접 조회
    if(!card){
      const {data}=await Auth.sb.from('cards').select('*').eq('id',cardId).maybeSingle();
      if(data)card=data;
    }
    if(card){PanelClient.selectClient(card,'timeline');}
    else Toast.show('손님 정보를 찾을 수 없습니다');
  }

  async function addPersonal(day){
    const inp=document.getElementById('personalMemoInput');if(!inp)return;
    const content=inp.value.trim();if(!content){Toast.show('내용을 입력하세요');return;}
    const alertDate=new Date(calYear,calMonth-1,day,9,0,0); // 오전 9시 기본
    const {error}=await Auth.sb.from('client_notes').insert({
      client_card_id:null, agent_id:Auth.user.id, type:'일정', content,
      alert_date:alertDate.toISOString(), alert_done:false
    });
    if(error){Toast.show('저장 실패','error');return;}
    Toast.show('일정 추가됨');inp.value='';
    await _renderCal();selectDate(day);
  }
  async function donePersonal(noteId){ await doneAlert(noteId); }
  async function doneAlert(noteId,day){
    await Auth.sb.from('client_notes').update({alert_done:true}).eq('id',noteId).eq('agent_id',Auth.user?.id);
    Toast.show('완료 처리됨');
    await _renderCal();
    if(day) selectDate(day);
    await Data.loadCounts();Hub.render();
  }

  async function calNav(dir){calMonth+=dir;if(calMonth>12){calMonth=1;calYear++;}if(calMonth<1){calMonth=12;calYear--;}await _renderCal();}

  async function renderSub(key,el){
    const alerts=await Data.loadAlerts();
    const all=[];
    alerts.overdue.forEach(a=>all.push({type:'overdue',icon:'⚠️',label:esc(a.content||a.type||'일정'),sub:new Date(a.alert_date).toLocaleDateString('ko-KR')+' (지연)',time:new Date(a.alert_date),color:'#ef4444',read:false}));
    alerts.matches.forEach(m=>all.push({type:'match',icon:'🏠',label:'매칭 매물 발견',sub:new Date(m.created_at).toLocaleDateString('ko-KR'),time:new Date(m.created_at),color:'var(--primary)',read:m.is_read}));
    alerts.memos.forEach(m=>all.push({type:'memo',icon:'📝',label:esc(m.content||'메모'),sub:new Date(m.created_at).toLocaleDateString('ko-KR'),time:new Date(m.created_at),color:'#f59e0b',read:m.is_read}));
    (alerts.invites||[]).forEach(inv=>{all.push({type:'invite',icon:'📩',label:`${esc(inv.name)} 공유방 초대`,sub:new Date(inv.created_at).toLocaleDateString('ko-KR'),time:new Date(inv.created_at),color:'#8b5cf6',read:false,roomId:inv.roomId});});

    let filtered=all;
    if(key==='al_match')filtered=all.filter(a=>a.type==='match');
    else if(key==='al_schedule')filtered=all.filter(a=>a.type==='overdue');

    if(key==='al_calendar'){
      const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth()+1;
      el.innerHTML=`<div class="panel-inner">${Hub.panelHead('달력')}<div id="calDetail" style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);max-height:300px;overflow-y:auto;"></div><div class="cal-header"><button class="cal-nav" onclick="PanelAlert.calNav(-1)">◀</button><div class="cal-title" id="calTitle">${calYear}년 ${calMonth}월</div><button class="cal-nav" onclick="PanelAlert.calNav(1)">▶</button></div><div id="calGrid"></div></div>`;
      await _renderCal();return;
    }

    const titles={'al_all':'전체 알림','al_match':'매칭 알림','al_schedule':'일정'};
    const _priority={'overdue':4,'invite':3.5,'match':2,'memo':1};
    filtered.sort((a,b)=>{if(a.read!==b.read)return a.read?1:-1;const pa=_priority[a.type]||0,pb=_priority[b.type]||0;if(pa!==pb)return pb-pa;return b.time-a.time;});
    let h=`<div class="panel-inner">${Hub.panelHead(titles[key]||'알림',filtered.length+'건')}`;
    if(!filtered.length)h+='<div class="empty"><div class="empty-icon">🔔</div>알림이 없어요</div>';
    else filtered.forEach(a=>{
      if(a.type==='invite'){
        h+=`<div class="tl-item" style="flex-wrap:wrap;gap:8px;"><span style="font-size:16px;flex-shrink:0;">${a.icon}</span><div style="flex:1;min-width:0;"><div class="tl-text">${a.label}</div><div class="tl-date">${a.sub}</div></div><div style="display:flex;gap:6px;flex-shrink:0;"><button onclick="PanelAlert.acceptInvite('${a.roomId}')" style="padding:5px 12px;border-radius:8px;border:none;background:#8b5cf6;color:#fff;font-size:12px;font-weight:700;cursor:pointer;">수락</button><button onclick="PanelAlert.rejectInvite('${a.roomId}')" style="padding:5px 12px;border-radius:8px;border:none;background:#374151;color:#9ca3af;font-size:12px;font-weight:700;cursor:pointer;">거절</button></div></div>`;
      } else {
        h+=`<div class="tl-item" style="${a.read?'opacity:0.5;':''}"><span style="font-size:16px;flex-shrink:0;">${a.icon}</span><div style="flex:1;"><div class="tl-text">${a.label}</div><div class="tl-date">${a.sub}</div></div><div style="width:8px;height:8px;border-radius:50%;background:${a.read?'#cbd5e1':a.color};flex-shrink:0;"></div></div>`;
      }
    });
    el.innerHTML=h+'</div>';
    _markAllRead(alerts);
  }

  async function acceptInvite(roomId){
    const{error}=await Data.acceptInvite(roomId);
    if(error){Toast.show('수락 실패','error');return;}
    Toast.show('공유방 참여 완료');
    await Promise.all([Data.loadRooms(),Data.loadPendingInvites(),Data.loadCounts()]);
    Hub.render();
    const el=document.getElementById('panelArea');if(el)render(el);
  }
  async function rejectInvite(roomId){
    const{error}=await Data.rejectInvite(roomId);
    if(error){Toast.show('거절 실패','error');return;}
    Toast.show('초대 거절됨');
    await Data.loadCounts();Hub.render();
    const el=document.getElementById('panelArea');if(el)render(el);
  }

  return { render, renderSub, calNav, selectDate, goToClient, acceptInvite, rejectInvite, addPersonal, donePersonal, doneAlert };
})();

/* ═══════════════════════════════════════════════════════════
   14. PanelMemo — 메모
   ═══════════════════════════════════════════════════════════ */
const PanelMemo = (() => {
  async function render(el){
    const memos=await Data.loadMemos();
    // 자동 읽음 처리
    memos.filter(m=>!m.is_read).forEach(m=>Data.markMemoRead(m.id));
    let h=`<div class="panel-inner">${Hub.panelHead('메모',memos.length+'건')}`;
    if(!memos.length)h+='<div class="empty"><div class="empty-icon">📝</div>메모가 없어요</div>';
    else memos.forEach(m=>{h+=`<div class="alert-item" style="${m.is_read?'opacity:0.6':''}"><div class="alert-dot" style="background:${m.is_read?'#94a3b8':'#f59e0b'}"></div><div style="flex:1;"><div class="alert-text">${esc(m.content||'메모')}</div><div class="alert-date">${new Date(m.created_at).toLocaleDateString('ko-KR')}</div></div><button class="tl-delete-btn" onclick="PanelMemo.del('${m.id}')" style="font-size:12px;">삭제</button></div>`;});
    el.innerHTML=h+'</div>';
  }
  async function del(id){await Data.deleteMemo(id);Toast.show('삭제됨');render(document.getElementById('panelArea'));}
  return { render, del };
})();

/* ═══════════════════════════════════════════════════════════
   15. 테마 토글
   ═══════════════════════════════════════════════════════════ */
function toggleTheme(mode) {
  if(mode==='dark')document.body.classList.add('dark'); else document.body.classList.remove('dark');
  localStorage.setItem('hwik_theme',mode);
  document.getElementById('btnLight').classList.toggle('active',mode==='light');
  document.getElementById('btnDark').classList.toggle('active',mode==='dark');
}

/* ═══════════════════════════════════════════════════════════
   16. 에러 수집
   ═══════════════════════════════════════════════════════════ */
(()=>{
  const MAX=10;let cnt=0,seen=new Set();
  function log(msg,src,line,col,err){try{const k=`${msg}|${src}|${line}`;if(seen.has(k)||cnt>=MAX)return;seen.add(k);cnt++;
    Auth.sb?.from('error_logs').insert({user_id:Auth.user?.id||null,error_message:String(msg).slice(0,500),error_source:src||'',page_url:location.pathname,severity:'mid'}).then(()=>{});}catch(_){}}
  window.onerror=(m,s,l,c,e)=>log(m,s,l,c,e);
  window.addEventListener('unhandledrejection',e=>log(e.reason?.message||String(e.reason),'unhandledrejection'));
})();

/* ═══════════════════════════════════════════════════════════
   17. App — 초기화
   ═══════════════════════════════════════════════════════════ */
const App = {
  _inited: false,
  async init() {
    if(!Auth.user){document.getElementById('loginBg').classList.add('show');const sp=document.getElementById('splash');if(sp){sp.style.opacity='0';setTimeout(()=>sp.remove(),400);}return;}
    if(this._inited) return;
    this._inited = true;
    document.getElementById('loginBg').classList.remove('show');
    if(!Auth.profile) await Auth.check();
    // 헤더 표시
    document.getElementById('headerRight').style.display='';
    const nav=document.getElementById('navAgent');
    if(nav&&Auth.profile){nav.textContent=Auth.profile.business_name||'내 정보';}
    // 어드민 링크
    if(Auth.getAgentInfo().isAdmin){const hdr=document.querySelector('.header-right');if(hdr)hdr.insertAdjacentHTML('afterbegin','<a href="../admin.html" class="btn-nav btn-nav-new" style="font-size:11px;">관리자</a>');}
    // 테마
    const theme=localStorage.getItem('hwik_theme')||'dark';toggleTheme(theme);
    // 카운트 로드 + 허브 렌더
    try{await Data.loadCounts();}catch(e){console.error('loadCounts failed:',e);}
    Hub.render();
    // 카카오 초기화
    try{
      if(typeof Kakao==='undefined'){console.warn('[Kakao] SDK 로드 안됨');}
      else if(!Kakao.isInitialized()){Kakao.init(HWIK_CONFIG.KAKAO_JS_KEY);console.log('[Kakao] init 완료, key:',HWIK_CONFIG.KAKAO_JS_KEY);}
      else{console.log('[Kakao] 이미 초기화됨');}
    }catch(e){console.error('[Kakao] init 오류:',e);}
    // 최초 사용자 프로필 설정 자동 트리거
    if(Auth.profile&&!Auth.profile.business_name) Hub._openMyInfo();
    // ?edit=id 파라미터 처리
    const editId=new URLSearchParams(location.search).get('edit');
    if(editId){Hub.openPanel('my');setTimeout(()=>PanelCards.edit(editId),500);}
    // 검색 학습 점수 로드
    Search.loadScores();
    // 스플래시 숨기기
    const sp=document.getElementById('splash');if(sp){sp.style.opacity='0';setTimeout(()=>sp.remove(),400);}
    // 비활성 자동복귀 + 허브 브리딩 시작
    _initHubBreathing();
    // 4. 브라우저 알림 권한 요청
    if('Notification' in window && Notification.permission==='default'){
      Notification.requestPermission();
    }
    // 5. 알림 폴링 (60초마다 새 알림 체크)
    _startAlertPolling();
    // 기존 매물 태그 일괄 생성 (백그라운드, 1회)
    Data.batchGenerateTags().then(r=>{if(r?.updated)console.log(`태그 생성: ${r.updated}건`);});
    // 기존 손님 매칭 1회 실행 (백그라운드)
    _batchMatchClients();
  }
};

async function _batchMatchClients(){
  const key='hwik_batch_match_done';
  if(localStorage.getItem(key))return; // 1회만 실행
  try{
    const{data:clients}=await Auth.sb.from('cards').select('id').eq('agent_id',Auth.user.id).eq('property->>type','손님').not('embedding','is',null).limit(50);
    if(!clients?.length)return;
    for(const c of clients){Data.triggerAutoMatch(c.id);}
    localStorage.setItem(key,'1');
    console.log(`배치 매칭: 손님 ${clients.length}명 실행`);
  }catch(e){console.warn('batchMatch:',e)}
}

function _startAlertPolling(){
  let _lastAlertCount=Data.cache.counts.alert||0;
  // Realtime 구독 시도
  try{
    Auth.sb.channel('alerts')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'match_notifications',filter:`agent_id=eq.${Auth.user.id}`},()=>_onNewAlert())
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'memos',filter:`agent_id=eq.${Auth.user.id}`},()=>_onNewAlert())
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'share_room_members',filter:`member_id=eq.${Auth.user.id}`},()=>_onNewAlert())
      .subscribe();
  }catch(_){
    // Realtime 실패 시 폴링 fallback (60초)
    setInterval(async()=>{
      if(!Auth.user)return;
      await Data.loadCounts();
      const newCount=Data.cache.counts.alert||0;
      if(newCount>_lastAlertCount)_onNewAlert();
      _lastAlertCount=newCount;
    },60000);
  }

  async function _onNewAlert(){
    await Data.loadCounts();
    const newCount=Data.cache.counts.alert||0;
    if(newCount>_lastAlertCount){
      Hub.render();
      if('Notification' in window && Notification.permission==='granted'){
        new Notification('휙 — 새 알림',{body:`${newCount-_lastAlertCount}건의 새 알림이 있습니다`,icon:'/favicon.ico'});
      }
    }
    _lastAlertCount=newCount;
  }
}

// ── ① 비활성 자동복귀 (3분) ──
function _initIdleReturn(){
  let idleTimer=null;
  const IDLE_MS=5*60*1000; // 5분
  function reset(){
    clearTimeout(idleTimer);
    idleTimer=setTimeout(()=>{
      if(Hub.activePanel){
        // 패널 닫기 + 헤더 복원 + 원형 허브로
        Hub.closePanel();
        // 헤더가 숨겨져 있으면 복원
        const header=document.querySelector('.header'),main=document.getElementById('main');
        if(header)header.style.transform='';
        if(main){main.style.marginTop='';main.style.height='';}
        // 원형 허브 렌더 (RADIUS 복원은 closePanel에서 처리)
      }
    },IDLE_MS);
  }
  ['mousemove','mousedown','keydown','touchstart','scroll'].forEach(ev=>document.addEventListener(ev,reset,{passive:true}));
  reset();
}

// ── ② 메인 허브 브리딩 애니메이션 (3분마다) ──
function _initHubBreathing(){
  let _idleTimer=null, _isAnimating=false;

  // 유휴 상태 감지 → 순차 호버 시작
  function resetIdle(){
    clearTimeout(_idleTimer);
    _idleTimer=setTimeout(startSequence, 5000); // 5초 무동작 후 시작
  }
  ['mousemove','mousedown','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,resetIdle,{passive:true}));
  resetIdle();

  async function startSequence(){
    if(_isAnimating)return;
    const nodes=document.querySelectorAll('.hub-node');
    if(!nodes.length){resetIdle();return;}
    _isAnimating=true;

    // 노드 순서대로 호버 효과
    for(let i=0;i<nodes.length;i++){
      // 중간에 사용자 조작하면 중단
      if(!_idleTimer){_isAnimating=false;return;}
      const n=nodes[i];
      const inner=n.querySelector('.hub-node-inner');
      if(inner){
        inner.style.transition='all 0.5s cubic-bezier(0.34,1.56,0.64,1)';
        inner.style.borderColor='rgba(99,102,241,0.5)';
        inner.style.boxShadow='0 0 14px rgba(99,102,241,0.35),0 0 35px rgba(99,102,241,0.17),0 0 56px rgba(99,102,241,0.07),0 4px 16px rgba(0,0,0,0.07)';
        inner.style.transform='translateY(-4px) scale(1.03)';
        Pulse.start(n.dataset.key);
      }
      await new Promise(r=>setTimeout(r,900));
      if(inner){
        inner.style.transition='all 0.4s ease';
        inner.style.borderColor='';
        inner.style.boxShadow='';
        inner.style.transform='';
        Pulse.stop(n.dataset.key);
      }
      await new Promise(r=>setTimeout(r,200));
    }
    _isAnimating=false;
    // 한 바퀴 돌고 다시 대기
    if(_idleTimer)_idleTimer=setTimeout(startSequence, 3000);
  }
}

// ── 배경 손님 매칭 체크 (지연 실행) ──
async function _bgCheckMatches(){
  // 로그인 직후 세션이 안정될 때까지 대기
  await new Promise(r=>setTimeout(r,3000));
  try{
    if(!Auth.user)return;
    const {data:cards}=await Auth.sb.from('cards').select('id,property').eq('agent_id',Auth.user.id).eq('property->>type','손님').is('embedding',null).limit(50);
    if(!cards?.length)return;
    const clientCards=cards;
    // 최대 3개만 처리 (과부하 방지)
    const {data:sess}=await Auth.sb.auth.getSession();
    if(!sess?.session?.access_token)return;
    for(const c of clientCards.slice(0,3)){
      Data.updateEmbedding(c.id);
      await new Promise(r=>setTimeout(r,2000));
    }
  }catch(e){console.warn('bgEmbed:',e)}
}
