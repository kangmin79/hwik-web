  function _parseNote(text){
    const r={type:'л©”лӘЁ',content:text,alert_date:null,hasTime:false,timeStr:'',urgent:false};if(!text)return r;
    const t=text;
    // нғҖмһ… нҢҗлі„
    if(/л°©л¬ё|нҳ„мһҘ|ліҙлҹ¬|лҙӨ|нҲ¬м–ҙ|мһ„мһҘ|мқҙмӮ¬|мһ…мЈј|нҮҙкұ°|лӘ…лҸ„/.test(t))r.type='л°©л¬ё';
    else if(/мғҒлӢҙ|м „нҷ”|нҶөнҷ”|м—°лқҪ|л¬ёмқҳ|мҪңл°ұ|мҪң|л¶Җмһ¬|мһ¬м—°лқҪ|лӢөмһҘ|нҡҢмӢ |л¬ёмһҗ/.test(t))r.type='мғҒлӢҙ';
    else if(/кі„м•Ҫ|мӮ¬мқё|лҸ„мһҘ|мһ”кёҲ|мһ…кёҲ|мӨ‘лҸ„кёҲ|кі„м•ҪкёҲ|нҠ№м•Ҫ|лӮ мқё/.test(t))r.type='кі„м•Ҫ';
    else if(/ліҙлӮҙ|м „мҶЎ|м№ҙнҶЎ|мҶҢк°ң|кіөмң |нңҷ/.test(t))r.type='л§Өл¬јмҶҢк°ң';
    // кёҙкёү
    if(/кёү|л№ЁлҰ¬|кёҙкёү|ASAP|лӢ№мһҘ|мҰүмӢң/.test(t))r.urgent=true;
    // мӢңк°„ нҢҢмӢұ
    let hour=null,minute=0;
    const pmM=t.match(/мҳӨнӣ„\s*(\d{1,2})\s*мӢң?\s*(?:(\d{1,2})\s*л¶„|л°ҳ)?/);
    if(pmM){hour=parseInt(pmM[1]);if(hour<12)hour+=12;minute=pmM[2]?parseInt(pmM[2]):(/мҳӨнӣ„.*л°ҳ/.test(t)?30:0);}
    if(hour===null){const amM=t.match(/мҳӨм „\s*(\d{1,2})\s*мӢң?\s*(?:(\d{1,2})\s*л¶„|л°ҳ)?/);if(amM){hour=parseInt(amM[1]);minute=amM[2]?parseInt(amM[2]):(/мҳӨм „.*л°ҳ/.test(t)?30:0);}}
    if(hour===null){const hm=t.match(/(\d{1,2})\s*мӢң\s*л°ҳ/);if(hm){hour=parseInt(hm[1]);minute=30;if(hour>=1&&hour<=6&&!/мҳӨм „|мғҲлІҪ/.test(t))hour+=12;}
      else{const tm=t.match(/(\d{1,2})\s*мӢң\s*(?:(\d{1,2})\s*л¶„)?/);if(tm){hour=parseInt(tm[1]);minute=parseInt(tm[2])||0;if(hour>=1&&hour<=6&&!/мҳӨм „|мғҲлІҪ/.test(t))hour+=12;}}}
    if(hour===null){if(/мғҲлІҪ/.test(t))hour=6;else if(/м•„м№Ё/.test(t))hour=9;else if(/м җмӢ¬/.test(t))hour=12;else if(/мҳӨнӣ„/.test(t))hour=14;else if(/м Җл…Ғ/.test(t))hour=18;else if(/нҮҙк·ј\s*нӣ„|нҮҙк·јнӣ„/.test(t))hour=19;else if(/л°Ө/.test(t))hour=21;}
    if(hour!==null){r.hasTime=true;r.timeStr=hour<12?`мҳӨм „ ${hour}мӢң${minute?minute+'л¶„':''}`:hour===12?`лӮ® 12мӢң${minute?minute+'л¶„':''}`:`мҳӨнӣ„ ${hour-12}мӢң${minute?minute+'л¶„':''}`;}
    // лӮ м§ң нҢҢмӢұ
    const now=new Date();let bd=null;const dayN={мқј:0,мӣ”:1,нҷ”:2,мҲҳ:3,лӘ©:4,кёҲ:5,нҶ :6};
    const nwD=t.match(/лӢӨмқҢ\s*мЈј\s*(мқј|мӣ”|нҷ”|мҲҳ|лӘ©|кёҲ|нҶ )/);if(nwD){bd=new Date(now);bd.setDate(bd.getDate()+(7-now.getDay())+dayN[nwD[1]]);}
    if(!bd){const twD=t.match(/мқҙлІҲ\s*мЈј\s*(мқј|мӣ”|нҷ”|мҲҳ|лӘ©|кёҲ|нҶ )/);if(twD){bd=new Date(now);const diff=dayN[twD[1]]-now.getDay();bd.setDate(bd.getDate()+(diff>=0?diff:diff+7));}}
    if(!bd){
      if(/мҳӨлҠҳ/.test(t))bd=new Date(now);
      else if(/лӮҙмқј/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+1);}
      else if(/лӘЁл Ҳ/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+2);}
      else if(/кёҖн”ј/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+3);}
      else if(/мЈјл§җ/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+((6-now.getDay()+7)%7||7));}
      else if(/лӢӨмқҢ\s*мЈј/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+7);}
      else{const nD=t.match(/(\d+)\s*мқј\s*[нӣ„л’Ө]/);if(nD){bd=new Date(now);bd.setDate(bd.getDate()+parseInt(nD[1]));}
        if(!bd){const dm=t.match(/(\d{1,2})\s*мӣ”\s*(\d{1,2})\s*мқј/);if(dm){const m=parseInt(dm[1])-1,d=parseInt(dm[2]);let y=now.getFullYear();if(m<now.getMonth()||(m===now.getMonth()&&d<now.getDate()))y++;bd=new Date(y,m,d);}}
        if(!bd){const sm=t.match(/(?<!\d)(\d{1,2})\/(\d{1,2})(?!\d)/);if(sm&&parseInt(sm[1])<=12&&parseInt(sm[2])<=31){const m=parseInt(sm[1])-1,d=parseInt(sm[2]);let y=now.getFullYear();if(m<now.getMonth()||(m===now.getMonth()&&d<now.getDate()))y++;bd=new Date(y,m,d);}}
        if(!bd){const dowM=t.match(/(мқј|мӣ”|нҷ”|мҲҳ|лӘ©|кёҲ|нҶ )\s*мҡ”мқј/);if(dowM){bd=new Date(now);bd.setDate(bd.getDate()+((dayN[dowM[1]]-now.getDay()+7)%7||7));}}
      }
    }
    if(!bd&&/мҪңл°ұ|мһ¬м—°лқҪ|лӢӨмӢң\s*м „нҷ”|лӢӨмӢң\s*м—°лқҪ|нҢ”лЎңм—…|follow/i.test(t))bd=new Date(now);
    if(!bd&&hour!==null)bd=new Date(now);
    if(bd){if(hour!==null)bd.setHours(hour,minute,0,0);else bd.setHours(9,0,0,0);r.alert_date=bd.toISOString();}
    return r;
  }

  function pvNote(text){const el=document.getElementById('notePv');if(!el)return;if(!text.trim()){el.style.display='none';return;}
    const p=_parseNote(text),parts=[];
    if(p.urgent)parts.push('<span style="color:#ef4444;">рҹ”ҙ кёҙкёү</span>');
    const tc={'л°©л¬ё':'#4ecdc4','мғҒлӢҙ':'#60a5fa','кі„м•Ҫ':'#f59e0b','л§Өл¬јмҶҢк°ң':'#a78bfa','л©”лӘЁ':'#64748b'};
    parts.push(`<span style="color:${tc[p.type]}">${p.type}</span>`);
    if(p.alert_date){const d=new Date(p.alert_date),days=['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];parts.push(`<span style="color:#facc15;">рҹ“… ${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})${p.hasTime?' '+p.timeStr:''}</span>`);}
    el.innerHTML=parts.join(' В· ');el.style.display='';}

  async function saveNote(cardId){const inp=document.getElementById('noteIn');if(!inp?.value?.trim())return;const p=_parseNote(inp.value.trim());await Data.saveClientNote(cardId,p);inp.value='';document.getElementById('notePv').style.display='none';
    Data.updateEmbedding(cardId);Data.updateClientLocation(cardId);
    const d=await Data.loadClientDetail(cardId);if(Hub.current){Hub.current._notes=d.notes;Hub.current._matches=d.matches;}Hub.openSub('cl_timeline');
    let msg='л©”лӘЁ м ҖмһҘлҗЁ';if(p.alert_date){const d2=new Date(p.alert_date),days=['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];msg=`м ҖмһҘ В· рҹ“… ${d2.getMonth()+1}/${d2.getDate()}(${days[d2.getDay()]})${p.hasTime?' '+p.timeStr:''} м•ҢлҰј`;}Toast.show(msg);}
  async function noteDel(nid,cid){if(!confirm('мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?'))return;await Data.deleteClientNote(nid);const d=await Data.loadClientDetail(cid);if(Hub.current)Hub.current._notes=d.notes;Hub.openSub('cl_timeline');}
  async function noteDone(nid,cid){await Data.updateNoteAlertDone(nid,true);const d=await Data.loadClientDetail(cid);if(Hub.current)Hub.current._notes=d.notes;Hub.openSub('cl_timeline');Toast.show('мҷ„лЈҢ мІҳлҰ¬лҗЁ');}
  async function reMatch(cid){Toast.show('л§Өм№ӯ мӨ‘...');const d=await Data.loadClientDetail(cid);if(Hub.current){Hub.current._matches=d.matches;Hub.current._notes=d.notes;}Hub.openSub('cl_match');Toast.show(d.matches.length+'кұҙ л§Өм№ӯ мҷ„лЈҢ');}

  // в”Җв”Җ мҶҗлӢҳ м№ҙл“ң мһ¬нҢҢмӢұ (мҲҳм •) в”Җв”Җ
  async function editClient(cardId){
    const card=Data.cache.clientCards.find(c=>c.id===cardId)||Hub.current?.data;
    if(!card)return;const p=card.property||{};
    const m=document.getElementById('editModal');if(!m)return;
    m.innerHTML=`<div class="modal-content"><div class="modal-header">мҶҗлӢҳ м •ліҙ мҲҳм •<button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('show')">вң•</button></div><div class="modal-body">
      <textarea id="clientEditText" class="reg-textarea" style="min-height:160px;" placeholder="мҶҗлӢҳ мЎ°кұҙмқ„ лӢӨмӢң мһ…л Ҙн•ҳм„ёмҡ”">${esc(p.rawText||[p.type,p.price,p.location,p.complex,p.area,...(p.features||[])].filter(Boolean).join(' '))}</textarea>
      <div class="edit-buttons"><button class="btn-cancel" onclick="this.closest('.modal-overlay').classList.remove('show')">м·ЁмҶҢ</button><button class="btn-primary" style="width:auto;padding:10px 24px;" id="clientEditBtn" onclick="PanelClient.saveClientEdit('${cardId}')">AIлЎң мһ¬л¶„м„қ</button></div>
    </div></div>`;m.classList.add('show');
  }

  async function saveClientEdit(cardId){
    const text=document.getElementById('clientEditText')?.value?.trim();if(!text)return;
    const btn=document.getElementById('clientEditBtn');btn.textContent='л¶„м„қ мӨ‘...';btn.disabled=true;
    try{
      const res=await fetch(`${HWIK_CONFIG.SUPABASE_URL}/functions/v1/parse-property`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+Auth.getToken()},body:JSON.stringify({text})});
      const r=await res.json();if(r.error)throw new Error(r.error);
      // н•„мҡ”н•ң н•„л“ңл§Ң propertyм—җ м ҖмһҘ (embedding/search_text л“ұ м ңмҷё)
      const property={
        type:r.type||null,price:r.price||null,location:r.location||null,address:r.address||null,
        complex:r.complex||null,area:r.area||null,floor:r.floor||null,room:r.room||null,
        features:r.features||[],moveIn:r.moveIn||null,category:r.category||null,rawText:text
      };
      await Auth.sb.from('cards').update({
        property,
        price_number:r.price_number||null,deposit:r.deposit||null,monthly_rent:r.monthly_rent||null,
        wanted_trade_type:r.wanted_trade_type||null,
        contact_name:r.contact_name||null,contact_phone:r.contact_phone||null,
        embedding:r.embedding||null,search_text:r.search_text||null
      }).eq('id',cardId).eq('agent_id',Auth.user.id);
      document.getElementById('editModal').classList.remove('show');
      Data.updateEmbedding(cardId);Data.updateClientLocation(cardId);
      Toast.show('мҲҳм • мҷ„лЈҢ');await Data.loadClientCards(0,true);_renderList();
    }catch(e){Toast.show('м ҖмһҘ мӢӨнҢЁ: '+e.message);}
    btn.textContent='AIлЎң мһ¬л¶„м„қ';btn.disabled=false;
  }

  async function saveContact(cardId){
    const name=document.getElementById('clName')?.value?.trim(),phone=document.getElementById('clPhone')?.value?.trim();
    await Auth.sb.from('cards').update({contact_name:name||null,contact_phone:phone||null}).eq('id',cardId);
    Toast.show('м ҖмһҘ мҷ„лЈҢ');
    // н—ҲлёҢ нҳ„мһ¬ лҚ°мқҙн„° м—…лҚ°мқҙнҠё
    if(Hub.current?.data?.id===cardId){Hub.current.data.contact_name=name;Hub.current.data.contact_phone=phone;}
  }

  return { render, setSort, onQ, onQEnter, renderSub, pvNote, saveNote, noteDel, noteDone, reMatch, editClient, saveClientEdit, saveContact };
})();

  function _renderList(){const el=document.getElementById('sharedList');if(!el)return;let cards=Data.cache.sharedCards.filter(c=>!selRoom||c.room_id===selRoom);

  let _sharedQuery='';

   13. PanelAlert вҖ” м•ҢлҰј + лӢ¬л Ҙ
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const PanelAlert = (() => {
  let calYear, calMonth, calAlerts=[];

  async function render(el){
    const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth()+1;
    const alerts=await Data.loadAlerts();
    let h=`<div class="panel-inner">${Hub.panelHead('м•ҢлҰј')}`;

    // м§Җм—° мқјм •
    if(alerts.overdue.length){h+=`<div class="section-label" style="color:#ef4444;">м§Җм—°лҗң мқјм • (${alerts.overdue.length})</div>`;alerts.overdue.forEach(a=>h+=`<div class="alert-item"><div class="alert-dot" style="background:#ef4444;"></div><div><div class="alert-text">${esc(a.content||a.type||'мқјм •')}</div><div class="alert-date">${new Date(a.alert_date).toLocaleDateString('ko-KR')} (м§Җм—°)</div></div></div>`);}
    // л§Өм№ӯ м•ҢлҰј
    if(alerts.matches.length){h+=`<div class="section-label" style="color:var(--primary);">л§Өм№ӯ м•ҢлҰј (${alerts.matches.length})</div>`;alerts.matches.forEach(m=>h+=`<div class="alert-item"><div class="alert-dot" style="background:${m.is_read?'#94a3b8':'var(--primary)'}"></div><div><div class="alert-text">рҹҸ  л§Өм№ӯ л§Өл¬ј л°ңкІ¬</div><div class="alert-date">${new Date(m.created_at).toLocaleDateString('ko-KR')}</div></div></div>`);}
    // л©”лӘЁ
    if(alerts.memos.length){h+=`<div class="section-label" style="color:#f59e0b;">лӘЁл°”мқј л©”лӘЁ (${alerts.memos.length})</div>`;alerts.memos.forEach(m=>h+=`<div class="alert-item" style="${m.is_read?'opacity:0.5':''}"><div class="alert-dot" style="background:${m.is_read?'#94a3b8':'#f59e0b'}"></div><div><div class="alert-text">${esc(m.content||'л©”лӘЁ')}</div><div class="alert-date">${new Date(m.created_at).toLocaleDateString('ko-KR')}</div></div></div>`);}

    if(!alerts.overdue.length&&!alerts.matches.length&&!alerts.memos.length)h+='<div class="empty"><div class="empty-icon">рҹ””</div>мғҲ м•ҢлҰјмқҙ м—Ҷм–ҙмҡ”</div>';

    // лӢ¬л Ҙ
    h+=`<div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px;"><div class="cal-header"><button class="cal-nav" onclick="PanelAlert.calNav(-1)">в—Җ</button><div class="cal-title" id="calTitle">${calYear}л…„ ${calMonth}мӣ”</div><button class="cal-nav" onclick="PanelAlert.calNav(1)">в–¶</button></div><div id="calGrid"></div></div></div>`;
    el.innerHTML=h;
    await _renderCal();
  }

  async function _renderCal(){
    calAlerts=await Data.loadCalendarAlerts(calYear,calMonth);
    document.getElementById('calTitle').textContent=`${calYear}л…„ ${calMonth}мӣ”`;
    const grid=document.getElementById('calGrid');if(!grid)return;
    const first=new Date(calYear,calMonth-1,1),last=new Date(calYear,calMonth,0);
    const startDay=first.getDay(),days=last.getDate(),today=new Date();
    const alertDates={};calAlerts.forEach(a=>{const d=new Date(a.alert_date).getDate();if(!alertDates[d])alertDates[d]=[];alertDates[d].push(a);});

    let html='';['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '].forEach(d=>html+=`<div class="cal-day-label">${d}</div>`);
    for(let i=0;i<startDay;i++)html+='<div class="cal-day"></div>';
    for(let d=1;d<=days;d++){
      const isToday=d===today.getDate()&&calMonth===today.getMonth()+1&&calYear===today.getFullYear();
      const hasAlert=alertDates[d];const hasOverdue=hasAlert?.some(a=>new Date(a.alert_date)<today&&!a.alert_done);
      html+=`<div class="cal-day${isToday?' today':''}${hasAlert?' has-alert':''}${hasOverdue?' has-overdue':''}">${d}</div>`;
    }
    grid.innerHTML=`<div class="cal-grid">${html}</div>`;
  }

  async function calNav(dir){calMonth+=dir;if(calMonth>12){calMonth=1;calYear++;}if(calMonth<1){calMonth=12;calYear--;}await _renderCal();}

  return { render, calNav };
})();

function toggleTheme(mode) {

  document.getElementById('btnLight').classList.toggle('active',mode==='light');

}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
(()=>{
  const MAX=10;let cnt=0,seen=new Set();
  function log(msg,src,line,col,err){try{const k=`${msg}|${src}|${line}`;if(seen.has(k)||cnt>=MAX)return;seen.add(k);cnt++;
    Auth.sb?.from('error_logs').insert({user_id:Auth.user?.id||null,error_message:String(msg).slice(0,500),error_source:src||'',page_url:location.pathname,severity:'mid'}).then(()=>{});}catch(_){}}
  window.onerror=(m,s,l,c,e)=>log(m,s,l,c,e);
  window.addEventListener('unhandledrejection',e=>log(e.reason?.message||String(e.reason),'unhandledrejection'));
})();

    if(Auth.profile&&!Auth.profile.business_name) Hub._openMyInfo();
    // ?edit=id нҢҢлқјлҜён„° мІҳлҰ¬
    const editId=new URLSearchParams(location.search).get('edit');
    if(editId){Hub.openPanel('my');setTimeout(()=>PanelCards.edit(editId),500);}
    // кІҖмғү н•ҷмҠө м җмҲҳ лЎңл“ң
    Search.loadScores();
    // л°ұк·ёлқјмҡҙл“ң: мҶҗлӢҳ л§Өм№ӯ мІҙнҒ¬
    // _bgCheckMatches(); // мһ„мӢң л№„нҷңм„ұнҷ” (embed-card 401 л°©м§Җ)
    // мҠӨн”ҢлһҳмӢң мҲЁкё°кё°
    const sp=document.getElementById('splash');if(sp){sp.style.opacity='0';setTimeout(()=>sp.remove(),400);}
    // л№„нҷңм„ұ мһҗлҸҷліөк·Җ + н—ҲлёҢ лёҢлҰ¬л”© мӢңмһ‘
    _initHubBreathing();
  }
};

// в”Җв”Җ в‘  л№„нҷңм„ұ мһҗлҸҷліөк·Җ (3л¶„) в”Җв”Җ
function _initIdleReturn(){
  let idleTimer=null;
  const IDLE_MS=5*60*1000; // 5л¶„
  function reset(){
    clearTimeout(idleTimer);
    idleTimer=setTimeout(()=>{
      if(Hub.activePanel){
        // нҢЁл„җ лӢ«кё° + н—ӨлҚ” ліөмӣҗ + мӣҗнҳ• н—ҲлёҢлЎң
        Hub.closePanel();
        // н—ӨлҚ”к°Җ мҲЁкІЁм ё мһҲмңјл©ҙ ліөмӣҗ
        const header=document.querySelector('.header'),main=document.getElementById('main');
        if(header)header.style.transform='';
        if(main){main.style.marginTop='';main.style.height='';}
        // мӣҗнҳ• н—ҲлёҢ л ҢлҚ” (RADIUS ліөмӣҗмқҖ closePanelм—җм„ң мІҳлҰ¬)
      }
    },IDLE_MS);
  }
  ['mousemove','mousedown','keydown','touchstart','scroll'].forEach(ev=>document.addEventListener(ev,reset,{passive:true}));
  reset();
}

// в”Җв”Җ в‘Ў л©”мқё н—ҲлёҢ лёҢлҰ¬л”© м• лӢҲл©”мқҙм…ҳ (3л¶„л§ҲлӢӨ) в”Җв”Җ
function _initHubBreathing(){
  let _idleTimer=null, _isAnimating=false;

  // мң нңҙ мғҒнғң к°җм§Җ вҶ’ мҲңм°Ё нҳёлІ„ мӢңмһ‘
  function resetIdle(){
    clearTimeout(_idleTimer);
    _idleTimer=setTimeout(startSequence, 5000); // 5мҙҲ л¬ҙлҸҷмһ‘ нӣ„ мӢңмһ‘
  }
  ['mousemove','mousedown','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,resetIdle,{passive:true}));
  resetIdle();

  async function startSequence(){
    if(_isAnimating)return;
    const nodes=document.querySelectorAll('.hub-node');
    if(!nodes.length){resetIdle();return;}
    _isAnimating=true;

    // л…ёл“ң мҲңм„ңлҢҖлЎң нҳёлІ„ нҡЁкіј
    for(let i=0;i<nodes.length;i++){
      // мӨ‘к°„м—җ мӮ¬мҡ©мһҗ мЎ°мһ‘н•ҳл©ҙ мӨ‘лӢЁ
      if(!_idleTimer){_isAnimating=false;return;}
      const n=nodes[i];
      const inner=n.querySelector('.hub-node-inner');
      if(inner){
        inner.style.transition='all 0.5s cubic-bezier(0.34,1.56,0.64,1)';
        inner.style.borderColor='rgba(99,102,241,0.5)';
        inner.style.boxShadow='0 0 14px rgba(99,102,241,0.35),0 0 35px rgba(99,102,241,0.17),0 0 56px rgba(99,102,241,0.07),0 4px 16px rgba(0,0,0,0.07)';
        inner.style.transform='translateY(-4px) scale(1.03)';
        Pulse.start(n.dataset.key);
      }
      await new Promise(r=>setTimeout(r,900));
      if(inner){
        inner.style.transition='all 0.4s ease';
        inner.style.borderColor='';
        inner.style.boxShadow='';
        inner.style.transform='';
        Pulse.stop(n.dataset.key);
      }
      await new Promise(r=>setTimeout(r,200));
    }
    _isAnimating=false;
    // н•ң л°”нҖҙ лҸҢкі  лӢӨмӢң лҢҖкё°
    if(_idleTimer)_idleTimer=setTimeout(startSequence, 3000);
  }
}

// в”Җв”Җ л°°кІҪ мҶҗлӢҳ л§Өм№ӯ мІҙнҒ¬ (м§Җм—° мӢӨн–ү) в”Җв”Җ
async function _bgCheckMatches(){
  // лЎңк·ёмқё м§Ғнӣ„ м„ём…ҳмқҙ м•Ҳм •лҗ  л•Ңк№Ңм§Җ лҢҖкё°
  await new Promise(r=>setTimeout(r,3000));
  try{
    if(!Auth.user)return;
    const {data:cards}=await Auth.sb.from('cards').select('id,property').eq('agent_id',Auth.user.id).limit(50);
    if(!cards?.length)return;
    const clientCards=cards.filter(c=>c.property?.type==='мҶҗлӢҳ'&&!c.property?.embedding);
    // мөңлҢҖ 3к°ңл§Ң мІҳлҰ¬ (кіјл¶Җн•ҳ л°©м§Җ)
    const {data:sess}=await Auth.sb.auth.getSession();
    if(!sess?.session?.access_token)return;
    for(const c of clientCards.slice(0,3)){
      Data.updateEmbedding(c.id);
      await new Promise(r=>setTimeout(r,2000));
    }
  }catch(_){}
}

// в”Җв”Җ PWA м„Өм№ҳ в”Җв”Җ
let _pwaEvent=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_pwaEvent=e;
  const hdr=document.querySelector('.header-right');if(hdr)hdr.insertAdjacentHTML('afterbegin','<button class="btn-nav btn-nav-new" onclick="App.installPwa()" id="pwaBtn" style="font-size:11px;">рҹ“І м„Өм№ҳ</button>');
});
App.installPwa=async function(){if(!_pwaEvent)return;_pwaEvent.prompt();const r=await _pwaEvent.userChoice;if(r.outcome==='accepted')document.getElementById('pwaBtn')?.remove();_pwaEvent=null;};

// мқҙнғҲ л°©м§Җ
window.addEventListener('beforeunload',e=>{const b=document.getElementById('leaveBanner');if(b&&b.style.display==='block'){e.preventDefault();e.returnValue='';}});
// лӘЁл°”мқј лҰ¬лӢӨмқҙл үнҠё
if(/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)&&!location.search.includes('desktop'))location.href='../mobile-v6.html';

// лҰ¬мӮ¬мқҙмҰҲ мӢң н—ҲлёҢ мһ¬л°°м№ҳ
let _resizeTimer;window.addEventListener('resize',()=>{clearTimeout(_resizeTimer);_resizeTimer=setTimeout(()=>{if(Hub.activePanel)Hub.adjustLayout();else Hub.render();},200);});

// мӢңмһ‘
Auth.init();
document.addEventListener('DOMContentLoaded', async()=>{await Auth.check();App.init();});
</script>
