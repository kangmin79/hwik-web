  function _parse(input) {
    const r={type:null,price:null,location:null,complex:null,area:null,floor:null,features:[]};
    const ckw=['구합니다','구해요','구해주세요','구함','찾습니다','찾아요','원합니다','예산','손님요청'];
    if(ckw.some(k=>input.includes(k)))r.type='손님'; else if(input.includes('매매'))r.type='매매'; else if(/전세|전셰|젼세/.test(input))r.type='전세'; else if(/월세|웜세/.test(input))r.type='월세';
    // 가격: 슬래시(월세) → 억+천 → 보증금패턴
    const rm=input.match(/(\d+)\s*\/\s*(\d+)/); if(rm){r.price=rm[1]+'/'+rm[2];if(!r.type)r.type='월세';}
    if(!r.price){const pm=input.match(/(\d+\.?\d*)\s*억\s*(\d+)?\s*(천)?/);if(pm){let p=pm[1]+'억';if(pm[2])p+=pm[2]+(pm[3]||'천');r.price=p;}}
    if(!r.price){const bm=input.match(/보증금\s*(\d+)\s*(?:만)?\s*(?:\/|\s)\s*월세?\s*(\d+)/);if(bm){r.price=bm[1]+'/'+bm[2];if(!r.type)r.type='월세';}}
    if(!r.price){const cm=input.match(/(\d+)\s*천/);if(cm)r.price=cm[1]+'천';}
    // 지역: 구+동 (순서 유연하게)
    const gm=input.match(/(강남|서초|송파|마포|용산|성동|광진|영등포|강동|동작|관악|종로|중구|강서|양천|구로|노원|서대문|은평|중랑|도봉|동대문|성북|금천|강북)구?/);
    const dm=input.match(/([가-힣]{2,4}동)/);
    if(gm&&dm)r.location=gm[0]+(gm[0].endsWith('구')?'':'구')+' '+dm[1];
    else if(gm)r.location=gm[0]+(gm[0].endsWith('구')?'':'구');
    else if(dm)r.location=dm[1];
    // 단지명: 브랜드 + 뒤 단어 (래미안대치팰리스, 자이 더시티 등)
    const brands=['래미안','자이','힐스테이트','푸르지오','더샵','롯데캐슬','e편한세상','아이파크','sk뷰','파크리오','포레나','두산위브','현대','삼성','대림','한화꿈에그린','센트레빌','우미린','어울림','엘스','리센츠','하이페리온','텐즈힐'];
    for(const b of brands){const bi=input.indexOf(b);if(bi>=0){const after=input.slice(bi+b.length).match(/^([가-힣a-zA-Z0-9]+)/);r.complex=after?b+after[1]:b;break;}}
    if(!r.complex){const cm=input.match(/([가-힣a-zA-Z]+\s*(?:아파트|오피스텔|빌라|상가|사무실))/);if(cm)r.complex=cm[0].trim();}
    const am=input.match(/(\d+)\s*평/); if(am)r.area=am[1]+'평';
    const fm=input.match(/(\d+)\s*층/); if(fm)r.floor=fm[1]+'층';
    const dm2=input.match(/(\d+)\s*동/); if(dm2&&fm)r.floor=dm2[1]+'동 '+r.floor;
    ['풀옵션','올수리','즉시입주','역세권','초역세권','신축','주차가능','주차','남향','동향','서향','북향','남동향','남서향','정남향','복층','테라스','보안','엘리베이터','학군좋음','초품아','한강뷰','공원뷰','HUG가능','무융자','대출가능','애견가능','시스템에어컨','베란다확장','드레스룸','빌트인','분리형','루프탑','고층','저층','채광좋음','슬세권','런세권'].forEach(f=>{if(input.includes(f))r.features.push(f);});
    return r;
  }

  function goTo(i) {
    slideIdx=Math.max(0,Math.min(i,selected.length-1));
    document.querySelectorAll('.card-slide').forEach((s,j)=>{s.style.transform=`translateX(${(j-slideIdx)*100}%)`;});
    const ind=document.querySelector('.phone-indicator');if(ind)ind.innerHTML=`<span>${slideIdx+1}</span> / ${selected.length}`;
    document.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('active',j===slideIdx));
  }
  function _setupSwipe() {
    const s=document.getElementById('phoneBody');if(!s)return;
    s.onmousedown=e=>{dragging=true;sx=e.clientX;cx=e.clientX;};
    s.onmousemove=e=>{if(dragging)cx=e.clientX;};
    s.onmouseup=s.onmouseleave=()=>{if(!dragging)return;dragging=false;const d=sx-cx;if(Math.abs(d)>50){if(d>0&&slideIdx<selected.length-1)goTo(slideIdx+1);else if(d<0&&slideIdx>0)goTo(slideIdx-1);}};
    s.addEventListener('touchstart',e=>{dragging=true;sx=e.touches[0].clientX;cx=sx;},{passive:true});
    s.addEventListener('touchmove',e=>{if(dragging)cx=e.touches[0].clientX;},{passive:true});
    s.addEventListener('touchend',()=>{if(!dragging)return;dragging=false;const d=sx-cx;if(Math.abs(d)>50){if(d>0&&slideIdx<selected.length-1)goTo(slideIdx+1);else if(d<0&&slideIdx>0)goTo(slideIdx-1);}});
  }

  return { toggle, clear, getSelected, renderSlider, miniCard, renderLive, goTo };
})();

/* ═══════════════════════════════════════════════════════════
   6. Share — 공유
   ═══════════════════════════════════════════════════════════ */
const Share = (() => {
  function openSheet() { const c=Preview.getSelected();if(!c.length)return;document.getElementById('shareCount').textContent=c.length+'건 선택됨';document.getElementById('shareSheet')?.classList.add('show'); }
  function closeSheet() { document.getElementById('shareSheet')?.classList.remove('show'); }

  function _link(cards) {
    cards=cards||Preview.getSelected();if(!cards.length)return '';
    const agentParam=Auth.user?'&agent='+Auth.user.id:'';
    if(cards.length===1) return `https://hwik.kr/property_chat.html?id=${cards[0].id}${agentParam}`;
    return `https://hwik.kr/property_chat.html?ids=${cards.map(c=>c.id).join(',')}${agentParam}`;
  }

  async function copyLink(cards) {
    const url=_link(cards);if(!url)return;
    try{await navigator.clipboard.writeText(url);}catch{const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
    Toast.show('링크가 복사되었습니다');closeSheet();
  }

  function sms(cards) {
    const url=_link(cards);if(!url)return;const ag=Auth.getAgentInfo(),n=(cards||Preview.getSelected()).length;
    window.open(`sms:?body=${encodeURIComponent(`[${ag.office||'부동산'}] 매물 ${n}건\n\n${url}`)}`,'_self');closeSheet();
  }

  // OG 이미지 생성
  async function _genOgBlob(ag){
    const c=document.createElement('canvas');c.width=800;c.height=420;const ctx=c.getContext('2d');
    const bg=ctx.createLinearGradient(0,0,800,420);bg.addColorStop(0,'#0d1b2a');bg.addColorStop(1,'#1b2838');ctx.fillStyle=bg;ctx.fillRect(0,0,800,420);
    ctx.fillStyle='rgba(78,205,196,0.08)';ctx.beginPath();ctx.arc(650,100,200,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#4ecdc4';ctx.font='bold 48px "Noto Sans KR",sans-serif';ctx.fillText('휙',60,90);
    ctx.fillStyle='#fff';ctx.font='bold 32px "Noto Sans KR",sans-serif';ctx.fillText(ag.office||'부동산',60,180);
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='20px "Noto Sans KR",sans-serif';ctx.fillText(ag.name||'',60,220);ctx.fillText(ag.phone||'',60,255);
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='16px "Noto Sans KR",sans-serif';ctx.fillText('매물을 휙 보내드립니다',60,340);
    return new Promise(r=>c.toBlob(r,'image/png'));
  }
  async function _getOgUrl(){
    const uid=Auth.user?.id;if(!uid)return null;
    const ver=Auth.profile?.og_version,path=`agents/${uid}.png`;
    if(ver==='v2b'){const{data}=Auth.sb.storage.from('og-images').getPublicUrl(path);return data?.publicUrl||null;}
    const blob=await _genOgBlob(Auth.getAgentInfo());if(!blob)return null;
    await Auth.sb.storage.from('og-images').upload(path,blob,{upsert:true,contentType:'image/png'});
    await Auth.sb.from('profiles').update({og_version:'v2b'}).eq('id',uid);
    const{data}=Auth.sb.storage.from('og-images').getPublicUrl(path);return data?.publicUrl||null;
  }

  async function kakao(cards) {
    cards=cards||Preview.getSelected();if(!cards.length)return;
    const url=_link(cards),ag=Auth.getAgentInfo();
    const p=cards[0].property||{};
    const firstComplex=p.complex||p.location||'매물';
    const title=cards.length===1?`${firstComplex} 매물 1개`:`${firstComplex} 외 매물 ${cards.length}개`;
    const desc=cards.length===1
      ?[p.type,p.price,p.area,p.floor].filter(Boolean).join(' · ')
      :cards.map(c=>`${c.property?.type||''} ${c.property?.price||''} ${c.property?.complex||c.property?.location||''}`).join('\n');
    // 시트 먼저 닫기 (사용자 제스처 컨텍스트 유지)
    closeSheet();
    // OG 이미지 확보 (없으면 즉시 생성)
    const imageUrl=await _getOgUrl().catch(()=>null);
    console.log('[Kakao] ogUrl:',imageUrl,'link:',url);
    // 카카오 공유 호출
    try{if(typeof Kakao!=='undefined'&&Kakao.isInitialized()){
      const content={title,description:desc,link:{mobileWebUrl:url,webUrl:url}};
      if(imageUrl){content.imageUrl=imageUrl;content.imageWidth=800;content.imageHeight=420;}
      Kakao.Share.sendDefault({objectType:'feed',content,buttons:[{title:'카드로 보기',link:{mobileWebUrl:url,webUrl:url}}]});
      return;}}catch(e){console.warn('Kakao share:',e);}
    await copyLink(cards);try{window.open('kakaotalk://launch','_self');}catch(_){}
  }

  return { openSheet, closeSheet, copyLink, sms, kakao };
})();

/* ═══════════════════════════════════════════════════════════
   7. Hub — 허브 네비게이션
   ═══════════════════════════════════════════════════════════ */
const Hub = (() => {
  const VW=800,VH=700;
  let RADIUS=265, stack=[], current=null, activePanel=null;

  const MAIN=[{key:'register',label:'매물 등록',angle:-90},{key:'my',label:'내 매물',angle:-18},{key:'client',label:'손님',angle:54},{key:'alert',label:'알림',angle:126},{key:'shared',label:'공유방',angle:198}];
  const CLIENT=[{key:'cl_conditions',label:'희망 조건',angle:-90},{key:'cl_match',label:'매칭 매물',angle:-30},{key:'cl_timeline',label:'상담 기록',angle:30},{key:'cl_schedule',label:'일정/알림',angle:90},{key:'cl_contact',label:'연락처',angle:150},{key:'cl_back',label:'← 돌아가기',angle:210}];
  const PROPERTY=[{key:'pr_detail',label:'상세 정보',angle:-90},{key:'pr_status',label:'거래 상태',angle:30},{key:'pr_back',label:'← 돌아가기',angle:150}];
  const ALERT=[{key:'al_all',label:'전체 알림',angle:-90},{key:'al_calendar',label:'달력',angle:30},{key:'al_back',label:'← 돌아가기',angle:150}];

  function render(nodes,center) {
    // 인자 없이 호출 시 현재 상태 유지 (손님 상세 등에서 허브 복구 방지)
    if(!nodes&&!center&&current){nodes=current.nodes||MAIN;center=current.center;}
    nodes=nodes||MAIN;center=center||{icon:'👤',name:Auth.profile?.business_name||'중개사',sub:''};
    const v=document.getElementById('hubVisual'),hc=document.getElementById('hubCenter');if(!v||!hc)return;
    // split 상태면 무조건 세로
    if(document.getElementById('main').classList.contains('split')){current={...current,nodes,center};_renderVertical();return;}
    // 원형 모드 복원
    hc.style.cssText='';v.style.cssText='';
    const cx=VW/2,cy=VH/2;
    hc.innerHTML=`${center.tag||''}<div class="hub-center-icon">${center.icon}</div><div class="hub-center-name">${esc(center.name)}</div><div class="hub-center-sub">${esc(center.sub)}</div>`;
    let svg='',html='';
    const c=Data.cache.counts;
    nodes.forEach(n=>{
      const rad=n.angle*Math.PI/180,nx=cx+RADIUS*Math.cos(rad),ny=cy+RADIUS*Math.sin(rad);
      svg+=`<line class="hub-line" x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}"/>`;
      ['t3','t2','t1'].forEach((s,i)=>svg+=`<circle class="pulse-${s}" id="p${s}-${n.key}" cx="${cx}" cy="${cy}" r="${6-i}"/>`);
      svg+=`<circle class="pulse-head" id="ph-${n.key}" cx="${cx}" cy="${cy}" r="3.5"/>`;
      let badge='';
      if(n.key==='alert'&&c.alert)badge=`<span class="hub-node-badge alert">${c.alert}</span>`;
      if(n.key==='memo'&&c.memo)badge=`<span class="hub-node-badge">${c.memo}</span>`;
      html+=`<div class="hub-node" data-key="${n.key}" style="left:${(nx/VW*100).toFixed(1)}%;top:${(ny/VH*100).toFixed(1)}%;" onclick="Hub.onNode('${n.key}')"><div class="hub-node-inner"><span class="hub-node-label">${n.label}</span>${badge}</div></div>`;
    });
    document.getElementById('hubLines').innerHTML=svg;
    v.querySelectorAll('.hub-node').forEach(el=>el.remove());
    v.insertAdjacentHTML('beforeend',html);
    v.querySelectorAll('.hub-node').forEach((el,i)=>{setTimeout(()=>el.classList.add('appear'),30+i*40);el.addEventListener('mouseenter',()=>Pulse.start(el.dataset.key,nodes));el.addEventListener('mouseleave',()=>Pulse.stop(el.dataset.key));});
  }

  // 레이아웃 자동 조정 (패널 열림/닫힘 시)
  function adjustLayout(){
    const isSplit=document.getElementById('main').classList.contains('split');
    const hubArea=document.querySelector('.hub-area');
    const availW=isSplit&&hubArea?hubArea.offsetWidth:window.innerWidth;

    if(isSplit){_renderVertical();return;}else{
      const ratio=availW/window.innerWidth;
      RADIUS=Math.round(230*Math.max(ratio,0.45));
      render(current?.nodes,current?.center);
    }
  }

  // 세로 리스트 모드 (좁은 허브 영역)
  function _renderVertical(){
    const nodes=current?.nodes||MAIN;
    const center=current?.center||{icon:'👤',name:Auth.profile?.business_name||'중개사',sub:''};
    const v=document.getElementById('hubVisual'),hc=document.getElementById('hubCenter');
    if(!v||!hc)return;

    // SVG 숨기기
    document.getElementById('hubLines').innerHTML='';
    v.querySelectorAll('.hub-node').forEach(el=>el.remove());

    // 허브 비주얼을 flex 컬럼으로 전환
    v.style.cssText='display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;aspect-ratio:unset;max-height:none;padding:10px 0;';
    // 중앙 노드를 인라인으로
    hc.style.cssText='position:static;transform:none;width:auto;height:auto;padding:8px 16px;border-radius:14px;display:flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,0.06);';
    hc.innerHTML=`<div style="font-size:18px;">${center.icon}</div><div style="font-size:12px;font-weight:800;">${esc(center.name)}</div>`;

    // 노드를 static flex 아이템으로 — 원래 순서 유지
    nodes.forEach(n=>{
      const active=activePanel===n.key;
      const c=Data.cache.counts;let badge='';
      if(n.key==='alert'&&c.alert)badge=`<span class="hub-node-badge alert">${c.alert}</span>`;
      if(n.key==='memo'&&c.memo)badge=`<span class="hub-node-badge">${c.memo}</span>`;
      v.insertAdjacentHTML('beforeend',`<div class="hub-node appear" data-key="${n.key}" style="position:static;transform:none;cursor:pointer;width:160px;" onclick="Hub.onNode('${n.key}')"><div class="hub-node-inner" style="min-width:auto;padding:10px 0;border-radius:14px;width:100%;text-align:center;position:relative;${active?'border-color:var(--primary);background:var(--primary-bg);box-shadow:0 0 0 3px rgba(99,102,241,0.12);':''}"><span class="hub-node-label">${n.label}</span>${badge}</div></div>`);
    });

    v.querySelectorAll('.hub-node').forEach(el=>{
      el.addEventListener('mouseenter',()=>Pulse.start(el.dataset.key,nodes));
      el.addEventListener('mouseleave',()=>Pulse.stop(el.dataset.key));
    });
  }

  function onNode(key) {
    if(key==='cl_back'||key==='pr_back'||key==='al_back'){back();return;}
    if(key.startsWith('cl_')||key.startsWith('pr_')){openSub(key);return;}
    if(key.startsWith('al_')){_openAlertSub(key);return;}
    if(key==='alert'){_enterAlert();return;}
    openPanel(key);
  }

  function _enterAlert(){
    stack.push({nodes:current?.nodes||MAIN,center:current?.center});
    current={type:'alert',nodes:ALERT,center:{icon:'🔔',name:'알림',sub:''}};
    closePanel();render(ALERT,current.center);
    // 바로 전체 알림 패널 열기
    setTimeout(()=>_openAlertSub('al_all'),100);
  }

  function _openAlertSub(key){
    document.querySelectorAll('.hub-node').forEach(n=>n.classList.remove('active'));
    document.querySelector(`.hub-node[data-key="${key}"]`)?.classList.add('active');
    activePanel=key;document.getElementById('main').classList.add('split');
    _renderVertical();_hideHeaderBtns();
    const el=document.getElementById('panelArea');
    PanelAlert.renderSub(key,el);
  }

  function openPanel(key) {
    if(activePanel===key){closePanel();return;}
    document.querySelectorAll('.hub-node').forEach(n=>n.classList.remove('active'));
    document.querySelector(`.hub-node[data-key="${key}"]`)?.classList.add('active');
    activePanel=key;document.getElementById('main').classList.add('split');
    _renderVertical();_hideHeaderBtns();
    const el=document.getElementById('panelArea');
    switch(key){
      case 'register':PanelRegister.render(el);break;
      case 'my':PanelCards.render(el);break;
      case 'client':PanelClient.render(el);break;
      case 'shared':PanelShared.render(el);break;
      case 'alert':_enterAlert();return;
      case 'memo':PanelMemo.render(el);break;
      case 'settings':_settings(el);break;
    }
  }

  function openSub(key) {
    if(activePanel===key){closePanel();return;}
    document.querySelectorAll('.hub-node').forEach(n=>n.classList.remove('active'));
    document.querySelector(`.hub-node[data-key="${key}"]`)?.classList.add('active');
    // 손님 상세가 열린 상태면 탭 전환으로 처리
    if(key.startsWith('cl_')&&PanelClient._hasSelectedClient()){
      const tabMap={'cl_match':'match','cl_timeline':'timeline','cl_conditions':'conditions','cl_schedule':'timeline','cl_contact':'conditions'};
      const tab=tabMap[key];
      if(tab){PanelClient.detailTab(tab);return;}
    }
    if(key==='cl_back'){if(PanelClient._hasSelectedClient()){PanelClient.closeDetail();return;}Hub.back();return;}
    activePanel=key;document.getElementById('main').classList.add('split');
    _renderVertical();_hideHeaderBtns();
    const el=document.getElementById('panelArea');
    if(key.startsWith('cl_'))PanelClient.renderSub(key,el);
    if(key.startsWith('pr_'))PanelCards.renderSub(key,el);
  }

  function _hideHeaderBtns(){/* 헤더 버튼 항상 표시 */}
  function _showHeaderBtns(){const hr=document.getElementById('headerRight');if(hr)hr.style.display='';}

  function closePanel() {
    document.getElementById('main').classList.remove('split');
    document.querySelectorAll('.hub-node').forEach(n=>n.classList.remove('active'));
    activePanel=null;
    // 헤더 복원
    const header=document.querySelector('.header'),main=document.getElementById('main');
    header.style.transform='';main.style.marginTop='';main.style.height='';
    _showHeaderBtns();
    // 원래 반지름 복구 + 재배치
    RADIUS=265;
    setTimeout(()=>render(current?.nodes,current?.center),400);
  }

  function _buildClientCenter(card){
    const p=card.property||{};
    const _cname=card.contact_name||(p.location?p.location:'손님');
    const _csub=[p.price,p.location&&card.contact_name?p.location:null].filter(Boolean).join(' ');
    const _trades=_clientTrades(card);const _cats=_clientCats(card);
    let _wtag='';
    if(_trades.length){_trades.forEach(t=>{_cats.forEach(c=>{const s=_catStyle[c]||_catStyle['손님'];const tc=_tradeColor[t]||'#475569';_wtag+=`<span style="padding:1px 6px;border-radius:5px;font-size:8px;font-weight:700;background:${s.bg};border:1px solid ${s.border};color:${tc};margin-bottom:1px;">${esc([c,t].filter(Boolean).join(' '))}</span> `;});});
    }else if(_cats[0]!=='손님'){_cats.forEach(c=>{const s=_catStyle[c]||_catStyle['손님'];_wtag+=`<span style="padding:1px 6px;border-radius:5px;font-size:8px;font-weight:700;background:${s.bg};border:1px solid ${s.border};color:#475569;margin-bottom:1px;">${esc(c)}</span> `;});}
    return {icon:'🙋',name:_cname,sub:_csub,tag:_wtag};
  }

  function enterClient(cardOrId) {
    const card = typeof cardOrId === 'string' ? (Data.cache.clientCards||[]).find(c=>c.id===cardOrId) || {id:cardOrId} : cardOrId;
    stack.push({nodes:current?.nodes||MAIN,center:current?.center});
    current={type:'client',data:card,nodes:CLIENT,center:_buildClientCenter(card),_notes:[],_matches:[]};
    closePanel();render(CLIENT,current.center);
    Data.loadClientDetail(card.id).then(d=>{current._notes=d.notes;current._matches=d.matches;});
    if(typeof PanelClient!=='undefined'&&PanelClient._addRecent)PanelClient._addRecent(card.id);
  }

  // 원형 렌더 없이 상태만 전환 (손님 목록에서 클릭 시)
  function _enterClientDirect(card){
    if(!current||current.type!=='client'||current.data?.id!==card.id){
      stack.push({nodes:current?.nodes||MAIN,center:current?.center});
    }
    current={type:'client',data:card,nodes:CLIENT,center:_buildClientCenter(card),_notes:[],_matches:[]};
    activePanel='cl_card';
  }
  function _renderVerticalDirect(){_renderVertical();_hideHeaderBtns();}

  function enterProperty(cardOrId) {
    const card = typeof cardOrId === 'string' ? (Data.cache.myCards||[]).find(c=>c.id===cardOrId) || (Data.cache.sharedCards||[]).find(c=>c.id===cardOrId) || {id:cardOrId,property:{}} : cardOrId;
    const p=card.property||{};
    stack.push({nodes:current?.nodes||MAIN,center:current?.center});
    current={type:'property',data:card,nodes:PROPERTY,center:{icon:'🏠',name:p.complex||p.location||'매물',sub:[p.type,p.price].filter(Boolean).join(' · ')}};
    closePanel();render(PROPERTY,current.center);
  }

  function back() { if(!stack.length){closePanel();return;} const prev=stack.pop();current=null;closePanel();render(prev.nodes,prev.center); }

  async function _settings(el) {
    const pr=Auth.profile||{};

    // 데이터 로드 (병렬)
    const [todayNotes,overdueNotes,unreadMatch,tomorrowNotes,contractCards] = await Promise.all([
      Auth.sb.from('client_notes').select('id,type,content,alert_date,client_card_id').eq('agent_id',Auth.user.id).gte('alert_date',new Date().toISOString().split('T')[0]).lt('alert_date',new Date(Date.now()+86400000).toISOString().split('T')[0]).limit(10).then(r=>r.data||[]),
      Auth.sb.from('client_notes').select('id,type,content,alert_date,client_card_id').eq('agent_id',Auth.user.id).eq('alert_done',false).lt('alert_date',new Date().toISOString()).limit(10).then(r=>r.data||[]),
      Auth.sb.from('match_notifications').select('id').eq('agent_id',Auth.user.id).eq('is_read',false).limit(50).then(r=>r.data||[]),
      Auth.sb.from('client_notes').select('id,type,content,alert_date,client_card_id').eq('agent_id',Auth.user.id).gte('alert_date',new Date(Date.now()+86400000).toISOString().split('T')[0]).lt('alert_date',new Date(Date.now()+2*86400000).toISOString().split('T')[0]).limit(10).then(r=>r.data||[]),
      Auth.sb.from('cards').select('id,property,trade_status,linked_client_id,linked_agent_id').eq('agent_id',Auth.user.id).eq('trade_status','계약중').limit(20).then(r=>r.data||[])
    ]);

    const clCards=Data.cache.clientCards||[];

    // 손님 카드에서 client_card_id로 이름 찾기
    function clientName(noteOrCard){
      const cid=noteOrCard?.client_card_id||noteOrCard?.linked_client_id;
      if(!cid)return '';
      const cl=clCards.find(c=>c.id===cid);
      return cl?.property?.contact_name||cl?.contact_name||'';

    const allNotes=[...overdueNotes.map(n=>({...n,_t:'overdue'})),...todayNotes.map(n=>({...n,_t:'today'})),...tomorrowNotes.map(n=>({...n,_t:'tomorrow'}))];

    el.innerHTML=`<div class="panel-inner">${_ph(ag.office||'대시보드')}

      <!-- 프로필 -->
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);">
        <div style="flex:1;min-width:0;">
          <div style="font-size:18px;font-weight:900;letter-spacing:-0.3px;">${esc(ag.office||'부동산')}</div>
          <div style="font-size:12px;color:var(--text-light);margin-top:4px;">${esc(ag.name||'')} · ${esc(ag.phone||'')}</div>
        </div>
        <button onclick="Hub._openProfileEdit()" style="padding:7px 16px;border-radius:20px;border:none;background:var(--primary);color:#fff;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;">프로필 수정</button>
      </div>

      <!-- 로그아웃 -->
      <div style="text-align:center;padding-top:8px;">
        <span style="font-size:11px;color:var(--text-light);cursor:pointer;opacity:0.5;" onclick="Auth.logout()">로그아웃</span>
      </div>
    </div>`;
  }

  function _openProfileEdit(){
    const pr=Auth.profile||{};const m=document.getElementById('editModal');if(!m)return;

/* ═══════════════════════════════════════════════════════════
   8. Pulse — 빛 애니메이션
   ═══════════════════════════════════════════════════════════ */
const Pulse = (() => {
  let raf=null;
  function start(key,nodes) {
    nodes=nodes||Hub.current?.nodes||Hub.MAIN;const n=nodes.find(n=>n.key===key);if(!n)return;
    const fx=400,fy=350,R=Hub.RADIUS||180,rad=n.angle*Math.PI/180,tx=fx+R*Math.cos(rad),ty=fy+R*Math.sin(rad);
    const els=['ph','pt1','pt2','pt3'].map(p=>document.getElementById(`${p}-${key}`));
    els.forEach(e=>{if(e)e.classList.add('on');});
    const t0=performance.now(),dur=500,delays=[0,40,90,150];
    const anim=now=>{els.forEach((e,i)=>{if(!e)return;const t=Math.max(0,Math.min((now-t0-delays[i])/dur,1)),ease=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;e.setAttribute('cx',fx+(tx-fx)*ease);e.setAttribute('cy',fy+(ty-fy)*ease);});if((now-t0-delays[3])/dur<1)raf=requestAnimationFrame(anim);else{els.forEach(e=>{if(e){e.setAttribute('cx',fx);e.setAttribute('cy',fy);}});setTimeout(()=>{if(document.querySelector(`.hub-node[data-key="${key}"]:hover`))start(key,nodes);},200);}};
    raf=requestAnimationFrame(anim);
  }
  function stop(key){if(raf){cancelAnimationFrame(raf);raf=null;}['ph','pt1','pt2','pt3'].forEach(p=>{const e=document.getElementById(`${p}-${key}`);if(e)e.classList.remove('on');});}
  return { start, stop };
})();

  async function handleOCR(e){

    try{const resized=await Data._resize(file,1600);const b64=await new Promise(r=>{const rd=new FileReader();rd.onloadend=()=>r(rd.result.split(',')[1]);rd.readAsDataURL(resized);});
      const res=await fetch(`${HWIK_CONFIG.SUPABASE_URL}/functions/v1/extract-image`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+Auth.getToken(),'apikey':HWIK_CONFIG.SUPABASE_KEY},body:JSON.stringify({image:b64})});

  function _runSteps(){const s=document.getElementById('aiSteps');if(s)s.style.display='';[0,1500,3000,4500].forEach((d,i)=>setTimeout(()=>{const el=document.getElementById(`step${i+1}`);if(el)el.classList.add('active');},d));}

  function _isBatch(text){
    // 여러 매물인지 판별: 줄바꿈 3개 이상이면서 200자 이상, 또는 "매물" 번호 패턴
    const lines=text.split('\n').filter(l=>l.trim().length>5);
    if(lines.length>=3 && text.length>200) return true;
    if(/매물\s*\d|^\d+[.\)]/m.test(text)) return true;
    return false;
  }

  async function doRegister(){
    const inp=document.getElementById('regInput'),btn=document.getElementById('regBtn');
    if(!inp?.value?.trim())return;if(!Auth.user){Toast.show('로그인이 필요합니다');return;}
    const text=inp.value.trim();

    // 여러 건이면 대량 파싱으로
    if(_isBatch(text)){await _doBatch(text);return;}

    // 단건 등록 (기존 card_generator와 동일한 흐름)
    document.getElementById('leaveBanner').style.display='block';btn.textContent='분석 중...';btn.disabled=true;_runSteps();
    try{
      // 1. AI 파싱 (DB 저장 안 함 — 파싱만)
      const res=await fetch(`${HWIK_CONFIG.SUPABASE_URL}/functions/v1/parse-property`,{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+Auth.getToken(),'apikey':HWIK_CONFIG.SUPABASE_KEY},
        body:JSON.stringify({text})
      });
      const r=await res.json();
      if(r.error){document.getElementById('regResult').innerHTML=`<div class="reg-error">${esc(r.error)}</div>`;btn.textContent='AI로 카드 만들기';btn.disabled=false;_resetSteps();document.getElementById('leaveBanner').style.display='none';return;}

      // ★ 오분류 감지: 손님 요청인데 매물로 파싱된 경우
      if(r.type!=='손님'&&/구합|구해요|찾습|찾아요|원합|원해요|이사\s*예정|급구/.test(text)){
        if(!confirm('입력이 손님 요청처럼 보입니다.\n\n매물로 등록하시겠습니까?\n(취소 → 손님 패널에서 등록)')){btn.textContent='AI로 카드 만들기';btn.disabled=false;_resetSteps();document.getElementById('leaveBanner').style.display='none';return;}
      }

      // 2. 카드 ID 생성
      const linkId=crypto.randomUUID().slice(0,12);

      // 3. 파싱 결과 임시 저장 → 확인 팝업
      _pendingParse={r,text,linkId};
      _showConfirmPopup(r,text);
    }catch(e){document.getElementById('regResult').innerHTML=`<div class="reg-error">오류: ${esc(e.message)}</div>`;}
    document.getElementById('leaveBanner').style.display='none';btn.textContent='AI로 카드 만들기';btn.disabled=false;_resetSteps();
  }

  async function confirmSave(){
    if(!_pendingParse)return;
    const {r,text,linkId}=_pendingParse;
    const btn=document.getElementById('regBtn');
    // 저장 중 UI 피드백
    const saveBtn=document.querySelector('.modal-body .btn-primary');
    if(saveBtn){saveBtn.textContent='저장 중...';saveBtn.disabled=true;}
    try{
      // 팝업에서 수정된 값 반영
      const property={
        type:document.getElementById('cfType').value, price:document.getElementById('cfPrice').value,
        location:document.getElementById('cfLocation').value, address:r.address||null,
        complex:document.getElementById('cfComplex').value, area:document.getElementById('cfArea').value,
        floor:document.getElementById('cfFloor').value, room:r.room||null,
        features:Array.from(document.querySelectorAll('#cfTags .edit-chip')).map(el=>el.textContent.replace('✕','').trim()),
        moveIn:r.moveIn||null, category:r.category||null, rawText:text
      };
      const comment=document.getElementById('cfComment')?.value?.trim();
      const sharedMemo=document.getElementById('cfShared')?.value?.trim();
      const privateMemo=document.getElementById('cfMemo')?.value?.trim();

      // 사진 업로드 + 좌표 매칭
      const needCoord=!r.lat&&(property.complex||property.location);
      const [photoUrls,coordResult]=await Promise.all([
        pendingPhotos.length?Data.uploadPhotos(linkId,pendingPhotos.map(p=>p.file)):[],
        needCoord?Data.matchCoords(property):Promise.resolve(null)
      ]);
      const finalLat=r.lat||(coordResult?.lat)||null;
      const finalLng=r.lng||(coordResult?.lng)||null;
      const _pf=Data.parsePriceFields(property.price,property.type);

      const cardData={
        id:linkId, agent_id:Auth.user.id, style:'memo', color:property.type==='전세'?'mint':property.type==='매매'?'coral':'blue', property,
        private_note:{memo:privateMemo||null,shared_memo:sharedMemo||null,rawText:text},
        agent_comment:comment||r.agent_comment||null,
        lat:finalLat, lng:finalLng,
        embedding:r.embedding||null,
        search_text:r.search_text||null, search_text_private:r.search_text_private||null,
        price_number:_pf.price_number||r.price_number||null,
        deposit:_pf.deposit||r.deposit||null, monthly_rent:_pf.monthly_rent||r.monthly_rent||null,
        move_in_date:r.move_in_date||null, wanted_trade_type:r.wanted_trade_type||null,
        contact_name:r.contact_name||null, contact_phone:r.contact_phone||null,
        photos:photoUrls.length?photoUrls:null, trade_status:'계약가능', tags:r.tags||[]
      };

      const {error:dbErr}=await Auth.sb.from('cards').insert([cardData]);
      if(dbErr)throw new Error('저장 실패: '+dbErr.message);

      Data.updateEmbedding(linkId);
      Promise.all([Data.batchGenerateTags(linkId).catch(()=>{}),Data.locateCard(linkId)]).then(()=>Data.triggerAutoMatch(linkId));

      document.getElementById('editModal').classList.remove('show');
      document.getElementById('regResult').innerHTML='<div class="reg-success">✅ 매물 카드가 생성되었습니다!</div>';
      document.getElementById('regInput').value='';pendingPhotos=[];_renderPhotos();onInput();
      document.getElementById('regComment').value='';
      _pendingParse=null;
    }catch(e){document.getElementById('regResult').innerHTML=`<div class="reg-error">오류: ${esc(e.message)}</div>`;}
    document.getElementById('leaveBanner').style.display='none';btn.textContent='AI로 카드 만들기';btn.disabled=false;_resetSteps();
  }

  async function _doBatch(text){
    if(fiParsing)return;fiParsing=true;fiParsedCards=[];fiDeletedIds=new Set();
    const btn=document.getElementById('regBtn');btn.textContent='일괄 분석 중...';btn.disabled=true;
    document.getElementById('fiProgress').style.display='';
    const lines=text.split('\n').filter(l=>l.trim()),chunks=[];let cur='';
    lines.forEach(l=>{if((cur+'\n'+l).length>1500&&cur){chunks.push(cur);cur=l;}else cur=cur?cur+'\n'+l:l;});if(cur)chunks.push(cur);
    let done=0;
    for(const chunk of chunks){
      try{const res=await fetch(`${HWIK_CONFIG.SUPABASE_URL}/functions/v1/batch-parse`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+Auth.getToken(),'apikey':HWIK_CONFIG.SUPABASE_KEY},body:JSON.stringify({text:chunk,skip_save:true})});const d=await res.json();if(d.cards)d.cards.forEach(c=>{c._id=crypto.randomUUID();fiParsedCards.push(c);});}catch(_){}
      done++;document.getElementById('fiProgressFill').style.width=Math.round(done/chunks.length*100)+'%';document.getElementById('fiProgressText').textContent=`${done}/${chunks.length} 청크 완료`;
    }
    const seen={};fiParsedCards.forEach(c=>{const k=`${c.type||''}|${c.price||''}|${c.complex||''}`;if(seen[k]){c._dup=true;seen[k]._dup=true;}else seen[k]=c;});
    document.getElementById('fiResults').style.display='';document.getElementById('fiResultSummary').textContent=`총 ${fiParsedCards.length}건 분석 완료`;_renderFiCards();
    fiParsing=false;btn.textContent='AI로 카드 만들기';btn.disabled=false;document.getElementById('fiProgress').style.display='none';
  }

  async function _processFile(file){
    const ext=file.name.split('.').pop().toLowerCase();
    if(ext==='xlsx'||ext==='xls'){if(typeof XLSX==='undefined')await new Promise((r,j)=>{const s=document.createElement('script');s.src='https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js';s.onload=r;s.onerror=j;document.head.appendChild(s);});
      const rd=new FileReader();rd.onload=e=>{const wb=XLSX.read(e.target.result,{type:'array'}),sheet=wb.Sheets[wb.SheetNames[0]];document.getElementById('fiDirectInput').value=XLSX.utils.sheet_to_csv(sheet,{FS:'\t',RS:'\n'});Toast.show(file.name+' 로드 완료');};rd.readAsArrayBuffer(file);
    }else{const rd=new FileReader();rd.onload=e=>{document.getElementById('fiDirectInput').value=e.target.result;Toast.show(file.name+' 로드 완료');};rd.readAsText(file,'UTF-8');}
  }

    let done=0;
    for(const chunk of chunks){
      try{const res=await fetch(`${HWIK_CONFIG.SUPABASE_URL}/functions/v1/batch-parse`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+Auth.getToken(),'apikey':HWIK_CONFIG.SUPABASE_KEY},body:JSON.stringify({text:chunk,skip_save:true})});const d=await res.json();if(d.cards)d.cards.forEach(c=>{c._id=crypto.randomUUID();fiParsedCards.push(c);});}catch(_){}
      done++;document.getElementById('fiProgressFill').style.width=Math.round(done/chunks.length*100)+'%';document.getElementById('fiProgressText').textContent=`${done}/${chunks.length} 청크 완료`;
    }
    // 중복 감지
    const seen={};fiParsedCards.forEach(c=>{const k=`${c.type||''}|${c.price||''}|${c.complex||''}`;if(seen[k]){c._dup=true;seen[k]._dup=true;}else seen[k]=c;});
    document.getElementById('fiResults').style.display='';document.getElementById('fiResultSummary').textContent=`총 ${fiParsedCards.length}건 분석 완료`;_renderFiCards();
    fiParsing=false;btn.textContent='AI로 일괄 분석';btn.disabled=false;document.getElementById('fiProgress').style.display='none';
  }

  function _renderFiCards(){const el=document.getElementById('fiCardList');if(!el)return;const cards=fiParsedCards.filter(c=>!fiDeletedIds.has(c._id)&&(fiFilter==='전체'||c.type===fiFilter));
    el.innerHTML=cards.map(c=>{const cat=categorizeProperty(c.rawText||'',c.room||'',c.area||'',c.floor||'');return `<div class="fi-card-item ${c._dup?'duplicate':''}"><div class="fi-card-info"><span class="fi-card-type ${c.type==='매매'?'sale':c.type==='전세'?'jeonse':'rent'}">${esc(c.type||'')}</span><span class="fi-card-cat">${esc(cat)}</span><strong>${esc(c.price||'-')}</strong> ${esc(c.complex||'')} ${esc(c.location||'')}${c.area?' · '+esc(c.area):''}${c._dup?'<span class="fi-dup-badge">중복?</span>':''}</div><div class="fi-card-actions"><button class="fi-card-edit" onclick="PanelRegister.fiEdit('${c._id}')">수정</button><button class="fi-card-delete" onclick="PanelRegister.fiDelete('${c._id}')">삭제</button></div></div>`;}).join('');
  }
  function setFiFilter(t,btn){fiFilter=t;btn?.closest('.fi-result-filters').querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn?.classList.add('active');_renderFiCards();}
  function fiEdit(id){const c=fiParsedCards.find(x=>x._id===id);if(!c)return;const m=document.getElementById('batchEditModal');if(!m)return;m.dataset.cardId=id;document.getElementById('beType').value=c.type||'';document.getElementById('bePrice').value=c.price||'';document.getElementById('beComplex').value=c.complex||'';document.getElementById('beLocation').value=c.location||'';document.getElementById('beArea').value=c.area||'';document.getElementById('beFloor').value=c.floor||'';m.classList.add('show');}
  function fiBatchSaveEdit(){const m=document.getElementById('batchEditModal'),c=fiParsedCards.find(x=>x._id===m?.dataset.cardId);if(!c)return;c.type=document.getElementById('beType').value;c.price=document.getElementById('bePrice').value;c.complex=document.getElementById('beComplex').value;c.location=document.getElementById('beLocation').value;c.area=document.getElementById('beArea').value;c.floor=document.getElementById('beFloor').value;m.classList.remove('show');_renderFiCards();}
  function fiDelete(id){fiDeletedIds.add(id);_renderFiCards();document.getElementById('fiResultSummary').textContent=`총 ${fiParsedCards.filter(c=>!fiDeletedIds.has(c._id)).length}건`;}

  async function fiSaveAll(){
    const cards=fiParsedCards.filter(c=>!fiDeletedIds.has(c._id));if(!cards.length||!Auth.user)return;
    document.getElementById('leaveBanner').style.display='';const btn=document.getElementById('fiSaveBtn');btn.textContent='저장 중...';btn.disabled=true;let saved=0;const savedIds=[];
    for(const c of cards){try{const prop={type:c.type,price:c.price,complex:c.complex,location:c.location,area:c.area,floor:c.floor,room:c.room,features:c.features||[],rawText:c.rawText||''};
      const coords=await Data.matchCoords(prop);if(coords.lat){prop.lat=coords.lat;prop.lng=coords.lng;}
      const _pf=Data.parsePriceFields(c.price,c.type);
      const {data:sv}=await Auth.sb.from('cards').insert({agent_id:Auth.user.id,property:prop,trade_status:'계약가능',tags:c.tags||[],embedding:c.embedding||null,search_text:c.search_text||null,search_text_private:c.search_text_private||null,price_number:_pf.price_number||c.price_number||null,deposit:_pf.deposit||c.deposit||null,monthly_rent:_pf.monthly_rent||c.monthly_rent||null}).select('id').single();
      if(sv){savedIds.push(sv.id);Data.locateCard(sv.id).then(()=>Data.triggerAutoMatch(sv.id));}saved++;btn.textContent=`저장 중... (${saved}/${cards.length})`;
    }catch(_){}}
    document.getElementById('leaveBanner').style.display='none';Toast.show(`${saved}건 저장 완료`);btn.textContent='전체 저장';btn.disabled=false;fiParsedCards=[];fiDeletedIds=new Set();document.getElementById('fiResults').style.display='none';document.getElementById('fiDirectInput').value='';
    // 저장 직후 태그 + 임베딩 보완 (백그라운드)
    if(saved>0){
      Data.batchGenerateTags().then(r=>{if(r?.updated)console.log(`태그 생성: ${r.updated}건`);});
      savedIds.slice(0,5).forEach((id,i)=>setTimeout(()=>Data.updateEmbedding(id),i*1500));
    }
  }

  return { render, onInput, handlePhotos, removePhoto, handleOCR, doRegister, handleFile, setFiFilter, fiEdit, fiBatchSaveEdit, fiDelete, fiSaveAll, addCfTag, confirmSave };
})();

  async function doShare(singleOrMulti,roomId){
    const m=document.getElementById('shareToRoomModal');
    const cards=m?._cards||[];
    let success=0;
    if(singleOrMulti!=='multi'){
      // 단건
      const {error}=await Data.shareCardToRoom(singleOrMulti,roomId);
      if(!error)success=1;else if(error?.code==='23505')Toast.show('이미 공유된 매물입니다');else Toast.show('공유 실패: '+(error?.message||''));
    }else{
      // 여러 건
      for(const card of cards){
        const {error}=await Data.shareCardToRoom(card.id,roomId);
        if(!error)success++;
      }
    }
    if(success)Toast.show(`${success}개 매물이 공유됐어요!`);
    m?.classList.remove('show');
  }

  async function saveEdit(id){

  async function chgStatus(id,st){

      _showClientPicker(id,st);return;

  async function _showClientPicker(cardId,newStatus){
    const card=Data.cache.myCards.find(x=>x.id===cardId);
    const clients=Data.cache.clientCards||[];
    // 매칭된 손님 찾기 (같은 거래유형+카테고리)
    const cp=card?.property||{};
    const matched=clients.filter(c=>{
      const wp=c.property||{};
      if(c.wanted_trade_type&&cp.type&&c.wanted_trade_type!==cp.type)return false;
      if(wp.category&&cp.category&&wp.category!==cp.category)return false;
      return true;
    }).slice(0,10);
    const recent=clients.filter(c=>!matched.some(m=>m.id===c.id)).slice(0,5);

    const m=document.getElementById('editModal');if(!m)return;
    m.innerHTML=`<div class="modal-content edit-modal" style="max-width:500px;"><div class="modal-header">어떤 손님과 ${newStatus==='완료'?'계약 완료':'계약 진행'}인가요?<button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('show')">✕</button></div><div class="modal-body" style="max-height:60vh;overflow-y:auto;">

      <div style="margin-top:12px;text-align:center;"><button class="btn-cancel" onclick="PanelCards._pickClient('${cardId}','${newStatus}','')">손님 연결 없이 변경</button></div>

  async function _pickClient(cardId,newStatus,clientId){
    document.getElementById('editModal')?.classList.remove('show');
    const myId=Auth.user?.id;
    // 매물이 내 것인지 공유 매물인지 확인
    const card=Data.cache.myCards.find(x=>x.id===cardId);
    const isMyCard=!!card;
    // 양방향 연결: 매물→손님, 손님→매물
    const updates={trade_status:newStatus,linked_client_id:clientId||null};
    if(!isMyCard)updates.linked_agent_id=myId; // 공유 매물이면 내 ID 기록
    const ops=[Auth.sb.from('cards').update(updates).eq('id',cardId)];
    if(clientId){
      ops.push(Auth.sb.from('cards').update({linked_card_id:cardId}).eq('id',clientId));
    }

  async function _renderList(){
    let cards=[...Data.cache.clientCards];
    // 거래유형 필터
    if(_tradeFilter){
      cards=cards.filter(c=>c.wanted_trade_type===_tradeFilter);
    }
    // 종류 필터
    if(_catFilter){
      const catAliases={villa:['villa','room','빌라','다세대','연립']};
      cards=cards.filter(c=>{
        const wc=c.wanted_categories||[];
        const cat=c.property?.category||'';
        if(_catFilter==='villa') return wc.some(v=>catAliases.villa.includes(v))||catAliases.villa.includes(cat);
        return wc.includes(_catFilter)||cat===_catFilter;
      });
    }
    if(cQuery.trim()){cards=Search.local(cQuery,cards);_renderItems(cards);return;}

    // 긴급도 정렬: 일정 로드 → 점수 부여
    const ids=cards.map(c=>c.id);
    let noteMap={};
    try{
      const{data}=await Auth.sb.from('client_notes').select('client_card_id,type,alert_date,alert_done,created_at').in('client_card_id',ids).order('created_at',{ascending:false});
      (data||[]).forEach(n=>{if(!noteMap[n.client_card_id])noteMap[n.client_card_id]=[];noteMap[n.client_card_id].push(n);});
    }catch(_){}

    const now=Date.now(),DAY=86400000;
    cards=cards.map(c=>{
      const notes=noteMap[c.id]||[];
      const lastNote=notes[0];
      const lastDate=lastNote?new Date(lastNote.created_at).getTime():0;
      const daysSince=lastDate?Math.floor((now-lastDate)/DAY):999;

      let urgency=0;
      // 지연 일정 (최우선)
      if(notes.some(n=>n.alert_date&&!n.alert_done&&new Date(n.alert_date)<new Date())) urgency=100;
      // 오늘 일정
      else if(notes.some(n=>n.alert_date&&!n.alert_done&&new Date(n.alert_date).toDateString()===new Date().toDateString())) urgency=80;
      // 최근 활동 (3일 이내)
      else if(daysSince<=3) urgency=60;
      // 오래 연락 안 함 (7일+)
      else if(daysSince>=7&&daysSince<999) urgency=50;
      // 신규 (메모 없음)
      else if(!lastNote) urgency=40;
      // 나머지
      else urgency=30;

      return {...c,_urgency:urgency,_daysSince:daysSince};
    });

    // 계약중 손님 최상위 → 최근 본 → 나머지 긴급도순
    const recent=_getRecent();
    const contractCards=[], recentCards=[], restCards=[], completedCards=[];
    // 계약중: linked_card_id가 있거나, 매물에서 linked_client_id로 연결된 손님
    const linkedClientIds=new Set((Data.cache.myCards||[]).filter(m=>m.linked_client_id&&m.trade_status==='계약중').map(m=>m.linked_client_id));
    cards.forEach(c=>{
      if(c.client_status==='계약완료') completedCards.push(c);
      else if(linkedClientIds.has(c.id)||c.linked_card_id)contractCards.push(c);
      else if(recent.includes(c.id))recentCards.push(c);
      else restCards.push(c);
    });
    // 최근 본 순서 유지
    recentCards.sort((a,b)=>recent.indexOf(a.id)-recent.indexOf(b.id));
    // 나머지는 긴급도순
    restCards.sort((a,b)=>{if(b._urgency!==a._urgency)return b._urgency-a._urgency;return new Date(b.created_at)-new Date(a.created_at);});
    // 완료는 최근순
    completedCards.sort((a,b)=>new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at));

    _renderItems([...contractCards,...recentCards,...restCards], recentCards.length, contractCards.length, noteMap, completedCards);
  }

  function _stageTag(lastNoteType){
    const t=lastNoteType||'메모';
    const s=TAG_STYLES[t]||TAG_STYLES['메모'];
    return {color:s.color, bg:s.bg, label:t==='메모'?'신규':t};
  }

  async function _renderItems(cards, recentCount, contractCount=0, noteMapFromList=null, completedCards=[]){const el=document.getElementById('clList');if(!el)return;if(!cards.length&&!completedCards.length){el.innerHTML='<div class="empty"><div class="empty-icon">🙋</div>손님이 없어요</div>';return;}
    // 마지막 메모: _renderList에서 전달받으면 재사용, 아니면 조회
    let lastNotes={};
    if(noteMapFromList){Object.entries(noteMapFromList).forEach(([cid,notes])=>{if(notes[0])lastNotes[cid]=notes[0];});}
    else{try{const ids=cards.map(c=>c.id);const{data}=await Auth.sb.from('client_notes').select('client_card_id,type,created_at').in('client_card_id',ids).order('created_at',{ascending:false});
      (data||[]).forEach(n=>{if(!lastNotes[n.client_card_id])lastNotes[n.client_card_id]=n;});}catch(_){}}

    // 스크롤 시 등록 영역 접기
    el.onscroll=()=>{if(_regOpen&&el.scrollTop>50){_regOpen=false;const body=document.getElementById('clientRegBody'),toggle=document.getElementById('clientRegToggle');if(body)body.style.display='none';if(toggle)toggle.style.transform='rotate(-90deg)';}};

    let html='';

    cards.forEach((c,idx)=>{
      if(contractCount>0&&idx===contractCount)html+=`<div style="height:1px;background:var(--border);margin:12px 0;"></div>`;
      if(idx===contractCount&&recentCount>0)html+=`<div style="font-size:11px;font-weight:700;color:var(--primary);padding:8px 0 4px;">🕐 최근 본 손님</div>`;
      if(recentCount>0&&idx===contractCount+recentCount)html+=`<div style="height:1px;background:var(--border);margin:12px 0;"></div><div style="font-size:11px;font-weight:700;color:var(--text-sub);padding:4px 0 4px;">전체 손님</div>`;
      const p=c.property||{},name=c.contact_name||p.location||p.complex||'손님',conds=[p.price,p.location,p.complex,p.area].filter(Boolean).map(v=>esc(v)).join(' · ');
      // 상태 색상 (마지막 메모 타입 기반)
      const lastNote=lastNotes[c.id];
      const stage=_stageTag(lastNote?.type);
      // 마지막 연락 표시
      let lastStr='';
      if(lastNote){const diff=Math.floor((Date.now()-new Date(lastNote.created_at))/(1000*60*60*24));
        if(diff<0)lastStr='방금';else if(diff===0)lastStr='오늘';else if(diff===1)lastStr='어제';else lastStr=diff+'일 전';
        const dateColor=diff<0?'#22c55e':diff>7?'#ef4444':diff>3?'#f59e0b':'#22c55e';
        lastStr=`<span style="font-size:10px;color:${dateColor};margin-left:8px;">· ${lastStr}</span>`;
      }

      html+=`<div class="item client-item" data-id="${c.id}" style="border-left:3px solid ${stage.color};${_selectedClient?.id===c.id?'background:var(--primary-bg);':''}" onclick='PanelClient.selectClient(JSON.parse(decodeURIComponent("${encodeURIComponent(JSON.stringify(c))}")))'>

        ${clientWantTag(c)}
        <div class="item-body">
          <div class="item-name">${esc(name)}${lastStr}</div>
          <div class="item-sub">${conds}</div>
        </div>
        ${c.contact_phone?`<span class="client-phone">${esc(c.contact_phone)}</span>`:''}
      </div>`;});
    // 더보기 (PAGE 이상이면 다음 페이지 있을 수 있음)
    if(cards.length>=50 && !cQuery.trim()){
      html+=`<div style="text-align:center;padding:16px 0;"><button onclick="PanelClient._loadMore()" style="padding:10px 32px;border-radius:10px;border:1.5px solid var(--primary);background:transparent;color:var(--primary);font-size:13px;font-weight:700;cursor:pointer;">더보기</button></div>`;
    }
    // 계약완료 손님 (접히는 섹션)
    if(completedCards.length){
      html+=`<div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px;">
        <div onclick="var b=document.getElementById('completedSection');var a=this.querySelector('span');if(b.style.display==='none'){b.style.display='';a.textContent='▼';}else{b.style.display='none';a.textContent='▶';}" style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 0;">
          <span style="font-size:10px;color:var(--text-light);">▶</span>
          <span style="font-size:11px;font-weight:700;color:#15803d;">✅ 계약완료 (${completedCards.length}건)</span>
        </div>
        <div id="completedSection" style="display:none;">`;
      completedCards.forEach(c=>{
        const p=c.property||{},name=c.contact_name||p.location||p.complex||'손님';
        const conds=[p.price,p.location,p.complex].filter(Boolean).map(v=>esc(v)).join(' · ');
        html+=`<div class="item client-item" data-id="${c.id}" style="border-left:3px solid #15803d;opacity:0.6;" onclick='PanelClient.selectClient(JSON.parse(decodeURIComponent("${encodeURIComponent(JSON.stringify(c))}")))'>
          ${clientWantTag(c)}
          <div class="item-body"><div class="item-name">${esc(name)}</div><div class="item-sub">${conds}</div></div>
        </div>`;

  function _parseNote(text){
    const r={type:'메모',content:text,alert_date:null,hasTime:false,timeStr:'',urgent:false};if(!text)return r;
    const t=text;
    // 타입 판별 (우선순위: 잔금 > 계약 > 가계약 > 방문 > 매물소개 > 카톡 > 전화 > 메모)
    if(/잔금|이사|입주|잔금정산|열쇠인수|명도|인도|퇴거/.test(t))r.type='잔금';
    else if(/계약서|사인|도장|계약금|중도금|특약|날인|배액|서류|등기|인감|확정일자|전입신고|HUG|전세보증|거래신고|실거래신고|법무사|취득세|양도세|권리증|자금조달/.test(t))r.type='계약';
    else if(/가계약|구두계약|예약금|선입금/.test(t))r.type='가계약';
    else if(/방문|현장|보러|봤|투어|임장/.test(t))r.type='방문';
    else if(/보내|전송|소개|공유|휙|링크|카드/.test(t))r.type='매물소개';
    else if(/카톡|문자|톡|메시지|답장|회신/.test(t))r.type='카톡';
    else if(/전화|통화|연락|콜백|콜|부재|재연락|문의/.test(t))r.type='전화';
    // 긴급
    if(/급|빨리|긴급|ASAP|당장|즉시|최대한\s*빨리/.test(t))r.urgent=true;
    // 시간 파싱
    let hour=null,minute=0;
    const pmM=t.match(/오후\s*(\d{1,2})\s*시?\s*(?:(\d{1,2})\s*분|반)?/);
    if(pmM){hour=parseInt(pmM[1]);if(hour<12)hour+=12;minute=pmM[2]?parseInt(pmM[2]):(/오후.*반/.test(t)?30:0);}
    if(hour===null){const amM=t.match(/오전\s*(\d{1,2})\s*시?\s*(?:(\d{1,2})\s*분|반)?/);if(amM){hour=parseInt(amM[1]);minute=amM[2]?parseInt(amM[2]):(/오전.*반/.test(t)?30:0);}}
    if(hour===null){const hm=t.match(/(\d{1,2})\s*시\s*반/);if(hm){hour=parseInt(hm[1]);minute=30;if(hour>=1&&hour<=6&&!/오전|새벽/.test(t))hour+=12;}
      else{const tm=t.match(/(\d{1,2})\s*시\s*(?:(\d{1,2})\s*분)?/);if(tm){hour=parseInt(tm[1]);minute=parseInt(tm[2])||0;if(hour>=1&&hour<=6&&!/오전|새벽/.test(t))hour+=12;}}}
    if(hour===null){if(/새벽/.test(t))hour=5;else if(/아침/.test(t))hour=9;else if(/오전/.test(t))hour=10;else if(/점심/.test(t))hour=12;else if(/오후/.test(t))hour=14;else if(/저녁/.test(t))hour=18;else if(/퇴근\s*후|퇴근후/.test(t))hour=19;else if(/밤/.test(t))hour=21;}
    if(hour===0){r.hasTime=true;r.timeStr='자정';}
    else if(hour!==null){r.hasTime=true;r.timeStr=hour<12?`오전 ${hour}시${minute?minute+'분':''}`:hour===12?`낮 12시${minute?minute+'분':''}`:`오후 ${hour-12}시${minute?minute+'분':''}`;}
    // 날짜 파싱
    const now=new Date();let bd=null;const dayN={일:0,월:1,화:2,수:3,목:4,금:5,토:6};
    // "다다음주 X요일"
    const nnwD=t.match(/다다음\s*주\s*(일|월|화|수|목|금|토)/);
    if(nnwD){bd=new Date(now);bd.setDate(bd.getDate()+(14-now.getDay())+dayN[nnwD[1]]);}
    // "다음주 X요일"
    if(!bd){const nwD=t.match(/다음\s*주\s*(일|월|화|수|목|금|토)/);if(nwD){bd=new Date(now);bd.setDate(bd.getDate()+(7-now.getDay())+dayN[nwD[1]]);}}
    // "이번주 X요일"
    if(!bd){const twD=t.match(/이번\s*주\s*(일|월|화|수|목|금|토)/);if(twD){bd=new Date(now);const diff=dayN[twD[1]]-now.getDay();bd.setDate(bd.getDate()+(diff>=0?diff:diff+7));}}
    if(!bd){
      if(/오늘/.test(t))bd=new Date(now);
      else if(/내일/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+1);}
      else if(/모레/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+2);}
      else if(/글피/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+3);}
      // 주말 버그 수정: 토요일까지 남은 일수 (0이면 다음주 토요일)
      else if(/주말/.test(t)){bd=new Date(now);const daysToSat=(6-now.getDay()+7)%7;bd.setDate(bd.getDate()+(daysToSat===0?7:daysToSat));}
      // "다다음주" (요일 없이)
      else if(/다다음\s*주/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+14);}
      else if(/다음\s*주/.test(t)){bd=new Date(now);bd.setDate(bd.getDate()+7);}
      // "월말"
      else if(/월말/.test(t)){bd=new Date(now.getFullYear(),now.getMonth()+1,0);}
      // "월초"
      else if(/월초/.test(t)){const m=now.getDate()<=5?now.getMonth():now.getMonth()+1;bd=new Date(now.getFullYear(),m,1);}
      else{
        // "N일 후/뒤"
        const nD=t.match(/(\d+)\s*일\s*[후뒤]/);if(nD){bd=new Date(now);bd.setDate(bd.getDate()+parseInt(nD[1]));}
        // "N주 후/뒤"
        if(!bd){const nW=t.match(/(\d+)\s*주\s*[후뒤]/);if(nW){bd=new Date(now);bd.setDate(bd.getDate()+parseInt(nW[1])*7);}}
        // "M월 D일"
        if(!bd){const dm=t.match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/);if(dm){const m=parseInt(dm[1])-1,d=parseInt(dm[2]);let y=now.getFullYear();if(m<now.getMonth()||(m===now.getMonth()&&d<now.getDate()))y++;bd=new Date(y,m,d);}}
        // "M/D"
        if(!bd){const sm=t.match(/(?<!\d)(\d{1,2})\/(\d{1,2})(?!\d)/);if(sm&&parseInt(sm[1])<=12&&parseInt(sm[2])<=31){const m=parseInt(sm[1])-1,d=parseInt(sm[2]);let y=now.getFullYear();if(m<now.getMonth()||(m===now.getMonth()&&d<now.getDate()))y++;bd=new Date(y,m,d);}}
        // "X요일"
        if(!bd){const dowM=t.match(/(일|월|화|수|목|금|토)\s*요일/);if(dowM){bd=new Date(now);bd.setDate(bd.getDate()+((dayN[dowM[1]]-now.getDay()+7)%7||7));}}
      }
    }
    // 콜백/재연락 — 시간 없으면 1시간 후로
    if(!bd&&/콜백|재연락|다시\s*전화|다시\s*연락|팔로업|follow/i.test(t)){
      bd=new Date(now);if(hour===null){bd.setTime(bd.getTime()+3600000);hour=bd.getHours();minute=bd.getMinutes();r.hasTime=true;r.timeStr=hour<12?`오전 ${hour}시`:`오후 ${hour-12}시`;}
    }
    // 시간만 있고 날짜 없으면 오늘 (단, 이미 지난 시간이면 내일)
    if(!bd&&hour!==null){bd=new Date(now);if(hour<now.getHours()||(hour===now.getHours()&&minute<=now.getMinutes())){bd.setDate(bd.getDate()+1);}}
    if(bd){if(hour!==null)bd.setHours(hour,minute,0,0);else bd.setHours(9,0,0,0);r.alert_date=bd.toISOString();}
    return r;
  }

  function pvNote(text){const el=document.getElementById('notePv');if(!el)return;if(!text.trim()){el.style.display='none';return;}
    const p=_parseNote(text),parts=[];
    if(p.urgent)parts.push('<span style="color:#ef4444;">🔴 긴급</span>');
    parts.push(renderTag(p.type));
    if(p.alert_date){const d=new Date(p.alert_date),days=['일','월','화','수','목','금','토'];parts.push(`<span style="color:#facc15;">📅 ${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})${p.hasTime?' '+p.timeStr:''}</span>`);}
    el.innerHTML=parts.join(' · ');el.style.display='';}

  async function _updateClientTags(cardId,text){
    try{
      const newTags=[];const isRequired=/꼭|필수|반드시|무조건/.test(text);
      for(const[kw,tag]of Object.entries(_memoTagKeywords)){if(text.includes(kw))newTags.push(tag);}
      // 지역 태그 감지
      const guM=text.match(/([\uAC00-\uD7AF]+구)/);
      if(guM&&_guCoords[guM[1]]){newTags.push(guM[1]);newTags.push('서울');}
      const dongM=text.match(/([\uAC00-\uD7AF]{2,}[0-9]*동)(?:\s|$|,)/);
      if(dongM&&!/^(행동|이동|활동|운동|감동|변동|작동|기동|동동|충동|발동)$/.test(dongM[1]))newTags.push(dongM[1]);
      // 제외 태그 감지 ("반지하 빼고", "옥탑 싫어요")
      const excludeMap={'반지하':'반지하','옥탑':'옥탑','1층':'1층','저층':'저층','북향':'북향','복도식':'복도식'};
      const newExcluded=[];
      for(const[kw,tag]of Object.entries(excludeMap)){if(new RegExp(kw+'\\s*(?:빼|싫|안돼|제외|말고|안되)').test(text))newExcluded.push(tag);}
      if(!newTags.length&&!newExcluded.length)return;
      // 기존 태그 로드
      const{data:card}=await Auth.sb.from('cards').select('tags,required_tags,excluded_tags,lat,lng').eq('id',cardId).single();
      if(!card)return;
      const tags=[...new Set([...(card.tags||[]),...newTags])];
      const updates={tags};
      if(isRequired){const rt=[...new Set([...(card.required_tags||[]),...newTags])];updates.required_tags=rt;}
      if(newExcluded.length){const et=[...new Set([...(card.excluded_tags||[]),...newExcluded])];updates.excluded_tags=et;}
      // 좌표 없으면 구 좌표 설정
      if(!card.lat&&guM&&_guCoords[guM[1]]){updates.lat=_guCoords[guM[1]].lat;updates.lng=_guCoords[guM[1]].lng;}
      await Auth.sb.from('cards').update(updates).eq('id',cardId);
    }catch(e){console.warn('updateClientTags:',e)}
  }
