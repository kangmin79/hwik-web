<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휙 E2E 테스트 - 3명의 중개사</title>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0f172a; color:#e2e8f0; font-family:-apple-system,sans-serif; padding:20px; max-width:1400px; margin:0 auto; }
        h1 { color:#facc15; margin-bottom:8px; }
        h2 { color:#0ea5e9; margin:16px 0 8px; font-size:15px; }
        h3 { color:#4ecdc4; margin:12px 0 6px; font-size:13px; }
        .subtitle { color:#94a3b8; font-size:13px; margin-bottom:20px; }
        .agent-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
        .agent-card { background:#1e293b; border-radius:12px; padding:16px; border:1px solid rgba(255,255,255,0.08); }
        .agent-name { font-size:16px; font-weight:700; margin-bottom:4px; }
        .agent-office { color:#94a3b8; font-size:12px; }
        .btn-group { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
        button { padding:10px 20px; border-radius:8px; border:none; background:#facc15; color:#0f172a; font-weight:700; cursor:pointer; font-size:13px; }
        button:hover { opacity:0.9; }
        button:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-blue { background:#0ea5e9; color:#fff; }
        .btn-green { background:#4ecdc4; color:#0f172a; }
        .btn-red { background:#ef4444; color:#fff; }
        .results { background:#1e293b; border-radius:12px; padding:16px; margin-bottom:16px; }
        .step { padding:8px 0; border-bottom:1px solid #334155; display:flex; align-items:center; gap:10px; }
        .step:last-child { border-bottom:none; }
        .step-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
        .step-pass { background:rgba(74,222,128,0.2); color:#4ade80; }
        .step-fail { background:rgba(248,113,113,0.2); color:#f87171; }
        .step-wait { background:rgba(148,163,184,0.2); color:#94a3b8; }
        .step-run { background:rgba(250,204,21,0.2); color:#facc15; }
        .step-text { flex:1; font-size:13px; }
        .step-detail { color:#64748b; font-size:11px; }
        .issue { background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.2); border-radius:8px; padding:10px; margin:6px 0; }
        .issue-title { color:#f87171; font-weight:700; font-size:12px; }
        .issue-desc { color:#fca5a5; font-size:12px; margin-top:4px; }
        .suggest { background:rgba(78,205,196,0.08); border:1px solid rgba(78,205,196,0.2); border-radius:8px; padding:10px; margin:6px 0; }
        .suggest-title { color:#4ecdc4; font-weight:700; font-size:12px; }
        .suggest-desc { color:#94a3b8; font-size:12px; margin-top:4px; }
        .summary { display:flex; gap:20px; margin:20px 0; }
        .summary-box { background:#1e293b; border-radius:12px; padding:16px; text-align:center; flex:1; }
        .summary-num { font-size:28px; font-weight:800; }
        .summary-label { font-size:12px; color:#94a3b8; }
        #log { background:#0f172a; border:1px solid #334155; border-radius:8px; padding:12px; font-size:11px; color:#64748b; max-height:400px; overflow-y:auto; white-space:pre-wrap; margin-top:16px; }
        .progress { height:4px; background:#1e293b; border-radius:2px; margin:12px 0; }
        .progress-bar { height:100%; background:#facc15; border-radius:2px; transition:width 0.3s; }
    </style>
</head>
<body>
    <h1>휙 E2E 테스트</h1>
    <div class="subtitle">3명의 가상 중개사가 휙의 전체 프로세스를 테스트합니다</div>

    <div class="agent-cards">
        <div class="agent-card" style="border-left:3px solid #FF6B6B;">
            <div class="agent-name" style="color:#FF6B6B">김영수</div>
            <div class="agent-office">한강공인중개사 · 마포구</div>
            <div style="margin-top:8px;font-size:11px;color:#94a3b8">아파트/오피스텔 · 전세 손님 위주</div>
        </div>
        <div class="agent-card" style="border-left:3px solid #4DABF7;">
            <div class="agent-name" style="color:#4DABF7">이지은</div>
            <div class="agent-office">미래부동산 · 강남구</div>
            <div style="margin-top:8px;font-size:11px;color:#94a3b8">아파트/상가 · 매매 손님 위주</div>
        </div>
        <div class="agent-card" style="border-left:3px solid #51CF66;">
            <div class="agent-name" style="color:#51CF66">박성호</div>
            <div class="agent-office">열린공인중개사 · 송파구</div>
            <div style="margin-top:8px;font-size:11px;color:#94a3b8">아파트/원투룸 · 월세 손님 위주</div>
        </div>
    </div>

    <div class="btn-group">
        <button onclick="runFullTest()">전체 테스트 실행</button>
        <button class="btn-blue" onclick="downloadReport()">리포트 다운로드</button>
    </div>

    <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

    <div class="summary" id="summary" style="display:none">
        <div class="summary-box"><div class="summary-num" style="color:#4ade80" id="passNum">0</div><div class="summary-label">통과</div></div>
        <div class="summary-box"><div class="summary-num" style="color:#f87171" id="failNum">0</div><div class="summary-label">실패</div></div>
        <div class="summary-box"><div class="summary-num" style="color:#fb923c" id="issueNum">0</div><div class="summary-label">이슈</div></div>
        <div class="summary-box"><div class="summary-num" style="color:#4ecdc4" id="suggestNum">0</div><div class="summary-label">제안</div></div>
    </div>

    <div id="testResults"></div>
    <div id="log" style="display:none"></div>

<script>
    const SUPABASE_URL = HWIK_CONFIG.SUPABASE_URL;
    const SUPABASE_KEY = HWIK_CONFIG.SUPABASE_KEY;
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 테스트에 사용할 실제 유저 ID (현재 로그인 유저)
    const MY_USER_ID = '219ecf54-6879-4636-8fb2-45ca8591c748';

    let _log = '';
    let _pass = 0, _fail = 0;
    let _issues = [], _suggests = [];

    function log(msg) { _log += msg + '\n'; }
    function issue(title, desc) { _issues.push({title, desc}); log(`[이슈] ${title}: ${desc}`); }
    function suggest(title, desc) { _suggests.push({title, desc}); log(`[제안] ${title}: ${desc}`); }

    function progress(pct) {
        document.getElementById('progressBar').style.width = pct + '%';
    }

    function downloadReport() {
        const blob = new Blob([_log], {type:'text/plain;charset=utf-8'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `hwik_e2e_test_${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
    }

    // ========== 테스트 함수들 ==========

    async function testDBConnection() {
        const { data, error } = await sb.from('cards').select('id').limit(1);
        if (error) return { pass:false, detail:'DB 연결 실패: ' + error.message };
        return { pass:true, detail:'DB 연결 OK' };
    }

    async function testLoadCards() {
        const { data, error } = await sb.from('cards')
            .select('id, property, trade_status, price_number, created_at')
            .eq('agent_id', MY_USER_ID)
            .order('created_at', {ascending:false})
            .limit(30);
        if (error) return { pass:false, detail:'매물 로드 실패: ' + error.message };
        if (!data || data.length === 0) return { pass:false, detail:'매물 0건 (데이터 없음)' };

        // 검증
        let issues = [];
        data.forEach((c, i) => {
            if (!c.property) issues.push(`[${i}] property null`);
            if (!c.property?.type) issues.push(`[${i}] type 없음`);
            if (!c.property?.category) issues.push(`[${i}] category 없음 (${c.property?.complex || '?'})`);
            if (c.price_number === null && c.property?.type !== '손님') issues.push(`[${i}] price_number null (${c.property?.price || '?'})`);
        });

        const noCategory = data.filter(c => !c.property?.category && c.property?.type !== '손님').length;
        if (noCategory > 0) issue('category 미저장', `${noCategory}/${data.length}건 category 없음. 검색/필터 정확도 저하`);

        const noPrice = data.filter(c => !c.price_number && c.property?.type !== '손님').length;
        if (noPrice > 0) issue('price_number 미저장', `${noPrice}/${data.length}건 price_number 없음. 가격 정렬/필터 불가`);

        return { pass:issues.length === 0, detail:`${data.length}건 로드. 문제: ${issues.length > 0 ? issues.slice(0,3).join(', ') : '없음'}` };
    }

    async function testEmbeddings() {
        const { data, error } = await sb.from('cards')
            .select('id, embedding')
            .eq('agent_id', MY_USER_ID)
            .limit(100);
        if (error) return { pass:false, detail:'임베딩 조회 실패' };

        const total = data?.length || 0;
        const withEmbed = data?.filter(c => c.embedding !== null).length || 0;
        const noEmbed = total - withEmbed;

        if (noEmbed > total * 0.1) issue('임베딩 누락', `${noEmbed}/${total}건 임베딩 없음. 벡터 검색 불가`);

        return { pass: noEmbed === 0, detail:`${withEmbed}/${total}건 임베딩 있음 (누락: ${noEmbed})` };
    }

    async function testSearchProperty() {
        const startTime = Date.now();
        try {
            const resp = await fetch(`${SUPABASE_URL}/functions/v1/search-property`, {
                method: 'POST',
                headers: {'Content-Type':'application/json', 'Authorization':'Bearer ' + SUPABASE_KEY},
                body: JSON.stringify({query:'아파트 전세', agent_id: MY_USER_ID, limit:10, trade_type:'전세', property_type:'apartment'})
            });
            const elapsed = Date.now() - startTime;
            const data = await resp.json();

            if (!resp.ok) return { pass:false, detail:`검색 API 에러 ${resp.status}: ${data.error || '?'}` };

            const results = data.results || [];

            // 검증: 전세 아파트만 나와야 함
            const wrongType = results.filter(r => r.property?.type !== '전세').length;
            if (wrongType > 0) issue('검색 필터 오류', `'아파트 전세' 검색에 전세 아닌 매물 ${wrongType}건 포함`);

            if (elapsed > 5000) issue('검색 느림', `${elapsed}ms 소요 (5초 초과)`);
            else if (elapsed > 3000) suggest('검색 속도 개선', `${elapsed}ms 소요. Claude 파싱 건너뛰기 적용 확인`);

            return { pass: wrongType === 0 && resp.ok, detail:`${results.length}건 결과, ${elapsed}ms 소요` };
        } catch(e) {
            return { pass:false, detail:'검색 API 호출 실패: ' + e.message };
        }
    }

    async function testShareRooms() {
        const { data, error } = await sb.from('share_rooms').select('id, name, owner_id').eq('owner_id', MY_USER_ID);
        if (error) return { pass:false, detail:'공유방 조회 실패' };

        if (!data || data.length === 0) {
            suggest('공유방 테스트', '공유방이 없어서 공유 기능 테스트 불가');
            return { pass:true, detail:'공유방 0개 (테스트 데이터 없음)' };
        }

        return { pass:true, detail:`${data.length}개 공유방` };
    }

    async function testSharedCards() {
        const { data: rooms } = await sb.from('share_room_members')
            .select('room_id').eq('member_id', MY_USER_ID).eq('status', 'accepted');

        if (!rooms || rooms.length === 0) return { pass:true, detail:'가입된 공유방 없음' };

        const roomIds = rooms.map(r => r.room_id);
        const { data, error } = await sb.from('card_shares')
            .select('id, card_id, room_id, shared_by, cards(id, property)')
            .in('room_id', roomIds)
            .limit(50);

        if (error) return { pass:false, detail:'공유 매물 조회 실패' };

        // 중복 체크
        const seen = {};
        let dupes = 0;
        (data || []).forEach(d => {
            if (!d.cards) return;
            const key = `${d.cards.id}_${d.shared_by}`;
            if (seen[key]) dupes++;
            seen[key] = true;
        });

        if (dupes > 0) issue('공유 매물 중복', `같은 중개사의 같은 매물이 ${dupes}건 중복`);

        return { pass: dupes === 0, detail:`${(data||[]).length}건 공유 매물 (중복: ${dupes})` };
    }

    async function testClientCards() {
        const { count, error } = await sb.from('cards')
            .select('id', {count:'exact', head:true})
            .eq('agent_id', MY_USER_ID)
            .eq('property->>type', '손님');

        if (error) return { pass:false, detail:'손님 카드 조회 실패' };

        if (count === 0) suggest('손님 등록', '손님이 0명. 매칭 테스트 불가');

        return { pass:true, detail:`${count}명 손님` };
    }

    async function testMatching() {
        // 손님 1명 찾기
        const { data: clients } = await sb.from('cards')
            .select('id, property, embedding')
            .eq('agent_id', MY_USER_ID)
            .eq('property->>type', '손님')
            .not('embedding', 'is', null)
            .limit(1);

        if (!clients || clients.length === 0) return { pass:true, detail:'임베딩 있는 손님 없음 (스킵)' };

        const startTime = Date.now();
        try {
            const resp = await fetch(`${SUPABASE_URL}/functions/v1/match-properties`, {
                method: 'POST',
                headers: {'Content-Type':'application/json', 'Authorization':'Bearer ' + SUPABASE_KEY},
                body: JSON.stringify({client_card_id: clients[0].id, agent_id: MY_USER_ID, limit:10})
            });
            const elapsed = Date.now() - startTime;
            const data = await resp.json();

            if (!resp.ok) return { pass:false, detail:`매칭 API 에러 ${resp.status}: ${data.error || '?'}` };

            if (elapsed > 5000) issue('매칭 느림', `${elapsed}ms 소요`);

            return { pass:true, detail:`${data.count || 0}건 매칭, ${elapsed}ms 소요` };
        } catch(e) {
            return { pass:false, detail:'매칭 API 호출 실패: ' + e.message };
        }
    }

    async function testPrivateNoteSecurity() {
        // 다른 사람 카드의 private_note 접근 시도
        const { data } = await sb.from('cards')
            .select('id, private_note')
            .neq('agent_id', MY_USER_ID)
            .limit(5);

        if (!data || data.length === 0) return { pass:true, detail:'다른 중개사 카드 없음 (스킵)' };

        const leaked = data.filter(c => c.private_note && c.private_note.memo);
        if (leaked.length > 0) issue('보안: private_note 노출', `다른 중개사의 비공개 메모 ${leaked.length}건 접근 가능!`);

        return { pass: leaked.length === 0, detail:`${data.length}건 조회, 노출: ${leaked.length}건` };
    }

    async function testCardView() {
        const { data } = await sb.from('cards')
            .select('id')
            .eq('agent_id', MY_USER_ID)
            .limit(1);

        if (!data || data.length === 0) return { pass:true, detail:'카드 없음' };

        try {
            const resp = await fetch(`${SUPABASE_URL.replace('api.hwik.kr','hwik.kr')}/property_view.html?id=${data[0].id}`);
            return { pass: resp.ok, detail:`카드 뷰어 ${resp.ok ? 'OK' : 'FAIL'} (${resp.status})` };
        } catch(e) {
            return { pass:false, detail:'카드 뷰어 접근 실패' };
        }
    }

    async function testTradeStatusFilter() {
        const { data } = await sb.from('cards')
            .select('id, trade_status')
            .eq('agent_id', MY_USER_ID)
            .limit(100);

        if (!data) return { pass:false, detail:'조회 실패' };

        const statusCount = {};
        data.forEach(c => {
            const s = c.trade_status || 'null';
            statusCount[s] = (statusCount[s] || 0) + 1;
        });

        const nullCount = statusCount['null'] || 0;
        if (nullCount > 0) issue('trade_status null', `${nullCount}건 거래상태 미설정. '계약가능' 기본값 필요`);

        return { pass: nullCount === 0, detail:`상태 분포: ${JSON.stringify(statusCount)}` };
    }

    async function testSearchLogs() {
        const { count } = await sb.from('search_logs')
            .select('id', {count:'exact', head:true});

        if (count === 0) suggest('검색 로그', '검색 로그 0건. 학습 데이터 부족');

        return { pass:true, detail:`검색 로그 ${count || 0}건` };
    }

    async function testJsonLd() {
        try {
            const resp = await fetch('https://hwik.kr/property_view.html');
            const html = await resp.text();
            const hasJsonLd = html.includes('application/ld+json');
            if (!hasJsonLd) suggest('SEO', 'JSON-LD가 정적 HTML에 없음. 동적 삽입 확인 필요');
            return { pass:true, detail:`JSON-LD 태그: ${hasJsonLd ? '있음' : '동적 삽입'}` };
        } catch(e) {
            return { pass:false, detail:'property_view 접근 실패' };
        }
    }

    async function testSitemap() {
        try {
            const resp = await fetch('https://hwik.kr/sitemap.xml');
            return { pass: resp.ok, detail:`sitemap.xml: ${resp.ok ? 'OK' : resp.status}` };
        } catch(e) {
            return { pass:false, detail:'sitemap.xml 접근 실패' };
        }
    }

    async function testRobotsTxt() {
        try {
            const resp = await fetch('https://hwik.kr/robots.txt');
            const text = await resp.text();
            const hasDisallow = text.includes('Disallow: /my_cards');
            if (!hasDisallow) issue('robots.txt', '관리자 페이지 크롤링 차단 확인 필요');
            return { pass: resp.ok, detail:`robots.txt: ${resp.ok ? 'OK' : resp.status}` };
        } catch(e) {
            return { pass:false, detail:'robots.txt 접근 실패' };
        }
    }

    // ========== 전체 테스트 실행 ==========
    const ALL_TESTS = [
        { group: '기본 연결', name: 'DB 연결', fn: testDBConnection },
        { group: '매물 관리', name: '매물 로드 (30개)', fn: testLoadCards },
        { group: '매물 관리', name: '임베딩 상태', fn: testEmbeddings },
        { group: '매물 관리', name: '거래상태 필드', fn: testTradeStatusFilter },
        { group: '검색', name: '벡터 검색 API', fn: testSearchProperty },
        { group: '검색', name: '검색 로그', fn: testSearchLogs },
        { group: '공유', name: '공유방', fn: testShareRooms },
        { group: '공유', name: '공유 매물 (중복 체크)', fn: testSharedCards },
        { group: '손님', name: '손님 카드', fn: testClientCards },
        { group: '손님', name: '매칭 API', fn: testMatching },
        { group: '보안', name: 'private_note 보안', fn: testPrivateNoteSecurity },
        { group: 'SEO', name: 'JSON-LD', fn: testJsonLd },
        { group: 'SEO', name: 'sitemap.xml', fn: testSitemap },
        { group: 'SEO', name: 'robots.txt', fn: testRobotsTxt },
    ];

    async function runFullTest() {
        _log = '';
        _pass = 0; _fail = 0;
        _issues = []; _suggests = [];

        log(`=== 휙 E2E 테스트 ===`);
        log(`날짜: ${new Date().toLocaleString()}\n`);

        const resultsEl = document.getElementById('testResults');
        let html = '';
        let currentGroup = '';

        for (let i = 0; i < ALL_TESTS.length; i++) {
            const t = ALL_TESTS[i];
            progress(Math.round((i / ALL_TESTS.length) * 100));

            if (t.group !== currentGroup) {
                if (currentGroup) html += '</div>';
                currentGroup = t.group;
                html += `<div class="results"><h2>${currentGroup}</h2>`;
            }

            // 실행 중 표시
            resultsEl.innerHTML = html + `<div class="step"><div class="step-num step-run">⏳</div><div class="step-text">${t.name} 실행 중...</div></div></div>`;

            const result = await t.fn();
            if (result.pass) _pass++; else _fail++;

            log(`${result.pass ? 'PASS' : 'FAIL'} | ${t.name}: ${result.detail}`);

            html += `<div class="step">
                <div class="step-num ${result.pass ? 'step-pass' : 'step-fail'}">${result.pass ? '✓' : '✗'}</div>
                <div class="step-text">${t.name}</div>
                <div class="step-detail">${result.detail}</div>
            </div>`;
        }
        html += '</div>';

        // 이슈 & 제안
        if (_issues.length > 0) {
            html += '<div class="results"><h2>🔴 발견된 이슈</h2>';
            _issues.forEach(i => {
                html += `<div class="issue"><div class="issue-title">${i.title}</div><div class="issue-desc">${i.desc}</div></div>`;
            });
            html += '</div>';
        }

        if (_suggests.length > 0) {
            html += '<div class="results"><h2>💡 개선 제안</h2>';
            _suggests.forEach(s => {
                html += `<div class="suggest"><div class="suggest-title">${s.title}</div><div class="suggest-desc">${s.desc}</div></div>`;
            });
            html += '</div>';
        }

        // 추가 분석: UI/UX 제안
        html += '<div class="results"><h2>📋 UI/UX 체크리스트</h2>';
        const uiChecks = [
            { name: '모바일 반응형', desc: '모바일에서 테스트 필요 (my_cards, card_generator)' },
            { name: '다크/라이트 테마', desc: '테마 전환 시 모든 요소 정상 표시 확인' },
            { name: '로딩 상태', desc: '모든 API 호출에 로딩 인디케이터 있는지' },
            { name: '에러 메시지', desc: '네트워크 오류 시 사용자에게 안내 메시지' },
            { name: '빈 상태', desc: '매물 0개, 손님 0개일 때 안내 문구' },
            { name: '무한 스크롤/더보기', desc: '매물 1000개 이상일 때 성능' },
            { name: '검색 UX', desc: 'Enter 후 결과 나올 때까지 스켈레톤 표시' },
            { name: '카드 미리보기', desc: '이미지 없는 매물의 noimg 카드 표시' },
            { name: '공유 해제', desc: '✕ 버튼으로 공유 해제 후 즉시 반영' },
            { name: '완료 보기', desc: '완료 매물 숨김 + 완료 탭에서 표시' },
        ];
        uiChecks.forEach(c => {
            html += `<div class="step"><div class="step-num step-wait">?</div><div class="step-text">${c.name}</div><div class="step-detail">${c.desc}</div></div>`;
        });
        html += '</div>';

        resultsEl.innerHTML = html;
        progress(100);

        // 요약
        document.getElementById('summary').style.display = 'flex';
        document.getElementById('passNum').textContent = _pass;
        document.getElementById('failNum').textContent = _fail;
        document.getElementById('issueNum').textContent = _issues.length;
        document.getElementById('suggestNum').textContent = _suggests.length;

        log(`\n=== 요약 ===`);
        log(`통과: ${_pass}, 실패: ${_fail}, 이슈: ${_issues.length}, 제안: ${_suggests.length}`);
    }
</script>
</body>
</html>
