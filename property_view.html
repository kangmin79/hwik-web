    <meta name="description" content="중개사가 직접 보내는 매물 카드예요. 눌러서 확인하세요 🏠">

    <!-- 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">

    <!-- 카카오맵 API -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=124cd68b3419bde24e03efa4f1ca2830&libraries=services&autoload=false"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        

        /* ========== 중개사 코멘트 ========== */
        .agent-comment-box {
            margin: 16px 0;
            padding: 14px 16px;
            background: rgba(250, 204, 21, 0.07);
            border-left: 3px solid #facc15;
            border-radius: 0 12px 12px 0;
        }

        .agent-comment-who {
            font-size: 11px;
            font-weight: 600;
            color: #facc15;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .agent-comment-text {
            font-size: 14px;
            color: #e2e8f0;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: #0a0a12;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 헤더 */
        .page-header {
            padding: 16px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo {
            font-size: 24px;
            font-weight: 900;
            color: #facc15;
            text-decoration: none;
        }
        
        /* 메인 컨텐츠 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 16px 80px;
        }
        
        /* 카드 컨테이너 */
        .card-container {
            width: 300px;
            margin-bottom: 16px;
            position: relative;
            overflow: visible;
        }

        /* ========== 스토리 프로그레스 바 ========== */
        .story-progress {
            display: none;
            gap: 4px;
            padding: 0 0 12px;
            width: 100%;
            max-width: 300px;
        }
        .story-progress.show { display: flex; }
        .story-bar {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        .story-bar.active .story-bar-fill,
        .story-bar.done .story-bar-fill {
            width: 100%;
        }
        .story-bar-fill {
            width: 0;
            height: 100%;
            background: #facc15;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* ========== 탭 존 (좌/우 터치 영역) ========== */
        
        /* ========== v3 카드 스타일 ========== */
        .card {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            user-select: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
            cursor: grab;
            will-change: transform, opacity;
            contain: layout style;
        }
        
        .card.dragging {
            transition: none;
            cursor: grabbing;
        }
        
        .swipe-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 100;
            color: #facc15;
            text-shadow: 0 0 20px rgba(250,204,21,0.3);
        }
        
        .swipe-indicator.show {
            opacity: 0.9;
        }
        
        /* ========== 사진 영역 (갤러리용) ========== */
        .card-photo-area {
            width: 100%; height: 120px; position: relative; overflow: hidden;
            cursor: pointer; background: #111; display: none;
        }
        
        /* 풀스크린 갤러리 (슬라이드 방식) */
        .gallery-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .gallery-overlay.show { display: flex; }
        .gallery-handle {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 4px; background: rgba(255,255,255,0.4);
            border-radius: 2px; z-index: 10;
        }
        .gallery-close {
            position: absolute; top: 16px; right: 16px; width: 44px; height: 44px;
            background: rgba(255,255,255,0.2); border: none; color: #fff;
            font-size: 24px; border-radius: 50%; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }
        .gallery-counter {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 14px; z-index: 10;
        }
        .gallery-track-wrap {
            width: 100%; height: 100%; overflow: hidden; position: relative;
            touch-action: none;
        }
        .gallery-track {
            display: flex; height: 100%; align-items: center;
        }
        .gallery-track.dragging { transition: none; }
        .gallery-slide {
            min-width: 100%; height: 100%; display: flex;
            align-items: center; justify-content: center;
        }
        .gallery-slide img {
            max-width: 95%; max-height: 80vh; object-fit: contain;
        }
        .gallery-dots {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; z-index: 10;
        }
        .gallery-dots .gdot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(255,255,255,0.3); transition: all 0.25s;
        }
        .gallery-dots .gdot.active {
            background: #fff; width: 18px; border-radius: 3px;
        }
        .gallery-tap {
            position: absolute;
            top: 60px;
            bottom: 60px;
            width: 25%;
            z-index: 5;
            cursor: pointer;
        }
        .gallery-tap-left { left: 0; }
        .gallery-tap-right { right: 0; }
        
        /* ========== 새 카드 공통 (card-full) ========== */
        .card-full {
          width: 300px; height: 500px; border-radius: 24px;
          overflow: hidden; position: relative;
          box-shadow: 0 40px 100px rgba(0,0,0,0.7);
          margin: 0 auto;
        }
        /* 카드 내부 슬라이더 공통 */
        .card-inner-slider {
          position: absolute; inset: 0; display: flex;
          transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
          z-index: 0; will-change: transform;
        }
        /* 사진 슬라이드 */
        .photo-slide {
          min-width: 100%; height: 100%; object-fit: cover;
          filter: brightness(0.97) contrast(1.04) saturate(1.06);
          pointer-events: none;
        }
        /* 메모 슬라이드 (중개사 코멘트) */
        .memo-slide {
          min-width: 100%; height: 100%; position: relative;
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          padding: 40px 32px;
          background: linear-gradient(160deg,#0d1117 0%,#151c27 40%,#0a0f1a 100%);
          overflow: hidden;
        }
        .memo-slide::before {
          content:''; position:absolute; width:300px; height:300px; border-radius:50%;
          background:radial-gradient(circle,rgba(78,205,196,0.06) 0%,transparent 70%);
          top:-50px; right:-80px;
        }
        .memo-quote { font-family:'Noto Serif KR',serif; font-size:72px; line-height:0.6; color:rgba(255,255,255,0.08); align-self:flex-start; margin-bottom:20px; position:relative; z-index:1; }
        .memo-text { font-family:'Noto Serif KR',serif; font-size:17px; color:rgba(255,255,255,0.9); line-height:1.9; text-align:center; letter-spacing:0.01em; position:relative; z-index:1; margin-bottom:32px; word-break:keep-all; }
        .memo-divider { width:32px; height:1px; background:rgba(255,255,255,0.15); margin-bottom:20px; position:relative; z-index:1; }
        .memo-agent { display:flex; flex-direction:column; align-items:center; gap:4px; position:relative; z-index:1; }
        .memo-agent-name { font-size:12px; color:rgba(255,255,255,0.4); font-weight:300; letter-spacing:0.05em; }
        .memo-agent-phone { font-size:14px; font-weight:600; color:rgba(255,255,255,0.7); letter-spacing:0.03em; }

        /* 상단 오버레이 */
        .card-top-info {
          position:absolute; top:0; left:0; right:0; padding:18px 18px 40px;
          background:linear-gradient(to bottom,rgba(0,0,0,0.55) 0%,transparent 100%);
          display:flex; justify-content:space-between; align-items:flex-start;
          z-index:10; pointer-events:none;
        }
        .card-badge { font-size:11px; font-weight:500; padding:5px 12px; border-radius:8px; color:rgba(255,255,255,0.85); background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14); letter-spacing:0.04em; display:inline-flex; align-items:center; gap:6px; pointer-events:all; }
        .card-badge-dot { width:6px; height:6px; border-radius:50%; display:inline-block; flex-shrink:0; }
        .card-dots { display:flex; gap:5px; align-items:center; margin-top:4px; }
        .card-dot { height:4px; border-radius:3px; background:rgba(255,255,255,0.35); transition:all 0.25s; width:4px; }
        .card-dot.active { background:#fff; width:14px; }

        /* 하단 오버레이 */
        .card-bottom {
          position:absolute; bottom:0; left:0; right:0;
          background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.72) 38%,rgba(0,0,0,0.2) 65%,transparent 100%);
          padding:50px 18px 18px; z-index:10; transition:opacity 0.3s;
        }
        .card-bottom.hidden { opacity:0; pointer-events:none; }
        .card-price { font-size:30px; font-weight:800; color:#fff; letter-spacing:-0.03em; margin-bottom:2px; }
        .card-name { font-size:12px; color:rgba(255,255,255,0.55); margin-bottom:10px; }
        .card-specs { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:14px; }
        .card-spec { font-size:11px; padding:4px 9px; border-radius:20px; background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.8); border:1px solid rgba(255,255,255,0.12); }
        .card-divider { height:1px; background:rgba(255,255,255,0.1); margin-bottom:14px; }
        /* 액션 바 */
        .card-action-bar { display:flex; gap:8px; }
        .card-action-btn {
          flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
          gap:5px; padding:10px 4px; border-radius:14px; cursor:pointer; text-decoration:none;
          background:rgba(255,255,255,0.08); backdrop-filter:blur(20px);
          border:1px solid rgba(255,255,255,0.12); box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);
          transition:all 0.15s;
        }
        .card-action-btn:active { transform:scale(0.93); }
        .card-action-btn svg { width:20px; height:20px; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
        .card-action-btn span { font-size:10px; font-weight:500; }
        .card-action-btn.act-call { border-color:rgba(78,205,196,0.3); }
        .card-action-btn.act-call svg { stroke:#4ecdc4; }
        .card-action-btn.act-call span { color:rgba(78,205,196,0.9); }
        .card-action-btn.act-kakao { border-color:rgba(250,204,21,0.25); }
        .card-action-btn.act-kakao svg { stroke:#facc15; }
        .card-action-btn.act-kakao span { color:rgba(250,204,21,0.9); }
        .card-action-btn.act-map svg { stroke:rgba(255,255,255,0.9); }
        .card-action-btn.act-map span { color:rgba(255,255,255,0.7); }
        /* 좌우 화살표 */
        .card-arrow {
          position:absolute; top:50%; transform:translateY(-50%);
          width:36px; height:36px; border-radius:50%;
          background:rgba(255,255,255,0.15); backdrop-filter:blur(8px);
          border:1px solid rgba(255,255,255,0.2);
          color:#fff; font-size:18px; cursor:pointer;
          display:flex; align-items:center; justify-content:center;
          z-index:20; transition:background 0.2s; user-select:none;
        }
        .card-arrow:hover { background:rgba(255,255,255,0.25); }
        .card-arrow.arr-left { left:10px; }
        .card-arrow.arr-right { right:10px; }
        /* 중개사 하단 */
        .agent-below {
          display: flex; align-items: center; gap: 12px;
          padding: 14px 20px; border-radius: 16px 16px 0 0;
          background: rgba(20,20,35,0.95);
          backdrop-filter: blur(20px);
          border: 1.5px solid rgba(255,255,255,0.12);
          border-bottom: none;
          position: fixed; bottom: 0; left: 0; right: 0;
          width: 100%; max-width: 100%;
          z-index: 100;
          box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
        }
        .agent-below-avatar {
          width: 40px; height: 40px; border-radius: 50%;
          background: rgba(78,205,196,0.2); border: 2px solid #4ecdc4;
          display: flex; align-items: center; justify-content: center;
          font-size: 14px; font-weight: 800; color: #4ecdc4; flex-shrink: 0;
          overflow: hidden;
        }
        .agent-below-avatar img { width:100%; height:100%; object-fit:cover; }
        .agent-below-info { display: flex; align-items: center; gap: 10px; }
        .agent-below-name { font-size: 15px; font-weight: 800; color: #fff; }
        .agent-below-phone { font-size: 14px; font-weight: 600; color: #4ecdc4; }

        /* ========== noimg 전용 ========== */
        .info-slide {
          min-width: 100%; height: 100%; position: relative;
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          padding: 60px 28px 100px; overflow: hidden;
        }
        .info-slide.bg-dark-1 {
          background: linear-gradient(160deg, #0d1b2a 0%, #1b2838 30%, #162032 60%, #0a1628 100%);
          background-image:
            linear-gradient(160deg, #0d1b2a 0%, #1b2838 30%, #162032 60%, #0a1628 100%),
            repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(255,255,255,0.015) 30px, rgba(255,255,255,0.015) 31px);
        }
        .info-slide.bg-dark-1::before {
          content: ''; position: absolute; width: 350px; height: 350px; border-radius: 50%;
          background: radial-gradient(circle, rgba(78,205,196,0.12) 0%, transparent 70%);
          top: -80px; right: -100px;
        }
        .info-slide.bg-dark-1::after {
          content: ''; position: absolute; width: 250px; height: 250px; border-radius: 50%;
          background: radial-gradient(circle, rgba(250,204,21,0.08) 0%, transparent 70%);
          bottom: -60px; left: -80px;
        }
        .info-slide.bg-dark-2 {
          background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
          background-image:
            linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%),
            repeating-linear-gradient(135deg, transparent, transparent 30px, rgba(255,255,255,0.015) 30px, rgba(255,255,255,0.015) 31px);
        }
        .info-slide.bg-dark-2::before {
          content: ''; position: absolute; width: 300px; height: 300px; border-radius: 50%;
          background: radial-gradient(circle, rgba(96,165,250,0.1) 0%, transparent 70%);
          top: -60px; left: -80px;
        }
        .info-complex {
          font-size: 36px; font-weight: 800; color: #fff;
          letter-spacing: -0.03em; line-height: 1.2;
          text-align: center; position: relative; z-index: 1;
          margin-bottom: 12px; text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .info-location {
          font-size: 14px; color: rgba(255,255,255,0.45);
          font-weight: 400; letter-spacing: 0.05em;
          position: relative; z-index: 1; margin-bottom: 24px;
        }
        .info-divider {
          width: 40px; height: 1.5px; background: rgba(255,255,255,0.15);
          position: relative; z-index: 1; margin-bottom: 24px;
        }
        .info-type-price {
          display: flex; align-items: baseline; gap: 8px;
          position: relative; z-index: 1;
        }
        .info-type {
          font-size: 13px; font-weight: 500; color: rgba(78,205,196,0.8);
          padding: 3px 10px; border-radius: 6px;
          background: rgba(78,205,196,0.1); border: 1px solid rgba(78,205,196,0.2);
        }
        .info-price {
          font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -0.02em;
        }
        .hwik-watermark {
          position: absolute; bottom: 12px; right: 14px;
          font-size: 11px; font-weight: 800; color: rgba(250,204,21,0.15);
          letter-spacing: -0.5px; z-index: 2;
        }

        /* (기존 A/F/J 색상 스타일 삭제됨) */

        /* ===== 풀스크린 지도 오버레이 ===== */
        .map-fullscreen-overlay {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9999; background: #000; flex-direction: column;
        }
        .map-fullscreen-overlay.show { display: flex; }
        .map-fullscreen-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: #1a1a2e; flex-shrink: 0;
        }
        .map-fullscreen-title {
            font-size: 14px; font-weight: 700; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
        }
        .map-fullscreen-close {
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            font-size: 18px; width: 36px; height: 36px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; margin-left: 12px;
        }
        #mapFullscreen { flex: 1; width: 100%; }

        /* ===== 미니맵 ===== */
        .card-map-row {
            display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px;
        }
        .card-map-row .map-text { flex: 1; min-width: 0; }
        .card-minimap {
            width: 70px; height: 70px; border-radius: 8px; overflow: hidden;
            flex-shrink: 0; cursor: pointer; position: relative;
            border: 1.5px solid rgba(255,255,255,0.1);
            background: #111;
        }
        .card-minimap .map-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.55); padding: 2px 0;
            text-align: center; font-size: 8px; color: #fff; font-weight: 600;
            pointer-events: none;
        }

        /* (기존 A/F/J 색상 스타일 삭제됨) */

        /* (기존 외부 액션 버튼 삭제됨 — 카드 내부로 이동) */

        /* 푸터 */
        .footer {
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }
        
        .footer a {
            color: #facc15;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header class="page-header">
        <a href="#" class="logo">휙</a>
    </header>
    
    <!-- 메인 -->
    <main class="main">
        <!-- 카드 컨테이너 -->
        <div class="swipe-indicator" id="swipeIndicator">휙!</div>
        
        <!-- 풀스크린 갤러리 (슬라이드) -->
        <div class="gallery-overlay" id="galleryOverlay">
            <div class="gallery-handle"></div>
            <button class="gallery-close" onclick="closeGallery()">×</button>
            <div class="gallery-counter" id="galleryCounter">1 / 3</div>
            <!-- 갤러리 탭 존 -->
            <div class="gallery-tap gallery-tap-left" onclick="goGallery(-1)"></div>
            <div class="gallery-tap gallery-tap-right" onclick="goGallery(1)"></div>
            <div class="gallery-track-wrap" id="galleryTrackWrap">
                <div class="gallery-track" id="galleryTrack"></div>
            </div>
            <div class="gallery-dots" id="galleryDots"></div>
            <!-- 좌우 버튼 -->
            <button onclick="goGallery(-1)" style="position:fixed;left:12px;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:22px;cursor:pointer;z-index:1002;display:flex;align-items:center;justify-content:center;">‹</button>
            <button onclick="goGallery(1)" style="position:fixed;right:12px;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:22px;cursor:pointer;z-index:1002;display:flex;align-items:center;justify-content:center;">›</button>
            <!-- 하단 닫기 버튼 -->
            <button onclick="closeGallery()" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:14px 40px;border-radius:30px;background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);font-size:15px;font-weight:600;cursor:pointer;z-index:1002;font-family:inherit;">닫기</button>
        </div>
        
        <!-- 스토리 프로그레스 바 -->
        <div class="story-progress" id="storyProgress"></div>
        
        <div class="card-container" id="cardContainer">
            <div id="cardSlot"></div>
            <!-- 탭 존은 카드 위에 렌더링되어야 클릭 수신 가능 -->

        </div>
        
        <!-- 액션 버튼은 카드 내부로 이동됨 -->
    </main>
    
    <!-- 푸터 -->
    <footer class="footer">
        <a href="https://kangmin79.github.io/hwik-web/" style="display: inline-flex; align-items: center; gap: 6px; color: #facc15; text-decoration: none; font-size: 13px;">
            <span style="font-weight: 700;">휙</span>으로 만든 매물카드 · 나도 써보기 →
        </a>
        <div style="margin-top:12px; font-size:10px; color:#555; line-height:1.6;">
            혜민솔루션 | 대표 강동욱 | 사업자등록번호 204-25-99980<br>
            경기도 구리시 갈매중앙로 185-3, 6층 20호
        </div>
    </footer>
    
    <script>
        // Supabase 초기화
        const SUPABASE_URL = HWIK_CONFIG.SUPABASE_URL;
        const SUPABASE_KEY = HWIK_CONFIG.SUPABASE_KEY;
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ===== 에러 로그 수집 =====
        async function logError(action, errorMsg, detail = null) {
            try {
                await supabaseClient.from('error_logs').insert({
                    user_id: null,
                    page: 'property_view',
                    action: action,
                    error_msg: String(errorMsg).slice(0, 500),
                    error_detail: detail
                });
            } catch(e) { console.warn('[휙 로그 실패]', e); }
        }
        window.addEventListener('error', (e) => { logError('unhandled_error', e.message, { file: e.filename, line: e.lineno }); });
        window.addEventListener('unhandledrejection', (e) => { logError('unhandled_promise', String(e.reason).slice(0, 500)); });

        // ★ XSS 방지: esc()는 config.js에서 로드됨
        
        // 여러 카드 상태
        let allCardsData = [];
        let currentIndex = 0;
        let overrideAgent = null; // 공유 매물: 보내는 중개사 정보로 덮어쓰기
        
        // 스와이프 상태
        let isDragging = false;
        let startX = 0;
        let currentX = 0;
        let cardElement = null;
        
        // 로딩 상태 표시
        function showLoading() {
            document.getElementById('cardSlot').innerHTML = `
                <div style="width:100%;border-radius:16px;overflow:hidden;background:#1a1a2e;">
                    <div style="width:100%;height:180px;background:linear-gradient(90deg,#252542 25%,#2e2e54 50%,#252542 75%);background-size:200% 100%;animation:skelShimmer 1.4s infinite;"></div>
                    <div style="padding:14px 14px 0;">
                        <div style="display:flex;gap:8px;margin-bottom:12px;">
                            <div style="width:48px;height:22px;border-radius:20px;background:#252542;animation:skelShimmer 1.4s infinite;"></div>
                            <div style="width:36px;height:22px;border-radius:20px;background:#252542;animation:skelShimmer 1.4s infinite 0.1s;"></div>
                        </div>
                        <div style="width:60%;height:20px;border-radius:6px;background:#252542;animation:skelShimmer 1.4s infinite 0.15s;margin-bottom:8px;"></div>
                        <div style="width:40%;height:32px;border-radius:6px;background:#252542;animation:skelShimmer 1.4s infinite 0.2s;margin-bottom:14px;"></div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
                            <div style="height:50px;border-radius:8px;background:#252542;animation:skelShimmer 1.4s infinite 0.25s;"></div>
                            <div style="height:50px;border-radius:8px;background:#252542;animation:skelShimmer 1.4s infinite 0.3s;"></div>
                        </div>
                        <div style="display:flex;gap:6px;margin-bottom:14px;">
                            <div style="width:50px;height:24px;border-radius:20px;background:#252542;animation:skelShimmer 1.4s infinite 0.35s;"></div>
                            <div style="width:64px;height:24px;border-radius:20px;background:#252542;animation:skelShimmer 1.4s infinite 0.4s;"></div>
                            <div style="width:44px;height:24px;border-radius:20px;background:#252542;animation:skelShimmer 1.4s infinite 0.45s;"></div>
                        </div>
                        <div style="display:flex;justify-content:space-between;padding:10px 0;">
                            <div style="width:35%;height:16px;border-radius:6px;background:#252542;animation:skelShimmer 1.4s infinite 0.5s;"></div>
                            <div style="width:28%;height:16px;border-radius:6px;background:#252542;animation:skelShimmer 1.4s infinite 0.55s;"></div>
                        </div>
                    </div>
                    <div style="text-align:center;padding:16px 0 20px;">
                        <span style="font-size:20px;font-weight:900;color:#f5c518;letter-spacing:-1px;animation:hwikPop 0.6s ease-in-out infinite alternate;display:inline-block;">휙!</span>
                    </div>
                </div>
                <style>
                    @keyframes skelShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
                    @keyframes hwikPop{from{transform:scale(0.85);opacity:0.5;}to{transform:scale(1.15);opacity:1;}}
                </style>
            `;
        }
        
        // 에러 표시
        function showError(message, emoji = '❌') {
            document.getElementById('cardSlot').innerHTML = `
                <div style="text-align: center; padding: 40px; color: #888;">
                    <div style="font-size: 40px; margin-bottom: 16px;">${emoji}</div>
                    <div style="font-size: 15px; line-height: 1.6;">${message}</div>
                </div>
            `;
            const cardSlot = document.getElementById('cardSlot');
            if (cardSlot) cardSlot.style.display = 'block';
        }
        
        // 7일 만료 체크
        function isExpired(data) {
            // 거래완료 상태면 만료
            return data.trade_status === '완료';
        }
        
        // 카드 데이터 불러오기
        async function loadCard(cardId) {
            showLoading();
            
            try {
                const { data, error } = await supabaseClient
                    .from('cards')
                    .select('id, property, agent, style, color, agent_comment, photos, lat, lng, view_count, trade_status, created_at, agent_id')
                    .eq('id', cardId)
                    .single();
                
                if (error) throw error;
                if (!data) { showError('매물 정보를 찾을 수 없습니다.'); return; }
                if (isExpired(data)) { showError('거래가 완료된 매물이에요.<br><br>중개사에게 다른 매물을 문의해 주세요.', '🏠'); return; }
                
                // ★ 조회수 증가
                try {
                    await supabaseClient.rpc('increment_view_count', { card_id: cardId });
                } catch(e) {
                    // fallback: 동시 접속 시 카운트 유실 가능
                    try {
                        await supabaseClient.from('cards').update({ view_count: (data.view_count || 0) + 1 }).eq('id', cardId);
                    } catch(e2) { console.warn('조회수 증가 실패:', e2); }
                }
                allCardsData = [data];
                currentIndex = 0;
                renderCard(data);
                
            } catch (error) {
                console.error('카드 로딩 오류:', error);
                logError('load_card', error.message, { cardId });
                showError('매물 정보를 불러올 수 없습니다.');
            }
        }
        
        // ★ OG 태그 동적 업데이트
        // 주의: 카카오톡 크롤러는 JS를 실행하지 않으므로, 이 함수로 업데이트한 OG 태그는
        // 카카오톡 미리보기에 반영되지 않습니다. 카카오톡 미리보기를 위해서는:
        // 1) og_image_url을 DB에 저장 (현재 구현됨) 한 뒤
        // 2) Cloudflare Worker 등 서버 사이드에서 HTML 응답 시 og:image 메타태그를 동적으로 삽입해야 합니다.
        function updateOGTags(data) {
            const p = data.property || {};
            const agent = overrideAgent || data.agent || {};
            const name = p.complex || p.location || '매물';
            const type = p.type || '';
            const price = p.price || '';
            const area = p.area ? ` · ${p.area}` : '';
            const agentName = agent.business_name || agent.name || '중개사';
            const agentId = agent.id || data.agent_id || '';

            const title = `${type} ${price} · ${name}${area}`;
            const desc = `${agentName}이 보내는 매물이에요. 지금 확인해보세요 🏠`;

            document.title = title;
            setMeta('og:title', title);
            setMeta('og:description', desc);
            setMeta('description', desc);
            setMeta('og:url', window.location.href);

            // ★ 매물별 og:image — 중개사 브랜드 이미지 + 캐시 무효화
            if (agentId) {
                const ogImg = `${SUPABASE_URL}/storage/v1/object/public/og-images/agents/${agentId}.png?id=${data.id}`;
                setMeta('og:image', ogImg);
            }
        }

        function updateOGTagsMulti(cards) {
            if (!cards.length) return;
            const agent = overrideAgent || cards[0].agent || {};
            const agentName = agent.business_name || agent.name || '중개사';
            const agentId = agent.id || cards[0].agent_id || '';
            const count = cards.length;
            const first = cards[0].property || {};
            const firstName = first.complex || first.location || '매물';

            const title = `${agentName}의 매물 ${count}개 · ${firstName} 외`;
            const desc = `${count}개 매물을 묶어서 보내드려요. 눌러서 확인하세요 🏠`;

            document.title = title;
            setMeta('og:title', title);
            setMeta('og:description', desc);
            setMeta('description', desc);
            setMeta('og:url', window.location.href);

            // ★ 멀티카드 og:image
            if (agentId) {
                const ogImg = `${SUPABASE_URL}/storage/v1/object/public/og-images/agents/${agentId}.png?ids=${cards.map(c=>c.id).join('-')}`;
                setMeta('og:image', ogImg);
            }
        }

        function setMeta(name, content) {
            const isProp = name.startsWith('og:') || name.startsWith('kakao:');
            const attr = isProp ? 'property' : 'name';
            let el = document.querySelector(`meta[${attr}="${name}"]`);
            if (!el) {
                el = document.createElement('meta');
                el.setAttribute(attr, name);
                document.head.appendChild(el);
            }
            el.setAttribute('content', content);
        }

        // ===== 템플릿 레지스트리 =====
        // 새 디자인 추가 시: CARD_TEMPLATES에 함수 하나만 추가하면 됩니다
        const CARD_TEMPLATES = {
            memo: buildMemoCard,   // 사진 있는 카드
            noimg: buildNoImgCard  // 사진 없는 카드
        };

        function resolveTemplate(data) {
            const photos = data.photos || [];
            return photos.length > 0 ? 'memo' : 'noimg';
        }

        // 공통 액션바 HTML
        function _actionBarHtml(agentPhone) {
            const tel = agentPhone ? agentPhone.replace(/-/g, '') : '';
            return `
              <div class="card-action-bar">
                <a class="card-action-btn act-call" href="${tel ? 'tel:' + tel : '#'}">
                  <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                  <span>전화</span>
                </a>
                <a class="card-action-btn act-kakao" href="#" onclick="goBackToKakao();return false;">
                  <svg viewBox="0 0 24 24"><path d="M12 3c5.8 0 10.5 3.66 10.5 8.17 0 4.51-4.7 8.17-10.5 8.17-.87 0-1.72-.08-2.54-.24l-4.14 2.82.93-4.08C3.92 16.13 1.5 13.37 1.5 11.17 1.5 6.66 6.2 3 12 3z"/></svg>
                  <span>카톡</span>
                </a>
                <a class="card-action-btn act-map" href="#" onclick="openKakaoMap();return false;">
                  <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  <span>지도</span>
                </a>
              </div>`;
        }

        // 공통 메모 슬라이드 HTML
        function _memoSlideHtml(agentComment, agentName, agentPhone) {
            if (!agentComment) return '';
            return `
              <div class="memo-slide">
                <div class="memo-quote">"</div>
                <div class="memo-text">${esc(agentComment).replace(/\n/g, '<br>')}</div>
                <div class="memo-divider"></div>
                <div class="memo-agent">
                  <div class="memo-agent-name">${agentName}</div>
                  <div class="memo-agent-phone">${agentPhone}</div>
                </div>
              </div>`;
        }

        // 공통 상단 오버레이 HTML
        function _topInfoHtml(type, totalSlides) {
            const dotColor = (type === '매매') ? '#fb923c' : '#4ecdc4';
            let dots = '';
            for (let i = 0; i < totalSlides; i++) {
                dots += `<div class="card-dot ${i === 0 ? 'active' : ''}"></div>`;
            }
            return `
              <div class="card-top-info">
                <span class="card-badge"><span class="card-badge-dot" style="background:${dotColor}"></span>${type}</span>
                <div class="card-dots" id="cardDots">${dots}</div>
              </div>`;
        }

        // 공통 하단 오버레이 HTML
        function _bottomHtml(price, name, location, area, specs, agentPhone) {
            const cardNameStr = [location, name, area].filter(Boolean).join(' · ');
            const specsHtml = specs.map(s => `<span class="card-spec">${s}</span>`).join('');
            return `
              <div class="card-bottom" id="cardBottom">
                <div class="card-price">${price}</div>
                <div class="card-name">${cardNameStr}</div>
                ${specsHtml ? `<div class="card-specs">${specsHtml}</div>` : ''}
                <div class="card-divider"></div>
                ${_actionBarHtml(agentPhone)}
              </div>`;
        }

        // 공통 중개사 하단 HTML
        function _agentBelowHtml(agentName, agentPhone, agentPhoto) {
            const initial = agentName.charAt(0);
            const avatarInner = agentPhoto
                ? `<img src="${esc(agentPhoto)}">`
                : initial;
            return `
              <div class="agent-below">
                <div class="agent-below-avatar">${avatarInner}</div>
                <div class="agent-below-info">
                  <div class="agent-below-name">${agentName}</div>
                  <div class="agent-below-phone">${agentPhone}</div>
                </div>
              </div>`;
        }

        // ===== memo 템플릿 (사진 있는 카드) =====
        function buildMemoCard(ctx) {
            const { type, price, name, location, area, floor, features, agentName, agentPhone, agentPhoto, photos, agentComment } = ctx;
            const hasComment = !!agentComment;
            const totalSlides = photos.length + (hasComment ? 1 : 0);
            const specs = [floor, ...features].filter(Boolean);

            const slidesHtml = photos.map((url, i) =>
                `<img class="photo-slide" src="${esc(url)}" loading="${i === 0 ? 'eager' : 'lazy'}" fetchpriority="${i === 0 ? 'high' : 'auto'}" onclick="openGallery()">`
            ).join('') + _memoSlideHtml(agentComment, agentName, agentPhone);

            const cardHtml = `
              <div class="card card-full" id="activeCard" data-template="memo" data-total="${totalSlides}">
                <div class="card-inner-slider" id="cardSlider">${slidesHtml}</div>
                ${_topInfoHtml(type, totalSlides)}
                ${_bottomHtml(price, name, location, area, specs, agentPhone)}
                <button class="card-arrow arr-left" onclick="_moveInternalSlide(-1)">‹</button>
                <button class="card-arrow arr-right" onclick="_moveInternalSlide(1)">›</button>
              </div>
              ${_agentBelowHtml(agentName, agentPhone, agentPhoto)}`;
            return cardHtml;
        }

        // ===== noimg 템플릿 (사진 없는 카드) =====
        function buildNoImgCard(ctx) {
            const { type, price, name, location, area, floor, features, agentName, agentPhone, agentPhoto, agentComment } = ctx;
            const hasComment = !!agentComment;
            const totalSlides = 1 + (hasComment ? 1 : 0);

            // 단지명 줄바꿈 처리
            const nameParts = name.length > 6 ? name.replace(/\s/g, '<br>') : name;
            const detailStr = [area, floor].filter(Boolean).join(' · ');
            const tagsHtml = features.length ? `<div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center;position:relative;z-index:1;margin-top:2px;">${features.map(f => `<span class="card-spec">${f}</span>`).join('')}</div>` : '';

            const slide = `
              <div class="info-slide bg-dark-1" style="padding:50px 28px 90px;">
                <div class="info-complex" style="font-size:30px;">${nameParts}</div>
                <div class="info-location">${location}</div>
                <div class="info-divider"></div>
                <div class="info-type-price" style="margin-bottom:14px;">
                  <span class="info-type">${type}</span>
                  <span class="info-price" style="font-size:24px;">${price}</span>
                </div>
                ${detailStr ? `<div style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.7);position:relative;z-index:1;margin-bottom:10px;">${detailStr}</div>` : ''}
                ${tagsHtml}
                <div class="hwik-watermark">휙</div>
              </div>`;

            const cardHtml = `
              <div class="card card-full" id="activeCard" data-template="noimg" data-total="${totalSlides}">
                <div class="card-inner-slider" id="cardSlider">
                  ${slide}${_memoSlideHtml(agentComment, agentName, agentPhone)}
                </div>
                ${_topInfoHtml(type, totalSlides)}
                <div class="card-bottom" id="cardBottom">
                  ${_actionBarHtml(agentPhone)}
                </div>
                ${totalSlides > 1 ? `<button class="card-arrow arr-left" onclick="_moveInternalSlide(-1)">‹</button><button class="card-arrow arr-right" onclick="_moveInternalSlide(1)">›</button>` : ''}
              </div>
              ${_agentBelowHtml(agentName, agentPhone, agentPhoto)}`;
            return cardHtml;
        }

        // ===== 내부 슬라이더 제어 =====
        let _internalSlideIndex = 0;

        function _moveInternalSlide(dir) {
            const card = document.getElementById('activeCard');
            if (!card) return;
            const total = parseInt(card.dataset.total) || 1;
            _internalSlideIndex = (_internalSlideIndex + dir + total) % total;
            _renderInternalSlide();
        }

        function _renderInternalSlide() {
            const slider = document.getElementById('cardSlider');
            const bottom = document.getElementById('cardBottom');
            const dots = document.getElementById('cardDots');
            const card = document.getElementById('activeCard');
            if (!slider || !card) return;

            const total = parseInt(card.dataset.total) || 1;
            const template = card.dataset.template;
            const isMemoSlide = (_internalSlideIndex === total - 1) && card.querySelector('.memo-slide');

            slider.style.transform = `translateX(-${_internalSlideIndex * 100}%)`;

            // 메모 슬라이드에서는 하단 숨김
            if (bottom) bottom.classList.toggle('hidden', !!isMemoSlide);

            // 도트 업데이트
            if (dots) {
                dots.querySelectorAll('.card-dot').forEach((d, i) =>
                    d.classList.toggle('active', i === _internalSlideIndex)
                );
            }
        }

        function _initInternalSwipe() {
            const card = document.getElementById('activeCard');
            if (!card) return;
            let startX = 0;
            card.addEventListener('touchstart', e => {
                if (e.target.closest('.card-arrow, .card-action-btn')) return;
                startX = e.touches[0].clientX;
            }, { passive: true });
            card.addEventListener('touchend', e => {
                if (e.target.closest('.card-arrow, .card-action-btn')) return;
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 40) _moveInternalSlide(diff > 0 ? 1 : -1);
            }, { passive: true });
        }

        // ===== renderCard (리팩토링) =====
        function renderCard(data, silent = false) {
            const container = document.getElementById('cardContainer');
            const agent = overrideAgent || data.agent || {};
            const p = data.property || {};

            const ctx = {
                type: esc(p.type) || '전세',
                price: esc(p.price) || '-',
                name: esc(p.complex || p.location) || '-',
                location: p.complex ? esc(p.location || '') : '',
                area: esc(p.area) || '',
                floor: esc(p.floor) || '',
                room: esc(p.room) || '',
                features: (p.features || p.tags || []).map(f => esc(f)),
                agentName: esc(agent?.name) || '부동산',
                agentPhone: esc(agent?.phone) || '',
                agentPhoto: agent?.profile_photo || null,
                photos: data.photos || [],
                agentComment: data.agent_comment || '',
            };

            updateOGTags(data);

            const templateName = resolveTemplate(data);
            const buildFn = CARD_TEMPLATES[templateName];
            if (!buildFn) { console.error('Unknown template:', templateName); return; }

            container.querySelector('#cardSlot').innerHTML = buildFn(ctx);
            _internalSlideIndex = 0;

            if (silent) return;

            // 좌표 저장 (지도용)
            initMinimap(p, data.lat, data.lng);

            updateNavigation();
            setupSwipe();
            _initInternalSwipe();
            _preloadAdjacentCards();
        }

        // 앞뒤 카드 photos[0] 미리 로드
        function _preloadAdjacentCards() {
            if (allCardsData.length <= 1) return;
            const indices = [
                (currentIndex + 1) % allCardsData.length,
                (currentIndex - 1 + allCardsData.length) % allCardsData.length
            ];
            indices.forEach(idx => {
                const photos = allCardsData[idx]?.photos;
                if (photos && photos[0]) {
                    const img = new Image();
                    img.src = photos[0];
                }
            });
        }
        
        // 여러 카드 로드
        async function loadMultipleCards(cardIds) {
            showLoading();
            
            try {
                const { data, error } = await supabaseClient
                    .from('cards')
                    .select('id, property, agent, style, color, agent_comment, photos, lat, lng, view_count, trade_status, created_at, agent_id')
                    .in('id', cardIds);
                
                if (error) throw error;
                if (!data || data.length === 0) { showError('매물 정보를 찾을 수 없습니다.'); return; }
                
                allCardsData = cardIds.map(id => data.find(d => d.id === id)).filter(Boolean);
                const validCards = allCardsData.filter(d => !isExpired(d));
                allCardsData = validCards;
                
                if (allCardsData.length === 0) { showError('매물 정보를 찾을 수 없습니다.', '🏠'); return; }
                currentIndex = 0;
                
                if (allCardsData.length > 0) {

                    if (allCardsData.length > 1) updateOGTagsMulti(allCardsData);
                }
                
            } catch (error) {
                console.error('카드 로딩 오류:', error);

        // 네비게이션 업데이트 — DOM 재사용으로 리플로우 최소화

        function updateIndicator() {

            const dots = document.querySelectorAll('#cardDots div');

        }
        
        function goToCard(index) {
            if (index < 0 || index >= allCardsData.length) return;
            currentIndex = index;
            renderCard(allCardsData[currentIndex]);
        }
        
        // 스와이프 설정 (틴더 스타일: 회전 + 날아감 + 새 카드 등장)
        let swipeInitialized = false;
        function setupSwipe() {
            if (allCardsData.length <= 1) return;
            // 프로그레스 바는 최초 1회만 생성
            if (!swipeInitialized) {

        }
        
        // 현재 카드에 위아래 스와이프 리스너 연결 (카드 간 이동)
        let _dragListenerCard = null;
        function attachDragToCard() {
            if (allCardsData.length <= 1) return;
            const container = document.getElementById('cardContainer');
            const card = container.querySelector('.card');
            if (!card) return;
            if (card === _dragListenerCard) return;
            _dragListenerCard = card;

            let startY = 0, deltaY = 0;
            let _dragging = false;
            const threshold = 60;

            const onStart = (e) => {
                if (e.target.closest('a')) return;
                if (e.target.closest('.contact-wrapper')) return;
                if (e.target.closest('.card-photo-area')) return;
                if (e.target.closest('.card-minimap')) return;
                if (e.target.closest('.card-arrow')) return;
                if (e.target.closest('.card-action-btn')) return;
                if (e.target.closest('.gallery-overlay')) return;
                const touch = e.touches ? e.touches[0] : e;
                startY = touch.clientY;
                deltaY = 0;
                _dragging = true;
                card.style.transition = 'none';
            };

            const onMove = (e) => {
                if (!_dragging) return;
                const touch = e.touches ? e.touches[0] : e;
                deltaY = touch.clientY - startY;
                card.style.transform = `translateY(${deltaY * 0.4}px)`;
                card.style.opacity = Math.max(0.4, 1 - Math.abs(deltaY) / 400);
            };

            const onEnd = () => {
                if (!_dragging) return;
                _dragging = false;

                if (Math.abs(deltaY) > threshold) {
                    const dir = deltaY < 0 ? 1 : -1; // 위로 밀면 다음, 아래로 밀면 이전
                    card.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
                    card.style.transform = `translateY(${deltaY < 0 ? '-120%' : '120%'})`;
                    card.style.opacity = '0';
                    card.addEventListener('transitionend', function h() {
                        card.removeEventListener('transitionend', h);
                        goCard(dir);
                    });
                } else {
                    card.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                    card.style.transform = '';
                    card.style.opacity = '';
                }
            };

            card.addEventListener('touchstart', onStart, { passive: true });
            card.addEventListener('touchmove', onMove, { passive: true });
            card.addEventListener('touchend', onEnd);
        }

        // 카드 이동
        function goCard(dir) {
            const total = allCardsData.length;

        function initMinimap(property, savedLat, savedLng) {
            const mapContainer = document.getElementById('minimap');
            if (!mapContainer) return;

            if (!savedLat || !savedLng) {
                mapContainer.style.display = 'none';

            // ★ 좌표가 이전 카드와 같으면 미니맵 재초기화 스킵 (가장 무거운 작업)
            const minimapKey = `${savedLat},${savedLng}`;
            if (minimapKey === _lastMinimapKey && minimapInstance) {
                mapContainer.style.display = '';
                return;
            }
            _lastMinimapKey = minimapKey;

            const complex = property.complex || '';
            const location = property.location || '';
            mapPlaceName = (complex && location) ? `${location} ${complex}` : (complex || location);
            mapCoords = { lat: savedLat, lng: savedLng };

            // SDK 완전히 로드된 후 실행 보장
            kakao.maps.load(() => {

        let minimapInstance = null;

        function createHwikMarker(position, map) {
            const content = [
                '<div style="display:flex;flex-direction:column;align-items:center;transform:translateY(-100%);animation:hwikBounce 0.8s ease-in-out infinite alternate;">',
                '<style>@keyframes hwikBounce{from{transform:translateY(-100%)}to{transform:translateY(calc(-100% - 6px))}}</style>',
                '<div style="background:#1a1a2e;color:#f5c518;font-size:14px;font-weight:900;',

                'border-right:7px solid transparent;border-top:10px solid #1a1a2e;margin-top:-1px;"></div>',
                '</div>'
            ].join('');
            return new kakao.maps.CustomOverlay({ position, content, map, yAnchor: 0 });
        }

        function renderMinimap(mapContainer, coords) {
            const position = new kakao.maps.LatLng(coords.lat, coords.lng);
            minimapInstance = new kakao.maps.Map(mapContainer, {
                center: position,
                level: 4,
                draggable: false,
                scrollwheel: false,
                disableDoubleClick: true,

            });
            createHwikMarker(position, minimapInstance);

        // =================== 미니맵 끝 ===================

        function openGallery() {

        function buildGallerySlides() {
            const track = document.getElementById('galleryTrack');
            // 무한루프: [마지막] + [전체] + [첫번째] 클론 배치
            const last = galleryPhotos[galRealCount - 1];
            const first = galleryPhotos[0];
            const slides = [last, ...galleryPhotos, first];

            // ★ 인접 슬라이드 선제 로드: 클론+첫2장=eager, 나머지=lazy
            track.innerHTML = slides.map((url, i) => {
                const isEager = (i <= 2) || (i === slides.length - 1);
                return `<div class="gallery-slide"><img src="${esc(url)}" loading="${isEager ? 'eager' : 'lazy'}"></div>`;
            }).join('');

            // ★ 첫 3장 Image 객체로 선제 preload (브라우저 캐시 선점)
            const preloadCount = Math.min(3, galleryPhotos.length);
            for (let i = 0; i < preloadCount; i++) {
                const img = new Image();
                img.src = galleryPhotos[i];

            // 실제 1번 슬라이드(인덱스 1)부터 시작

        function setGalleryPos(withTransition) {
            const track = document.getElementById('galleryTrack');
            // 클론 때문에 실제 위치는 +1
            const pos = (galleryIndex + 1) * 100;
            if (withTransition) {
                track.style.transition = 'transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            } else {

            document.getElementById('galleryCounter').textContent = `${galleryIndex + 1} / ${galRealCount}`;

            if (galRealCount <= 10) {

                    `<div class="gdot ${i === galleryIndex ? 'active' : ''}"></div>`
                ).join('');
            } else {

        }

        function goGallery(dir) {
            if (galRealCount <= 1) return;
            const track = document.getElementById('galleryTrack');
            const prevIndex = galleryIndex;
            galleryIndex = (galleryIndex + dir + galRealCount) % galRealCount;
            updateGalleryUI();

            const nextIdx = (galleryIndex + dir + galRealCount) % galRealCount;
            const preloadImg = new Image();
            preloadImg.src = galleryPhotos[nextIdx];

            if (dir === 1 && prevIndex === galRealCount - 1) {
                // 마지막 → 첫번째: 오른쪽 클론으로 슬라이드 후 점프
                track.style.transition = 'transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                track.style.transform = `translateX(-${(galRealCount + 1) * 100}%)`;
            } else if (dir === -1 && prevIndex === 0) {
                // 첫번째 → 마지막: 왼쪽 클론으로 슬라이드 후 점프
                track.style.transition = 'transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                track.style.transform = `translateX(0%)`;
            } else {
                setGalleryPos(true);
                return;
            }

            track.addEventListener('transitionend', function handler() {
                track.removeEventListener('transitionend', handler);
                track.style.transition = 'none';
                track.style.transform = `translateX(-${(galleryIndex + 1) * 100}%)`;
            });
        }

        function setupGallerySwipe() {
            const wrap = document.getElementById('galleryTrackWrap');
            const track = document.getElementById('galleryTrack');

            const newWrap = wrap.cloneNode(false);
            newWrap.id = 'galleryTrackWrap';
            newWrap.appendChild(track);
            wrap.parentNode.replaceChild(newWrap, wrap);

            // 위아래 스와이프로 갤러리 닫기만
            let galTouchStartY = 0, galTouchDeltaY = 0;
            const overlay = document.getElementById('galleryOverlay');

            overlay.addEventListener('touchstart', (e) => {
                galTouchStartY = e.touches[0].clientY;
                galTouchDeltaY = 0;

            }, { passive: true });

            overlay.addEventListener('touchmove', (e) => {
                galTouchDeltaY = e.touches[0].clientY - galTouchStartY;
                overlay.style.opacity = 1 - Math.abs(galTouchDeltaY) / 300;
                const base = (galleryIndex + 1) * 100;
                track.style.transform = `translateX(-${base}%) translateY(${galTouchDeltaY}px)`;
            }, { passive: true });

            overlay.addEventListener('touchend', () => {
                if (Math.abs(galTouchDeltaY) > 80) {
                    closeGallery();
                    overlay.style.opacity = '';
                } else {
                    setGalleryPos(true);
                    overlay.style.opacity = '';
                }
            });
        }

        // URL에서 카드 ID 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const cardId = urlParams.get('id');
        const cardIds = urlParams.get('ids');
        const agentOverrideId = urlParams.get('agent');
        
        // 공유 매물: 보내는 중개사 정보 먼저 로드 후 카드 로드
        (async function init() {

<!-- 휙 에러 수집 스니펫 v1.2 -->
<script>
(function() {
  const MAX_PER_MINUTE = 10;
  const IGNORE_LIST = [
    'ResizeObserver loop',
    'Script error.',
    'Loading chunk',
  ];

  let sendCount = 0;
  const sent = new Set();
  let cachedUserId = null;

  setInterval(() => { sendCount = 0; }, 60000);

  function getSb() {
    if (typeof supabaseClient !== 'undefined') return supabaseClient;
    if (typeof supabase !== 'undefined') return supabase;
    return null;
  }

  async function getUserId() {
    if (cachedUserId) return cachedUserId;
    try {
      const sb = getSb();
      if (!sb) return null;
      const { data } = await sb.auth.getSession();
      cachedUserId = data?.session?.user?.id || null;
      return cachedUserId;
    } catch {
      return null;
    }
  }

  function errorKey(type, msg, src, line) {
    return [type, msg?.substring(0, 100), src, line].join('|');
  }

  function severity(type, msg) {
    const m = (msg || '').toLowerCase();
    if (m.includes('supabase') && m.includes('not defined')) return 'critical';
    if (m.includes('kakao') && m.includes('not defined')) return 'critical';
    if (m.includes('authapierror')) return 'critical';
    if (m.includes('jwt expired')) return 'critical';
    if (m.includes('invalid api key')) return 'critical';
    if (type === 'edge_function') return 'high';
    if (m.includes('postgrest')) return 'high';
    if (m.includes('functionserror')) return 'high';
    if (m.includes('row-level security')) return 'high';
    if (m.includes('insert') || m.includes('update')) return 'high';
    if (m.includes('auth') || m.includes('login')) return 'high';
    if (m.includes('storage')) return 'high';
    if (m.includes('cannot read prop')) return 'mid';
    if (m.includes('undefined')) return 'mid';
    if (m.includes('null')) return 'mid';
    if (m.includes('typeerror')) return 'mid';
    if (m.includes('referenceerror')) return 'mid';
    if (m.includes('networkerror')) return 'mid';
    if (m.includes('timeout')) return 'mid';
    if (m.includes('429') || m.includes('rate limit')) return 'mid';
    return 'low';
  }

  function fileName(url) {
    if (!url) return 'unknown';
    try { return new URL(url).pathname.split('/').pop() || 'unknown'; }
    catch { return url.split('/').pop() || 'unknown'; }
  }

  async function logError(data) {
    try {
      if (sendCount >= MAX_PER_MINUTE) return;
      const msg = data.message || '';
      if (IGNORE_LIST.some(x => msg.includes(x))) return;
      const key = errorKey(data.error_type, msg, data.source_file, data.line_number);
      if (sent.has(key)) return;
      sent.add(key);
      const sb = getSb();
      if (!sb) return;
      const userId = await getUserId();
      await sb.from('error_logs').insert({
        error_type: data.error_type || 'js_error',
        message: msg.substring(0, 1000),
        stack_trace: (data.stack_trace || '').substring(0, 3000),
        source_file: fileName(data.source_file),
        line_number: data.line_number || null,
        col_number: data.col_number || null,
        page_url: location.href.substring(0, 500),
        user_agent: navigator.userAgent.substring(0, 500),
        user_id: userId,
        severity: severity(data.error_type, msg),
        extra_info: {
          screen: screen.width + 'x' + screen.height,
          viewport: window.innerWidth + 'x' + window.innerHeight,
          referrer: document.referrer || null,
          timestamp_local: new Date().toLocaleString('ko-KR', {timeZone:'Asia/Seoul'})
        }
      });
      sendCount++;
    } catch (e) {}
  }

  window.onerror = function(msg, src, line, col, err) {
    logError({
      error_type: 'js_error',
      message: msg,
      stack_trace: err?.stack,
      source_file: src,
      line_number: line,
      col_number: col
    });
    return false;
  };

  window.addEventListener('unhandledrejection', function(e) {
    logError({
      error_type: 'promise_rejection',
      message: e.reason?.message || String(e.reason),
      stack_trace: e.reason?.stack
    });
  });

  console.log('[휙 에러수집] v1.2 활성화 ✓');
})();
</script>

        <button class="map-fullscreen-close" onclick="closeFullscreenMap()">✕</button>
    </div>
    <div id="mapFullscreen"></div>
</div>
