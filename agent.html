<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중개사 홈페이지 — 휙</title>
<meta name="description" content="휙 공인중개사 매물 목록">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --dark: #1a1a2e;
  --yellow: #f5c842;
  --yellow-dim: rgba(245,200,66,0.15);
  --yellow-bg: rgba(245,200,66,0.04);
  --bg: #f8f8fa;
  --surface: #ffffff;
  --card: #f3f4f6;
  --border: #e5e7eb;
  --text: #1a1a2e;
  --sub: #6b7280;
  --muted: #6b7280;
  --radius: 10px;
}
html,body { font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:var(--dark); color:var(--text); -webkit-font-smoothing:antialiased; letter-spacing:-0.02em; line-height:1.6; }
.wrap { max-width:430px; margin:0 auto; background:var(--surface); min-height:100vh; box-shadow:0 0 40px rgba(0,0,0,0.3); }

/* 브레드크럼 */
.breadcrumb { padding:10px 16px; font-size:11px; color:var(--muted); }
.breadcrumb a { color:var(--sub); text-decoration:none; }
.breadcrumb span { margin:0 4px; }

/* 헤더 — 단지 페이지와 동일 */
.header { background:var(--dark); padding:16px; }
.header-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.logo {
  width:48px; height:48px;
  background:var(--yellow);
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:20px; color:var(--dark);
  flex-shrink:0; overflow:hidden;
}
.logo img { width:100%; height:100%; object-fit:cover; border-radius:10px; }
.header-info { flex:1; min-width:0; }
.header-name { font-size:17px; font-weight:500; color:#fff; }
.header-sub { font-size:12px; color:rgba(255,255,255,0.6); margin-top:2px; }
.header-actions { display:flex; gap:8px; margin-top:12px; }
.btn-call {
  flex:1; padding:11px 14px;
  background:var(--yellow); border:none; border-radius:8px;
  font-size:14px; font-weight:700; color:var(--dark);
  cursor:pointer; text-decoration:none;
  display:flex; align-items:center; justify-content:center; gap:7px;
  letter-spacing:0.5px;
}
.btn-call svg { flex-shrink:0; }
.btn-hwik {
  padding:11px 14px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:8px;
  font-size:13px; font-weight:400; color:rgba(255,255,255,0.75);
  cursor:pointer; text-decoration:none; text-align:center; display:block;
  white-space:nowrap;
}

/* 통계 뱃지 */
.stat-row { display:flex; gap:8px; margin-top:10px; }
.stat-badge {
  font-size:11px; padding:3px 10px;
  background:rgba(255,255,255,0.1);
  border-radius:20px; color:rgba(255,255,255,0.8);
}

/* 구분선 */
.divider { height:8px; background:var(--card); }

/* 섹션 */
.section { padding:16px; }
.section-title {
  font-size:14px; font-weight:600; margin-bottom:12px;
  display:flex; align-items:center; gap:6px;
}
.section-title::before {
  content:''; display:inline-block;
  width:3px; height:14px;
  background:var(--yellow); border-radius:2px;
}
.section-title small { font-size:12px; font-weight:400; color:var(--sub); }

/* 매물 카드 — listing-item 스타일 */
.trade-list { display:flex; flex-direction:column; gap:8px; }
.listing-item {
  display:flex; gap:12px; align-items:flex-start;
  padding:14px;
  border:1.5px solid var(--yellow);
  border-radius:var(--radius);
  background:var(--yellow-bg);
  cursor:pointer;
  box-shadow:0 1px 4px rgba(245,200,66,0.15);
  transition:all .15s;
  text-decoration:none; color:inherit;
}
.listing-item:hover { box-shadow:0 3px 10px rgba(245,200,66,0.25); transform:translateY(-1px); }
.listing-item:active { transform:scale(0.98); background:rgba(245,200,66,0.12); }

/* 썸네일 */
.thumb {
  width:56px; height:56px;
  border-radius:8px;
  background:var(--card);
  flex-shrink:0; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
}
.thumb img { width:100%; height:100%; object-fit:cover; }

/* 카드 내용 */
.card-body { flex:1; min-width:0; }
.badges { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:4px; }
.badge {
  font-size:10px; font-weight:600;
  padding:2px 7px; border-radius:4px;
}
.b-매매 { background:#fff3ed; color:#ea580c; }
.b-전세 { background:#eef2ff; color:#4f46e5; }
.b-월세 { background:#f5f3ff; color:#7c3aed; }
.b-반전세 { background:#fdf4ff; color:#a21caf; }
.b-계약가능 { background:#f0fdf4; color:#16a34a; }
.b-계약중  { background:#eff6ff; color:#2563eb; }
.card-price { font-size:16px; font-weight:700; color:var(--text); margin-bottom:2px; }
.card-loc { font-size:12px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
.card-tags { display:flex; flex-wrap:wrap; gap:3px; }
.card-tag {
  font-size:10px; color:var(--sub);
  background:rgba(0,0,0,0.04);
  border-radius:4px; padding:1px 6px;
}
.listing-link { font-size:11px; color:#ba7517; align-self:center; font-weight:500; white-space:nowrap; }

/* 빈 상태 */
.listing-empty {
  text-align:center; padding:20px 16px;
  border:1.5px dashed var(--yellow);
  border-radius:var(--radius);
  background:var(--yellow-bg);
}
.listing-empty-text { font-size:13px; color:var(--sub); margin-bottom:8px; }

/* 스켈레톤 */
.skel { background:linear-gradient(90deg,#f0f0f4 25%,#e8e8ec 50%,#f0f0f4 75%); background-size:200% 100%; animation:shimmer 1.2s infinite; border-radius:6px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-item { display:flex; gap:12px; padding:14px; border:1.5px solid #f0eedf; border-radius:var(--radius); background:#fffdf0; margin-bottom:8px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 브레드크럼 -->
  <div class="breadcrumb">
    <a href="/">휙</a><span>›</span>
    <a href="/gu.html">지역</a><span>›</span>
    <span id="navName">중개사</span>
  </div>

  <!-- 헤더 -->
  <div class="header">
    <div class="header-top">
      <div class="logo" id="profileLogo">휙</div>
      <div class="header-info">
        <div class="header-name" id="profileName">불러오는 중...</div>
        <div class="header-sub" id="profileSub"></div>
      </div>
    </div>
    <div class="stat-row" id="statRow"></div>
    <div class="header-actions" id="headerActions" style="display:none">
      <a class="btn-call" id="btnCall" href="#">📞 전화 상담</a>
      <a class="btn-hwik" href="/mobile.html">휙 검색</a>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 매물 목록 -->
  <div class="section">
    <div class="section-title">
      등록 매물 <small id="cardCount"></small>
    </div>
    <div class="trade-list" id="cardList">
      <div class="skel-item">
        <div class="skel" style="width:56px;height:56px;border-radius:8px;flex-shrink:0"></div>
        <div style="flex:1">
          <div class="skel" style="height:12px;width:55%;margin-bottom:7px"></div>
          <div class="skel" style="height:17px;width:38%;margin-bottom:7px"></div>
          <div class="skel" style="height:11px;width:75%"></div>
        </div>
      </div>
      <div class="skel-item">
        <div class="skel" style="width:56px;height:56px;border-radius:8px;flex-shrink:0"></div>
        <div style="flex:1">
          <div class="skel" style="height:12px;width:45%;margin-bottom:7px"></div>
          <div class="skel" style="height:17px;width:32%;margin-bottom:7px"></div>
          <div class="skel" style="height:11px;width:65%"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const sb = supabase.createClient(HWIK_CONFIG.SUPABASE_URL, HWIK_CONFIG.SUPABASE_KEY);
const params = new URLSearchParams(location.search);
const agentId = params.get('id');

if (!agentId) {
  document.getElementById('profileName').textContent = '잘못된 주소입니다.';
  document.getElementById('cardList').innerHTML = '';
} else {
  load();
}

async function load() {
  const [profileRes, cardsRes] = await Promise.all([
    sb.from('profiles')
      .select('id,agent_name,business_name,phone,address,profile_photo_url')
      .eq('id', agentId)
      .maybeSingle(),
    sb.from('cards')
      .select('id,property,trade_status,photos,tags,price_number')
      .eq('agent_id', agentId)
      .neq('property->>type', '손님')
      .neq('trade_status', '완료')
      .order('created_at', { ascending: false })
      .limit(30),
  ]);

  const p = profileRes.data;
  const cards = cardsRes.data || [];

  if (!p) {
    document.getElementById('profileName').textContent = '존재하지 않는 중개사입니다.';
    document.getElementById('cardList').innerHTML = '';
    return;
  }

  renderProfile(p, cards.length);
  renderCards(cards);
}

function renderProfile(p, count) {
  const name = p.agent_name || p.business_name || '공인중개사';
  document.title = `${name} — 휙`;
  document.getElementById('navName').textContent = name;
  document.getElementById('profileName').textContent = name;

  const sub = [p.business_name !== name ? p.business_name : '', p.address].filter(Boolean).join(' · ');
  document.getElementById('profileSub').textContent = sub;

  // 로고 (프로필 사진 or 이름 첫 글자)
  const logo = document.getElementById('profileLogo');
  if (p.profile_photo_url) {
    logo.innerHTML = `<img src="${esc(p.profile_photo_url)}" alt="${esc(name)}">`;
  } else {
    logo.textContent = name[0] || '중';
  }

  // 통계 뱃지
  const statRow = document.getElementById('statRow');
  const parts = [];
  if (p.address) parts.push('📍 ' + p.address.split(' ').slice(0,2).join(' '));
  if (count > 0) parts.push(`매물 ${count}건`);
  statRow.innerHTML = parts.map(t => `<span class="stat-badge">${esc(t)}</span>`).join('');

  // 전화 버튼
  if (p.phone) {
    const formatted = formatPhone(p.phone);
    document.getElementById('btnCall').href = `tel:${esc(p.phone)}`;
    document.getElementById('btnCall').innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.64 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.55 1.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${formatted}`;
    document.getElementById('headerActions').style.display = 'flex';
  }
}

function renderCards(cards) {
  const listEl = document.getElementById('cardList');
  const countEl = document.getElementById('cardCount');

  if (!cards.length) {
    listEl.innerHTML = `<div class="listing-empty"><div class="listing-empty-text">등록된 매물이 없습니다</div></div>`;
    countEl.textContent = '';
    return;
  }

  countEl.textContent = `${cards.length}건`;

  listEl.innerHTML = cards.map(card => {
    const p = card.property || {};
    const type = p.type || '';
    const price = p.price || '';
    const complex = p.complex || '';
    const location = p.location || '';
    const area = p.area || '';
    const floor = p.floor || '';
    const status = card.trade_status || '계약가능';
    const tags = (card.tags || []).slice(0, 4);
    const loc = [complex, location, area, floor ? floor + '층' : ''].filter(Boolean).join(' · ');
    const photos = card.photos || [];
    const thumb = photos[0]?.url || (typeof photos[0] === 'string' ? photos[0] : null);
    const thumbHtml = thumb
      ? `<div class="thumb"><img src="${esc(thumb)}" alt="매물" loading="lazy"></div>`
      : `<div class="thumb">${{매매:'🏠',전세:'🔑',월세:'💰',반전세:'🏡'}[type]||'🏠'}</div>`;
    const tagsHtml = tags.length
      ? `<div class="card-tags">${tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join('')}</div>`
      : '';

    return `<a class="listing-item" href="/property_chat.html?id=${esc(card.id)}" target="_blank">
      ${thumbHtml}
      <div class="card-body">
        <div class="badges">
          <span class="badge b-${esc(type)}">${esc(type)}</span>
          <span class="badge b-${esc(status)}">${esc(status)}</span>
        </div>
        <div class="card-price">${esc(price)}</div>
        <div class="card-loc">${esc(loc)}</div>
        ${tagsHtml}
      </div>
      <span class="listing-link">보기 →</span>
    </a>`;
  }).join('');
}

function formatPhone(p) {
  const d = (p || '').replace(/\D/g, '');
  if (d.length === 11) return `${d.slice(0,3)}-${d.slice(3,7)}-${d.slice(7)}`;
  if (d.length === 10) return `${d.slice(0,3)}-${d.slice(3,6)}-${d.slice(6)}`;
  return p;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
