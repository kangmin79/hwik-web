<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>휙 길찾기 경로 테스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0f1117; color: #e2e8f0; }
  #map { width: 100%; height: 100vh; }
  #panel { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1d27; border-top: 1px solid rgba(255,255,255,0.1); padding: 16px; z-index: 999; }
  .title { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
  .btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { padding: 8px 14px; border-radius: 20px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-subway { background: rgba(226,75,74,0.2); color: #e24b4a; border: 1px solid rgba(226,75,74,0.4); }
  .btn-school { background: rgba(29,158,117,0.2); color: #1d9e75; border: 1px solid rgba(29,158,117,0.4); }
  .btn-bus    { background: rgba(55,138,221,0.2); color: #378add; border: 1px solid rgba(55,138,221,0.4); }
  .btn-clear  { background: rgba(255,255,255,0.05); color: #6b7280; border: 1px solid rgba(255,255,255,0.1); }
  #status { font-size: 12px; color: #6b7280; margin-top: 8px; min-height: 18px; }
  .info-box { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: #1a1d27; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 16px; font-size: 13px; z-index: 999; white-space: nowrap; }
</style>
</head>
<body>
<div id="map"></div>
<div class="info-box">📍 매물: 마포구 공덕동 삼성래미안</div>
<div id="panel">
  <div class="title">도로따라 경로 표시 (애니메이션)</div>
  <div class="btns">
    <button class="btn btn-subway" onclick="drawRoute('subway')">🚇 공덕역</button>
    <button class="btn btn-school" onclick="drawRoute('school')">🏫 공덕초등학교</button>
    <button class="btn btn-bus"    onclick="drawRoute('bus')">🚌 버스정류장</button>
    <button class="btn btn-clear"  onclick="clearRoutes()">✕ 초기화</button>
  </div>
  <div id="status">버튼을 누르면 도로따라 경로가 그려집니다</div>
</div>

<script>
const KAKAO_REST_KEY = (typeof HWIK_CONFIG !== 'undefined' && HWIK_CONFIG.KAKAO_REST_KEY) || '8b7ecadf67aaed392e75605093efb2c4';
const PROPERTY = { lat: 37.5449, lng: 126.9514 };
const POIS = {
  subway: { lat: 37.5443, lng: 126.9521, name: '공덕역',          color: '#e24b4a' },
  school: { lat: 37.5462, lng: 126.9488, name: '공덕초등학교',    color: '#1d9e75' },
  bus:    { lat: 37.5435, lng: 126.9500, name: '공덕동버스정류장', color: '#378add' },
};

let map, polylines = [], markers = [], animTimers = [];

// ★ autoload=false → kakao.maps.load() 콜백에서 초기화
window.kakaoInit = function() {
  kakao.maps.load(() => {
    const center = new kakao.maps.LatLng(PROPERTY.lat, PROPERTY.lng);
    map = new kakao.maps.Map(document.getElementById('map'), { center, level: 4 });
    const marker = new kakao.maps.Marker({ position: center, map });
    const iw = new kakao.maps.InfoWindow({
      content: '<div style="padding:6px 10px;font-size:12px;font-weight:600;">📍 삼성래미안(매물)</div>'
    });
    iw.open(map, marker);
    markers.push(marker);
  });
};
</script>

<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=124cd68b3419bde24e03efa4f1ca2830&libraries=services&autoload=false" onload="kakaoInit()"></script>

<script>
async function drawRoute(type) {
  const poi = POIS[type];
  const status = document.getElementById('status');
  status.textContent = `${poi.name} 경로 계산 중...`;

  try {
    const url = `https://apis-navi.kakaomobility.com/v1/directions?origin=${PROPERTY.lng},${PROPERTY.lat}&destination=${poi.lng},${poi.lat}&priority=RECOMMEND`;
    const res = await fetch(url, { headers: { 'Authorization': `KakaoAK ${KAKAO_REST_KEY}` } });
    const data = await res.json();
    if (data.routes && data.routes[0] && data.routes[0].result_code === 0) {
      const coords = [];
      data.routes[0].sections.forEach(s => s.roads.forEach(r => {
        for (let i = 0; i < r.vertexes.length; i += 2)
          coords.push(new kakao.maps.LatLng(r.vertexes[i+1], r.vertexes[i]));
      }));
      const dist = Math.round(data.routes[0].summary.distance);
      const mins = Math.round(data.routes[0].summary.duration / 60);
      animateLine(coords, poi.color);
      addPoiMarker(poi);
      status.textContent = `✅ ${poi.name} — ${mins}분 (${dist}m)`;
      return;
    }
  } catch(e) {}

  // 폴백: OSRM 도보
  try {
    const url = `https://router.project-osrm.org/route/v1/foot/${PROPERTY.lng},${PROPERTY.lat};${poi.lng},${poi.lat}?overview=full&geometries=geojson`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.routes && data.routes[0]) {
      const coords = data.routes[0].geometry.coordinates.map(c => new kakao.maps.LatLng(c[1], c[0]));
      const dist = Math.round(data.routes[0].distance);
      const mins = Math.round(data.routes[0].duration / 60);
      animateLine(coords, poi.color);
      addPoiMarker(poi);
      status.textContent = `✅ ${poi.name} — 도보 ${mins}분 (${dist}m)`;
    }
  } catch(e) {
    status.textContent = `❌ 경로 조회 실패`;
  }
}

function animateLine(coords, color) {
  const bounds = new kakao.maps.LatLngBounds();
  coords.forEach(c => bounds.extend(c));
  map.setBounds(bounds);

  let drawn = 2;
  let prevLine = null;
  const step = Math.max(1, Math.floor(coords.length / 50));

  const timer = setInterval(() => {
    if (drawn > coords.length) {
      clearInterval(timer);
      // 마지막 완성선 고정
      const finalLine = new kakao.maps.Polyline({
        path: coords, strokeWeight: 5, strokeColor: color, strokeOpacity: 0.9, strokeStyle: 'solid'
      });
      finalLine.setMap(map);
      polylines.push(finalLine);
      if (prevLine) prevLine.setMap(null);
      return;
    }
    if (prevLine) prevLine.setMap(null);
    prevLine = new kakao.maps.Polyline({
      path: coords.slice(0, drawn),
      strokeWeight: 5, strokeColor: color, strokeOpacity: 0.9, strokeStyle: 'solid'
    });
    prevLine.setMap(map);
    drawn += step;
  }, 16);

  animTimers.push(timer);
}

function addPoiMarker(poi) {
  const marker = new kakao.maps.Marker({
    position: new kakao.maps.LatLng(poi.lat, poi.lng), map
  });
  const iw = new kakao.maps.InfoWindow({
    content: `<div style="padding:5px 8px;font-size:11px;font-weight:600;">${poi.name}</div>`
  });
  iw.open(map, marker);
  markers.push(marker);
}

function clearRoutes() {
  animTimers.forEach(clearInterval);
  animTimers = [];
  polylines.forEach(p => p.setMap(null));
  polylines = [];
  markers.forEach((m, i) => { if (i > 0) m.setMap(null); });
  markers = markers.slice(0, 1);
  document.getElementById('status').textContent = '초기화됨';
  map.setCenter(new kakao.maps.LatLng(PROPERTY.lat, PROPERTY.lng));
  map.setLevel(4);
}
</script>
</body>
</html>
